        /* StatsPage Component: Visualizes productivity metrics */
        const StatsPage = ({ user, onOpenCreator, quickTasks = [], pomodoroTime, isPomodoroActive }) => {
            const stats = useMemo(() => {
                const all = Array.isArray(quickTasks) ? quickTasks : [];
                const completed = all.filter(t => t.completed);
                const pending = all.filter(t => !t.completed);
                const total = all.length;
                const completionRate = total ? Math.round((completed.length / total) * 100) : 0;

                const startOfToday = new Date();
                startOfToday.setHours(0, 0, 0, 0);
                const endOfToday = new Date(startOfToday);
                endOfToday.setDate(endOfToday.getDate() + 1);

                const doneToday = completed.filter(t => t.completedAt && t.completedAt >= startOfToday.getTime() && t.completedAt < endOfToday.getTime()).length;
                const overdue = pending.filter(t => {
                    if (!t.dueDate) return false;
                    const due = new Date(`${t.dueDate}T${t.dueTime || '23:59'}`).getTime();
                    return !isNaN(due) && due < Date.now();
                }).length;

                const weekBuckets = Array.from({ length: 7 }).map((_, idx) => {
                    const d = new Date(startOfToday);
                    d.setDate(d.getDate() - (6 - idx));
                    const key = d.toLocaleDateString('en-US', { weekday: 'short' });
                    return { key, done: 0 };
                });

                completed.forEach(t => {
                    if (!t.completedAt) return;
                    const d = new Date(t.completedAt);
                    d.setHours(0, 0, 0, 0);
                    const diffDays = Math.floor((startOfToday.getTime() - d.getTime()) / (24 * 60 * 60 * 1000));
                    if (diffDays >= 0 && diffDays < 7) {
                        const idx = 6 - diffDays;
                        weekBuckets[idx].done += 1;
                    }
                });

                return { total, completed: completed.length, pending: pending.length, completionRate, doneToday, overdue, weekBuckets };
            }, [quickTasks]);

            const ringCirc = 2 * Math.PI * 42;
            const ringProgress = (ringCirc * stats.completionRate) / 100;
            const weeklyMax = Math.max(1, ...stats.weekBuckets.map(b => b.done));

            return (
                /* FIX 2026-04-15: Added showFab={false} and removed noPadding for StatsPage display */
                <Layout onOpenCreator={onOpenCreator} showFab={false} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive}>
                    {/* FIX 2026-04-15: Increased to pt-[110px] for better header separation */}
                    <div className="max-w-7xl mx-auto w-full px-0 md:px-12 pt-[110px] md:pt-10 pb-24">
                        <Header user={user} subtitle="Productivity Statistics" />
                        <div className="px-4 md:px-0 space-y-6 md:space-y-8">
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-5">
                                <div className="glass-panel rounded-2xl p-4 md:p-5">
                                    <p className="text-[10px] uppercase tracking-widest text-cream-light/40 font-bold">Total Tasks</p>
                                    <p className="text-2xl md:text-3xl font-display text-cream-light mt-2">{stats.total}</p>
                                </div>
                                <div className="glass-panel rounded-2xl p-4 md:p-5">
                                    <p className="text-[10px] uppercase tracking-widest text-cream-light/40 font-bold">Completed</p>
                                    <p className="text-2xl md:text-3xl font-display text-green-300 mt-2">{stats.completed}</p>
                                </div>
                                <div className="glass-panel rounded-2xl p-4 md:p-5">
                                    <p className="text-[10px] uppercase tracking-widest text-cream-light/40 font-bold">Done Today</p>
                                    <p className="text-2xl md:text-3xl font-display text-primary mt-2">{stats.doneToday}</p>
                                </div>
                                <div className="glass-panel rounded-2xl p-4 md:p-5">
                                    <p className="text-[10px] uppercase tracking-widest text-cream-light/40 font-bold">Overdue</p>
                                    <p className="text-2xl md:text-3xl font-display text-red-300 mt-2">{stats.overdue}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
                                <div className="lg:col-span-4 glass-panel rounded-3xl p-6 md:p-8 flex flex-col items-center justify-center card-glow">
                                    <h3 className="text-xl font-display font-bold text-cream-light italic mb-6 w-full">Overall Progress</h3>
                                    <div className="relative w-48 h-48 md:w-56 md:h-56 flex items-center justify-center">
                                        <svg className="w-full h-full -rotate-90" viewBox="0 0 100 100">
                                            <circle cx="50" cy="50" fill="transparent" r="42" stroke="rgba(255,255,255,0.08)" strokeWidth="8"></circle>
                                            <circle cx="50" cy="50" fill="transparent" r="42" stroke="#f97316" strokeDasharray={`${ringProgress} ${ringCirc}`} strokeLinecap="round" strokeWidth="8"></circle>
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-4xl font-display font-bold text-cream-light">{stats.completionRate}%</span>
                                            <span className="text-[10px] font-bold text-primary/60 uppercase tracking-widest mt-1">Completed</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-8 glass-panel rounded-3xl p-6 md:p-8 card-glow">
                                    <h3 className="text-xl font-display font-bold text-cream-light italic mb-6">Weekly Momentum</h3>
                                    <div className="grid grid-cols-7 gap-2 md:gap-3 items-end h-44 md:h-52">
                                        {stats.weekBuckets.map(bucket => {
                                            const pct = Math.max(8, Math.round((bucket.done / weeklyMax) * 100));
                                            return (
                                                <div key={bucket.key} className="flex flex-col items-center justify-end h-full">
                                                    <div className="w-full rounded-xl bg-white/5 border border-white/5 overflow-hidden h-full flex items-end">
                                                        <div className="w-full bg-gradient-to-t from-primary to-orange-300/80 rounded-xl transition-all duration-300" style={{ height: `${pct}%` }}></div>
                                                    </div>
                                                    <p className="text-[9px] md:text-[10px] text-cream-light/50 mt-2 uppercase tracking-wider font-bold">{bucket.key}</p>
                                                    <p className="text-[10px] text-cream-light/70 font-bold">{bucket.done}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel rounded-3xl p-6 md:p-8">
                                <h3 className="text-lg md:text-xl font-display font-bold text-cream-light italic mb-4">Insight</h3>
                                <p className="text-sm md:text-base text-cream-light/70 font-sans leading-relaxed">
                                    {stats.total === 0
                                        ? "Start by adding your first quick task. Your progress analytics will appear here automatically."
                                        : stats.completionRate >= 80
                                            ? "Excellent consistency. Keep your momentum by clearing overdue tasks first to maintain high completion."
                                            : stats.completionRate >= 50
                                                ? "Good pace. A quick win is finishing 2-3 pending tasks today to push your completion above 70%."
                                                : "You have room to recover. Focus on completing today's tasks first before adding new ones."}
                                </p>
                            </div>
                        </div>
                    </div>
                </Layout>
            );
        };

        /* StreakPage Component: Displays gamification streaks and rewards */
        const StreakPage = ({ user, onOpenCreator, gamification, pomodoroTime, isPomodoroActive }) => {
            const rewards = gamification?.rewards || [];
            const currentStreak = gamification?.currentStreak || 0;
            const streakUnit = currentStreak === 1 ? 'DAY' : 'DAYS';
            return (
                /* FIX 2026-04-15: Added showFab={false} to disable Floating Action Button on StreakPage as requested */
                <Layout onOpenCreator={onOpenCreator} showFab={false} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive}>
                    {/* FIX 2026-04-15: Increased to pt-[110px] for better header separation */}
                    <div className="max-w-2xl mx-auto w-full pt-[110px] pb-24 px-4 md:px-0">
                        <Header user={user} subtitle="Streak & Achievements" />
                        <div className="px-4 md:px-0">
                            <section className="mb-16 flex flex-col items-center text-center">
                                <div className="relative mb-6">
                                    <span className="material-symbols-outlined text-[120px] text-primary glow-orange leading-none relative z-10" style={{fontVariationSettings: "'FILL' 1"}}>local_fire_department</span>
                                </div>
                                <h2 className="text-8xl font-black text-primary italic glow-orange tracking-tighter mb-2">{currentStreak} {streakUnit}</h2>
                                <p className="text-cream-light/40 text-lg uppercase tracking-[0.5em] font-sans font-bold">Current Streak</p>
                                <p className="text-cream-light/30 text-xs mt-2 uppercase tracking-wider">Best: {gamification?.longestStreak || 0} days</p>
                            </section>
                            <section className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
                                {(rewards.length ? rewards : ['Login Starter Reward']).map((reward, idx) => (

                                        <div className="w-16 h-16 rounded-full bg-amber-400/10 flex items-center justify-center text-amber-400 border border-amber-400/30">
                                            <span className="material-symbols-outlined text-3xl" style={{fontVariationSettings: "'FILL' 1"}}>military_tech</span>
                                        </div>
                                        <h3 className="text-xl font-bold text-cream-light">{typeof reward === 'string' ? reward : reward.name}</h3>
                                        <p className="text-cream-light/40 text-sm font-sans">Daily login reward unlocked.</p>
                                    </div>
                                ))}
                            </section>
                        </div>
                    </div>
                </Layout>
            );
        };

        /* ClockPage Component: Displays analog clock and alarm management */
        const ClockPage = ({ user, onOpenCreator, alarms = [], onAddAlarm, onToggleAlarm, onDeleteAlarm, pomodoroTime, setPomodoroTime, isPomodoroActive, setIsPomodoroActive, pomodoroSessions }) => {

            const [alarmTime, setAlarmTime] = useState('07:00');
            const [repeatDaily, setRepeatDaily] = useState(true);

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(timer);

            const seconds = now.getSeconds();
            const minutes = now.getMinutes();

            const secondDeg = seconds * 6;

            const hourDeg = (hours % 12) * 30 + minutes * 0.5;

            const handleSubmitAlarm = (e) => {
                e.preventDefault();
                if (!alarmTime) return;
                onAddAlarm({
                    label: (label || 'Alarm').trim(),

                setLabel('');

            return (
                /* FIX 2026-04-15: Added showFab={false} to disable Floating Action Button on ClockPage as requested */

                                        <div className="absolute w-[4px] h-[72px] bg-white origin-bottom rounded-full bottom-[50%]" style={{ transform: `rotate(${hourDeg}deg)` }}></div>

                                    </div>
                                    <div className="text-center">
                                        <h2 className="text-6xl font-display text-cream-light mb-2">{now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</h2>
                                        <p className="text-primary/60 font-sans tracking-[0.2em] uppercase text-sm font-bold">{now.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' })}</p>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between mb-4">
                                        <h2 className="text-2xl font-bold text-cream-light/90 uppercase tracking-[0.3em]">Pomodoro</h2>
                                        <div className="flex items-center gap-2">
                                            <span className="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full uppercase tracking-widest">{pomodoroSessions} Sessions Done</span>
                                        </div>
                                    </div>
                                    <div className="glass-panel p-10 rounded-[3rem] flex flex-col items-center justify-center space-y-8 relative overflow-hidden group">
                                        {/* Pomodoro Progress Ring [FIX 2026-04-16] */}
                                        <div className="relative w-64 h-64 flex items-center justify-center">
                                            <svg className="w-full h-full -rotate-90" viewBox="0 0 100 100">
                                                {/* Background Circle */}
                                                <circle 
                                                    cx="50" cy="50" r="46" 
                                                    fill="none" stroke="currentColor" strokeWidth="4" 
                                                    className="text-white/[0.03]" 
                                                />
                                                {/* Active Progress Circle */}
                                                <circle 
                                                    cx="50" cy="50" r="46" 
                                                    fill="none" stroke="url(#pomoGradient)" 
                                                    strokeWidth="4" strokeLinecap="round"
                                                    strokeDasharray="289.027"
                                                    strokeDashoffset={289.027 - (289.027 * ((1500 - pomodoroTime) / 1500))}
                                                    className="transition-all duration-1000 ease-linear"
                                                />
                                                <defs>
                                                    <linearGradient id="pomoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                                        <stop offset="0%" stopColor="#f97316" />
                                                        <stop offset="100%" stopColor="#ef4444" />
                                                    </linearGradient>
                                                </defs>
                                            </svg>
                                            
                                            {/* Inner UI */}
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                                                <div className={`text-6xl font-display font-bold text-cream-light tracking-tighter ${isPomodoroActive ? 'animate-pulse' : ''}`}>
                                                    {Math.floor(pomodoroTime / 60)}:{String(pomodoroTime % 60).padStart(2, '0')}
                                                </div>
                                                <p className="text-[10px] font-bold text-cream-light/30 uppercase tracking-[0.2em] mt-2">Focus Mode</p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-6 relative z-10">
                                            <button 
                                                id="pomo_play_pause_btn"
                                                onClick={() => {
                                                    if (navigator.vibrate) try { navigator.vibrate(20); } catch(e) {}
                                                    setIsPomodoroActive(!isPomodoroActive);
                                                }}
                                                className={`w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 shadow-xl ${isPomodoroActive ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 'bg-primary/20 text-primary border border-primary/30'}`}

                                                <span className="material-symbols-outlined text-4xl font-bold">{isPomodoroActive ? 'pause' : 'play_arrow'}</span>

                                                id="pomo_reset_btn"

                                                    if (navigator.vibrate) try { navigator.vibrate([10, 10]); } catch(e) {}

                                        {/* Background Decor */}

                                            </div>

                                </div>
                            </div>
                        </div>
                    </div>

        /* ProfilePage Component: User profile management */

            return (
                <div className="faiora-loading-screen fixed inset-0 z-50 blur-overlay flex flex-col items-center justify-center">

                                    Faiora

                            </div>

                                <p className="text-primary text-[10px] uppercase tracking-[0.8em] font-sans font-bold">Fallo ora</p>

        // --- Notification Permission Banner (for mobile user-gesture requirement) ---
        const NotificationBanner = ({ user }) => {
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                if (!user) return;
                if (!('Notification' in window)) return;
                if (Notification.permission === 'granted' || Notification.permission === 'denied') return;

                // Check if user dismissed the banner recently (7-day cooldown)
                const dismissed = localStorage.getItem('faiora_notif_banner_dismissed');
                if (dismissed) {
                    const dismissedAt = parseInt(dismissed);
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;
                    if (Date.now() - dismissedAt < sevenDays) return;
                }

                // Show banner after a short delay so it doesn't flash during loading
                const timer = setTimeout(() => setVisible(true), 2000);
                return () => clearTimeout(timer);
            }, [user]);

            const handleEnable = async () => {
                const result = await FaioraNotifications.requestPermission();
                setVisible(false);
                if (result !== 'granted') {
                    localStorage.setItem('faiora_notif_banner_dismissed', String(Date.now()));
                }
            };

            const handleDismiss = () => {
                setVisible(false);
                localStorage.setItem('faiora_notif_banner_dismissed', String(Date.now()));

            if (!visible) return null;

            return (
                <div className="faiora-mobile-banner fixed top-0 left-0 right-0 z-[300] px-4 pt-3 pb-0 md:flex md:justify-center pointer-events-none" style={{paddingTop: 'env(safe-area-inset-top, 12px)'}}>
                    <div className="pointer-events-auto w-full md:max-w-lg bg-gradient-to-r from-orange-950/95 via-black/95 to-orange-950/95 backdrop-blur-2xl border border-orange-500/30 rounded-2xl p-4 shadow-[0_8px_40px_rgba(249,115,22,0.25)] flex items-center gap-3 animate-in slide-in-from-top-4 duration-500">

        };

        // --- Root Component ---
        


        /* TransitionManager - handles page navigation transitions with fire-wipe overlay and content dissolve */
        /* FIX 2026-04-15: Added fade-in/fade-out dissolve animation on route content behind the fire sprite */
        const TransitionManager = ({ children, onTransitionStart, onTransitionEnd }) => {
            const FIRE_WIPE_DURATION_MS = 1200; // FIX 2026-04-15: Reduced from 1850ms for faster page switching
            const location = useLocation();
            const [displayLocation, setDisplayLocation] = useState(() => normalizeRouteLocation(location));
            const [isWiping, setIsWiping] = useState(false);
            const [isDissolving, setIsDissolving] = useState(false);
            const [isFadingIn, setIsFadingIn] = useState(false);
            const [transitionKey, setTransitionKey] = useState(0);

            const playFireSFX = () => {
                const audio = new Audio('fire_transition_sfx.mp3');
                audio.volume = 0.6;
                audio.play().catch(e => {
                    // Silent catch for autoplay restrictions
                });
                
                // Fade out after 1 second
                setTimeout(() => {
                    const fadeDuration = 500; // 0.5s fade
                    const step = 0.05;
                    const interval = fadeDuration / (0.4 / step);
                    
                    const fadeInterval = setInterval(() => {
                        if (audio.volume > step) {
                            audio.volume -= step;
                        } else {
                            audio.volume = 0;
                            clearInterval(fadeInterval);
                            audio.pause();
                        }
                    }, interval);
                }, 1000);
            };

            const lastPath = useRef(location.pathname || '/');
            const timers = useRef([]);

            const clearTimers = () => {
                timers.current.forEach(t => clearTimeout(t));
                timers.current = [];
            };

            const startTransition = (newLoc) => {
                clearTimers();
                setIsWiping(true);
                setIsDissolving(true);
                setIsFadingIn(false);
                setTransitionKey(prev => prev + 1);
                if (onTransitionStart) setTimeout(() => onTransitionStart(), 0);
                playFireSFX();

                /* t1: At 450ms, swap route content but keep it hidden (still dissolve-out) */
                const t1 = setTimeout(() => {
                    setDisplayLocation(normalizeRouteLocation(newLoc));
                }, 450); // FIX 2026-04-15: Reduced from 850ms

                /* t2: At 750ms, start the smooth fade-in as fire sprite begins to clear */
                /* Fire sprite peak is faster now, so content appears earlier for snappier feel */
                const t2 = setTimeout(() => {
                    setIsDissolving(false);
                    setIsFadingIn(true);
                }, 750); // FIX 2026-04-15: Reduced from 1300ms

                /* t3: Re-enable nav bar faster (at 600ms instead of 1100ms) */
                /* This eliminates the 'stuck' feeling during the fire sweep on mobile */
                const t3 = setTimeout(() => {
                    if (onTransitionEnd) setTimeout(() => onTransitionEnd(), 0);
                }, 600); // FIX 2026-04-15: Reduced from 1100ms

                /* t4: Fire sprite ends at 1200ms, remove fire overlay */
                const t4 = setTimeout(() => {
                    setIsWiping(false);
                }, FIRE_WIPE_DURATION_MS);

                /* t5: At 1500ms, fade-in animation done, cleanup dissolve state */
                const t5 = setTimeout(() => {
                    setIsFadingIn(false);
                }, 1500); // FIX 2026-04-15: Reduced from 2200ms
                
                timers.current = [t1, t2, t3, t4, t5];
            };

            useEffect(() => {
                // Do not run startTransition on first mount: it applies dissolve-out (opacity: 0) to all
                // routes until timers fire, which looks like a blank screen right after login when HashRouter mounts.
                setDisplayLocation(normalizeRouteLocation(location));
                lastPath.current = location.pathname || '/';
            }, []);

            useEffect(() => {
                const safety = setTimeout(() => {
                    setIsDissolving(false);
                    setIsWiping(false);
                    setIsFadingIn(false);
                }, 1600); // FIX 2026-04-15: Reduced from 2500ms safety limit
                return () => clearTimeout(safety);
            }, []);

            useEffect(() => {
                const path = location.pathname || '/';
                if (path !== lastPath.current) {
                    const params = new URLSearchParams(location.search);
                    if (params.has('search')) {
                        setDisplayLocation(normalizeRouteLocation(location));
                        lastPath.current = path;
                        return;
                    }
                    lastPath.current = path;
                    startTransition(location);
                }
            }, [location.pathname]);

            /* route-transition-shell - dissolve class determines fade-out/fade-in state */
            const dissolveClass = isDissolving ? 'route-dissolve-out' : (isFadingIn ? 'route-dissolve-in' : '');

            return (
                <div className="relative w-full h-full overflow-hidden">
                    {isWiping && (
                        <div key={transitionKey} className="fire-wipe-overlay fire-wipe-active">
                            <div className="fire-wipe-sprite"></div>
                        </div>
                    )}
                    <div key={displayLocation.pathname || '/'} className={"app-route-shell w-full h-full min-h-0 flex flex-col " + dissolveClass}>
                        <Routes location={normalizeRouteLocation(displayLocation)}>
                            {children}
                            <Route path="*" element={<Navigate to="/" replace />} />
                        </Routes>
                    </div>
                </div>
            );
        };

        const QuickTaskModal = ({ onClose, onAdd, initialData = null, showToast, prefillDate = null }) => {
            const getTomorrow = () => {
                const d = new Date();
                d.setDate(d.getDate() + 1);
                return formatDateLocal(d);
            };
            const getNextMonday = () => {
                const d = new Date();
                d.setDate(d.getDate() + (1 + 7 - d.getDay()) % 7 || 7);
                return formatDateLocal(d);
            };
             const extractDateFromText = (input) => {
                let lower = input.toLowerCase();
                let cleanText = input;
                const now = new Date();
                let newDate = null;
                let newTime = null;

                // 1. Detect Times first to prevent date parsing interference (e.g. 10am)
                // Patterns: 2pm, 10:30am, 14:00, 2 pm
                const timeRegex = /\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b|\b([01]\d|2[0-3]):([0-5]\d)\b/gi;
                let timeMatch;
                if ((timeMatch = timeRegex.exec(lower)) !== null) {
                    let h, m = '00';
                    if (timeMatch[1]) { // am/pm format
                        h = parseInt(timeMatch[1]);
                        if (timeMatch[2]) m = timeMatch[2];
                        const ampm = timeMatch[3].toLowerCase();
                        if (ampm === 'pm' && h < 12) h += 12;
                        if (ampm === 'am' && h === 12) h = 0;
                    } else { // 24h format
                        h = parseInt(timeMatch[4]);
                        m = timeMatch[5];
                    }
                    newTime = `${h.toString().padStart(2, '0')}:${m}`;
                    cleanText = cleanText.replace(timeMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                 // 2. Detect Specific Dates (e.g. mar 1, march 10, this 15)
                const monthNames = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
                const fullMonthNames = ['january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
                
                // Generic date like "march 15", "mar 15", or "mar15"
                const dateRegex = new RegExp(`\\b(${monthNames.join('|')}|${fullMonthNames.join('|')})\\s*(\\d{1,2})\\b`, 'i');
                let dateMatch = dateRegex.exec(lower);
                
                // "this 15" format
                const thisDateRegex = /\bthis\s+(\d{1,2})\b/i;
                let thisDateMatch = thisDateRegex.exec(lower);

                if (dateMatch) {
                    const monthText = dateMatch[1].toLowerCase();
                    let monthIdx = monthNames.findIndex(m => monthText.startsWith(m));
                    if (monthIdx === -1) monthIdx = fullMonthNames.findIndex(m => m.startsWith(monthText));
                    const day = parseInt(dateMatch[2]);
                    
                    const targetDate = new Date(now.getFullYear(), monthIdx, day);
                    const matchIdx = dateMatch.index;
                    const fullMatch = dateMatch[0];
                    const nextChar = lower[matchIdx + fullMatch.length];

                    // Refinement: only commit if:
                    // 1. Next char exists (e.g. user typed a space after "mar 1 ")
                    // 2. OR the day is > 3 (e.g. "mar 4" is definitely not "mar 40")
                    // 3. OR it's a 2-digit day (handled by day > 3 mostly, but explicit check for 10-31)
                    if (day >= 1 && day <= 31) {
                        const targetDateStr = formatDateLocal(targetDate);
                        const tempCleanText = cleanText.replace(dateMatch[0], '');
                        if (nextChar || day > 3) {
                           if (targetDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                               targetDate.setFullYear(now.getFullYear() + 1);
                           }
                           newDate = formatDateLocal(targetDate);
                           cleanText = tempCleanText;
                           lower = cleanText.toLowerCase();
                        } else {
                           // Pending single digit
                           return { date: targetDateStr, time: newTime || '10:00', cleanText: tempCleanText, isPending: true };
                        }
                    }
                } else if (thisDateMatch) {
                    const day = parseInt(thisDateMatch[1]);
                    let targetDate = new Date(now.getFullYear(), now.getMonth(), day);
                    // If 15th of this month has passed, move to next month
                    if (targetDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                        targetDate = new Date(now.getFullYear(), now.getMonth() + 1, day);
                    }
                    newDate = formatDateLocal(targetDate);
                    cleanText = cleanText.replace(thisDateMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 3. Detect Relative Entities (tomorrow, next week, wed, thu, thur)
                const relativePatterns = [
                    { regex: /\btomorrow\b/i, offset: 1 },
                    { regex: /\bnext week\b/i, offset: 7 },
                    { regex: /\b(?:next\s+)?(monday|mon|tuesday|tue|wednesday|wed|thursday|thu|thur|thurs|friday|fri|saturday|sat|sunday|sun)\b/i }
                ];

                for (const p of relativePatterns) {
                    let match = p.regex.exec(lower);
                    if (match) {
                        const target = new Date();
                        if (p.offset) {
                            target.setDate(now.getDate() + p.offset);
                        } else {
                            const weekdays = { 
                                sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, thur: 4, thurs: 4, fri: 5, sat: 6, 
                                sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6 
                            };
                            const targetDay = weekdays[match[1].toLowerCase()];
                            // Calculate days until next occurrence
                            let diff = (targetDay + 7 - now.getDay()) % 7;
                            // If it's today, move to next week for "closest future"
                            if (diff === 0) diff = 7;
                            target.setDate(now.getDate() + diff);
                        }
                        newDate = formatDateLocal(target);
                        cleanText = cleanText.replace(match[0], '');
                        lower = cleanText.toLowerCase();
                        break; // Only one date per task description
                    }
                }

                // 4. Relative Offsets (e.g. 5 min, 2 hrs, in 10m)
                const relativeTimeRegex = /\b(?:in\s+)?(\d+)\s*(m|min|mins|minutes|h|hr|hrs|hour|hours)\b/i;
                let relTimeMatch;
                if ((relTimeMatch = relativeTimeRegex.exec(lower)) !== null) {
                    const value = parseInt(relTimeMatch[1]);
                    const unit = relTimeMatch[2].toLowerCase();
                    const target = new Date(now);
                    
                    if (unit.startsWith('m')) {
                        target.setMinutes(now.getMinutes() + value);
                    } else if (unit.startsWith('h')) {
                        target.setHours(now.getHours() + value);
                    }
                    
                    newDate = formatDateLocal(target);
                    newTime = target.getHours().toString().padStart(2, '0') + ':' + target.getMinutes().toString().padStart(2, '0');
                    cleanText = cleanText.replace(relTimeMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 4. Fallback shared logic
                if (newDate && !newTime) newTime = '10:00';
                
                return { date: newDate, time: newTime, cleanText, isPending: false };
            };



             const getLaterTiming = () => {
                const now = new Date();
                const hour = now.getHours();
                
                // 6PM - 6AM -> Tomorrow 10AM
                if (hour >= 18 || hour < 6) {
                    const target = new Date(now);
                    if (hour >= 18) target.setDate(target.getDate() + 1);
                    return {
                        date: formatDateLocal(target),
                        time: '10:00'
                    };
                }
                
                // 6AM - 6PM -> 4 Hours later
                const future = new Date(now.getTime() + 4 * 60 * 60 * 1000);
                return {
                    date: formatDateLocal(future),
                    time: future.getHours().toString().padStart(2, '0') + ':' + future.getMinutes().toString().padStart(2, '0')
                };
            };

            const initialLater = getLaterTiming();

            const [text, setText] = useState((initialData && initialData.text) || '');
            const [dueDate, setDueDate] = useState((initialData && initialData.dueDate) || prefillDate || initialLater.date);
            const [dueTime, setDueTime] = useState((initialData && initialData.dueTime) || (prefillDate ? '10:00' : initialLater.time));
            const [isClosing, setIsClosing] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showCustom, setShowCustom] = useState(!!prefillDate || !!(initialData && (initialData.dueDate || initialData.dueTime)));
            const [selectedPreset, setSelectedPreset] = useState(() => {
                if (showCustom) return 'custom';
                if (prefillDate) return 'custom'; // though prefillDate implies custom usually
                return 'later';
            });
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [pendingExtraction, setPendingExtraction] = useState(null);
            const dropdownRef = useRef(null);

            // Ref to track if a history state was pushed by this modal
            const historyPushedRef = useRef(false);

            // Effect to manage browser history for this modal
            useEffect(() => {
                if (!isClosing) {
                    // Push a new state when the modal is opened
                    window.history.pushState({ modal: 'quickTask' }, '');
                    historyPushedRef.current = true;
                } else if (historyPushedRef.current) {
                    // If the modal is closing, and we previously pushed a state, go back
                    if (window.history.state && window.history.state.modal === 'quickTask') {
                        window.history.back();
                    }
                    historyPushedRef.current = false;
                }
            }, [isClosing]);


            useEffect(() => {
                const handler = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsDropdownOpen(false);
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

              const handleTextChange = (val) => {
                const { date, time, cleanText, isPending } = extractDateFromText(val);
                if (isPending) {
                    setText(val);
                    setPendingExtraction({ date, time, cleanText });
                } else {
                    setText(cleanText);
                    setPendingExtraction(null);
                    if (date) { setDueDate(date); setShowCustom(true); setSelectedPreset('custom'); }
                    if (time) { setDueTime(time); setShowCustom(true); setSelectedPreset('custom'); }
                }
            };

            useEffect(() => {
                if (pendingExtraction) {
                    const timer = setTimeout(() => {
                        const { date, time, cleanText } = pendingExtraction;
                        setText(cleanText);
                        if (date) { setDueDate(date); setShowCustom(true); setSelectedPreset('custom'); }
                        if (time) { setDueTime(time); setShowCustom(true); setSelectedPreset('custom'); }
                        setPendingExtraction(null);
                    }, 2000);
                    return () => clearTimeout(timer);
                }
            }, [pendingExtraction, dueDate, dueTime]);

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(onClose, 200);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (text.trim() && !isSubmitting) {
                    setIsSubmitting(true);
                    onAdd(text.trim(), dueDate, dueTime);
                    if (showToast) showToast(initialData ? "Task updated!" : "Quick task added!");
                    // Instant close for better perceived performance
                    handleClose();
                }
            };

            const getSelectedLabel = () => {
                const todayStr = formatDateLocal();
                const tomorrowStr = getTomorrow();
                const nextMonStr = getNextMonday();

                const formatTime = (t) => {
                    if (!t) return '';
                    const [h, m] = t.split(':');
                    const hours = parseInt(h);
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    return `${hours % 12 || 12}:${m} ${ampm}`;
                };

                const formatD = (d) => {
                    if(d === todayStr) return 'Today';
                    if(d === tomorrowStr) return 'Tomorrow';
                    const parts = (d || '').split('-');
                    return parts.length === 3 ? `${parts[1]}/${parts[2]}` : '';
                };

                // Use logic to determine which preset to show if possible
                if (selectedPreset === 'later') {
                    const isLaterMatch = (dueDate === initialLater.date && dueTime === initialLater.time);
                    if (isLaterMatch) {
                        return { label: 'Later', sub: (initialLater.date === todayStr ? 'Today, ' : 'Tomorrow, ') + formatTime(initialLater.time), icon: 'wb_twilight' };
                    }
                }
                
                if (selectedPreset === 'tomorrow') {
                    if (dueDate === tomorrowStr && dueTime === '10:00') {
                        return { label: 'Tomorrow', sub: 'Tomorrow, 10:00 AM', icon: 'event' };
                    }
                }
                
                if (selectedPreset === 'monday') {
                    if (dueDate === nextMonStr && dueTime === '08:00') {
                        return { label: 'Next Monday', sub: 'Monday, 8:00 AM', icon: 'calendar_month' };
                    }
                }

                if (showCustom || selectedPreset === 'custom') {
                    return { label: 'Custom', sub: `${formatD(dueDate)}, ${formatTime(dueTime)}`, icon: 'schedule' };
                }

                // Fallback smart matching if preset is somehow lost or doesn't match
                if (dueDate === initialLater.date && dueTime === initialLater.time) return { label: 'Later', sub: (initialLater.date === todayStr ? 'Today, ' : 'Tomorrow, ') + formatTime(initialLater.time), icon: 'wb_twilight' };
                if (dueDate === tomorrowStr && dueTime === '10:00') return { label: 'Tomorrow', sub: 'Tomorrow, 10:00 AM', icon: 'event' };
                if (dueDate === nextMonStr && dueTime === '08:00') return { label: 'Next Monday', sub: 'Monday, 8:00 AM', icon: 'calendar_month' };
                return { label: 'Custom', sub: `${formatD(dueDate)}, ${formatTime(dueTime)}`, icon: 'schedule' };
            };

            const selected = getSelectedLabel();

            /* quick-task-modal - z-index raised above header */
            /* quick-task-modal - raised z-index to 999 */
            /* FIX 2026-04-15: Raised to z-[999] (was 500) */
            return (
                <div className={"fixed inset-0 z-[999] flex items-center justify-center p-4 transition-all duration-200 " + (isClosing ? 'opacity-0 scale-95' : 'animate-in fade-in duration-300')}>
                    <style>{`
                        .quick-task-input:focus {
                            border-color: #f97316 !important;
                            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2) !important;
                        }
                        .quick-option-btn {
                            width: 100%;
                            padding: 1rem 1.25rem;
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                            color: #cbd5e1;
                            font-size: 0.9rem;
                            transition: all 0.2s;
                            border-radius: 1rem;
                        }
                        .quick-option-btn:hover {
                            background: rgba(255,255,255,0.05);
                            color: #f97316;
                        }
                    `}</style>
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={handleClose}></div>
                    <div className="bg-[#0f172a] w-full max-w-sm rounded-[2.5rem] p-6 relative z-10 shadow-2xl border border-white/5 animate-in zoom-in-95 duration-300">
                        <div className="flex justify-between items-center mb-8">
                            <h3 className="text-xl font-bold text-cream-light font-montserrat tracking-wide">{initialData ? 'Edit Task' : 'New Quick Task'}</h3>
                            <button onClick={handleClose} className="text-white/20 hover:text-primary transition-colors">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-3">
                                <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Task Description</label>
                                <textarea
                                    autoFocus
                                    value={text}
                                    onChange={(e) => handleTextChange(e.target.value)}
                                    placeholder="What needs to be done? (Each new line creates a new quick task)"
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat quick-task-input"
                                    rows={4}
                                    style={{ textTransform: 'capitalize', resize: 'none' }}
                                    disabled={isSubmitting}
                                />
                            </div>
                            <div className="space-y-3 relative" ref={dropdownRef}>
                                <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Schedule Task</label>
                                <button 
                                    type="button"
                                    onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between group hover:bg-white/10 transition-all font-montserrat"

        const SetLockModal = ({ onSet, onClose, showToast }) => {

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (step === 3) return; // Let the input field handle its own events
                    
                    if (e.key >= '0' && e.key <= '9') {
                        const key = parseInt(e.key);
                        if (step === 1 && pin.length < 6) {
                            const newVal = pin + key;
                            setPin(newVal);
                            if (newVal.length === 6) {
                                setTimeout(() => handleSubmit(null, newVal), 200);
                            }
                        } else if (step === 2 && confirmPin.length < 6) {
                            const newVal = confirmPin + key;
                            setConfirmPin(newVal);
                            if (newVal.length === 6) {
                                setTimeout(() => handleSubmit(null, newVal), 200);
                            }
                        }
                    } else if (e.key === 'Backspace') {
                        if (step === 1) setPin(prev => prev.slice(0, -1));
                        else setConfirmPin(prev => prev.slice(0, -1));
                    } else if (e.key === 'Escape') {
                        handleClose();
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [pin, confirmPin, step]);

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(onClose, 200);
            };

            const handleSubmit = async (e, finalPin) => {
                if (e && e.preventDefault) e.preventDefault();
                const currentPin = finalPin || (step === 1 ? pin : confirmPin);

                if (step === 1) {
                    if (currentPin.length !== 6) return;
                    setStep(2);
                } else if (step === 2) {
                    if (pin !== currentPin) {
                        showToast("PINs do not match");
                        setConfirmPin("");
                        return;
                    }
                    setStep(3);
                } else {
                    const hash = await hashPIN(pin);
                    onSet(hash, hint);
                    handleClose();
                }

                                    Skip Hint
                                </button>
                            </div>
                        )}
                    </div>
                </div>

        const UnlockModal = ({ hint, onUnlock, onClose, showToast }) => {
            const [pin, setPin] = useState("");
            const [isClosing, setIsClosing] = useState(false);
            const [isError, setIsError] = useState(false);

            useEffect(() => {
                const handleKeyDown = (e) => {

                                    onClick={() => {

        const App = () => {
            const [isTimerDone, setIsTimerDone] = useState(false);
            const [activeCollection, setActiveCollection] = useState(() => localStorage.getItem('faiora_active_collection') || 'tasks');
            const [isProbing, setIsProbing] = useState(true);
            /* FIX 2026-04-16: Added states for tracking first data sync and video ready status */
            const [isFirstSyncDone, setIsFirstSyncDone] = useState(false);
            const [isVideoReady, setIsVideoReady] = useState(false);
            const [isAuthChecked, setIsAuthChecked] = useState(false);
            const [isCreatorOpen, setIsCreatorOpen] = useState(false);
            const [editingNote, setEditingNote] = useState(null);
            const [user, setUser] = useState(null);
            const [notes, setNotes] = useState([]);
            const [noteSections, setNoteSections] = useState(() => {
                try { return JSON.parse(localStorage.getItem('faiora_sections') || '[]'); } catch(e) { return []; }
            });
            const [quickTasks, setQuickTasks] = useState([]);
            const [alarms, setAlarms] = useState([]);
            const migrationDoneRef = useRef(false);
            const alarmTimersRef = useRef(new Map());

            const qtWriteGuard = useRef(0); // Timestamp of last local quick task write
            const [isQuickTaskModalOpen, setIsQuickTaskModalOpen] = useState(false);
            const [editingQuickTask, setEditingQuickTask] = useState(null);
            const [prefillDate, setPrefillDate] = useState(null);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [sharedNotes, setSharedNotes] = useState([]);
            const [publicNote, setPublicNote] = useState(null);
            const [isPublicLoading, setIsPublicLoading] = useState(false);
            const [profileData, setProfileData] = useState({});
            const [settingsData, setSettingsData] = useState({});
            const [gamification, setGamification] = useState({ currentStreak: 0, longestStreak: 0, lastLoginDate: null, rewards: [] });

            const normalizeQuickTasks = useCallback((tasks = []) => {
                const seen = new Set();
                return (Array.isArray(tasks) ? tasks : []).map((task, idx) => {
                    const baseId = (task && task.id) ? String(task.id) : `qt_legacy_${Date.now()}_${idx}`;
                    let nextId = baseId;
                    if (seen.has(nextId)) {
                        nextId = `${baseId}_${idx}_${Math.random().toString(36).slice(2, 6)}`;
                    }
                    seen.add(nextId);
                    return { ...task, id: nextId };
                });
            }, []);

            // Note Locking State
            const [lockedNoteId, setLockedNoteId] = useState(null);
            const [unlockCallback, setUnlockCallback] = useState(null);
            const [isSetLockModalOpen, setIsSetLockModalOpen] = useState(false);
            const [noteToLock, setNoteToLock] = useState(null);
            const [unlockingNote, setUnlockingNote] = useState(null);
            
            // LABEL: POMODORO-STATE — Global persistence for the timer (v1.1.0)
            const [pomodoroTime, setPomodoroTime] = useState(25 * 60);
            const [isPomodoroActive, setIsPomodoroActive] = useState(false);
            const [pomodoroSessions, setPomodoroSessions] = useState(0);

            const isQuickTaskEditorOpen = isQuickTaskModalOpen || !!editingQuickTask;
            const isOverlayOpen = isCreatorOpen || isQuickTaskEditorOpen || isSetLockModalOpen || !!unlockingNote;

            useEffect(() => {
                document.body.classList.add('faiora-react-ready');
                window.dispatchEvent(new Event('faiora-app-ready'));
            }, []);

            /* handleRequestEditNote - opens note editor, handles locked notes */
            /* FIX 2026-04-15: Push history state for non-locked notes so back button */
            /* closes the note instead of navigating to the previous page (e.g. calendar) */
            const handleRequestEditNote = useCallback((note) => {
                if (note.isLocked) {
                    setUnlockingNote(note);
                    window.history.pushState({ modal: 'unlock' }, '');
                } else {
                    setEditingNote(note);
                    setIsCreatorOpen(true);
                    window.history.pushState({ modal: 'creator' }, '');
                }
            }, []);

            const handleSetLock = async (hash, hint) => {
                if (!editingNote || !user) return;
                const updates = { isLocked: true, pinHash: hash, pinHint: hint };
                handleBulkUpdate(editingNote.id, updates);
                setEditingNote(prev => ({ ...prev, ...updates }));
                // Note will always require a PIN prompt when opened.
                showToast("Note Locked");
            };

            const handleRemoveLock = async () => {
                if (!editingNote || !user) return;
                const updates = { isLocked: false, pinHash: null, pinHint: null };
                handleBulkUpdate(editingNote.id, updates);
                setEditingNote(prev => ({ ...prev, ...updates }));
                showToast("Lock Removed");

            const [toasts, setToasts] = useState([]);
            const [isTransitioning, setIsTransitioning] = useState(false);
            // Pomodoro Logic (v1.1.4 Persistence & Functional Fixes) [FIX 2026-04-16]
            useEffect(() => {
                const savedTime = localStorage.getItem('faiora_pomo_time');
                const savedSessions = localStorage.getItem('faiora_pomo_sessions');
                if (savedTime) setPomodoroTime(parseInt(savedTime));
                if (savedSessions) setPomodoroSessions(parseInt(savedSessions));
            }, []);

            useEffect(() => {
                let interval = null;
                if (isPomodoroActive && pomodoroTime > 0) {
                    interval = setInterval(() => {
                        setPomodoroTime(prev => {
                            const next = prev - 1;
                            localStorage.setItem('faiora_pomo_time', next.toString());
                            return next;
                        });
                    }, 1000);
                } else if (pomodoroTime === 0 && isPomodoroActive) {
                    setIsPomodoroActive(false);
                    setPomodoroSessions(s => {
                        const next = s + 1;
                        localStorage.setItem('faiora_pomo_sessions', next.toString());
                        return next;
                    });
                    
                    // Push Notification for Pomodoro [FIX 2026-04-16]
                    if (FaioraNotifications) {
                        FaioraNotifications.show("Pomodoro Finished!", "Great job! Time for a short break.");
                        FaioraNotifications.playNotifSFX();
                    }
                    
                    // Reset to 25 mins
                    const defaultTime = 25 * 60;
                    setPomodoroTime(defaultTime);
                    localStorage.setItem('faiora_pomo_time', defaultTime.toString());
                }
                return () => clearInterval(interval);
            }, [isPomodoroActive, pomodoroTime]);

            // Notification Catch-up Logic
            useEffect(() => {
                const triggerCheck = () => {
                    if (FaioraNotifications.isSwReady()) {
                        FaioraNotifications.checkMissedNotifications();
                    }
                };

                // Check on mount (delay a bit for SW)
                const timer = setTimeout(triggerCheck, 2000);
                
                // Check when online
                window.addEventListener('online', triggerCheck);
                
                return () => {
                    clearTimeout(timer);
                    window.removeEventListener('online', triggerCheck);
                };
            }, []);

            const videoRef = useRef();
            const prevPopState = useRef(0);
            const lastRoutePathRef = useRef((window.location.hash || '#/').replace(/^#/, '').split('?')[0] || '/');

            // Ref to indicate if a modal was closed via code, to prevent double-handling by popstate
            const closingViaCode = useRef(false);
            const appStartTimeRef = useRef(Date.now());
            const prevAuthUidRef = useRef(null);
            const getHashPath = useCallback(() => {
                const rawHash = window.location.hash || '#/';
                const normalizedHash = rawHash.startsWith('#') ? rawHash.slice(1) : rawHash;
                const [pathnameOnly] = normalizedHash.split('?');
                return pathnameOnly || '/';
            }, []);
            const scrollHomeToTop = useCallback(() => {
                try {
                    window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
                } catch (e) {
                    window.scrollTo(0, 0);
                }
                const main = document.querySelector('main');
                if (main) {
                    try {
                        main.scrollTo({ top: 0, left: 0, behavior: 'auto' });
                    } catch (e) {
                        main.scrollTop = 0;
                    }
                }
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            }, []);
            const exitApp = useCallback(() => {
                const appPlugin = window.Capacitor?.Plugins?.App;
                if (appPlugin && typeof appPlugin.exitApp === 'function') {
                    try {
                        appPlugin.exitApp();
                        return;
                    } catch (error) {
                        console.warn('Capacitor App exit failed:', error);
                    }
                }
                if (window.navigator?.app && typeof window.navigator.app.exitApp === 'function') {
                    try {
                        window.navigator.app.exitApp();
                        return;
                    } catch (error) {
                        console.warn('navigator.app.exitApp failed:', error);
                    }
                }
                try {
                    window.close();
                } catch (error) {
                    console.warn('window.close failed:', error);
                }
            }, []);
            const redirectToHomeFromBack = useCallback((alreadyAtHome = false) => {
                prevPopState.current = 0;
                lastRoutePathRef.current = '/';
                if (!alreadyAtHome) {
                    window.location.hash = '#/';
                }
                const syncToTop = () => scrollHomeToTop();
                if (typeof window.requestAnimationFrame === 'function') {
                    window.requestAnimationFrame(syncToTop);
                } else {
                    setTimeout(syncToTop, 0);
                }
                window.history.pushState({ stayAlive: true }, '');
            }, [scrollHomeToTop]);

            useEffect(() => {
                const syncRoutePath = () => {
                    const path = getHashPath();
                    lastRoutePathRef.current = path;

                    const state = window.history.state || {};
