<body class="dark-gradient-bg font-montserrat text-slate-100 min-h-screen selection:bg-primary/30 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { createRoot } = ReactDOM;
        const { HashRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyDktbyVgI7AAwaY2u-KsWBRwLZawy0949s",
            authDomain: "faiora-24f4a.firebaseapp.com",
            projectId: "faiora-24f4a",
            storageBucket: "faiora-24f4a.firebasestorage.app",
            messagingSenderId: "752265363994",
            appId: "1:752265363994:web:78795bfad67d2d541e07a3",
            measurementId: "G-B0DWSL1JMV"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable offline persistence for smoother, instant loading
        db.enablePersistence().catch(err => {
            if (err.code === 'failed-precondition') {
                console.warn("Persistence failed: multiple tabs open");
            } else if (err.code === 'unimplemented') {
                console.warn("Persistence not supported by browser");
            }
        });

        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ==========================================================================
        // LABEL: NOTIF-ENGINE — Push Notification Engine
        // ==========================================================================
        // Handles both:
        //   1. LOCAL notifications (setTimeout when app is open) — LABEL: NOTIF-LOCAL
        //   2. FCM token registration (for Cloud Functions push) — LABEL: NOTIF-FCM
        //
        // HOW IT WORKS:
        //   - On login, requests notification permission
        //   - Gets an FCM token from Firebase and stores it in Firestore
        //   - Cloud Functions use that token to send push even when app is closed
        //   - Local setTimeout scheduling still works as fallback when app is open
        // ==========================================================================
        const FaioraNotifications = (() => {
            const timers = new Map(); // taskId -> [timerIds]
            let swReady = false;
            let swRegistration = null;

            // ------------------------------------------------------------------
            // LABEL: NOTIF-SW — Register Service Worker
            // ------------------------------------------------------------------
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    swRegistration = reg;
                    swReady = true;
                    console.log('🔥 Faiora SW registered');
                }).catch(err => console.warn('SW registration failed:', err));
            }

            // ------------------------------------------------------------------
            // LABEL: NOTIF-FCM — VAPID Key for FCM Web Push
            // ------------------------------------------------------------------
            // HOW TO GET THIS KEY:
            //   1. Go to Firebase Console → Project Settings → Cloud Messaging
            //   2. Under "Web Push certificates" → Click "Generate key pair"
            //   3. Copy the key and paste it below
            // ------------------------------------------------------------------
            const VAPID_KEY = 'YOUR_VAPID_KEY_HERE';

            // ------------------------------------------------------------------
            // LABEL: NOTIF-PERMISSION — Request notification permission + FCM token
            // ------------------------------------------------------------------
            const requestPermission = async () => {
                if (!('Notification' in window)) return false;
                if (Notification.permission === 'denied') return false;

                let granted = Notification.permission === 'granted';
                if (!granted) {
                    const result = await Notification.requestPermission();
                    granted = result === 'granted';
                }

                // If permission granted, register FCM token
                if (granted) {
                    registerFCMToken();
                }
                return granted;
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-FCM-TOKEN — Get FCM token and store in Firestore
            // ------------------------------------------------------------------
            // This token is what Cloud Functions use to send push to YOUR device.
            // Stored in Firestore: fcmTokens/{userId} → { tokens: [...] }
            const registerFCMToken = async () => {
                try {
                    if (VAPID_KEY === 'YOUR_VAPID_KEY_HERE') {
                        console.warn('⚠️ FCM VAPID key not set! Background notifications won\'t work.');
                        console.warn('   Go to Firebase Console → Project Settings → Cloud Messaging → Generate key pair');
                        return;
                    }

                    const messaging = firebase.messaging();
                    const token = await messaging.getToken({ vapidKey: VAPID_KEY });

                    if (token && auth.currentUser) {
                        const userId = auth.currentUser.uid;
                        const tokenRef = db.collection('fcmTokens').doc(userId);
                        const doc = await tokenRef.get();

                        if (doc.exists) {
                            const existing = doc.data().tokens || [];
                            if (!existing.includes(token)) {
                                // Add new token (user might have multiple devices)
                                await tokenRef.update({
                                    tokens: firebase.firestore.FieldValue.arrayUnion(token),
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            }
                        } else {
                            // First time — create token document
                            await tokenRef.set({
                                tokens: [token],
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                        console.log('🔔 FCM token registered for push notifications');
                    }
                } catch (err) {
                    console.warn('FCM token registration failed:', err);
                }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-SFX — Play notification sound effect
            // ------------------------------------------------------------------
            const playNotifSFX = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const playTone = (freq, start, dur, vol = 0.15) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                        gain.gain.setValueAtTime(vol, ctx.currentTime + start);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + start);
                        osc.stop(ctx.currentTime + start + dur);
                    };
                    playTone(880, 0, 0.15, 0.12);
                    playTone(1100, 0.12, 0.15, 0.1);
                    playTone(1320, 0.24, 0.25, 0.08);
                } catch(e) { /* AudioContext not available */ }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-UTIL — Format time for notification title
            // ------------------------------------------------------------------
            const formatNotifTime = (dateObj) => {
                let hours = dateObj.getHours();
                const minutes = dateObj.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                if (hours === 0) hours = 12;
                const minStr = minutes === 0 ? '' : ':' + String(minutes).padStart(2, '0');
                return `${hours}${minStr}${ampm}`;
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-SEND — Show a local notification via Service Worker
            // ------------------------------------------------------------------
            const sendNotification = (title, body, tag) => {
                if (!swRegistration) return;
                playNotifSFX();
                swRegistration.showNotification(title, {
                    body,
                    icon: 'logo.png',
                    badge: 'logo.png',
                    tag,
                    renotify: true,
                    vibrate: [200, 100, 200],
                    requireInteraction: true,
                    data: { url: location.origin + location.pathname }
                });
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-SCHEDULE — Schedule local notifications for a task
            // ------------------------------------------------------------------
            // Schedules up to 3 setTimeout timers:
            //   1. At exact due time
            //   2. 2 hours before
            //   3. 1 day before (at 9 AM)
            const scheduleForTask = (task) => {
                if (!task || !task.dueDate || task.completed) return;
                cancelForTask(task.id);

                const permitted = Notification.permission === 'granted';
                if (!permitted) return;

                const dueTime = task.dueTime || '23:59';
                const dueDateTime = new Date(`${task.dueDate}T${dueTime}`);
                if (isNaN(dueDateTime.getTime())) return;

                const now = Date.now();
                const dueMs = dueDateTime.getTime();
                const taskTimers = [];
                const taskName = task.text || task.title || 'Task';
                const timeStr = formatNotifTime(dueDateTime);

                // Timer 1: At exact due time
                if (dueMs > now) {
                    const id = setTimeout(() => {
                        sendNotification(`⏰ Reminder for "${taskName}" on ${timeStr}`, '🔥 Due Now!', `faiora-due-${task.id}`);
                    }, dueMs - now);
                    taskTimers.push(id);
                }

                // Timer 2: 2 hours before
                const twoHoursBefore = dueMs - (2 * 60 * 60 * 1000);
                if (twoHoursBefore > now) {
                    const id = setTimeout(() => {
                        sendNotification(`⌛ Reminder for "${taskName}" on ${timeStr}`, '⚡ Due in 2 hours!', `faiora-2h-${task.id}`);
                    }, twoHoursBefore - now);
                    taskTimers.push(id);
                }

                // Timer 3: 1 day before at 9 AM
                const dayBefore = new Date(dueDateTime);
                dayBefore.setDate(dayBefore.getDate() - 1);
                dayBefore.setHours(9, 0, 0, 0);
                const dayBeforeMs = dayBefore.getTime();
                if (dayBeforeMs > now) {
                    const id = setTimeout(() => {
                        sendNotification(`📅 Reminder for "${taskName}" on ${timeStr}`, '✨ Due Tomorrow!', `faiora-1d-${task.id}`);
                    }, dayBeforeMs - now);
                    taskTimers.push(id);
                }

                if (taskTimers.length > 0) {
                    timers.set(task.id, taskTimers);
                }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-CANCEL — Cancel scheduled notifications for a task
            // ------------------------------------------------------------------
            const cancelForTask = (taskId) => {
                const existing = timers.get(taskId);
                if (existing) {
                    existing.forEach(id => clearTimeout(id));
                    timers.delete(taskId);
                }
                if (swRegistration) {
                    ['due', '2h', '1d'].forEach(prefix => {
                        swRegistration.getNotifications({ tag: `faiora-${prefix}-${taskId}` })
                            .then(notifs => notifs.forEach(n => n.close()))
                            .catch(() => {});
                    });
                }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-RESCHEDULE — Reschedule all tasks on app load
            // ------------------------------------------------------------------
            const rescheduleAll = (tasks) => {
                timers.forEach((timerIds) => timerIds.forEach(id => clearTimeout(id)));
                timers.clear();
                if (!tasks || !Array.isArray(tasks)) return;
                tasks.filter(t => t.dueDate && !t.completed).forEach(t => scheduleForTask(t));
            };

            return { requestPermission, scheduleForTask, cancelForTask, rescheduleAll };
        })();
        
        // --- Shared Components ---

        const Sidebar = () => null;
        const MobileNav = () => null;

        const ResponsiveNav = () => {
            const location = useLocation();
            const isActive = (path) => location.pathname === path;
            
            const createSparks = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                for (let i = 0; i < 10; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    const tx = (Math.random() - 0.5) * 140;
                    const ty = -Math.random() * 80 - 40;
                    spark.style.setProperty('--tx', `${tx}px`);
                    spark.style.setProperty('--ty', `${ty}px`);
                    spark.style.left = `${centerX}px`;
                    spark.style.top = `${centerY}px`;
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 800);
                }
            };

            const NavLink = ({ to, icon, label, fillOnActive = false }) => (
                <Link 
                    to={to} 
                    onClick={createSparks}
                    className={`nav-item-animation flex flex-col items-center justify-center group relative w-16 h-16 md:w-full md:aspect-square ${isActive(to) ? 'text-primary' : 'text-slate-500 hover:text-primary/70 scale-95 hover:scale-100'}`}
                >
                    <span className="material-symbols-outlined text-3xl md:text-3xl" style={fillOnActive && isActive(to) ? {fontVariationSettings: '"FILL" 1'} : {}}>{icon}</span>
                    <span className="absolute left-full ml-4 px-3 py-1 bg-primary text-white text-[10px] font-bold uppercase tracking-widest rounded-lg opacity-0 -translate-x-4 pointer-events-none transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0 hidden md:block whitespace-nowrap z-[100] shadow-xl">{label}</span>
                </Link>
            );

            return (
                <React.Fragment>
                    {/* Mobile Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center py-3 z-50 px-4 md:hidden transition-opacity duration-300">
                        <NavLink to="/" icon="home" label="Home" />
                        <NavLink to="/notes" icon="grid_view" label="Notes" />
                        <NavLink to="/calendar" icon="calendar_month" label="Calendar" />
                        <NavLink to="/streak" icon="local_fire_department" label="Streak" fillOnActive={true} />
                        <NavLink to="/stats" icon="leaderboard" label="Analysis" />
                        <NavLink to="/clock" icon="history" label="Clocks" />
                    </nav>

                    {/* Desktop Left Sidebar */}
                    <nav className="hidden md:flex fixed left-0 top-0 bottom-0 w-24 bg-black/40 backdrop-blur-2xl border-r border-white/5 flex-col items-center py-12 gap-8 z-50">
                        <div className="mb-4">
                            <div className="text-primary mb-6"><span className="material-symbols-outlined text-4xl font-light glow-orange" style={{fontVariationSettings: '"FILL" 1'}}>local_fire_department</span></div>
                        </div>
                        <NavLink to="/" icon="home" label="Home" />
                        <NavLink to="/notes" icon="grid_view" label="Notes" />
                        <NavLink to="/calendar" icon="calendar_month" label="Calendar" />
                        <NavLink to="/streak" icon="local_fire_department" label="Streak" fillOnActive={true} />
                        <NavLink to="/stats" icon="leaderboard" label="Analysis" />
                        <NavLink to="/clock" icon="history" label="Clocks" />
                    </nav>
                </React.Fragment>
            );
        };

        const Layout = ({ children, onOpenCreator, onFabClick, noPadding = false }) => {
            const handleFabClick = onFabClick || onOpenCreator;
            
            return (
                <div className="flex flex-col md:flex-row h-[100dvh] overflow-hidden bg-transparent">
                    <ResponsiveNav />
                    <main className={`flex-1 overflow-y-auto no-scrollbar relative pt-0 pb-24 md:pb-12 ${noPadding ? 'px-0' : 'px-0 md:px-12'} md:ml-24`}>
                        {children}
                        <button 
                            onClick={handleFabClick}
                            className="fixed bottom-[110px] md:bottom-12 right-6 md:right-12 w-[68px] h-[68px] md:w-20 md:h-20 bg-primary hover:bg-primary-dark text-white rounded-full flex items-center justify-center fab-shadow transition-all duration-300 hover:scale-110 active:scale-95 z-40 group"
                        >
                            <span className="material-symbols-outlined text-[32px] md:text-4xl group-hover:rotate-90 transition-transform duration-300">add</span>
                        </button>
                    </main>
                </div>
            );
        };

        const UserMenu = ({ user }) => {
            const [isOpen, setIsOpen] = useState(false);
            const menuRef = useRef();

             useEffect(() => {
                 const handleClickOutside = (event) => {
                     if (menuRef.current && !menuRef.current.contains(event.target)) {
                         setIsOpen(false);
                     }
                 };
                 const handleCloseInternal = () => setIsOpen(false);
                 
                 document.addEventListener("mousedown", handleClickOutside);
                 window.addEventListener("faiora-close-popups", handleCloseInternal);
                 return () => {
                     document.removeEventListener("mousedown", handleClickOutside);
                     window.removeEventListener("faiora-close-popups", handleCloseInternal);
                 };
             }, []);

             const toggleMenu = () => {
                 const next = !isOpen;
                 if (next) {
                     window.history.pushState({ modal: 'usermenu', popup: true }, '');
                 }
                 setIsOpen(next);
             };

            const handleLogout = () => {
                auth.signOut();
                localStorage.removeItem('faiora_logged_in');
            };

            const handleLogin = () => {
                auth.signInWithPopup(googleProvider);
            };

            if (!user) {
                return (
                    <button 
                        onClick={handleLogin}
                        className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs font-bold transition-all text-cream-light/60 hover:text-primary active:scale-95"
                    >
                        <span className="material-symbols-outlined text-lg">login</span>
                        LOGIN
                    </button>
                );
            }

            return (
                <div className="relative" ref={menuRef}>
                     <button 
                        onClick={toggleMenu}
                        className="w-10 h-10 md:w-12 md:h-12 rounded-full overflow-hidden border border-white/10 ring-4 ring-black/20 hover:ring-primary/40 transition-all duration-300"
                    >
                        <img 
                            alt={user.displayName || "User"} 
                            className="w-full h-full object-cover bg-primary/20" 
                            src={user.photoURL || "https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y"}
                        />
                    </button>

                    {isOpen && (
                        <div className="absolute right-0 mt-4 w-64 bg-slate-900 border border-white/20 rounded-3xl p-2 shadow-[0_25px_60px_rgba(0,0,0,0.8)] z-[250] animate-in fade-in slide-in-from-top-2 duration-200 overflow-hidden">
                            <div className="p-4 border-b border-white/5 mb-2">
                                <p className="text-white font-bold truncate">{user.displayName}</p>
                                <p className="text-white/40 text-xs truncate">{user.email}</p>
                            </div>
                            <button className="flex items-center gap-3 w-full p-3 hover:bg-white/10 rounded-2xl text-white/70 hover:text-primary transition-all text-sm group">
                                <span className="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">person</span>
                                Profile
                            </button>
                            <button className="flex items-center gap-3 w-full p-3 hover:bg-white/10 rounded-2xl text-white/70 hover:text-primary transition-all text-sm group">
                                <span className="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">settings</span>
                                Settings
                            </button>
                            <div className="h-px bg-white/5 my-2"></div>
                            <button 
                                onClick={handleLogout}
                                className="flex items-center gap-3 w-full p-3 hover:bg-red-500/20 rounded-2xl text-red-400 hover:text-red-300 transition-all text-sm group"
                            >
                                <span className="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">logout</span>
                                Logout
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const Header = ({ title = "Faiora", subtitle = "Digital Planner", user }) => {
            const navigate = useNavigate();
            const location = useLocation();
            const queryParams = new URLSearchParams(location.search);
            const initialSearch = queryParams.get('search') || '';
            const [localQuery, setLocalQuery] = useState(initialSearch);
            const [isSearching, setIsSearching] = useState(false);

            // Debounced Search to prevent lag and skip transition manager
            useEffect(() => {
                if (localQuery.trim() !== initialSearch) {
                    setIsSearching(true);
                }
                
                const timer = setTimeout(() => {
                    const trimmed = localQuery.trim();
                    const isSearchPage = location.pathname === '/notes' && queryParams.has('search');
                    
                    if (trimmed && trimmed !== initialSearch) {
                        navigate(`/notes?search=${encodeURIComponent(trimmed)}`);
                    } else if (!trimmed && isSearchPage) {
                        navigate('/notes');
                    }
                    setIsSearching(false);
                }, 500); // Reduced to 500ms for faster feel
                return () => clearTimeout(timer);
            }, [localQuery, initialSearch, navigate, location.pathname]);

            // Sync with URL Changes (like Browser Back/Forward)
            useEffect(() => {
                setLocalQuery(initialSearch);
                setIsSearching(false);
            }, [initialSearch]);

            return (
                <React.Fragment>
                    <style>{`
                        @keyframes search-spin {
                            to { transform: rotate(360deg); }
                        }
                        .search-loader {
                            animation: search-spin 0.6s linear infinite;
                        }
                    `}</style>
                    {/* Mobile Sticky Header */}
                    <header className="md:hidden sticky top-0 left-0 right-0 z-[200] bg-black/95 backdrop-blur-2xl border-b border-white/5 px-0 py-4 flex flex-col gap-3 relative animate-mobile-header">
                        <div className="flex items-center justify-between gap-3 relative z-10 w-full px-4">
                            <div className="shrink-0 flex items-center justify-center text-primary">
                                <span className="material-symbols-outlined text-2xl" style={{fontVariationSettings: '"FILL" 1'}}>local_fire_department</span>
                            </div>
                            
                             <div className="flex-1 relative flex items-center group">
                                 <span className="absolute left-3.5 flex items-center justify-center pointer-events-none">
                                     <span className={`${isSearching ? 'search-loader' : ''} flex items-center justify-center`}>
                                         <span className={`material-symbols-outlined ${isSearching ? 'text-primary' : 'text-white/40'} text-lg group-focus-within:text-primary transition-colors`}>
                                             {isSearching ? 'refresh' : 'search'}
                                         </span>
                                     </span>
                                 </span>
                                <input 
                                    type="text" 
                                    placeholder="Search Faiora..."
                                    value={localQuery}

                    if (target.classList.contains('resizable-image')) {
                        e.stopPropagation();
                        // On touch, we might not want to prevent default if we want focus, but for selection it's better to prevent.
                        if (!isTouch) e.preventDefault(); 
                        
                        clearAll();
                        const container = target.closest('.resizable-image-container');
                        if (container) container.classList.add('selected');
                        target.classList.add('selected');
                        setSelectedImage(target);

                        // Long Press to Move
                        const timer = setTimeout(() => {
                            if (container) handleImageMoveStart(e, container);
                        }, 500);
                        
                        const clearTimer = () => clearTimeout(timer);
                        document.addEventListener('mouseup', clearTimer, { once: true });
                        document.addEventListener('touchend', clearTimer, { once: true });
                        document.addEventListener('mousemove', (me) => {
                            if (Math.abs(me.clientX - startX) > 10 || Math.abs(me.clientY - startY) > 10) clearTimer();
                        }, { once: true });
                        
                        return;
                    }
                    
                    // 2. Handle clicking a resize handle (Remove crop handles)
                    if (target.classList.contains('resize-handle')) {
                        e.stopPropagation();
                        e.preventDefault();
                        const handleType = target.classList.contains('tl') ? 'tl' :
                                         target.classList.contains('tr') ? 'tr' :
                                         target.classList.contains('bl') ? 'bl' : 'br';
                        
                        const container = target.closest('.resizable-image-container');
                        const img = container ? container.querySelector('img') : null;
                        if (img) handleImageResize(e, img, handleType);
                        return;
                    }

                    // 4. Handle Action Buttons (Delete)
                    const action = target.closest('[data-action]') ? target.closest('[data-action]').dataset.action : null;
                    if (action) {
                        e.stopPropagation();
                        e.preventDefault();
                        const container = target.closest('.resizable-image-container');
                        
                        if (action === 'image-delete' && container) {
                            container.remove();
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        }
                        return;
                    }

                    // 3. Deselect when clicking outside
                    if (selectedImage && !target.closest('.resizable-image-container')) {
                        clearAll();
                    }
                };
                
                document.addEventListener('mousedown', handleGlobalInteract, true);
                document.addEventListener('touchstart', handleGlobalInteract, { capture: true, passive: false });
                
                return () => {
                    document.removeEventListener('mousedown', handleGlobalInteract, true);
                    document.removeEventListener('touchstart', handleGlobalInteract, true);
                };
            }, [selectedImage]);

            const ownerId = editingNote ? editingNote.ownerId : user?.uid;
            const canEdit = useMemo(() => {
                if (!user) return isPublic && allowPublicEdit;
                if (!ownerId || user.uid === ownerId) return true;
                if (user.email && sharedWith.includes(user.email.toLowerCase())) return true;
                if (isPublic && allowPublicEdit) return true;
                return false;
            }, [user, ownerId, sharedWith, isPublic, allowPublicEdit]);

            const theme = themes.find(t => t.id === noteTheme);
            const currentThemeClass = theme ? theme.themeClass : '';

            return (
                <div className={"fixed inset-0 z-[110] flex items-center justify-center p-0 md:p-8 transition-all duration-300 " + (isClosing ? 'opacity-0 scale-95 pointer-events-none' : 'animate-in fade-in duration-500')}>
                    <div className={"absolute inset-0 bg-black/70 backdrop-blur-2xl transition-opacity duration-300 hidden md:block " + (isClosing ? 'opacity-0' : '')} onClick={handleClose}></div>
                    
                    <div className={"task-creator-modal w-full max-w-full md:max-w-4xl h-full md:h-[85vh] rounded-none md:rounded-[2rem] overflow-hidden flex flex-col relative z-10 shadow-2xl transition-all duration-250 " + (isClosing ? 'opacity-0 scale-95 translate-y-20 md:translate-y-0 ease-in' : 'animate-in zoom-in-95 duration-500 ease-out') + ' transition-colors duration-500 ' + currentThemeClass}>
                        
                        {/* Top Progress Bar Slider */}
                        <div 
                            className="modal-top-progress cursor-pointer group h-4 bg-black/5 hover:bg-black/10 transition-all relative overflow-hidden"
                            onClick={handleProgressClick}
                            onMouseMove={handleProgressDrag}
                            onTouchMove={handleProgressDrag}
                        >
                            <div 
                                className="modal-progress-fill h-full transition-all duration-300 relative flex items-center justify-end" 
                                style={{ width: progress + "%" }}
                            >
                                <span className={`text-[9px] font-bold text-slate-800 px-2 mb-0.5 select-none transition-opacity ${progress < 15 ? 'opacity-0' : 'opacity-100'}`}>
                                    {progress}%
                                </span>
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow-lg scale-0 group-hover:scale-100 transition-transform ring-4 ring-primary/20"></div>
                            </div>
                            {progress < 15 && (
                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-slate-800 opacity-60 select-none">
                                    {progress}%
                                </span>
                            )}
                        </div>

                        <div 
                            className="flex-1 overflow-y-auto p-4 md:p-10 no-scrollbar relative flex flex-col"
                        >
                            {noteIcon && (
                                <div className="absolute top-24 right-10 pointer-events-none opacity-[0.07] select-none">
                                    <span className="material-symbols-outlined text-8xl text-primary animate-in zoom-in-50 duration-700">{noteIcon}</span>
                                </div>
                            )}
                            <div className="flex justify-between items-start mb-4 relative z-10">
                                <div className="flex-1 flex flex-col gap-2">
                                    <div className="flex items-center gap-2">
                                        <button 
                                            onClick={handleClose}
                                            className="md:hidden flex items-center justify-center flex-shrink-0 text-slate-500 hover:text-slate-800 transition-colors p-1 -ml-1"
                                        >
                                            <span className="material-symbols-outlined text-[22px]">arrow_back</span>
                                        </button>
                                    <input 
                                        type="text" 
                                        placeholder="Main title" 
                                        maxLength={24}
                                        readOnly={!canEdit}
                                        className="bg-transparent border-none text-2xl md:text-4xl font-bold text-slate-800 placeholder:text-slate-600 focus:ring-0 w-full tracking-tight px-0 md:px-4 font-display"
                                        value={title}
                                        onChange={(e) => { 
                                            if(!canEdit) return;
                                            const val = e.target.value;
                                            setTitle(val); 
                                            setHasChanges(true); 
                                            hasChangesRef.current = true;
                                            // Fast debounced live save for title changes
                                            if (debouncedSaveTimer.current) clearTimeout(debouncedSaveTimer.current);
                                            debouncedSaveTimer.current = setTimeout(() => {
                                                const html = editorRef.current ? editorRef.current.innerHTML : content;
                                                saveToFirestore({ 
                                                    title: val, content: html, progress, isPinned, noteTheme, noteIcon, 
                                                    labels, reminderDate, sharedWith,
                                                    section: (editingNote && editingNote.section) ? editingNote.section : ''
                                                }, true);
                                            }, 300);
                                        }}
                                        onBlur={() => {
                                            if(!canEdit) return;
                                            const formatted = formatTitle(title);
                                            setTitle(formatted);
                                            saveToFirestore({ title: formatted, content: (editorRef.current ? editorRef.current.innerHTML : content), progress, isPinned, noteTheme, noteIcon, labels, reminderDate, section: (editingNote ? editingNote.section : '') || '' }, true);
                                        }}
                                    />
                                    </div>
                                    <div className="flex flex-wrap items-center gap-2 px-0 md:px-4">
                                        {labels.map(label => (
                                            <span key={label} className="text-[10px] font-bold uppercase tracking-widest bg-primary/10 text-primary px-2 py-1 rounded-md flex items-center gap-1 font-montserrat">
                                                {label}
                                                {canEdit && (
                                                    <button onClick={() => { setLabels(labels.filter(l => l !== label)); setHasChanges(true); hasChangesRef.current = true; saveState(); }} className="hover:text-primary-dark">
                                                        <span className="material-symbols-outlined text-xs">close</span>
                                                    </button>
                                                )}
                                            </span>
                                        ))}
                                        {reminderDate && (
                                            <span className="inline-flex items-center gap-1 text-[10px] font-bold font-montserrat text-primary bg-primary/10 px-2 py-1 rounded-md">
                                                <span className="material-symbols-outlined text-xs">notifications_active</span>
                                                {formatReminderDate(reminderDate)}
                                            </span>
                                        )}
                                    </div>
                                </div>
                                <div className="flex items-center gap-0.5 flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setIsPinned(!isPinned); setHasChanges(true); hasChangesRef.current = true; saveState(); }}
                                        className={"p-2 rounded-full transition-all " + (isPinned ? "text-primary bg-primary/10" : "text-slate-400 hover:text-slate-600")}
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[22px] md:text-[24px]" style={isPinned ? {fontVariationSettings: "'FILL' 1"} : {}}>push_pin</span>
                                    </button>
                                    <button 
                                        onClick={handleClose}
                                        className="hidden md:block p-2 rounded-full text-slate-400 hover:text-slate-600 hover:bg-black/5 transition-all"
                                    >
                                        <span className="material-symbols-outlined text-[24px]">close</span>
                                    </button>
                                </div>
                            </div>
                            <div className="flex-1">
                                <div 
                                    ref={editorRef}
                                    contentEditable={canEdit ? "true" : "false"}
                                    className="note-editor-area"
                                    data-placeholder="Start typing your notes..."
                                    onInput={(e) => { 
                                        if(!canEdit) return; 
                                        setHasChanges(true); 
                                        hasChangesRef.current = true;
                                        // Fast debounced live save for real-time sync
                                        if (debouncedSaveTimer.current) clearTimeout(debouncedSaveTimer.current);
                                        debouncedSaveTimer.current = setTimeout(() => {
                                            const html = editorRef.current ? editorRef.current.innerHTML : content;
                                            saveToFirestore({ 
                                                title, content: html, progress, isPinned, noteTheme, noteIcon, 
                                                labels, reminderDate, sharedWith,
                                                section: (editingNote && editingNote.section) ? editingNote.section : ''
                                            }, true);
                                        }, 300);
                                    }}
                                    onBlur={saveState}
                                    onClick={handleEditorClick}
                                    onPaste={handlePaste}
                                    onKeyDown={handleEditorKeyDown}
                                    dangerouslySetInnerHTML={{ __html: initialContent }}
                                />
                            </div>
                        </div>
                        <div className="task-creator-footer mt-auto flex items-center justify-between p-1.5 md:p-3 bg-white/50 backdrop-blur-xl border-t border-black/5 relative z-[100] gap-1 md:gap-2 overflow-visible">
                            {/* Left Side: Main Tools Group */}
                            <div className="flex items-center gap-0 md:gap-1 flex-nowrap overflow-visible">
                                {/* Nested Horizontal Formatting Dropdown */}
                                 <div className="relative flex-shrink-0">
                                     <button onClick={() => handleSetActivePopup(activePopup === 'format' ? null : 'format')} className={"footer-action-btn h-[32px] w-[32px] flex items-center justify-center transition-all rounded-xl " + (activePopup === 'format' ? "bg-black/5 text-secondary" : "text-secondary hover:bg-black/5")} title="Formatting">
                                         <span className="material-symbols-outlined text-[22px]">format_color_text</span>
                                     </button>
                                    
                                    {activePopup === 'format' && (
                                        <div className="format-popup-bar absolute bottom-[calc(100%+8px)] left-1 bg-white rounded-2xl pl-3 shadow-xl border border-black/5 flex flex-nowrap items-center p-2 z-[150] animate-in slide-in-from-bottom-2 duration-200">
                                                
                                                {/* Style Sub-menu Trigger */}
                                                 <div className="relative px-2">
                                                     <button 
                                                         onClick={() => handleSetActiveSubPopup(activeSubPopup === 'style' ? null : 'style')}
                                                         className={"h-10 pl-3 pr-3 flex items-center justify-center gap-1.5 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'style' ? "bg-black/5" : "hover:bg-black/5")}
                                                     >
                                                        <span className="text-[14px] font-bold tracking-tight uppercase font-montserrat">H1</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {/* Style Horizontal Bar */}
                                                    {activeSubPopup === 'style' && (
                                                        <div className="absolute bottom-full left-0 mb-2 bg-white rounded-xl shadow-2xl border border-black/10 flex items-center p-1.5 px-3 z-[160] animate-in slide-in-from-bottom-2 duration-200 gap-2 w-max whitespace-nowrap">
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('h1'); }} className="h-9 px-2 flex items-center hover:bg-black/5 rounded-md text-base font-bold text-slate-700 font-montserrat">H1</button>
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('h2'); }} className="h-9 px-2 flex items-center hover:bg-black/5 rounded-md text-sm font-bold text-slate-600 font-montserrat">H2</button>
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('normal'); }} className="centered h-9 px-6 flex items-center text-center justify-center hover:bg-black/5 rounded-md text-xs text-slate-500 font-montserrat">Normal</button>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/10 mx-1"></div>

                                                {/* Case Sub-menu Trigger */}
                                                <div className="relative">
                                                     <button 
                                                         onClick={() => handleSetActiveSubPopup(activeSubPopup === 'case' ? null : 'case')}
                                                         className={"w-10 h-10 flex items-center justify-center gap-1 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'case' ? "bg-black/5" : "hover:bg-black/5")}
                                                     >
                                                        <span className="text-[14px] font-bold tracking-tight font-montserrat">Aa</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {/* Case Horizontal Bar */}
                                                    {activeSubPopup === 'case' && (
                                                        <div className="absolute bottom-full left-0 mb-2 bg-white rounded-xl shadow-2xl border border-black/10 flex items-center p-1.5 px-2 z-[150] animate-in slide-in-from-bottom-2 duration-200 gap-1">
                                                            <button onMouseDown={(e) => { e.preventDefault(); applyCase('cap'); }} className="h-5 px-3 flex items-center hover:bg-black/5 rounded-lg text-xs capitalize font-bold text-slate-700 font-montserrat">Aa</button>
                                                            <button onMouseDown={(e) => { e.preventDefault(); applyCase('upper'); }} className="h-5 px-3 flex items-center hover:bg-black/5 rounded-lg text-xs uppercase font-bold text-slate-700 font-montserrat">AA</button>
                                                            <button onMouseDown={(e) => { e.preventDefault(); applyCase('lower'); }} className="h-5 px-3 flex items-center hover:bg-black/5 rounded-lg text-xs lowercase font-bold text-slate-700 font-montserrat">aa</button>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/10 mx-1"></div>

                                                {/* Basic Formatting Buttons */}
                                                <div className="flex items-center">
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('**'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Bold">
                                                        <span className="material-symbols-outlined text-[20px]">format_bold</span>
                                                    </button>
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('*'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Italic">
                                                        <span className="material-symbols-outlined text-[20px]">format_italic</span>
                                                    </button>
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('__'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Underline">
                                                        <span className="material-symbols-outlined text-[20px]">format_underlined</span>
                                                    </button>
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('~~'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Strikethrough">
                                                        <span className="material-symbols-outlined text-[20px]">strikethrough_s</span>
                                                    </button>
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/5 mx-1"></div>

                                                



                                                <div className="relative">
                                                    <button 
                                                        onClick={() => handleSetActiveSubPopup(activeSubPopup === 'highlight' ? null : 'highlight')}
                                                        className={"w-10 h-10 flex items-center justify-center gap-1 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'highlight' ? "bg-black/5" : "hover:bg-black/5")}
                                                    >
                                                         <span className="material-symbols-outlined text-[20px]">ink_highlighter</span>
                                                         <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                     </button>
                                                    {/* Highlight Color Picker — positioned to stay on screen */}
                                                    {activeSubPopup === 'highlight' && (
                                                        <div className="absolute bottom-full right-0 mb-2 p-2 bg-white rounded-xl shadow-2xl border border-black/5 flex items-center z-[160] animate-in slide-in-from-bottom-1 duration-200" style={{ minWidth: '130px' }}>
                                                            <div className="grid grid-cols-4 gap-2">
                                                                <button 
                                                                    onMouseDown={(e) => { e.preventDefault(); toggleHighlight('transparent'); }}
                                                                    className="highlight-option flex items-center justify-center bg-white border-dashed"
                                                                    title="No Highlight"
                                                                >
                                                                    <span className="material-symbols-outlined text-xs text-slate-200">format_color_reset</span>
                                                                </button>
                                                                {['#fed7aa', '#fef08a', '#bbf7d0', '#bfdbfe', '#ddd6fe', '#fecaca', '#f5f5f5', '#ffedd5', '#fef9c3', '#dcfce7', '#dbeafe', '#f3e8ff', '#ffe4e6', '#ccfbf1', '#fef3c7'].map(c => (
                                                                    <button 
                                                                        key={c}
                                                                        onMouseDown={(e) => { e.preventDefault(); toggleHighlight(c); }}
                                                                        className="highlight-option" 
                                                                        style={{ backgroundColor: c }}
                                                                    />
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="relative">
                                                    <button 
                                                        onClick={() => handleSetActiveSubPopup(activeSubPopup === 'divider' ? null : 'divider')}
                                                        className={"w-10 h-10 flex items-center justify-center rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'divider' ? "bg-black/5" : "hover:bg-black/5")}
                                                        title="Divider Colors"
                                                    >
                                                        <span className="material-symbols-outlined text-[20px]" style={{color: '#ea580c'}}>horizontal_rule</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {/* Divider Color Picker — positioned to stay on screen */}
                                                    {activeSubPopup === 'divider' && (
                                                        <div className="absolute bottom-full right-0 mb-2 p-2 bg-white rounded-xl shadow-2xl border border-black/5 flex items-center gap-2 z-[160] animate-in slide-in-from-bottom-1 duration-200">
                                                            {['#ea580c', '#334155', '#64748b', '#94a3b8', '#cbd5e1'].map(color => (
                                                                <button 
                                                                    key={color}
                                                                    onMouseDown={(e) => { 
                                                                        e.preventDefault(); 
                                                                        document.execCommand('insertHTML', false, `<hr style="border:none; border-top: 2px solid ${color}; margin: 1.5rem 0; width: 100%;" />`); 
                                                                        setHasChanges(true);
                                                                        hasChangesRef.current = true;
                                                                    }}
                                                                    className="divider-option w-6 h-6 rounded-full border border-black/5 hover:scale-110 transition-transform flex-shrink-0"
                                                                    style={{ backgroundColor: color }}
                                                                    title={color === '#ea580c' ? 'Dark Orange' : 'Gray Shade'}
                                                                />
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                        </div>
                                    )}
                                </div>
                                


                                {/* 2. Tools Dropdown (Overflow Menu) */}
                                 <div className="relative flex-shrink-0">
                                     <button onClick={() => handleSetActivePopup(activePopup === 'tools' ? null : 'tools')} className={"footer-action-btn flex items-center justify-center transition-all rounded-xl " + (activePopup === 'tools' ? "bg-black/5 text-secondary" : "text-secondary hover:bg-black/5")} title="More Tools">
                                         <span className="material-symbols-outlined text-[26px]">menu</span>
                                     </button>
                                    {activePopup === 'tools' && (
                                        <div className="absolute bottom-[calc(100%+8px)] left-0 md:left-0 md:translate-x-0 bg-white rounded-2xl shadow-xl border border-black/5 flex items-center p-1 z-[150] animate-in slide-in-from-bottom-2 duration-200">
                                                 <div className="flex items-center px-1">
                                                     <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('justifyLeft'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Align Left"><span className="material-symbols-outlined text-[20px]">format_align_left</span></button>
                                                     <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('justifyCenter'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Align Center"><span className="material-symbols-outlined text-[20px]">format_align_center</span></button>
                                                     <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('justifyRight'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Align Right"><span className="material-symbols-outlined text-[20px]">format_align_right</span></button>
                                                 </div>
                                                 <div className="w-px h-6 bg-black/5 mx-1"></div>
                                                 <div className="flex items-center px-1">
                                                     <button onClick={() => { convertActiveBlock('todo'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Checklist"><span className="material-symbols-outlined text-[20px]">checklist</span></button>
                                                     <button onClick={() => { convertActiveBlock('bullet'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Bullets"><span className="material-symbols-outlined text-[20px]">format_list_bulleted</span></button>
                                                     <button onClick={() => { convertActiveBlock('number'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Numbering"><span className="material-symbols-outlined text-[20px]">format_list_numbered</span></button>
                                                 </div>
                                                 <div className="w-px h-6 bg-black/5 mx-1"></div>
                                                 <div className="flex items-center px-1">
                                                     <button onClick={() => { fileInputRef.current.click(); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Add Image"><span className="material-symbols-outlined text-[20px]">image</span></button>
                                                 </div>
                                             </div>
                                    )}
                                </div>
                                
                                <div className="footer-divider flex-shrink-0 hidden md:block"></div>

                                {/* Rest of Footer Icons */}
                                 <div className="relative flex-shrink-0">
                                     <button onClick={() => handleSetActivePopup(activePopup === 'reminder' ? null : 'reminder')} className={"footer-action-btn relative " + (activePopup === 'reminder' ? "bg-black/5 text-primary" : "")} title="Reminders">
                                         <span className="material-symbols-outlined text-[24px]">notifications</span>
                                        {reminderDate && <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-orange-500 rounded-full border-2 border-white"></span>}
                                    </button>
                                    {activePopup === 'reminder' && (
                                        <div className="absolute bottom-full mb-4 left-0 bg-white rounded-xl shadow-2xl border border-black/5 z-[150] w-72 animate-in slide-in-from-bottom-2 duration-300 py-2">
                                            {!showCustomReminder ? (
                                                <div className="flex flex-col">
                                                    <div className="px-5 py-3 border-b border-black/5 mb-1">
                                                        <p className="text-sm font-semibold text-slate-800 font-montserrat">Remind me later</p>
                                                       
                                                    </div>
                                                    
                                                    <button onClick={() => { setReminderDate(new Date().toISOString().split('T')[0] + 'T18:00'); setHasChanges(true); hasChangesRef.current = true; handleSetActivePopup(null); }} className="px-5 py-3 hover:bg-black/5 flex items-center justify-between text-sm text-slate-600 transition-colors font-montserrat">

                                                        handleSetActivePopup(null);

                                                                    const newTime = e.target.value;
                                                                    const currentDate = reminderDate.split('T')[0] || new Date().toISOString().split('T')[0];
                                                                    setReminderDate(`${currentDate}T${newTime}`);

                                                                    hasChangesRef.current = true;

                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                 <div className="relative flex-shrink-0">
                                     <button onClick={() => handleSetActivePopup(activePopup === 'palette' ? null : 'palette')} className={"footer-action-btn " + (activePopup === 'palette' ? "bg-black/5 text-black" : "")} title="Theme">
                                         <span className="material-symbols-outlined text-[24px]">palette</span>

                                                    key={t.id}

                                                    type="text"

                                            <button

                                                <span className="material-symbols-outlined text-[18px]">block</span>

                                                 <span className="material-symbols-outlined text-lg">label</span>
                                                 Add Label
                                             </button>
                                             <button onClick={() => { handleSetActivePopup('share'); }} className="menu-item font-montserrat">
                                                 <span className="material-symbols-outlined text-lg">share</span>
                                                 Share Note
                                             </button>
                                             <button onClick={() => { 
                                                 if(confirm("Duplicate this note?")) {
                                                     alert("Note duplicated (Simulated)");
                                                     handleSetActivePopup(null);

                                                 <span className="material-symbols-outlined text-lg">content_copy</span>
                                                 Duplicate Note

                                             <button onClick={() => { handleSetActivePopup('history'); }} className="menu-item font-montserrat">

                                                 <span className="material-symbols-outlined text-lg">delete</span>
                                                 Delete Note
                                             </button>
                                         </div>
                                     )}
                                     {activePopup === 'labels' && (
                                         <div className="more-menu-dropdown z-[120] w-56 animate-in scale-95 duration-200">
                                             <div className="flex items-center gap-2 mb-3 p-1">
                                                 <button onClick={() => handleSetActivePopup('more')} className="p-1 hover:bg-slate-100 rounded-full">
                                                     <span className="material-symbols-outlined text-sm">arrow_back</span>
                                                 </button>
                                                 <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Add Label</span>
                                             </div>
                                             <div className="flex flex-col gap-1 mb-2 max-h-40 overflow-y-auto no-scrollbar">
                                                 {["PRIORITY", "PERSONAL", "WORK", "URGENT", "STRATEGY"].map(l => (
                                                     <button key={l} onClick={() => { 
                                                         const newLabels = labels.includes(l) ? labels.filter(x => x !== l) : [...labels, l];
                                                         setLabels(newLabels); 
                                                         handleSetActivePopup(null); 
                                                         setHasChanges(true); 
                                                         hasChangesRef.current = true;
                                                         saveToFirestore({ title, content: (editorRef.current ? editorRef.current.innerHTML : content), progress, isPinned, noteTheme, noteIcon, labels: newLabels, reminderDate, section: (editingNote ? editingNote.section : '') || '' });
                                                     }} className="menu-item !py-2 justify-between font-montserrat">
                                                         <span>{l}</span>
                                                         {labels.includes(l) && <span className="material-symbols-outlined text-primary text-sm">check</span>}
                                                     </button>
                                                 ))}
                                             </div>
                                             <div className="h-px bg-slate-100 my-1"></div>
                                             <div className="flex gap-1 p-1">
                                                 <input 
                                                     type="text" 
                                                     placeholder="Custom label..." 
                                                     className="flex-1 bg-slate-50 border-none rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-primary/30 font-montserrat"
                                                     value={newLabelText}
                                                     onChange={e => setNewLabelText(e.target.value)}
                                                     onKeyDown={e => {
                                                         if(e.key === 'Enter' && newLabelText.trim()) {
                                                             const cleanLabel = newLabelText.trim().toUpperCase();
                                                             const newLabels = labels.includes(cleanLabel) ? labels : [...labels, cleanLabel];
                                                             setLabels(newLabels);
                                                             setNewLabelText("");
                                                             handleSetActivePopup(null);
                                                             setHasChanges(true);
                                                             hasChangesRef.current = true;
                                                             saveToFirestore({ title, content: (editorRef.current ? editorRef.current.innerHTML : content), progress, isPinned, noteTheme, noteIcon, labels: newLabels, reminderDate, section: (editingNote ? editingNote.section : '') || '' });
                                                         }
                                                     }}
                                                 />
                                             </div>
                                         </div>
                                     )}
                                     {activePopup === 'share' && (
                                         <div className="more-menu-dropdown z-[120] w-80 p-0 overflow-hidden animate-in slide-in-from-bottom-2 duration-200">
                                             <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-white">
                                                 <div className="flex items-center gap-2">
                                                     <button onClick={() => handleSetActivePopup('more')} className="p-1 hover:bg-slate-100 rounded-full">
                                                         <span className="material-symbols-outlined text-sm">arrow_back</span>
                                                     </button>
                                                     <span className="text-sm font-bold text-slate-800 font-montserrat tracking-tight">Share Note</span>
                                                 </div>
                                                 <button onClick={() => handleSetActivePopup(null)} className="text-slate-400 hover:text-slate-600">
                                                     <span className="material-symbols-outlined text-lg">close</span>
                                                 </button>
                                             </div>
                                             <div className="p-4 space-y-5 bg-white">
                                                 {/* Email Sharing */}
                                                 <div>
                                                     <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Invite by Email</label>
                                                     <div className="flex gap-2">
                                                         <input 
                                                             type="email" 
                                                             placeholder="Enter email..." 
                                                             className="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-primary/20 font-montserrat"
                                                             value={shareEmail}
                                                             onChange={e => setShareEmail(e.target.value)}
                                                             onKeyDown={e => {
                                                                 if(e.key === 'Enter' && shareEmail.trim()) {
                                                                     const email = shareEmail.trim().toLowerCase();
                                                                     if(!sharedWith.includes(email)) {
                                                                         setSharedWith([...sharedWith, email]);
                                                                         setHasChanges(true);
                                                                         hasChangesRef.current = true;
                                                                     }
                                                                     setShareEmail("");
                                                                 }
                                                             }}
                                                         />
                                                         <button 
                                                             onClick={() => {
                                                                 if(shareEmail.trim()) {
                                                                     const email = shareEmail.trim().toLowerCase();
                                                                     if(!sharedWith.includes(email)) {
                                                                         setSharedWith([...sharedWith, email]);
                                                                         setHasChanges(true);
                                                                         hasChangesRef.current = true;
                                                                     }
                                                                     setShareEmail("");
                                                                 }
                                                             }}
                                                             className="bg-primary text-white px-3 rounded-xl text-xs font-bold hover:bg-primary-dark transition-colors"
                                                         >Invite</button>
                                                     </div>
                                                     <div className="mt-3 flex flex-wrap gap-2">
                                                         {sharedWith.map(email => (

                                                                 {email}
                                                                  <button onClick={() => { setSharedWith(sharedWith.filter(e => e !== email)); setHasChanges(true); hasChangesRef.current = true; }} className="hover:text-red-500">
                                                                     <span className="material-symbols-outlined text-xs">close</span>
                                                                 </button>
                                                             </span>
                                                         ))}
                                                     </div>
                                                 </div>

                                                 <div className="h-px bg-slate-100"></div>
