                                                                      token = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                                                                      setPublicShareToken(token);
                                                                  }
                                                                  setIsPublic(newVal);
                                                                  setHasChanges(true);
                                                                  hasChangesRef.current = true;
                                                                  saveToFirestore({ 
                                                                      title, 
                                                                      content: (editorRef.current ? editorRef.current.innerHTML : content), 
                                                                      isPublic: newVal,
                                                                      publicShareToken: token,
                                                                      allowPublicEdit
                                                                  }, true);

                                                             <div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${isPublic ? 'left-6' : 'left-1'}`}></div>
                                                         </button>
                                                     </div>

                                                         <>
                                                             <div className="flex items-center justify-between animate-in fade-in slide-in-from-top-1 duration-200">

                                                                     <span className="text-[10px] text-slate-400 font-montserrat">Anyone can edit this note</span>
                                                                 </div>

                                                                     onClick={() => { 
                                                                          const newVal = !allowPublicEdit;
                                                                          setAllowPublicEdit(newVal);

                                                                          saveToFirestore({ 
                                                                              title, 
                                                                              content: (editorRef.current ? editorRef.current.innerHTML : content), 
                                                                              allowPublicEdit: newVal,
                                                                              isPublic,
                                                                              publicShareToken
                                                                          }, true);
                                                                      }}
                                                                     className={`w-10 h-5 rounded-full relative transition-colors ${allowPublicEdit ? 'bg-primary' : 'bg-slate-200'}`}
                                                                 >
                                                                     <div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${allowPublicEdit ? 'left-6' : 'left-1'}`}></div>
                                                                 </button>
                                                             </div>
                                                             <button 
                                                                 onClick={() => {
                                                                     const activeToken = publicShareToken || (editingNoteRef.current?.publicShareToken);
                                                                     const url = `${window.location.origin}${window.location.pathname.replace('index.html', '')}share_note.html#/${activeToken}`;
                                                                     navigator.clipboard.writeText(url);
                                                                     showToast("Public link copied!");
                                                                 }}

                                                                 <span className="material-symbols-outlined text-sm">link</span>
                                                                 Copy Public Link
                                                             </button>
                                                         </>

                                                 </div>
                                             </div>
                                         </div>

                                             <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                                                 <div className="flex items-center gap-2">
                                                     <button onClick={() => handleSetActivePopup('more')} className="p-1 hover:bg-slate-200 rounded-full">
                                                         <span className="material-symbols-outlined text-sm">arrow_back</span>
                                                     </button>
                                                     <span className="text-sm font-bold text-slate-800 font-montserrat tracking-tight">Version history</span>

                                                      <div key={dayId} className="p-3 hover:bg-slate-50 rounded-xl flex items-center justify-between group">

                                                  <button onClick={() => handleSetActivePopup(null)} className="text-xs font-bold text-slate-800 hover:text-primary">Dismiss</button>

                                         </div>

                             </div>

                    {showConfirm.show && (

                    {showDeleteConfirm && (

        // --- Shared Helpers ---
        const getThemeClasses = (themeId) => {

        };

        const formatReminderDate = (dateStr) => {
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                const month = d.toLocaleString('en-US', { month: 'short' });
                const day = d.getDate();
                const time = d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                return `${month} ${day} • ${time}`;
            } catch(e) { return dateStr; }
        };

        const formatDateMinimal = (dateStr) => {
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                const month = d.toLocaleString('en-US', { month: 'short' });
                const day = d.getDate();
                return `${month} ${day}`;
            } catch(e) { return dateStr; }
        };

        const stripHtml = (html) => {
            if (!html) return '';
            const tmp = document.createElement('div');
            // Remove <hr> tags specifically and other block-level separations
            const clean = html.replace(/<hr[^>]*>/gi, ' ');
            const formatted = clean.replace(/<\/div>| <\/p>|<\/h1>|<\/h2>|<\/h3>|<\/li>|<\/br>|<br\/?>/gi, ' ');
            tmp.innerHTML = formatted;
            return (tmp.textContent || tmp.innerText || '').trim().replace(/\s+/g, ' ');
        };

        const formatTitle = (text) => {
            if (!text) return '';
            const t = text.trim();
            if (t.length === 0) return '';
            const limited = t.slice(0, 24);
            // If already all caps (and contains at least one letter), keep it. 
            // Otherwise, apply Title Case to ensure it's never all lowercase.
            if (limited === limited.toUpperCase() && /[A-Z]/.test(limited)) {
                return limited;
            }
            return limited.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        };

        const NoteCard = React.memo(({ note, onClick, index, variant = 'full', onRemoveReminder, isSelected = false }) => {

            if (variant === 'priority') {
                return (

                    >
                        <div className="flex justify-start">
                            <span className={`material-symbols-outlined text-xl ${theme.icon}`} style={note.isPinned ? {fontVariationSettings: "'FILL' 1"} : {}}>{note.noteIcon || 'push_pin'}</span>

                        <div className="mt-auto w-full flex flex-col gap-1 text-left">

            // Unifying 'compact' and 'full' styling logic derived directly from backup.html
            const isCompact = variant === 'compact';

            return (
                <div 
                    onClick={onClick}
                    className={`card-glow sticky-note-${(index % 5) + 1} ${isCompact ? 'rounded-[2rem] p-5 h-[140px]' : 'rounded-[2.2rem] p-6 h-[220px]'} flex flex-col border-b-4 group cursor-pointer relative overflow-hidden font-montserrat ${theme.bg} ${theme.border} ${isSelected ? 'scale-[0.97]' : ''}`}
                    style={isSelected ? { boxShadow: '0 0 0 3px #f97316, 0 0 20px rgba(249, 115, 22, 0.3)', transition: 'all 0.3s ease' } : {}}
                >
                    <div className="absolute top-4 right-4 text-right">
                        <span className={`material-symbols-outlined text-xl ${theme.icon} transition-opacity`} style={note.isPinned ? {fontVariationSettings: "'FILL' 1"} : {}}>{note.noteIcon || 'push_pin'}</span>

                    <div className="pr-8 mb-2">
                        <h3 className={`${isCompact ? 'text-lg' : 'text-xl'} font-bold tracking-tight font-display leading-tight mb-1.5 ${theme.text}`}>{formatTitle(note.title) || "Untitled"}</h3>
                        {preview && (
                            <p className={`${isCompact ? 'text-xs line-clamp-2 mt-1.5' : 'text-sm line-clamp-3 mt-2'} leading-relaxed font-sans ${theme.sub}`}>{preview}</p>
                        )}
                    </div>
                    
                    <div className="mt-auto pt-0 flex flex-col gap-1">
                        {note.reminderDate && (
                            <div className={`inline-flex items-center gap-1.5 text-[10px] font-bold font-montserrat ${theme.chipBg} ${theme.label} px-2.5 py-1.5 rounded-lg w-max border ${theme.chipBorder} relative group/rem`}>
                                <span className="material-symbols-outlined text-xs">notifications_active</span>
                                <span>{formatReminderDate(note.reminderDate)}</span>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onRemoveReminder && onRemoveReminder(note.id); }}
                                    className="ml-1 hover:text-primary transition-colors opacity-0 group-hover/rem:opacity-100"
                                >
                                    <span className="material-symbols-outlined text-[10px]">close</span>
                                </button>
                            </div>
                        )}
                        <div className="flex flex-wrap gap-1.5">
                        {(note.labels && note.labels.length > 0) ? (
                            note.labels.map(l => (
                                <span key={l} className={`text-[10px] font-bold uppercase tracking-widest font-montserrat ${theme.labelBg} ${theme.label} px-2.5 py-1 rounded-lg`}>{l}</span>
                            ))
                        ) : (
                            <span className={`text-[10px] font-bold uppercase tracking-widest font-montserrat ${theme.labelBg} ${theme.label} px-2.5 py-1 rounded-lg opacity-60`}>LABEL</span>
                        )}
                        </div>
                    </div>
                    {isSelected && (
                        <div className="absolute top-2.5 left-2.5 w-7 h-7 bg-primary rounded-full flex items-center justify-center shadow-lg z-10 animate-in zoom-in-50 duration-200 border-2 border-white">
                            <span className="material-symbols-outlined text-white text-base font-bold">check</span>
                        </div>
                    )}
                </div>
            );
        });

        // --- Page Components ---

        const DashboardPage = ({ user, notes, quickTasks, onOpenCreator, onEditNote, onRestoreDefaults, onReorderPriorityNote, onToggleQuickTask, onAddQuickTaskClick, onDeleteQuickTask, onUpdateQuickTask, onEditQuickTask, editingQuickTask, setEditingQuickTask, isQuickTaskModalOpen, setIsQuickTaskModalOpen, onRemoveReminder }) => {
            const navigate = useNavigate();
            const { search } = useLocation();
            const queryParams = new URLSearchParams(search);
            const [dragState, setDragState] = useState(null);
            const dragRef = useRef(null);
            const gestureRef = useRef({ active: false, activated: false, scrolling: false });
            const longPressTimer = useRef(null);
            
            // Move/Up/Cancel are added on document ONLY when a gesture starts,
            // to avoid blocking native scroll with per-card handlers.
            const docMoveRef = useRef(null);
            const docEndRef = useRef(null);

            const removeDocListeners = () => {
                if (docMoveRef.current) document.removeEventListener('pointermove', docMoveRef.current);
                if (docEndRef.current) {
                    document.removeEventListener('pointerup', docEndRef.current);
                    document.removeEventListener('pointercancel', docEndRef.current);
                }
                docMoveRef.current = null;
                docEndRef.current = null;
            };

            const [localNotes, setLocalNotes] = useState(() => 
                 notes
                     .filter(n => (n.labels || []).some(l => l.toUpperCase() === 'PRIORITY'))
                     .sort((a, b) => {
                         const orderA = a.homeOrder || 0;
                         const orderB = b.homeOrder || 0;
                         if (orderA !== orderB) return orderA - orderB;
                         const timeA = a.updatedAt ? (a.updatedAt.toMillis ? a.updatedAt.toMillis() : new Date(a.updatedAt).getTime()) : 0;
                         const timeB = b.updatedAt ? (b.updatedAt.toMillis ? b.updatedAt.toMillis() : new Date(b.updatedAt).getTime()) : 0;
                         return timeB - timeA;
                     })
             );
            const [visibleTasksCount, setVisibleTasksCount] = useState(10);

            const sortedQuickTasks = useMemo(() => {
                const tasks = [...quickTasks];
                tasks.sort((a, b) => {
                    // 1. Completion status (uncompleted first)
                    if (a.completed && !b.completed) return 1;
                    if (!a.completed && b.completed) return -1;
                    
                    // 2. For completed tasks, sort by completedAt descending (newest first)
                    if (a.completed && b.completed) {
                        return (b.completedAt || 0) - (a.completedAt || 0);
                    }
                    
                    // 3. For uncompleted tasks, sort by deadline ascending (earliest first)
                    // If one has a deadline and the other doesn't, deadline comes first
                    if (a.dueDate && !b.dueDate) return -1;
                    if (!a.dueDate && b.dueDate) return 1;
                    
                    if (a.dueDate && b.dueDate) {
                        const dateA = new Date(`${a.dueDate}T${a.dueTime || '00:00'}`);
                        const dateB = new Date(`${b.dueDate}T${b.dueTime || '00:00'}`);
                        if (dateA < dateB) return -1;
                        if (dateA > dateB) return 1;
                    }
                    
                    return 0;
                });
                return tasks;
            }, [quickTasks]);

            // Sync localNotes with notes prop when not dragging
            useEffect(() => {
                if (!dragState) {
                    const priorities = notes
                        .filter(n => (n.labels || []).some(l => l.toUpperCase() === 'PRIORITY'))
                        .sort((a, b) => {
                            const orderA = a.homeOrder || 0;
                            const orderB = b.homeOrder || 0;
                            if (orderA !== orderB) return orderA - orderB;
                            const timeA = a.updatedAt ? (a.updatedAt.toMillis ? a.updatedAt.toMillis() : new Date(a.updatedAt).getTime()) : 0;
                            const timeB = b.updatedAt ? (b.updatedAt.toMillis ? b.updatedAt.toMillis() : new Date(b.updatedAt).getTime()) : 0;
                            return timeB - timeA;
                        });
                    setLocalNotes(priorities);
                }
            }, [notes, dragState]);

            const handlePointerDown = (noteId, e) => {
                const cardEl = e.currentTarget;
                const { clientX, clientY, pointerId } = e;

                gestureRef.current = {
                    active: true,
                    activated: false,
                    scrolling: false,
                    pointerId,
                    cardEl,
                    noteId,
                    startX: clientX,
                    startY: clientY,
                    lastY: clientY
                };

                // Attach document-level listeners for this gesture
                const onMove = (ev) => {
                    const gs = gestureRef.current;
                    if (!gs.active) return;
                    const { clientX: mx, clientY: my } = ev;

                    if (gs.scrolling) return;

                    // Before long-press: detect scroll and bail
                    if (!gs.activated) {
                        if (Math.abs(mx - gs.startX) > 8 || Math.abs(my - gs.startY) > 8) {
                            if (longPressTimer.current) clearTimeout(longPressTimer.current);
                            gs.scrolling = true;
                            gs.active = false;
                            try { gs.cardEl.releasePointerCapture(gs.pointerId); } catch(err) {}
                            removeDocListeners();
                        }
                        return;
                    }

                    // Drag mode (after long press)
                    handlePointerMoveCore(mx, my);
                };

                const onEnd = (ev) => {
                    handlePointerEndCore(ev);
                    removeDocListeners();
                };

                removeDocListeners();
                docMoveRef.current = onMove;
                docEndRef.current = onEnd;
                document.addEventListener('pointermove', onMove);
                document.addEventListener('pointerup', onEnd);
                document.addEventListener('pointercancel', onEnd);

                longPressTimer.current = setTimeout(() => {
                    if (navigator.vibrate) try { navigator.vibrate(50); } catch(err) {}
                    gestureRef.current.activated = true;

                    try { cardEl.setPointerCapture(pointerId); } catch(err) {}

                    const rect = cardEl.getBoundingClientRect();
                    const clone = cardEl.cloneNode(true);
                    clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;z-index:9999;pointer-events:none;opacity:0.9;transform:scale(1.05) rotate(2deg);box-shadow:0 25px 60px rgba(0,0,0,0.5), 0 0 30px rgba(249, 115, 22, 0.3);transition:transform 0.15s ease, box-shadow 0.15s ease;border-radius:1.5rem;`;
                    document.body.appendChild(clone);
                    document.body.style.cursor = 'grabbing';
                    cardEl.style.opacity = '0.3';
                    cardEl.style.transform = 'scale(0.95)';

                    dragRef.current = {
                        noteId,
                        cloneEl: clone,
                        originalEl: cardEl,
                        offsetX: clientX - rect.left,
                        offsetY: clientY - rect.top,
                        startX: clientX,
                        startY: clientY,
                        didMove: false
                    };
                    setDragState(dragRef.current);
                }, 350);
            };

            const findScrollParent = (el) => {
                let node = el ? el.parentElement : null;
                while (node && node !== document.body) {
                    const style = window.getComputedStyle(node);
                    if ((style.overflowY === 'auto' || style.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) return node;
                    node = node.parentElement;
                }
                return document.documentElement;
            };

            const handlePointerMoveCore = (mx, my) => {
                const s = dragRef.current;
                if (!s) return;
                s.didMove = true;
                s.cloneEl.style.left = (mx - s.offsetX) + 'px';
                s.cloneEl.style.top = (my - s.offsetY) + 'px';

                let hoveredNoteId = null;
                document.querySelectorAll('[data-priority-note-id]').forEach(el => {
                    const nid = el.getAttribute('data-priority-note-id');
                    if (nid === s.noteId) return;
                    const r = el.getBoundingClientRect();
                    const centerX = r.left + r.width / 2; const centerY = r.top + r.height / 2;
                    if (Math.abs(mx - centerX) < 80 && Math.abs(my - centerY) < 80) hoveredNoteId = nid;
                });

                if (hoveredNoteId) {
                    setLocalNotes(prev => {
                        const si = prev.findIndex(n => n.id === s.noteId);
                        const ti = prev.findIndex(n => n.id === hoveredNoteId);
                        if (si === -1 || ti === -1) return prev;
                        const n = [...prev]; const [rm] = n.splice(si, 1); n.splice(ti, 0, rm); return n;
                    });
                }
            };

            const handlePointerEndCore = (e) => {
                const gs = gestureRef.current;
                if (!gs.active) return;
                try { gs.cardEl.releasePointerCapture(gs.pointerId); } catch(err) {}
                if (longPressTimer.current) clearTimeout(longPressTimer.current);

                if (gs.scrolling) {
                    setDragState(null);
                    dragRef.current = null;
                    return;
                }

                const s = dragRef.current;
                if (s && gs.activated && s.didMove) {
                    setLocalNotes(currentLocal => {
                        const fi = currentLocal.findIndex(n => n.id === s.noteId);
                        let tid = s.noteId;
                        if (currentLocal.length > 1) { const ti = fi > 0 ? fi - 1 : 1; tid = currentLocal[ti].id; }
                        if (tid !== s.noteId) onReorderPriorityNote(s.noteId, tid);
                        return currentLocal;
                    });
                    if (s.cloneEl) s.cloneEl.remove();
                    if (s.originalEl) {
                        s.originalEl.style.opacity = '1';
                        s.originalEl.style.transform = '';
                    }
                } else if (!gs.activated) {
                    // Short tap: open note
                    const note = localNotes.find(n => n.id === gs.noteId);
                    if (note) onEditNote(note);
                }

                document.body.style.cursor = '';
                setDragState(null);
                dragRef.current = null;
                gs.active = false;
            };

            // Effect cleanup
            useEffect(() => {
                return () => removeDocListeners();
            }, []);

            const sortedPriorityNotes = localNotes.slice(0, 6);

            return (
                <Layout onOpenCreator={onOpenCreator} onFabClick={onAddQuickTaskClick}>
                    <div className="max-w-7xl mx-auto w-full px-0 md:px-0 pt-0 md:pt-12 pb-12">
                        <Header user={user} />
                        <section className="mt-3 md:mt-8 mb-12 md:mb-16 px-4 md:px-0">
                            <div className="flex items-center gap-4 mb-6 pt-0 md:mb-10">
                                <h2 className="hidden md:block text-2xl font-bold text-cream-light/90 uppercase tracking-[0.3em] font-display">PRIORITY NOTES</h2>
                                <h2 className="md:hidden text-lg font-bold text-cream-light/90 uppercase tracking-[0.2em] font-display">PRIORITY</h2>
                                <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                                <Link to="/notes" className="text-[9px] md:text-[10px] font-bold text-primary/60 uppercase tracking-widest hover:text-primary transition-colors">
                                    view all ({notes.length})
                                </Link>
                            </div>
                            
                            {sortedPriorityNotes.length === 0 ? (
                                <div className="flex flex-col items-center justify-center p-20 glass-panel rounded-3xl border-dashed border-white/10 text-center">
                                    <span className="material-symbols-outlined text-6xl text-white/5 mb-4">star</span>
                                    <p className="text-white/40 font-medium mb-4 font-montserrat">No priority notes found</p>
                                    <p className="text-white/20 text-xs mb-8 uppercase tracking-widest font-bold">Tag a note with "PRIORITY" to see it here</p>
                                    <button 
                                        onClick={onOpenCreator}
                                        className="px-6 py-2 bg-primary/20 hover:bg-primary/30 text-primary border border-primary/30 rounded-xl text-xs font-bold uppercase tracking-widest transition-all font-montserrat"
                                    >
                                        Add New Note
                                    </button>
                                </div>
                            ) : (
                                queryParams.get('search') && sortedPriorityNotes.length === 0 ? (
                                    <div className="col-span-full py-20 text-center glass-panel rounded-3xl border border-white/5">
                                        <span className="material-symbols-outlined text-4xl text-white/10 mb-2">search_off</span>
                                        <p className="text-[10px] uppercase tracking-widest font-bold text-white/30">No matching important notes</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 lg:grid-cols-6 gap-3 md:gap-6 px-0 md:px-2 mb-16 md:mb-20">
                                        {sortedPriorityNotes.map((note, index) => (
                                            <div 
                                                key={note.id}
                                                onPointerDown={(e) => handlePointerDown(note.id, e)}

                                                className="transition-transform duration-300"
                                            >
                                                <NoteCard 
                                                    note={note} 
                                                    onClick={() => onEditNote(note)} 
                                                    index={index} 
                                                    variant="priority"
                                                    onRemoveReminder={onRemoveReminder} 
                                                />
                                            </div>
                                        ))}

                                        {sortedPriorityNotes.length < 6 && (
                                            <button 
                                                onClick={onOpenCreator}
                                                className="sticky-note-add h-[150px] md:h-[160px] border-2 border-dashed border-primary/40 rounded-[2rem] p-6 flex flex-col items-center justify-center group cursor-pointer hover:bg-primary/5 transition-colors"
                                            >
                                                <div className="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-3">
                                                    <span className="material-symbols-outlined text-2xl">add</span>
                                                </div>
                                                <p className="text-sm font-bold text-primary/80 uppercase tracking-widest text-center px-2">Add New Note</p>
                                            </button>
                                        )}
                                    </div>
                                )
                            )}
                        </section>

                        {/* Quick Tasks Section */}
                        <div className="px-4 md:px-0">
                            <div className="flex items-center gap-4 mb-6 md:mb-10">
                            <h2 className="text-lg md:text-2xl font-bold text-cream-light/90 uppercase tracking-[0.2em] md:tracking-[0.3em] font-display">QUICK TASKS</h2>
                            <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                            <button 
                                onClick={onAddQuickTaskClick}
                                className="text-[10px] font-bold text-primary/60 uppercase tracking-widest hover:text-primary transition-colors flex items-center gap-1"
                            >
                                <span className="material-symbols-outlined text-sm">add</span>
                                Add Quick Task
                            </button>
                        </div>

                        <section className="grid grid-cols-1 lg:grid-cols-3 gap-12 mb-32">
                            <div className="lg:col-span-2 space-y-4">
                                {quickTasks.length === 0 ? (
                                    <div className="glass-panel p-10 rounded-3xl text-center border-dashed border-white/5">
                                        <p className="text-white/20 text-sm font-bold uppercase tracking-widest">No quick tasks yet</p>
                                    </div>
                                ) : (
                                    <React.Fragment>
                                        {(() => {
                                            const incompleteTasks = sortedQuickTasks.filter(t => !t.completed);
                                            const completedTasks = sortedQuickTasks.filter(t => t.completed);
                                            
                                            // Always show at least 'visibleTasksCount' total, 
                                            // but prioritize incomplete ones.
                                            let displayTasks = [];
                                            if (incompleteTasks.length >= visibleTasksCount) {
                                                displayTasks = incompleteTasks.slice(0, visibleTasksCount);
                                            } else {
                                                displayTasks = [...incompleteTasks, ...completedTasks.slice(0, visibleTasksCount - incompleteTasks.length)];
                                            }

                                            // Ensure a recently completed or toggled task stays in view
                                            // by checking if it's in the displayTasks. If not, we might need a different approach,
                                            // but for now, showing 6 and prioritizing incomplete is much better.
                                            
                                            return displayTasks.map(task => {
                                                const formatDueDate = (date, time) => {
                                                    if (!date) return { label: '', isOverdue: false };
                                                    const d = new Date(date);
                                                    const now = new Date();
                                                    const today = now.toISOString().split('T')[0];
                                                    const tomorrow = new Date();
                                                    tomorrow.setDate(tomorrow.getDate() + 1);
                                                    const tomorrowStr = tomorrow.toISOString().split('T')[0];
                                                    
                                                    // Check for Overdue
                                                    let isOverdue = false;
                                                    const target = new Date(date);
                                                    if (time) {
                                                        const [h, m] = time.split(':');
                                                        target.setHours(parseInt(h), parseInt(m), 0, 0);
                                                    } else {
                                                        target.setHours(23, 59, 59, 999);
                                                    }
                                                    
                                                    if (now > target) {
                                                        isOverdue = true;
                                                    }

                                                    if (date === today) {
                                                        if (time) {
                                                            const [h, m] = time.split(':');
                                                            const diffMs = target - now;
                                                            const diffHours = diffMs / (1000 * 60 * 60);
                                                            
                                                            if (diffHours > 0 && diffHours <= 8) {
                                                                return { label: `Due in ${Math.ceil(diffHours)} ${Math.ceil(diffHours) === 1 ? 'hour' : 'hours'}`, isOverdue };
                                                            }
                                                        }
                                                        let label = isOverdue ? 'Past due' : 'Due Today';
                                                        if (time) {
                                                            const [h, m] = time.split(':');
                                                            const hours = parseInt(h);
                                                            const ampm = hours >= 12 ? 'PM' : 'AM';
                                                            const h12 = hours % 12 || 12;
                                                            label += ` • ${h12}:${m} ${ampm}`;
                                                        }
                                                        return { label, isOverdue };
                                                    }
                                                    
                                                    if (date === tomorrowStr) {
                                                        let label = isOverdue ? 'Past due' : 'Due Tomorrow';
                                                        if (time) {
                                                            const [h, m] = time.split(':');
                                                            const hours = parseInt(h);
                                                            const ampm = hours >= 12 ? 'PM' : 'AM';
                                                            const h12 = hours % 12 || 12;
                                                            label += ` • ${h12}:${m} ${ampm}`;
                                                        }
                                                        return { label, isOverdue };
                                                    }

                                                    const options = { month: 'short', day: 'numeric' };
                                                    let str = d.toLocaleDateString('en-US', options);
                                                    if (time) {
                                                        const [h, m] = time.split(':');
                                                        const hours = parseInt(h);
                                                        const ampm = hours >= 12 ? 'PM' : 'AM';
                                                        const h12 = hours % 12 || 12;
                                                        str += ` • ${h12}:${m} ${ampm}`;
                                                    }
                                                    return { label: isOverdue ? `Past due • ${str}` : str, isOverdue };
                                                };
                                                
                                                const { label: dueDateStr, isOverdue } = formatDueDate(task.dueDate, task.dueTime);

                                                return (
                                                    <div 
                                                        key={task.id}
                                                        className={`glass-panel rounded-[2rem] p-4 md:p-5 flex items-center justify-between group hover:bg-white/[0.07] hover:border-primary/30 transition-all duration-200 cursor-pointer border border-white/5 shadow-lg hover:shadow-primary/5 ${task.completed ? 'opacity-40 grayscale-[0.5]' : ''} ${isOverdue && !task.completed ? 'border-red-500/30' : ''}`}
                                                        style={{ minHeight: window.innerWidth < 768 ? '64px' : 'auto', touchAction: 'pan-y' }}
                                                        onClick={() => {
                                                            onToggleQuickTask(task.id);
                                                            // Play sound
                                                            try {
                                                                const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-37a.mp3');
                                                                audio.volume = 0.3;
                                                                audio.play().catch(() => {});
                                                            } catch(e) {}
                                                        }}
                                                        onContextMenu={(e) => {
                                                            e.preventDefault();
                                                            onEditQuickTask(task);
                                                        }}
                                                         onTouchStart={(e) => {
                                                             const { clientX, clientY } = e.touches[0];
                                                             e.currentTarget._startX = clientX;
                                                             e.currentTarget._startY = clientY;
                                                             const timer = setTimeout(() => onEditQuickTask(task), 600);
                                                             e.currentTarget._touchTimer = timer;
                                                         }}
                                                         onTouchEnd={(e) => {
                                                             clearTimeout(e.currentTarget._touchTimer);
                                                         }}
                                                         onTouchMove={(e) => {
                                                             const { clientX, clientY } = e.touches[0];
                                                             const dx = Math.abs(clientX - (e.currentTarget._startX || clientX));
                                                             const dy = Math.abs(clientY - (e.currentTarget._startY || clientY));
                                                             if (dx > 10 || dy > 10) {
                                                                 clearTimeout(e.currentTarget._touchTimer);
                                                             }
                                                         }}
                                                    >
                                                        <div className="flex items-center gap-5 pointer-events-none">
                                                            <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all duration-300 ${task.completed ? 'bg-primary border-primary text-white scale-110 shadow-lg shadow-primary/20' : 'border-white/10 text-transparent group-hover:border-primary/40'}`}>
                                                                <span className="material-symbols-outlined text-[1rem] font-bold">check</span>
                                                            </div>
                                                            <div className="flex flex-col gap-0.5">
                                                                <h4 className={`text-sm md:text-base text-cream-light font-montserrat font-bold tracking-wide transition-all duration-300 ${task.completed ? 'line-through decoration-primary/50 opacity-60' : 'group-hover:text-primary'} ${isOverdue && !task.completed ? 'text-red-400' : ''}`}>
                                                                    {task.text}
                                                                </h4>
                                                                {dueDateStr && (
                                                                    <p className={`text-[9px] md:text-[10px] font-montserrat font-bold uppercase tracking-[0.15em] flex items-center gap-1.5 transition-opacity ${isOverdue && !task.completed ? 'text-red-500' : 'text-primary/80 opacity-60 group-hover:opacity-100'}`}>
                                                                        <span className="material-symbols-outlined text-[10px] md:text-xs">event</span>
                                                                        {dueDateStr}
                                                                    </p>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); onDeleteQuickTask(task.id); }}
                                                            className="opacity-0 group-hover:opacity-100 p-2 text-white/10 hover:text-red-400 transition-all duration-200 pointer-events-auto transform hover:scale-110"
                                                        >
                                                            <span className="material-symbols-outlined text-xl">delete</span>
                                                        </button>
                                                    </div>
                                                );
                                            });
                                        })()}

                                        {quickTasks.length > visibleTasksCount && (
                                            <button 
                                                onClick={() => setVisibleTasksCount(prev => prev + 5)}
                                                className="w-full py-4 glass-panel rounded-2xl text-[10px] font-bold text-primary/60 uppercase tracking-widest hover:bg-white/5 transition-all"
                                            >
                                                Load More Tasks
                                            </button>
                                        )}
                                    </React.Fragment>
                                )}
                            </div>
                            
                            <div className="glass-panel rounded-3xl p-10 flex flex-col items-center justify-center text-center space-y-6">
                                <div className="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-2">
                                    <span className="material-symbols-outlined text-4xl" style={{fontVariationSettings: '"FILL" 1'}}>bolt</span>
                                </div>
                                <h3 className="text-2xl font-bold text-cream-light">Quick Focus</h3>
                                <p className="text-cream-light/60 font-sans leading-relaxed">Start a 25-minute pomodoro session to breeze through your tasks.</p>
                                <button className="w-full bg-primary/20 hover:bg-primary/30 text-primary border border-primary/30 py-4 rounded-2xl font-bold transition-all uppercase tracking-widest text-xs">Start Session</button>
                            </div>
                        </section>
                    </div>
                </div>
            </Layout>
            );
        };

        const NotesPage = React.memo(({ user, notes, onOpenCreator, onEditNote, noteSections, onAddSection, onDeleteSection, onMoveNote, onReorderNote, onRemoveReminder, onBulkUpdate, onBulkDelete }) => {
            const navigate = useNavigate();
            const pinnedNotes = notes.filter(n => n.isPinned);
            const [labelFilter, setLabelFilter] = useState('');
            const [showLabelDropdown, setShowLabelDropdown] = useState(false);
            const [showAddSection, setShowAddSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');
            const [pendingDeleteSection, setPendingDeleteSection] = useState(null);
            const longPressTimer = useRef(null);
            const dropdownRef = useRef(null);
            const [dragState, setDragState] = useState(null);
            const [localNotes, setLocalNotes] = useState(notes);
            const dragRef = useRef(null);
            const [selectedNotes, setSelectedNotes] = useState([]);
            const selectionMode = selectedNotes.length > 0;
            const pointerHandledRef = useRef(false);
            const geometryRef = useRef(null);
            const lastUpdateRef = useRef(0);
             const [selectionPopup, setSelectionPopup] = useState(null);
             const [newLabelText, setNewLabelText] = useState('');
             
             // Back button support for popups
             useEffect(() => {
                 const handleCloseInternal = () => {
                     setShowLabelDropdown(false);
                     setShowAddSection(false);
                     setPendingDeleteSection(null);
                     setSelectionPopup(null);
                 };
                 window.addEventListener('faiora-close-popups', handleCloseInternal);
                 return () => window.removeEventListener('faiora-close-popups', handleCloseInternal);
             }, []);

             const handleSetShowLabelDropdown = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'label' }, '');
                 setShowLabelDropdown(val);
             };
             const handleSetShowAddSection = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'section' }, '');
                 setShowAddSection(val);
             };
             const handleSetPendingDeleteSection = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'delete' }, '');
                 setPendingDeleteSection(val);
             };
             const handleSetSelectionPopup = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'selection' }, '');
                 setSelectionPopup(val);
             };

            // Sync localNotes with prop notes when not dragging
            useEffect(() => {
                if (!dragState) {
                    setLocalNotes(notes);
                }
            }, [notes, dragState]);

            // Collect all unique labels
            const allLabels = useMemo(() => {
                const set = new Set();
                notes.forEach(n => (n.labels || []).forEach(l => set.add(l)));
                return Array.from(set).sort();
            }, [notes]);

            // Filter function
            const { search } = useLocation();
            const queryParams = new URLSearchParams(search);
            const searchQuery = queryParams.get('search') || '';

            const matchesFilter = (note) => {
                const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                    const shortMonths = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    return `${months[d.getMonth()]} ${d.getDate()} ${d.getFullYear()} ${shortMonths[d.getMonth()]}`;
                };

                const searchableText = [
                    note.title,
                    note.content,
                    (note.labels || []).join(' '),
                    note.section,
                    note.reminderDate,
                    formatDate(note.reminderDate),
                    note.noteIcon
                ].filter(Boolean).join(' ').toLowerCase();

                if (searchQuery && !searchableText.includes(searchQuery.toLowerCase())) return false;
                if (!labelFilter) return true;
                return (note.labels || []).includes(labelFilter);
            };

            // Group notes by section (excluding pinned)
            const unpinnedNotes = notes.filter(n => !n.isPinned);
            const sectionNotes = (sectionName) => unpinnedNotes.filter(n => (n.section || '') === sectionName && matchesFilter(n));
            const allNotesUnsectioned = unpinnedNotes.filter(n => !n.section && matchesFilter(n));

            // Close dropdown on outside click
             useEffect(() => {
                 const handler = (e) => {
                     if (dropdownRef.current && !dropdownRef.current.contains(e.target)) handleSetShowLabelDropdown(false);
                 };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            // Disable right-click on the notes page
            useEffect(() => {
                const handler = (e) => e.preventDefault();
                document.addEventListener('contextmenu', handler);
                return () => document.removeEventListener('contextmenu', handler);
            }, []);

            // Gesture state ref — shared between pointer event handlers
            const gestureRef = useRef({ active: false, activated: false, scrolling: false });

            // Find nearest scrollable ancestor for manual scroll
            const findScrollParent = (el) => {
                let node = el ? el.parentElement : null;
                while (node && node !== document.body) {
                    const style = window.getComputedStyle(node);
                    if ((style.overflowY === 'auto' || style.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) return node;
                    node = node.parentElement;
                }
                return document.documentElement;
            };

            // Cleanup on unmount
            useEffect(() => {
                return () => {
                    if (dragRef.current && dragRef.current.cloneEl) dragRef.current.cloneEl.remove();
                };
            }, []);

            // === POINTER EVENT HANDLERS (unified mouse+touch) ===
            // Only onPointerDown is on individual cards.
            // Move/Up/Cancel are added on document ONLY when a gesture starts,
            // to avoid blocking native scroll with per-card handlers.

            const docMoveRef = useRef(null);
            const docEndRef = useRef(null);

            const removeDocListeners = () => {
                if (docMoveRef.current) document.removeEventListener('pointermove', docMoveRef.current);
                if (docEndRef.current) {
                    document.removeEventListener('pointerup', docEndRef.current);
                    document.removeEventListener('pointercancel', docEndRef.current);
                }
                docMoveRef.current = null;
                docEndRef.current = null;
            };

            const handlePointerDown = (noteId, e) => {
                const cardEl = e.currentTarget;
                const { clientX, clientY, pointerId } = e;

                gestureRef.current = {
                    active: true,
                    activated: false,
                    scrolling: false,
                    pointerId,
                    cardEl,
                    noteId,
                    startX: clientX,
                    startY: clientY,
                    lastY: clientY
                };

                // Attach document-level listeners for this gesture
                const onMove = (ev) => {
                    const gs = gestureRef.current;
                    if (!gs.active) return;
                    const { clientX: mx, clientY: my } = ev;

                    if (gs.scrolling) return;

                    // Before long-press: detect scroll and bail
                    if (!gs.activated) {
                        if (Math.abs(mx - gs.startX) > 8 || Math.abs(my - gs.startY) > 8) {
                            if (longPressTimer.current) clearTimeout(longPressTimer.current);
                            gs.scrolling = true;
                            gs.active = false;
                            try { gs.cardEl.releasePointerCapture(gs.pointerId); } catch(err) {}
                            removeDocListeners();
                        }
                        return;
                    }

                    // Drag mode (after long press)
                    handlePointerMoveCore(mx, my);
                };

                const onEnd = (ev) => {
                    handlePointerEndCore(ev);
                    removeDocListeners();
                };

                removeDocListeners();
                docMoveRef.current = onMove;
                docEndRef.current = onEnd;
                document.addEventListener('pointermove', onMove);
                document.addEventListener('pointerup', onEnd);
                document.addEventListener('pointercancel', onEnd);

                if (selectionMode) return;

                longPressTimer.current = setTimeout(() => {
                    if (navigator.vibrate) try { navigator.vibrate(50); } catch(err) {}
                    gestureRef.current.activated = true;

                    try { cardEl.setPointerCapture(pointerId); } catch(err) {}

                    const initialNote = notes.find(n => n.id === noteId);
                    const initialSection = initialNote ? (initialNote.isPinned ? "__pinned" : (initialNote.section || '')) : '';
                    
                    const scrollParent = findScrollParent(cardEl);
                    const currentScroll = scrollParent.scrollTop;
                    
                    const sections = [];
                    document.querySelectorAll('[data-drop-section]').forEach(el => {
                        const rect = el.getBoundingClientRect();
                        sections.push({ 
                            el, 
                            sect: el.getAttribute('data-drop-section'),
                            absTop: rect.top + currentScroll,
                            absBottom: rect.bottom + currentScroll,
                            absLeft: rect.left,
                            absRight: rect.right
                        });
                    });
                    
                    const noteElements = [];
                    document.querySelectorAll('[data-note-id]').forEach(el => {
                        const nid = el.getAttribute('data-note-id');
                        if (nid !== noteId) {
                           const rect = el.getBoundingClientRect();
                           const sectEl = el.closest('[data-drop-section]');
                           noteElements.push({ 
                               nid, 
                               sect: sectEl ? sectEl.getAttribute('data-drop-section') : '',
                               absCenterX: rect.left + rect.width / 2,
                               absCenterY: rect.top + rect.height / 2 + currentScroll
                           });
                        }
                    });

                    geometryRef.current = { sections, noteElements, scrollParent };

                    dragRef.current = {
                        noteId,
                        initialSection,
                        cardEl,
                        startX: clientX,
                        startY: clientY,
                        cloneCreated: false,
                        cloneEl: null,
                        originalEl: cardEl,
                        offsetX: 0,
                        offsetY: 0,
                        didMove: false
                    };
                    cardEl.style.transform = 'scale(0.97)';
                    cardEl.style.transition = 'transform 0.15s ease';
                }, 350);
            };

            // Core move logic (called from document listener, only during drag)
            const handlePointerMoveCore = (mx, my) => {
                const state = dragRef.current;
                if (!state) return;

                if (!state.cloneCreated && (Math.abs(mx - state.startX) > 5 || Math.abs(my - state.startY) > 5)) {
                    state.cloneCreated = true;
                    state.didMove = true;
                    const gs = gestureRef.current;
                    const rect = gs.cardEl.getBoundingClientRect();
                    const cloneEl = gs.cardEl.cloneNode(true);
                    document.body.style.cursor = 'grabbing';

                    cloneEl.className = 'drag-clone fixed z-[9999] pointer-events-none transition-transform duration-100 ease-out';
                    cloneEl.style.width = rect.width + 'px';
                    cloneEl.style.height = rect.height + 'px';
                    cloneEl.style.opacity = '0.9';
                    cloneEl.style.filter = 'drop-shadow(0 20px 40px rgba(0,0,0,0.4))';
                    cloneEl.style.left = (mx - (mx - rect.left)) + 'px';
                    cloneEl.style.top = (my - (my - rect.top)) + 'px';
                    cloneEl.style.borderRadius = '24px';
                    cloneEl.style.pointerEvents = 'none';
                    cloneEl.style.transform = 'scale(0.95)';
                    document.body.appendChild(cloneEl);

                    state.cloneEl = cloneEl;
                    state.offsetX = mx - rect.left;
                    state.offsetY = my - rect.top;

                    gs.cardEl.style.opacity = '0.3';
                    gs.cardEl.style.transform = 'scale(0.95)';

                    document.querySelectorAll('[data-drop-section]').forEach(el => {
                        el.style.outline = '2px dashed rgba(249, 115, 22, 0.4)';
                        el.style.outlineOffset = '4px';
                        el.style.borderRadius = '1.5rem';
                        el.style.transition = 'outline 0.2s, background 0.2s';
                    });
                }

                if (!state.cloneCreated) return;

                requestAnimationFrame(() => {
                    if (state.cloneEl) {
                        state.cloneEl.style.left = (mx - state.offsetX) + 'px';
                        state.cloneEl.style.top = (my - state.offsetY) + 'px';
                        state.cloneEl.style.transform = 'scale(1.05) rotate(1deg)';
                    }
                });

                const geo = geometryRef.current;
                if (geo && geo.scrollParent) {
                    const threshold = 120;
                    const viewHeight = window.innerHeight;
                    if (my < threshold) {
                        geo.scrollParent.scrollTop -= 15;
                    } else if (my > viewHeight - threshold) {
                        geo.scrollParent.scrollTop += 15;
                    }
                }

                const currentScroll = geo ? geo.scrollParent.scrollTop : 0;
                const absoluteMy = my + currentScroll;
                const absoluteMx = mx;

                let hoveredSect = null;
                const isDraggingPinned = (state.initialSection === "__pinned");
                
                if (geo && geo.sections) {
                    geo.sections.forEach(s => {
                        const isTargetPinned = (s.sect === "__pinned");
                        if (isDraggingPinned !== isTargetPinned) return;
                        if (absoluteMx >= s.absLeft && absoluteMx <= s.absRight && absoluteMy >= s.absTop && absoluteMy <= s.absBottom) {
                            hoveredSect = s.sect;
                            s.el.style.background = 'rgba(249, 115, 22, 0.05)';
                            s.el.style.outline = '2px dashed rgba(249, 115, 22, 0.4)';
                        } else {
                            s.el.style.background = '';
                            s.el.style.outline = '';
                        }
                    });
                }

                let hoveredNoteId = null;
                if (hoveredSect !== null && geo && geo.noteElements) {
                    geo.noteElements.forEach(n => {
                        if (n.sect !== hoveredSect) return;
                        const dx = absoluteMx - n.absCenterX;
                        const dy = absoluteMy - n.absCenterY;
                        if (Math.sqrt(dx*dx + dy*dy) < 90) hoveredNoteId = n.nid;
                    });
                }

                const now = Date.now();
                if (now - lastUpdateRef.current > 60 && (hoveredNoteId || hoveredSect !== null)) {
                    lastUpdateRef.current = now;
                    setLocalNotes(prev => {
                        let next = [...prev];
                        let changed = false;
                        const ni = next.findIndex(n => n.id === state.noteId);
                        if (ni === -1) return prev;

                        if (hoveredNoteId) {
                            const ti = next.findIndex(n => n.id === hoveredNoteId);
                            if (ti !== -1 && ni !== ti) {
                                const [rm] = next.splice(ni, 1);
                                next.splice(ti, 0, rm);
                                changed = true;
                            }
                        }

                        const curIdx = next.findIndex(n => n.id === state.noteId);
                        if (curIdx > -1 && hoveredSect !== null) {
                            const note = next[curIdx];
                            const targetIsPinned = (hoveredSect === "__pinned");
                            const targetSect = targetIsPinned ? (note.section || "") : hoveredSect;
                            if ((note.section || '') !== targetSect || !!note.isPinned !== targetIsPinned) {
                                next[curIdx] = { ...note, section: targetSect, isPinned: targetIsPinned };
                                changed = true;
                            }
                        }
                        return changed ? next : prev;
                    });
                }
            };

            const cleanupDrag = () => {
                const state = dragRef.current;
                const gs = gestureRef.current;
                
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                document.body.classList.remove('dragging-active');
                
                document.querySelectorAll('.drag-clone').forEach(el => el.remove());
                if (state && state.cloneEl) state.cloneEl.remove();

                if (state && state.originalEl) {
                    state.originalEl.style.opacity = '';
                    state.originalEl.style.transform = '';
                    state.originalEl.style.transition = '';
                    state.originalEl.classList.remove('dragging-source');
                }

                document.querySelectorAll('[data-drop-section]').forEach(el => {
                    el.style.background = '';
                    el.style.outline = '';
                });

                if (longPressTimer.current) clearTimeout(longPressTimer.current);
                gs.active = false;
                gs.activated = false;
                gs.scrolling = false;
                dragRef.current = null;
                setDragState(null);
                removeDocListeners();
            };

            const handlePointerEndCore = (e) => {
                const gs = gestureRef.current;
                if (!gs.active) return;

                try { gs.cardEl.releasePointerCapture(gs.pointerId); } catch(err) {}

                const state = dragRef.current;
                
                if (state && state.cloneCreated && state.didMove) {
                    setLocalNotes(currentLocal => {
                        const finalNote = currentLocal.find(n => n.id === state.noteId);
                        const originalNote = notes.find(n => n.id === state.noteId);
                        if (finalNote && originalNote && ((finalNote.section || '') !== (originalNote.section || '') || !!finalNote.isPinned !== !!originalNote.isPinned)) {
                            onBulkUpdate(state.noteId, { section: finalNote.section || '', isPinned: !!finalNote.isPinned });
                        }
                        const finalIdx = currentLocal.findIndex(n => n.id === state.noteId);
                        if (finalIdx > -1) {
                            const targetIdx = finalIdx > 0 ? finalIdx - 1 : 0;
                            const targetId = currentLocal[targetIdx].id;
                            if (targetId !== state.noteId) {
                                onReorderNote(state.noteId, targetId);
                            } else if (currentLocal.length > 1) {
                                onReorderNote(state.noteId, currentLocal[1].id);
                            }
                        }
                        return currentLocal;
                    });
                } 
                else if (!gs.scrolling) {
                    if (selectionMode || gs.activated) {
                        pointerHandledRef.current = true;
                        toggleNoteSelection(gs.noteId);
                    }
                }

                cleanupDrag();
            };

            // Global cleanup on unmount
            useEffect(() => {
                return () => { cleanupDrag(); removeDocListeners(); };
            }, []);

            const handleAddSectionSubmit = () => {
                if (newSectionName.trim()) {
                    onAddSection(newSectionName);
                    setNewSectionName('');
                    handleSetShowAddSection(false);
                 }
            };

            // Toggle note selection
            const toggleNoteSelection = (noteId) => {
                setSelectedNotes(prev => prev.includes(noteId) ? prev.filter(id => id !== noteId) : [...prev, noteId]);
            };

            // Bulk action handlers
            const bulkTogglePin = () => {
                const allPinned = selectedNotes.every(id => {
                    const n = notes.find(note => note.id === id);
                    return n && n.isPinned;
                });
                selectedNotes.forEach(id => {
                    const n = notes.find(note => note.id === id);
                    if (n) onBulkUpdate(id, { isPinned: !allPinned });
                });
                setSelectedNotes([]);
            };

            const bulkDelete = () => {
                if (confirm(`Delete ${selectedNotes.length} note(s)? This cannot be undone.`)) {
                    selectedNotes.forEach(id => onBulkDelete(id));
                    setSelectedNotes([]);
                }
            };

            const bulkDuplicate = () => {
                selectedNotes.forEach(id => {
                    const n = notes.find(note => note.id === id);
                    if (n) {
                        const dup = { ...n, id: 'note_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5), title: n.title + ' (Copy)', isPinned: false };
                        onBulkUpdate(dup.id, dup, true);
                    }
                });
                setSelectedNotes([]);
            };

            const bulkApplyPalette = (themeId) => {
                selectedNotes.forEach(id => {
                    onBulkUpdate(id, { noteTheme: themeId });
                });
                handleSetSelectionPopup(null);
                setSelectedNotes([]);
            };

            const bulkApplyLabel = (label) => {
                selectedNotes.forEach(id => {
                    const n = notes.find(note => note.id === id);
                    if (n) {
                        const newLabels = (n.labels || []).includes(label) ? n.labels : [...(n.labels || []), label];
                        onBulkUpdate(id, { labels: newLabels });
                     }
                 });
                 handleSetSelectionPopup(null);
                 setNewLabelText('');
                setSelectedNotes([]);
            };

            const bulkSetReminder = () => {
                const dateStr = prompt('Enter reminder date (YYYY-MM-DD):');
                if (dateStr) {
                    selectedNotes.forEach(id => {
                        onBulkUpdate(id, { reminderDate: dateStr + 'T08:00' });
                    });
                    setSelectedNotes([]);
                }
            };

            const themes = [
                { id: 'glass', color: 'rgba(255,255,255,0.05)' },
                { id: 'peach', color: '#ffedd5' },
                { id: 'amber', color: '#fef3c7' },
                { id: 'orange', color: '#ffedd5' },
                { id: 'yellow', color: '#fef9c3' },
                { id: 'warm1', color: '#e9d9c4' },
                { id: 'warm2', color: '#e9e5d8' },
                { id: 'warm3', color: '#e9e2da' },
                { id: 'warm4', color: '#e8c59d' },
                { id: 'warm5', color: '#e9e6d5' },
                { id: 'sage', color: '#ecfdf5' },
                { id: 'sky', color: '#e0f2fe' },
                { id: 'lavender', color: '#eef2ff' },
                { id: 'rose', color: '#fff1f2' },
                { id: 'slate', color: '#f1f5f9' },
                { id: 'teal', color: '#f0fdfa' },
                { id: 'indigo', color: '#f5f3ff' }
            ];

            const renderNoteGrid = (notesList, gridClass, currentSection = null) => {
                const count = notesList.length;
                // User prefers uniform sizes matching the Anima Christi spacing rather than dense mode
                const isDense = false; 
                // Enforcing a uniform gap-8 across all notes, keeping grid configuration
                const activeGridClass = gridClass || "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8";
                const sourceNoteId = dragState ? dragState.noteId : null;

                return (
                    <div className={activeGridClass}>
                        {notesList.map((note, index) => {
                            const isDragged = note.id === sourceNoteId;
                            
                            if (isDragged) {
                                // Anchor: The original DOM element that must stay in its starting section to keep pointer capture.
                                // We keep it in the original section's grid regardless of where the note currently "is".
                                const isHomeSection = currentSection === (dragState.initialSection || '');
                                const isTargetSection = note.isPinned ? (currentSection === '__pinned') : (currentSection === (note.section || ''));

                                return (
                                    <React.Fragment key={note.id}>
                                        {/* 1. SEPARATE ANCHOR: Persistent and invisible to hold pointer capture */}
                                        {isHomeSection && (
                                            <div 
                                                data-note-id={note.id}
                                                onPointerDown={(e) => handlePointerDown(note.id, e)}
                                                className="opacity-0 w-0 h-0 pointer-events-none overflow-hidden absolute" 
                                            />
                                        )}
                                        
                                        {/* 2. PLACEHOLDER: The visual destination feedback */}
                                        {isTargetSection && (
                                            <div className={`border-2 border-dashed border-primary/20 rounded-3xl flex flex-col items-center justify-center bg-primary/5 transition-all animate-pulse overflow-hidden relative group/placeholder min-h-[190px]`}>
                                                 <div className="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
                                                 <span className={`material-symbols-outlined text-primary/30 relative z-10 transition-transform text-4xl mb-2 scale-110 group-hover/placeholder:scale-125`}>add_circle</span>
                                                 <p className="text-primary/20 text-[10px] uppercase tracking-[0.2em] font-bold relative z-10">Land Here</p>
                                            </div>
                                        )}
                                    </React.Fragment>
                                );
                            }

                            const isSelected = selectedNotes.includes(note.id);

                            return (
                                <div 
                                    key={note.id}
                                    data-note-id={note.id}
                                    onPointerDown={(e) => handlePointerDown(note.id, e)}
                                    onContextMenu={(e) => e.preventDefault()}
                                    onClick={() => { 
                                        if (pointerHandledRef.current) {
                                            pointerHandledRef.current = false;
                                            return;
                                        }
                                        if (selectedNotes.length > 0) {
                                            toggleNoteSelection(note.id);
                                        } else if (!dragRef.current || !dragRef.current.didMove) {
                                            onEditNote(note); 
                                        }
                                    }} 
                                    style={{ 
                                        touchAction: 'pan-y',
                                        cursor: selectionMode ? 'pointer' : (dragState ? 'grabbing' : 'pointer')
                                    }}
                                    className="transition-all duration-300"
                                >
                                    <NoteCard 
                                        note={note} 
                                        index={index} 
                                        onRemoveReminder={onRemoveReminder}
                                        variant="default"
                                        isSelected={isSelected}
                                    />
                                </div>
                            );
                        })}
                    </div>
                );
            };

            // Label filter dropdown component
             const LabelFilterDropdown = () => (
