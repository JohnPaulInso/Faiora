                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    return newNotes;
                });
                // Sync to Firestore
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).update({
                        [`notes.${noteId}.section`]: sectionName
                    }).catch(e => console.warn('Section move sync fail', e));
                }
                if (showToast) showToast('Moved to ' + (sectionName || 'All Notes'));
            }, [user, activeCollection, showToast]);

            const quickTasksRef = useRef(quickTasks);
            useEffect(() => { quickTasksRef.current = quickTasks; }, [quickTasks]);
            const alarmsRef = useRef(alarms);
            useEffect(() => { alarmsRef.current = alarms; }, [alarms]);

            const clearAlarmTimers = useCallback((alarmId = null) => {
                if (alarmId) {
                    const timers = alarmTimersRef.current.get(alarmId) || [];
                    timers.forEach(id => clearTimeout(id));
                    alarmTimersRef.current.delete(alarmId);
                    return;
                }
                alarmTimersRef.current.forEach((timers) => timers.forEach(id => clearTimeout(id)));
                alarmTimersRef.current.clear();
            }, []);

            const scheduleAlarm = useCallback((alarm) => {
                if (!alarm || !alarm.enabled || !alarm.time) return;
                clearAlarmTimers(alarm.id);
                const [h, m] = String(alarm.time).split(':').map(Number);
                if (Number.isNaN(h) || Number.isNaN(m)) return;

                const now = new Date();
                const target = new Date();
                target.setHours(h, m, 0, 0);
                if (target.getTime() <= now.getTime()) {
                    target.setDate(target.getDate() + 1);
                }
                const delay = target.getTime() - now.getTime();
                const timeoutId = setTimeout(() => {
                    FaioraNotifications.notifyNow('Alarm Ringing', `${alarm.label || 'Alarm'} • ${alarm.time}`, `faiora-alarm-${alarm.id}`);
                    const updatedAlarm = { ...alarm, lastTriggeredAt: Date.now() };
                    const nextAlarms = alarmsRef.current.map(a => a.id === alarm.id ? updatedAlarm : a);
                    setAlarms(nextAlarms);
                    if (auth.currentUser) {
                        localStorage.setItem('faiora_alarms_' + auth.currentUser.uid, JSON.stringify(nextAlarms));
                        if (activeCollection) {
                            db.collection(activeCollection).doc(auth.currentUser.uid).set({ alarms: nextAlarms }, { merge: true }).catch(() => {});
                        }
                    }
                    if (alarm.repeatDaily && alarm.enabled) {
                        scheduleAlarm(updatedAlarm);
                    } else {
                        const disabled = { ...updatedAlarm, enabled: false };
                        const disabledList = alarmsRef.current.map(a => a.id === alarm.id ? disabled : a);
                        setAlarms(disabledList);
                    }
                }, delay);
                alarmTimersRef.current.set(alarm.id, [timeoutId]);
            }, [activeCollection, clearAlarmTimers]);

            const rescheduleAlarms = useCallback((list) => {
                clearAlarmTimers();
                (list || []).forEach(a => scheduleAlarm(a));
            }, [clearAlarmTimers, scheduleAlarm]);

            useEffect(() => () => clearAlarmTimers(), [clearAlarmTimers]);

            const handleUpdateQuickTasks = useCallback((updatedTasks, specificUpdate = null) => {
                setQuickTasks(updatedTasks);
                quickTasksRef.current = updatedTasks;
                const currentUser = auth.currentUser;
                
                if (currentUser) {
                    if (isProbing) {
                        console.warn('⚠️ [SYNC] Modifications paused while discovering writable collection...');
                        return;
                    }
                    console.log(`🔧 Syncing QuickTasks [${activeCollection}]:`, specificUpdate ? 'Partial' : 'Full');
                    localStorage.setItem('faiora_quick_tasks_' + currentUser.uid, JSON.stringify(updatedTasks));
                    if (activeCollection) {
                        const docRef = db.collection(activeCollection).doc(currentUser.uid);
                        if (specificUpdate) {
                            // Atomic field update
                            docRef.update(specificUpdate)
                                .then(() => console.log('✅ QuickTasks partial sync successful'))
                                .catch(e => {
                                    console.warn('⚠️ Partial sync failed, executing aggressive set(merge:true) fallback:', e.message);
                                    // Bypasses PERMISSION DENIED if it was caused by structural mismatch (Array vs Map)
                                    docRef.set({ quickTasks: updatedTasks }, { merge: true })
                                        .then(() => console.log('✅ Aggressive fallback: QuickTasks sync successful'))
                                        .catch(err => {
                                            console.error('❌ QuickTasks WRITE PERMISSION DENIED on', activeCollection, ':', err.message);
                                            showToast("Database error. Please refresh or try again.");
                                        });
                                });
                        } else {
                            // Fallback / Bulk update
                            docRef.set({ quickTasks: updatedTasks }, { merge: true })
                                .then(() => console.log('✅ QuickTasks full sync successful'))
                                .catch(e => console.error('❌ QuickTasks full sync FAILED:', e.message));
                        }
                    } else {
                        console.warn('⚠️ activeCollection is falsy - cannot sync quick tasks');
                    }
                } else {
                    console.warn('⚠️ No currentUser — cannot save quick tasks');
                }
            }, [activeCollection, isProbing]);

            const handleUpdateAlarms = useCallback((updatedAlarms) => {
                setAlarms(updatedAlarms);
                alarmsRef.current = updatedAlarms;
                const currentUser = auth.currentUser;
                if (!currentUser) return;
                localStorage.setItem('faiora_alarms_' + currentUser.uid, JSON.stringify(updatedAlarms));
                if (isProbing || !activeCollection) return;
                db.collection(activeCollection).doc(currentUser.uid).set({ alarms: updatedAlarms }, { merge: true }).catch(() => {});
            }, [activeCollection, isProbing]);

            const handleAddAlarm = useCallback((payload) => {
                const alarm = {
                    id: 'alarm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                    label: payload.label || 'Alarm',
                    time: payload.time || '07:00',
                    repeatDaily: payload.repeatDaily !== false,
                    enabled: true,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                const updated = [alarm, ...alarmsRef.current];
                handleUpdateAlarms(updated);
                scheduleAlarm(alarm);
            }, [handleUpdateAlarms, scheduleAlarm]);

            const handleToggleAlarm = useCallback((alarmId) => {
                const updated = alarmsRef.current.map(a => a.id === alarmId ? { ...a, enabled: !a.enabled, updatedAt: Date.now() } : a);
                handleUpdateAlarms(updated);
                const next = updated.find(a => a.id === alarmId);
                if (next && next.enabled) scheduleAlarm(next);
                else clearAlarmTimers(alarmId);
            }, [handleUpdateAlarms, scheduleAlarm, clearAlarmTimers]);

            const handleDeleteAlarm = useCallback((alarmId) => {
                clearAlarmTimers(alarmId);
                const updated = alarmsRef.current.filter(a => a.id !== alarmId);
                handleUpdateAlarms(updated);
            }, [clearAlarmTimers, handleUpdateAlarms]);

            const handleSaveProfile = useCallback((nextProfile) => {
                setProfileData(prev => ({ ...prev, ...nextProfile }));
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).set({ profile: { ...profileData, ...nextProfile } }, { merge: true }).catch(() => {});
                }
                showToast("Profile saved");
            }, [user, activeCollection, profileData, showToast]);

            const handleSaveSettings = useCallback((nextSettings) => {
                setSettingsData(prev => ({ ...prev, ...nextSettings }));
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).set({ settings: { ...settingsData, ...nextSettings } }, { merge: true }).catch(() => {});
                }
                showToast("Settings saved");
            }, [user, activeCollection, settingsData, showToast]);

            const handleAddQuickTask = useCallback((text, dueDate = '', dueTime = '') => {
                const chunks = String(text || '')
                    .split(/\r?\n/)
                    .map(line => formatTaskText(line))
                    .map(line => line.trim())
                    .filter(Boolean);
                if (!chunks.length) return;

                let dueTimestamp = null;
                if (dueDate) {
                    const dt = new Date(`${dueDate}T${dueTime || '23:59'}`);
                    if (!isNaN(dt.getTime())) dueTimestamp = dt.getTime();
                }
                const now = Date.now();
                const newTasks = chunks.map((line, idx) => ({
                    id: 'qt_' + (now + idx) + '_' + Math.random().toString(36).slice(2, 7),
                    text: line,
                    dueDate,
                    dueTime,
                    dueTimestamp,
                    completed: false,
                    createdAt: now + idx
                }));
                const updated = [...newTasks, ...quickTasksRef.current];
                handleUpdateQuickTasks(updated);
                newTasks.forEach(task => FaioraNotifications.scheduleForTask(task));
            }, [handleUpdateQuickTasks]);

            const handleUpdateQuickTask = (id, text, dueDate, dueTime) => {
                let dueTimestamp = null;
                if (dueDate) {
                    const dt = new Date(`${dueDate}T${dueTime || '23:59'}`);
                    if (!isNaN(dt.getTime())) dueTimestamp = dt.getTime();
                }

                const targetIndex = quickTasks.findIndex(t => t.id === id);
                if (targetIndex > -1) {
                    const updated = [...quickTasks];
                    const updatedTask = { ...updated[targetIndex], text, dueDate, dueTime, dueTimestamp, updatedAt: Date.now() };
                    updated[targetIndex] = updatedTask;
                    handleUpdateQuickTasks(updated);
                    FaioraNotifications.scheduleForTask(updatedTask);
                }
            };

            const [taskSnackbars, setTaskSnackbars] = useState([]);
            
            const addTaskSnackbar = useCallback((message, onUndo) => {
                const id = Date.now() + Math.random();
                setTaskSnackbars(prev => [...prev, { id, message, onUndo }]);
                setTimeout(() => {
                    setTaskSnackbars(prev => prev.filter(s => s.id !== id));
                }, 5000);
            }, []);

            const handleDeleteQuickTask = (id) => {
                const targetIndex = quickTasks.findIndex(t => t.id === id);
                const taskToDelete = targetIndex > -1 ? quickTasks[targetIndex] : null;
                if (!taskToDelete) return;

                FaioraNotifications.cancelForTask(id);
                const updated = [...quickTasks];
                updated.splice(targetIndex, 1);
                handleUpdateQuickTasks(updated);
                
                addTaskSnackbar(`Task deleted`, () => {
                    const restored = [taskToDelete, ...quickTasksRef.current];
                    handleUpdateQuickTasks(restored);
                    FaioraNotifications.scheduleForTask(taskToDelete);
                });
            };

            const handleToggleQuickTask = (id) => {
                const targetIndex = quickTasks.findIndex(t => t.id === id);
                if (targetIndex > -1) {
                    const updated = [...quickTasks];
                    const original = updated[targetIndex];
                    const updatedTask = {
                        ...original,
                        completed: !original.completed,
                        completedAt: !original.completed ? Date.now() : null
                    };
                    updated[targetIndex] = updatedTask;
                    handleUpdateQuickTasks(updated);
                    if (updatedTask.completed) {
                        FaioraNotifications.playCheckSFX();
                        FaioraNotifications.cancelForTask(id);
                        addTaskSnackbar(`Task completed`, () => {
                            // UNDO: Set it back to incomplete
                            const reverted = [...quickTasksRef.current];
                            const undoIndex = reverted.findIndex(t => t.id === id);
                            if (undoIndex > -1) {
                                reverted[undoIndex] = { ...reverted[undoIndex], completed: false, completedAt: null };
                                handleUpdateQuickTasks(reverted);
                            }
                        });
                    } else {
                        FaioraNotifications.scheduleForTask(updatedTask);
                    }
                }
            };

            const handleOpenCreator = useCallback(() => {
                setEditingNote(null);
                setIsCreatorOpen(true);
                // Push history so back button closes the modal instead of navigating away
                window.history.pushState({ modal: 'creator' }, '');
            }, []);

            const handleEditNote = useCallback((note) => {
                setEditingNote(note);
                setIsCreatorOpen(true);
                window.history.pushState({ modal: 'creator' }, '');
            }, []);

            const handleOpenSetLock = useCallback(() => {
                setIsSetLockModalOpen(true);
                window.history.pushState({ modal: 'setLock' }, '');
            }, []);

            const handleCloseSetLock = useCallback(() => {
                setIsSetLockModalOpen(false);
                if (window.history.state && window.history.state.modal === 'setLock') {
                    window.history.back();
                }
            }, []);

            const handleOpenQuickTaskModal = useCallback((date = null) => {
                setPrefillDate(date);
                setEditingQuickTask(null);
                setIsQuickTaskModalOpen(true);
            }, []);

            const handleCloseQuickTaskModal = useCallback(() => {
                setIsQuickTaskModalOpen(false);
                setPrefillDate(null);
            }, []);

            const handleOpenQuickTaskEditor = useCallback((task) => {
                setPrefillDate(null);
                setIsQuickTaskModalOpen(false);
                setEditingQuickTask(task);
            }, []);

            const handleCloseQuickTaskEditor = useCallback(() => {
                setEditingQuickTask(null);
            }, []);

            const handleCloseUnlockModal = useCallback(() => {
                setUnlockingNote(null);
                if (window.history.state && window.history.state.modal === 'unlock') {
                    window.history.back();
                }
            }, []);

            const handleCloseCreator = () => {
                setEditingNote(null);
                setIsCreatorOpen(false);
                // Pop the history entry we pushed, but flag it so popstate handler doesn't re-close
                if (window.history.state && window.history.state.modal === 'creator') {
                    closingViaCode.current = true;
                    window.history.back();
                }
            };

            // Fires as soon as Google popup/native sign-in resolves — before onAuthStateChanged in some browsers.
            useEffect(() => {
                const onSignedIn = (e) => {
                    const signedUser = e.detail;
                    if (!signedUser) return;
                    setNotes([]);
                    setQuickTasks([]);
                    setUser(signedUser);
                    setIsAuthChecked(true);
                    setIsTimerDone(true);
                    setIsProbing(true);
                };
                window.addEventListener('faiora-signed-in', onSignedIn);
                return () => window.removeEventListener('faiora-signed-in', onSignedIn);
            }, []);

            // APK / WebView: OAuth or resume can strip or break the hash — no Route match → blank screen.
            useEffect(() => {
                if (!user) return;
                try {
                    const h = window.location.hash;
                    if (!h || h === '#' || !h.startsWith('#/')) {
                        window.location.hash = '#/';
                    }
                } catch (e) { /* ignore */ }
            }, [user]);

            useEffect(() => {
                const fixHashOnResume = () => {
                    if (document.visibilityState !== 'visible') return;
                    if (!auth.currentUser) return;
                    try {
                        const h = window.location.hash;
                        if (!h || h === '#' || !h.startsWith('#/')) {
                            window.location.hash = '#/';
                        }
                    } catch (e) { /* ignore */ }
                };
                document.addEventListener('visibilitychange', fixHashOnResume);
                return () => document.removeEventListener('visibilitychange', fixHashOnResume);
            }, []);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    const nextUid = u?.uid ?? null;
                    const prevUid = prevAuthUidRef.current;
                    if (prevUid !== nextUid) {
                        setNotes([]);
                        setQuickTasks([]);
                        prevAuthUidRef.current = nextUid;
                    }
                    setUser(u);
                    setIsAuthChecked(true);

                    if (u) {
                        setIsProbing(true);
                        // Defer notifications + Firestore probe so this tick only updates auth state (fixes freeze / stuck login UI).
                        setTimeout(() => {
                        try {
                            if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                                FaioraNotifications.registerFCMToken();
                            } else {
                                FaioraNotifications.requestPermission().catch(() => {});
                            }
                        } catch (notifErr) {
                            console.warn('[Faiora] notification bootstrap:', notifErr);
                        }
                        console.log("👤 [AUTH] User logged in, starting writable collection discovery...");
                        const tryProbe = async () => {
                            const lastColl = localStorage.getItem('faiora_active_collection');
                            let bestCollection = lastColl || 'tasks';
                            try {
                                // 1. INSTANT LOAD: Set cached collection immediately so UI starts loading data
                                setActiveCollection(bestCollection);
                                console.log("⚡ [PROBE] Instant load from cache:", bestCollection);

                                const probeCollections = Array.from(new Set([bestCollection, 'tasks', 'users', 'userdata', 'notes', 'faiora_data', 'user_metadata']));
                                
                                const runProbe = async () => {
                                    try {
                                        const quickSnap = await db.collection(bestCollection).doc(u.uid).get();
                                        if (quickSnap.exists) {
                                            const qd = quickSnap.data();
                                            const hasNotes = qd?.notes && Object.keys(qd.notes).length > 0;
                                            const hasTasks = qd?.quickTasks && (Array.isArray(qd.quickTasks) ? qd.quickTasks.length > 0 : Object.keys(qd.quickTasks || {}).length > 0);
                                            if (hasNotes || hasTasks || qd?.profile || qd?.settings || (qd?.noteSections && qd.noteSections.length)) {
                                                try {
                                                    await db.collection(bestCollection).doc(u.uid).set({ _lastSync: Date.now() }, { merge: true });
                                                    console.log('⚡ [PROBE] Fast path using', bestCollection);
                                                    return bestCollection;
                                                } catch (e) {
                                                    console.warn('⚡ [PROBE] Fast path write check failed, full probe');
                                                }
                                            }
                                        }
                                    } catch (e) {
                                        console.warn('⚡ [PROBE] Fast path read failed, full probe');
                                    }

                                    console.log("🔍 [PROBE] Parallel discovery on:", probeCollections);

                                    const tryMigrateToWritable = async (richest) => {
                                        for (const coll of probeCollections) {
                                            if (coll === richest.coll) continue;
                                            try {
                                                console.log(`🚚 [MIGRATION] Trying writable home: '${coll}'`);
                                                await db.collection(coll).doc(u.uid).set(richest.data, { merge: true });
                                                showToast("Data secured & permissions fixed!");
                                                return coll;
                                            } catch (e2) { /* try next */ }
                                        }
                                        return richest.coll;
                                    };

                                    const results = await Promise.all(probeCollections.map(async (coll) => {
                                        try {
                                            const doc = await db.collection(coll).doc(u.uid).get();
                                            if (doc.exists) {
                                                const data = doc.data();
                                                const hasNotes = data && data.notes && Object.keys(data.notes).length > 0;
                                                const hasTasks = data && (data.quickTasks && (Array.isArray(data.quickTasks) ? data.quickTasks.length > 0 : Object.keys(data.quickTasks).length > 0));
                                                const score = (hasNotes ? 10 : 0) + (hasTasks ? 5 : 0);
                                                return { coll, exists: true, score, data };
                                            }
                                            return { coll, exists: false, score: 0, data: null };
                                        } catch (err) {
                                            return { coll, exists: false, score: -1, data: null };
                                        }
                                    }));

                                    const candidates = results.filter(r => r.score > 0).sort((a, b) => b.score - a.score);

                                    if (candidates.length > 0) {
                                        const richest = candidates[0];
                                        try {
                                            await db.collection(richest.coll).doc(u.uid).set({ _lastSync: Date.now() }, { merge: true });
                                            return richest.coll;
                                        } catch (e) {
                                            console.warn(`🚑 [PROBE] Source '${richest.coll}' is Read-Only. Searching for writable home...`);
                                            return await tryMigrateToWritable(richest);
                                        }
                                    }

                                    return bestCollection;
                                };

                                const found = await runProbe();
                                const result = found || bestCollection;
                                
                                if (result !== activeCollection) {
                                    console.log(`📍 [PROBE] Redirecting to found collection: '${result}'`);
                                    setActiveCollection(result);
                                    localStorage.setItem('faiora_active_collection', result);
                                }
                                
                                await new Promise(r => setTimeout(r, 200));

                                return result;
                            } catch (err) {
                                console.warn("Collection probe failed:", err?.message || err);
                                return bestCollection;
                            } finally {
                                setIsProbing(false);
                            }
                        };
                        
                        tryProbe().then(async (finalColl) => {
                            if (!finalColl) return;
                            try {
                                const doc = await db.collection(finalColl).doc(u.uid).get();
                                if (!doc.exists) {
                                    const sampleNote = { 
                                        id: 'note_priority_welcome', 
                                        title: 'Your First Priority Note', 
                                        labels: ['PRIORITY'], 
                                        noteIcon: 'star', 
                                        noteTheme: 'warm4', 
                                        content: '<div>This is a default priority note. You can edit it or add more labeled with "PRIORITY" to see them on your dashboard.</div>',
                                        homeOrder: 0
                                    };
                                    const notesMap = {
                                        [sampleNote.id]: { ...sampleNote, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
                                    };
                                    await db.collection(finalColl).doc(u.uid).set({ notes: notesMap });
                                }
                            } catch (e) {
                                console.warn("Seed attempt failed:", e.message);
                            }
                        });

                        localStorage.setItem('faiora_logged_in', 'true');
                        // Manual Override Command for User Support
                        window.faiora_switch_coll = (name) => {
                            setActiveCollection(name);
                            localStorage.setItem('faiora_active_collection', name);
                            console.log(`🚀 Switched active collection to: ${name}. Re-syncing...`);
                        };
                        }, 0);
                    } else {
                        setIsProbing(false);
                        console.log("👤 [AUTH] No user, skipping collection discovery.");
                    }
                });

                const handleGlobalKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                        // Global Undo for tasks
                        setTaskSnackbars(prev => {
                            if (prev.length === 0) return prev;
                            const last = prev[prev.length - 1];
                            if (last.onUndo) last.onUndo();
                            return prev.slice(0, -1);
                        });
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);

                const authTimeout = setTimeout(() => {
                    setIsAuthChecked(true);
                }, 5000);

                return () => {
                    unsubscribe();
                    clearTimeout(authTimeout);
                    window.removeEventListener('keydown', handleGlobalKeyDown);
                };
            }, []);

            useEffect(() => {
                const safety = setTimeout(() => setIsTransitioning(false), 1800);
                return () => clearTimeout(safety);
            }, [user]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setIsTimerDone(true);
                }, 1000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const enforceSpeed = () => {
                    if (videoRef.current) {
                        videoRef.current.playbackRate = 1.5;
                    }
                };
                enforceSpeed();
                // Add listeners to reset if changed by context/extensions
                if (videoRef.current) {
                    videoRef.current.addEventListener('ratechange', enforceSpeed);
                    videoRef.current.addEventListener('playing', enforceSpeed);
                }
                return () => {
                    if (videoRef.current) {
                        videoRef.current.removeEventListener('ratechange', enforceSpeed);
                        videoRef.current.removeEventListener('playing', enforceSpeed);
                    }
                };
            }, [user, isTimerDone, isAuthChecked]);

            const handleLoadingComplete = useCallback(() => {
                setIsTimerDone(true);
            }, []);

            // FIX 2026-04-15: Removed LoadingPage/Loaders for direct fade-in launch
            /* 
            if (!isTimerDone || !isAuthChecked) {
                return <LoadingPage onComplete={handleLoadingComplete} />;
            }
            */
           
            // Ensure ready signal is sent even if loaders are removed
            useEffect(() => {
                if (isAuthChecked) {
                    window.dispatchEvent(new CustomEvent('faiora-app-ready'));
                }
            }, [isAuthChecked]);

            // Redirection logic for tokens...
            const hash = window.location.hash;
            if (hash.startsWith('#/share/')) {
                const token = hash.replace('#/share/', '');
                window.location.href = `share_note.html#/${token}`;
                return null; // Simplified from LoadingPage
            }

            // FIX 2026-04-15: Wait for auth check to finish before showing LoginModal
            // This prevents the Google login prompt from flashing when the user is already logged in.
            if (!isAuthChecked) {
                return null;
            }

            if (!user) {
                return <LoginModal />;
            }



            return (
                <HashRouter>
                    <FaioraErrorBoundary>
                    <NotificationBanner user={user} />
                    <video 
                        ref={videoRef}
                        className={`fire-bg-video ${isVideoReady ? 'is-ready' : ''}`}
                        autoPlay 
                        loop 
                        muted 
                        playsInline
                        onPlaying={() => setIsVideoReady(true)}
                        onError={() => setIsVideoReady(false)}
                        src="fire_bg_video.mp4"
                    />
                    <div className={isTransitioning ? 'page-transitioning' : ''}>
                        <TransitionManager 
                            onTransitionStart={() => setIsTransitioning(true)}
                            onTransitionEnd={() => setIsTransitioning(false)}
                        >
                         <Route path="/" element={<DashboardPage user={user} notes={notes} quickTasks={quickTasks} onOpenCreator={handleOpenCreator} onEditNote={handleRequestEditNote} onRestoreDefaults={handleRestoreDefaults} onReorderPriorityNote={handleReorderPriorityNote} onToggleQuickTask={handleToggleQuickTask} onAddQuickTaskClick={() => { handleOpenQuickTaskModal(); }} onDeleteQuickTask={handleDeleteQuickTask} onUpdateQuickTask={handleUpdateQuickTask} onEditQuickTask={handleOpenQuickTaskEditor} editingQuickTask={editingQuickTask} setEditingQuickTask={setEditingQuickTask} isQuickTaskModalOpen={isQuickTaskModalOpen} setIsQuickTaskModalOpen={setIsQuickTaskModalOpen} onRemoveReminder={handleRemoveReminder} isProbing={isProbing} isFirstSyncDone={isFirstSyncDone} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/notes" element={<NotesPage user={user} notes={notes} onOpenCreator={handleOpenCreator} onEditNote={handleRequestEditNote} noteSections={noteSections} onAddSection={handleAddSection} onDeleteSection={handleDeleteSection} onMoveNote={handleMoveNoteToSection} onReorderNote={handleReorderNote} onRemoveReminder={handleRemoveReminder} onBulkUpdate={handleBulkUpdate} onBulkDelete={handleBulkDelete} isProbing={isProbing} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/calendar" element={
                            <CalendarPage 
                                user={user} 
                                notes={notes} 
                                quickTasks={quickTasks}
                                onOpenCreator={handleOpenCreator} 
                                onEditNote={handleRequestEditNote} 
                                onToggleQuickTask={handleToggleQuickTask}
                                 onEditQuickTask={handleOpenQuickTaskEditor}
                                 onAddQuickTask={handleOpenQuickTaskModal}
                                pomodoroTime={pomodoroTime}
                                isPomodoroActive={isPomodoroActive}
                            />
                        } />
                        <Route path="/stats" element={<StatsPage user={user} onOpenCreator={handleOpenCreator} quickTasks={quickTasks} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/streak" element={<StreakPage user={user} onOpenCreator={handleOpenCreator} gamification={gamification} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/clock" element={<ClockPage user={user} onOpenCreator={handleOpenCreator} alarms={alarms} onAddAlarm={handleAddAlarm} onToggleAlarm={handleToggleAlarm} onDeleteAlarm={handleDeleteAlarm} pomodoroTime={pomodoroTime} setPomodoroTime={setPomodoroTime} isPomodoroActive={isPomodoroActive} setIsPomodoroActive={setIsPomodoroActive} pomodoroSessions={pomodoroSessions} />} />
                        <Route path="/profile" element={<ProfilePage user={user} onOpenCreator={handleOpenCreator} profileData={profileData} onSaveProfile={handleSaveProfile} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/settings" element={<SettingsPage user={user} onOpenCreator={handleOpenCreator} settingsData={settingsData} onSaveSettings={handleSaveSettings} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        </TransitionManager>
                    </div>
                     {isCreatorOpen && <TaskCreator onClose={handleCloseCreator} user={user} editingNote={editingNote} activeCollection={activeCollection} onUpdateNote={handleUpdateNoteLocal} onDeleteNote={handleDeleteNoteLocal} onSaveVersion={handleSaveVersion} showToast={showToast} notes={notes} onToggleLock={handleRemoveLock} onOpenLockSet={handleOpenSetLock} />}
                     {isSetLockModalOpen && <SetLockModal onClose={handleCloseSetLock} showToast={showToast} onSet={handleSetLock} />}
                     {unlockingNote && (
                         <UnlockModal 
                            hint={unlockingNote.pinHint} 
                            showToast={showToast}
                            onClose={handleCloseUnlockModal}
                            onUnlock={async (p) => {
                                const hash = await hashPIN(p);
                                if (hash === unlockingNote.pinHash) {
                                    const note = unlockingNote;
                                    setTimeout(() => handleEditNote(note), 220);
                                    return true;
                                }
                                return false;
                            }}
                         />
                     )}
                    {isQuickTaskModalOpen && (
                        <QuickTaskModal 
                            prefillDate={prefillDate}
                            onClose={handleCloseQuickTaskModal} 
                            onAdd={handleAddQuickTask} 
                            showToast={showToast} 
                        />
                    )}
                    {editingQuickTask && (
                        <QuickTaskModal 
                            initialData={editingQuickTask}
                            onClose={handleCloseQuickTaskEditor}
                            showToast={showToast}
                            onAdd={(text, date, time) => {
                                handleUpdateQuickTask(editingQuickTask.id, text, date, time);
                                handleCloseQuickTaskEditor();
                            }}
                        />
                    )}
                    <div className="toast-container">
                        {toasts.map(toast => (
                            <div key={toast.id} className="toast-pill">
                                <span className="material-symbols-outlined text-primary text-xl">check_circle</span>
                                {toast.message}
                            </div>
                        ))}
                    </div>

                    {/* Task Snackbars */}
                    <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[200] flex flex-col-reverse gap-3 pointer-events-none w-full max-w-sm px-4">
                        <style>{`
                            .task-snackbar {
                                background: rgba(15, 23, 42, 0.9);
                                backdrop-filter: blur(12px);
                                border: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 1.25rem;
                                padding: 0.85rem 1.25rem;
                                display: flex;
                                items-center;
                                justify-content: space-between;
                                color: #f8fafc;
                                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
                                pointer-events: auto;
                                animation: snackbar-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                            }
                            @keyframes snackbar-in {
                                from { opacity: 0; transform: translateY(20px) scale(0.9); }
                                to { opacity: 1; transform: translateY(0) scale(1); }
                            }
                        `}</style>
                        {taskSnackbars.slice(-1).map(snack => (
                            <div key={snack.id} className="task-snackbar group">
                                <div className="flex items-center gap-3">
                                    <span className="material-symbols-outlined text-primary text-xl">
                                        {snack.message.includes('deleted') ? 'delete' : 'check_circle'}
                                    </span>
                                    <span className="text-sm font-medium">{snack.message}</span>
                                </div>
                                <button 
                                    onClick={() => {
                                        snack.onUndo();
                                        setTaskSnackbars(prev => prev.filter(s => s.id !== snack.id));
                                    }}
                                    className="text-primary text-xs font-bold uppercase tracking-wider px-3 py-1.5 hover:bg-primary/10 rounded-lg transition-colors"
                                >
                                    Undo
                                </button>
                            </div>
                        ))}
                    </div>
                    </FaioraErrorBoundary>
                </HashRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
