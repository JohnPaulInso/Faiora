                    cardEl.style.opacity = '0.3';
                    cardEl.style.transform = 'scale(0.95)';

                    dragRef.current = {
                        noteId,
                        cloneEl: clone,
                        originalEl: cardEl,
                        offsetX: clientX - rect.left,
                        offsetY: clientY - rect.top,
                        startX: clientX,
                        startY: clientY,
                        didMove: false
                    };
                    setDragState(dragRef.current);
                }, 350);
            };

            const findScrollParent = (el) => {
                let node = el ? el.parentElement : null;
                while (node && node !== document.body) {
                    const style = window.getComputedStyle(node);
                    if ((style.overflowY === 'auto' || style.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) return node;
                    node = node.parentElement;
                }
                return document.documentElement;
            };

            const handlePointerMoveCore = (mx, my) => {
                const s = dragRef.current;
                if (!s) return;
                s.didMove = true;
                
                /* FIX 2026-04-16: Clone follows finger correctly using delta from start position */
                if (s.cloneEl) {
                    s.cloneEl.style.transform = `translate3d(${mx - s.startX}px, ${my - s.startY}px, 0) scale(1.05) rotate(2deg)`;
                }

                // [FIX 2026-04-16] Edge Autoscrolling for Mobile
                const scrollSpeed = 15;
                const edgeThreshold = 80;
                if (my < edgeThreshold) {
                    window.scrollBy(0, -scrollSpeed);
                } else if (my > window.innerHeight - edgeThreshold) {
                    window.scrollBy(0, scrollSpeed);
                }

                // Throttle proximity check to every ~32ms (2 frames)
                const now = Date.now();
                if (now - lastUpdateRef.current < 32) return;
                lastUpdateRef.current = now;
                // handlePointerMoveCore - Dashboard reorder logic sync [FIX 2026-04-16]

                let hoveredNoteId = null;
                document.querySelectorAll('[data-priority-note-id]').forEach(el => {
                    const nid = el.getAttribute('data-priority-note-id');
                    if (nid === s.noteId) return;
                    const r = el.getBoundingClientRect();
                    const centerX = r.left + r.width / 2; const centerY = r.top + r.height / 2;
                    if (Math.abs(mx - centerX) < 80 && Math.abs(my - centerY) < 80) hoveredNoteId = nid;
                });

                if (hoveredNoteId) {
                    setLocalNotes(prev => {
                        const si = prev.findIndex(n => n.id === s.noteId);
                        const ti = prev.findIndex(n => n.id === hoveredNoteId);
                        if (si === -1 || ti === -1) return prev;
                        const n = [...prev]; const [rm] = n.splice(si, 1); n.splice(ti, 0, rm); return n;
                    });
                }
            };

            /* handlePointerEndCore - cleans up drag state when pointer is released */
            /* FIX 2026-04-15: Added cleanup for activated-but-no-move case where clone and opacity were not restored */
            const handlePointerEndCore = (e) => {
                const gs = gestureRef.current;
                if (!gs.active) return;
                try { gs.cardEl.releasePointerCapture(gs.pointerId); } catch(err) {}
                if (longPressTimer.current) clearTimeout(longPressTimer.current);

                if (gs.scrolling) {
                    setDragState(null);
                    dragRef.current = null;
                    return;
                }

                const s = dragRef.current;
                if (s && gs.activated && s.didMove) {
                    /* User dragged and moved - commit reorder */
                    setLocalNotes(currentLocal => {
                        const fi = currentLocal.findIndex(n => n.id === s.noteId);
                        let tid = s.noteId;
                        if (currentLocal.length > 1) { const ti = fi > 0 ? fi - 1 : 1; tid = currentLocal[ti].id; }
                        if (tid !== s.noteId) onReorderPriorityNote(s.noteId, tid);
                        return currentLocal;
                    });
                } else if (!gs.activated) {
                    /* Short tap: open note */
                    const note = localNotes.find(n => n.id === gs.noteId);
                    if (note) onEditNote(note);
                }

                /* Always cleanup clone element and restore original card styles */
                if (s) {
                    if (s.cloneEl) s.cloneEl.remove();
                    if (s.originalEl) {
                        s.originalEl.style.opacity = '1';
                        s.originalEl.style.transform = '';
                    }
                }

                document.body.style.cursor = '';
                setDragState(null);
                dragRef.current = null;
                gs.active = false;
            };

            // Effect cleanup
            useEffect(() => {
                return () => removeDocListeners();
            }, []);

            const sortedPriorityNotes = useMemo(() => localNotes.slice(0, 6), [localNotes]);

            const handleRefresh = async () => {
                if (navigator.vibrate) try { navigator.vibrate([10, 30, 10]); } catch(err) {}
                console.log("🔄 Pull-to-refresh triggered: Re-syncing data...");
                // Force a reload of the snapshot state by pulsing isAuthChecked or similar
                // But for now, a hard reload or simple 1s delay is a visual enough confirmation
                // of the live snapshot sync which is already active.
                return new Promise(resolve => setTimeout(resolve, 1200));
            };

            return (
                <Layout onOpenCreator={onOpenCreator} onFabClick={onAddQuickTaskClick} onRefresh={handleRefresh} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive}>
                    <div className="max-w-7xl mx-auto w-full px-0 md:px-12 pt-20 md:pt-12 pb-12">
                        <Header user={user} />
                        <section className="mt-3 md:mt-8 mb-12 md:mb-16 px-4 md:px-0">
                            <div className="flex items-center gap-4 mb-6 pt-2 md:mb-10">
                                <h2 className="hidden md:block text-2xl font-bold text-cream-light/90 uppercase tracking-[0.3em] font-display">PRIORITY NOTES</h2>
                                <h2 className="md:hidden text-lg font-bold text-cream-light/90 uppercase tracking-[0.2em] font-display">PRIORITY</h2>
                                <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                                <Link to="/notes" className="text-[9px] md:text-[10px] font-bold text-primary/60 uppercase tracking-widest hover:text-primary transition-colors">
                                    view all ({notes.length})
                                </Link>
                            </div>
                            
                            {/* FIX 2026-04-16: Use isFirstSyncDone to keep skeletons visible until initial snapshots are ready */}
                            {(isProbing || !isFirstSyncDone) ? (
                                <div className="grid grid-cols-2 lg:grid-cols-6 gap-3 md:gap-6 px-0 md:px-2 mb-16 md:mb-20">
                                    {[...Array(6)].map((_, i) => <PriorityNoteSkeleton key={i} index={i} />) }
                                </div>
                            ) : sortedPriorityNotes.length === 0 ? (
                                <div className="flex flex-col items-center justify-center p-20 glass-panel rounded-3xl border-dashed border-white/10 text-center">
                                    <span className="material-symbols-outlined text-6xl text-white/5 mb-4">star</span>
                                    <p className="text-white/40 font-medium mb-4 font-montserrat">No priority notes found</p>
                                    <p className="text-white/20 text-xs mb-8 uppercase tracking-widest font-bold">Tag a note with "PRIORITY" to see it here</p>
                                    <button 
                                        onClick={onOpenCreator}
                                        className="px-6 py-2 bg-primary/20 hover:bg-primary/30 text-primary border border-primary/30 rounded-xl text-xs font-bold uppercase tracking-widest transition-all font-montserrat"
                                    >
                                        Add New Note
                                    </button>
                                </div>
                            ) : (
                                queryParams.get('search') && sortedPriorityNotes.length === 0 ? (
                                    <div className="col-span-full py-20 text-center glass-panel rounded-3xl border border-white/5">
                                        <span className="material-symbols-outlined text-4xl text-white/10 mb-2">search_off</span>
                                        <p className="text-[10px] uppercase tracking-widest font-bold text-white/30">No matching important notes</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 lg:grid-cols-6 gap-3 md:gap-6 px-0 md:px-2 mb-16 md:mb-20">
                                        {sortedPriorityNotes.map((note, index) => (
                                            <div 
                                                key={note.id}
                                                onPointerDown={(e) => handlePointerDown(note.id, e)}
                                                onContextMenu={(e) => e.preventDefault()}
                                                style={{ touchAction: (dragState && dragState.noteId === note.id) ? 'none' : 'pan-y' }}
                                                className={"transition-transform duration-300 " + (dragState && dragState.noteId === note.id ? 'z-[1000] scale-105' : 'z-10')}
                                            >
                                                {/* note-card-container: individual priority note [FIX 2026-04-16] */}
                                                <NoteCard 
                                                    id={`note_card_${note.id}`}
                                                    note={note} 
                                                    onClick={() => onEditNote(note)} 
                                                    index={index} 
                                                    variant="priority"
                                                    onRemoveReminder={onRemoveReminder} 
                                                />
                                            </div>
                                        ))}

                                        {sortedPriorityNotes.length < 6 && (
                                            <button 
                                                onClick={onOpenCreator}
                                                className="sticky-note-add h-[150px] md:h-[160px] border-2 border-dashed border-primary/40 rounded-[2rem] p-6 flex flex-col items-center justify-center group cursor-pointer hover:bg-primary/5 transition-colors"
                                            >
                                                <div className="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-3">
                                                    <span className="material-symbols-outlined text-2xl">add</span>
                                                </div>
                                                <p className="text-sm font-bold text-primary/80 uppercase tracking-widest text-center px-2">Add New Note</p>
                                            </button>

                                    </div>
                                )
                            )}
                        </section>

                        {/* Quick Tasks Section */}
                        <div className="px-4 md:px-0">
                            <div className="flex items-center gap-4 mb-6 md:mb-10">
                            <h2 className="text-lg md:text-2xl font-bold text-cream-light/90 uppercase tracking-[0.2em] md:tracking-[0.3em] font-display">QUICK TASKS</h2>
                            <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                            <button 
                                onClick={onAddQuickTaskClick}
                                className="text-[10px] font-bold text-primary/60 uppercase tracking-widest hover:text-primary transition-colors flex items-center gap-1"
                            >
                                <span className="material-symbols-outlined text-sm">add</span>
                                Add Quick Task
                            </button>
                        </div>

                        <section className="grid grid-cols-1 lg:grid-cols-3 gap-12 mb-32">
                            <div className="lg:col-span-2 space-y-4">
                                {(isProbing && quickTasks.length === 0) ? (
                                    <div className="space-y-4">
                                        {[...Array(5)].map((_, i) => <SkeletonQuickTask key={i} />)}
                                    </div>
                                ) : quickTasks.length === 0 ? (
                                    <div className="glass-panel p-10 rounded-3xl text-center border-dashed border-white/5">
                                        <p className="text-white/20 text-sm font-bold uppercase tracking-widest">No quick tasks yet</p>
                                    </div>
                                ) : (
                                    <React.Fragment>
                                        <div className="space-y-8">
                                            {[
                                                { key: 'today', label: 'Today', items: groupedQuickTasks.today },
                                                { key: 'tomorrow', label: 'Tomorrow', items: groupedQuickTasks.tomorrow },
                                                { key: 'in2days', label: 'In 2 Days', items: groupedQuickTasks.in2days },
                                                { key: 'thisWeek', label: 'This Week', items: groupedQuickTasks.thisWeek },
                                                { key: 'completed', label: 'Finished', items: groupedQuickTasks.completed }
                                            ].map(section => (
                                                section.items.length > 0 && (
                                                    <div key={section.key} className="space-y-3">
                                                        <div className="flex items-center gap-3">
                                                            <h3 className="text-[10px] md:text-xs font-bold uppercase tracking-[0.25em] text-primary/70">{section.label}</h3>
                                                            <div className="h-px flex-1 bg-white/10"></div>
                                                        </div>
                                                        <div className="space-y-4">
                                                            {section.items.map(task => (
                                                                <QuickTaskItem
                                                                    key={task.id}
                                                                    task={task}
                                                                    onToggle={onToggleQuickTask}
                                                                    onDelete={onDeleteQuickTask}
                                                                    onEdit={onEditQuickTask}
                                                                />
                                                            ))}
                                                        </div>
                                                    </div>
                                                )
                                            ))}
                                        </div>
                                    </React.Fragment>
                                )}
                            </div>
                            
                            <div className="glass-panel rounded-3xl p-10 flex flex-col items-center justify-center text-center space-y-6">
                                <div className="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-2">
                                    <span className="material-symbols-outlined text-4xl" style={{fontVariationSettings: '"FILL" 1'}}>bolt</span>
                                </div>
                                <h3 className="text-2xl font-bold text-cream-light">Quick Focus</h3>
                                <p className="text-cream-light/60 font-sans leading-relaxed">Start a 25-minute pomodoro session to breeze through your tasks.</p>
                                <button className="w-full bg-primary/20 hover:bg-primary/30 text-primary border border-primary/30 py-4 rounded-2xl font-bold transition-all uppercase tracking-widest">Start Session</button>
                            </div>
                        </section>
                    </div>
                </div>
            </Layout>
            );
        };

        /* FIX 2026-04-16: Added pomodoroTime and isPomodoroActive to NotesPage signature for global sync */
        const NotesPage = React.memo(({ user, notes, onOpenCreator, onEditNote, noteSections, onAddSection, onDeleteSection, onMoveNote, onReorderNote, onRemoveReminder, onBulkUpdate, onBulkDelete, isProbing, pomodoroTime, isPomodoroActive }) => {
            const navigate = useNavigate();
            const pinnedNotes = notes.filter(n => n.isPinned);
            const [labelFilter, setLabelFilter] = useState('');
            const [showLabelDropdown, setShowLabelDropdown] = useState(false);
            const [showAddSection, setShowAddSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');
            const [pendingDeleteSection, setPendingDeleteSection] = useState(null);
            const longPressTimer = useRef(null);
            const dropdownRef = useRef(null);
            const [dragState, setDragState] = useState(null);
            const [localNotes, setLocalNotes] = useState(notes);
            const dragRef = useRef(null);
            const [selectedNotes, setSelectedNotes] = useState([]);
            const selectionMode = selectedNotes.length > 0;
            const pointerHandledRef = useRef(false);
            const geometryRef = useRef(null);
            const lastUpdateRef = useRef(0);
             const [selectionPopup, setSelectionPopup] = useState(null);
             const [newLabelText, setNewLabelText] = useState('');
             
             // Back button support for popups
             useEffect(() => {
                 const handleCloseInternal = () => {
                     setShowLabelDropdown(false);
                     setShowAddSection(false);
                     setPendingDeleteSection(null);
                     setSelectionPopup(null);
                 };
                 window.addEventListener('faiora-close-popups', handleCloseInternal);
                 return () => window.removeEventListener('faiora-close-popups', handleCloseInternal);
             }, []);

             const handleSetShowLabelDropdown = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'label' }, '');
                 setShowLabelDropdown(val);
             };
             const handleSetShowAddSection = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'section' }, '');
                 setShowAddSection(val);
             };
             const handleSetPendingDeleteSection = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'delete' }, '');
                 setPendingDeleteSection(val);
             };
             const handleSetSelectionPopup = (val) => {
                 if (val) window.history.pushState({ modal: 'notes', popup: 'selection' }, '');
                 setSelectionPopup(val);
             };

            // Sync localNotes with prop notes when not dragging
            // [FIX 2026-04-16] Stabilized with JSON comparison to prevent infinite loop during Pomodoro ticks
            const lastSyncRef = useRef('');
            useEffect(() => {
                const currentSync = JSON.stringify(notes.map(n => ({ id: n.id, updatedAt: n.updatedAt, section: n.section, labels: n.labels })));
                if (!dragState && currentSync !== lastSyncRef.current) {
                    lastSyncRef.current = currentSync;
                    setLocalNotes(notes);
                }
            }, [notes, dragState]);

            // Collect all unique labels
            const allLabels = useMemo(() => {
                const set = new Set();
                notes.forEach(n => (n.labels || []).forEach(l => set.add(l)));
                return Array.from(set).sort();
            }, [notes]);

            // Filter function
            const { search } = useLocation();
            const queryParams = new URLSearchParams(search);
            const searchQuery = queryParams.get('search') || '';

            const matchesFilter = (note) => {
                const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    const d = parseDateString(dateStr);
                    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                    const shortMonths = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    return `${months[d.getMonth()]} ${d.getDate()} ${d.getFullYear()} ${shortMonths[d.getMonth()]}`;
                };

                const searchableText = [
                    note.title,
                    note.content,
                    (note.labels || []).join(' '),
                    note.section,
                    note.reminderDate,
                    formatDate(note.reminderDate),
                    note.noteIcon
                ].filter(Boolean).join(' ').toLowerCase();

                if (searchQuery && !searchableText.includes(searchQuery.toLowerCase())) return false;
                if (!labelFilter) return true;
                return (note.labels || []).includes(labelFilter);
            };

            // Group notes by section (excluding pinned)
            const unpinnedNotes = notes.filter(n => !n.isPinned);
            const sectionNotes = (sectionName) => unpinnedNotes.filter(n => (n.section || '') === sectionName && matchesFilter(n));
            const allNotesUnsectioned = unpinnedNotes.filter(n => !n.section && matchesFilter(n));

            // Close dropdown on outside click
             useEffect(() => {
                 const handler = (e) => {
                     if (dropdownRef.current && !dropdownRef.current.contains(e.target)) handleSetShowLabelDropdown(false);
                 };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

             // Disable right-click on the notes page (but ALLOW on editable areas for mobile context menu)
             useEffect(() => {
                 const handler = (e) => {
                     // Allow context menu if target is an input, textarea or contenteditable
                     if (e.target.tagName === 'INPUT' || 
                         e.target.tagName === 'TEXTAREA' || 
                         e.target.closest('[contenteditable="true"]')) {
                         return;
                     }
                     e.preventDefault();
                 };
                 document.addEventListener('contextmenu', handler);
                 return () => document.removeEventListener('contextmenu', handler);
             }, []);

            // Gesture state ref — shared between pointer event handlers
            const gestureRef = useRef({ active: false, activated: false, scrolling: false });

            // Find nearest scrollable ancestor for manual scroll
            const findScrollParent = (el) => {
                let node = el ? el.parentElement : null;
                while (node && node !== document.body) {
                    const style = window.getComputedStyle(node);
                    if ((style.overflowY === 'auto' || style.overflowY === 'scroll') && node.scrollHeight > node.clientHeight) return node;
                    node = node.parentElement;
                }
                return document.documentElement;
            };

            // Cleanup on unmount
            useEffect(() => {
                return () => {
                    if (dragRef.current && dragRef.current.cloneEl) dragRef.current.cloneEl.remove();
                };
            }, []);

            // === POINTER EVENT HANDLERS (unified mouse+touch) ===
            // Only onPointerDown is on individual cards.
            // Move/Up/Cancel are added on document ONLY when a gesture starts,
            // to avoid blocking native scroll with per-card handlers.

            const docMoveRef = useRef(null);
            const docEndRef = useRef(null);

            const removeDocListeners = () => {
                if (docMoveRef.current) document.removeEventListener('pointermove', docMoveRef.current);
                if (docEndRef.current) {
                    document.removeEventListener('pointerup', docEndRef.current);
                    document.removeEventListener('pointercancel', docEndRef.current);
                }
                docMoveRef.current = null;
                docEndRef.current = null;
            };

            const handlePointerDown = (noteId, e) => {
                const cardEl = e.currentTarget;
                const { clientX, clientY, pointerId } = e;

                gestureRef.current = {
                    active: true,
                    activated: false,
                    scrolling: false,
                    pointerId,
                    cardEl,
                    noteId,
                    startX: clientX,
                    startY: clientY,
                    lastY: clientY
                };

                // Attach document-level listeners for this gesture
                const onMove = (ev) => {
                    const gs = gestureRef.current;
                    if (!gs.active) return;
                    const { clientX: mx, clientY: my } = ev;

                    if (gs.scrolling) return;

                    // Before long-press: detect scroll and bail
                    if (!gs.activated) {
                        // FIX 2026-04-15: Increased movement threshold to 15px (was 8px) to prevent accidental drag triggers during scroll
                        if (Math.abs(mx - gs.startX) > 15 || Math.abs(my - gs.startY) > 15) {
                            if (longPressTimer.current) clearTimeout(longPressTimer.current);
                            gs.scrolling = true;
                            gs.active = false;
                            try { gs.cardEl.releasePointerCapture(gs.pointerId); } catch(err) {}
                            removeDocListeners();
                        }
                        return;
                    }

                    // Drag mode (after long press)
                    handlePointerMoveCore(mx, my);
                };

                const onEnd = (ev) => {
                    handlePointerEndCore(ev);
                    removeDocListeners();
                };

                removeDocListeners();
                docMoveRef.current = onMove;
                docEndRef.current = onEnd;
                document.addEventListener('pointermove', onMove);
                document.addEventListener('pointerup', onEnd);
                document.addEventListener('pointercancel', onEnd);

                if (selectionMode) return;

                // FIX 2026-04-15: Increased to 550ms (was 500ms) for clearer "hold-to-move" intent
                longPressTimer.current = setTimeout(() => {
                    if (navigator.vibrate) try { navigator.vibrate(50); } catch(err) {}
                    gestureRef.current.activated = true;

                    try { cardEl.setPointerCapture(pointerId); } catch(err) {}

                    const initialNote = notes.find(n => n.id === noteId);
                    const initialSection = initialNote ? (initialNote.isPinned ? "__pinned" : (initialNote.section || '')) : '';
                    
                    const scrollParent = findScrollParent(cardEl);
                    const currentScroll = scrollParent.scrollTop;
                    
                    const sections = [];
                    document.querySelectorAll('[data-drop-section]').forEach(el => {
                        const rect = el.getBoundingClientRect();
                        sections.push({ 
                            el, 
                            sect: el.getAttribute('data-drop-section'),
                            absTop: rect.top + currentScroll,
                            absBottom: rect.bottom + currentScroll,
                            absLeft: rect.left,
                            absRight: rect.right
                        });
                    });
                    
                    const noteElements = [];
                    document.querySelectorAll('[data-note-id]').forEach(el => {
                        const nid = el.getAttribute('data-note-id');
                        if (nid !== noteId) {
                           const rect = el.getBoundingClientRect();
                           const sectEl = el.closest('[data-drop-section]');
                           noteElements.push({ 
                               nid, 
                               sect: sectEl ? sectEl.getAttribute('data-drop-section') : '',
                               absCenterX: rect.left + rect.width / 2,
                               absCenterY: rect.top + rect.height / 2 + currentScroll
                           });
                        }
                    });

                    geometryRef.current = { sections, noteElements, scrollParent };

                    dragRef.current = {
                        noteId,
                        initialSection,
                        cardEl,
                        startX: clientX,
                        startY: clientY,
                        cloneCreated: false,
                        cloneEl: null,
                        originalEl: cardEl,
                        offsetX: 0,
                        offsetY: 0,
                        didMove: false
                    };
                    cardEl.style.transform = 'scale(0.97)';
                    cardEl.style.transition = 'transform 0.15s ease';
                }, 350);
            };

            // Core move logic (called from document listener, only during drag)
            const handlePointerMoveCore = (mx, my) => {
                const state = dragRef.current;
                if (!state) return;

                if (!state.cloneCreated && (Math.abs(mx - state.startX) > 5 || Math.abs(my - state.startY) > 5)) {
                    state.cloneCreated = true;
                    state.didMove = true;
                    const gs = gestureRef.current;
                    const rect = gs.cardEl.getBoundingClientRect();
                    const cloneEl = gs.cardEl.cloneNode(true);
                    document.body.style.cursor = 'grabbing';

                    cloneEl.className = 'drag-clone fixed z-[9999] pointer-events-none transition-transform duration-100 ease-out';
                    cloneEl.style.width = rect.width + 'px';
                    cloneEl.style.height = rect.height + 'px';
                    cloneEl.style.opacity = '0.9';
                    cloneEl.style.filter = 'drop-shadow(0 20px 40px rgba(0,0,0,0.4))';
                    cloneEl.style.left = (mx - (mx - rect.left)) + 'px';
                    cloneEl.style.top = (my - (my - rect.top)) + 'px';
                    cloneEl.style.borderRadius = '24px';
                    cloneEl.style.pointerEvents = 'none';
                    cloneEl.style.transform = 'scale(0.95)';
                    document.body.appendChild(cloneEl);

                    state.cloneEl = cloneEl;
                    state.offsetX = mx - rect.left;
                    state.offsetY = my - rect.top;

                    gs.cardEl.style.opacity = '0.3';
                    gs.cardEl.style.transform = 'scale(0.95)';

                    document.querySelectorAll('[data-drop-section]').forEach(el => {
                        el.style.outline = '2px dashed rgba(249, 115, 22, 0.4)';
                        el.style.outlineOffset = '4px';
                        el.style.borderRadius = '1.5rem';
                        el.style.transition = 'outline 0.2s, background 0.2s';
                    });
                }

                if (!state.cloneCreated) return;

                requestAnimationFrame(() => {
                    if (state.cloneEl) {
                        state.cloneEl.style.left = (mx - state.offsetX) + 'px';
                        state.cloneEl.style.top = (my - state.offsetY) + 'px';
                        state.cloneEl.style.transform = 'scale(1.05) rotate(1deg)';
                    }
                });

                const geo = geometryRef.current;
                if (geo && geo.scrollParent) {
                    const threshold = 120;
                    const viewHeight = window.innerHeight;
                    if (my < threshold) {
                        geo.scrollParent.scrollTop -= 15;
                    } else if (my > viewHeight - threshold) {
                        geo.scrollParent.scrollTop += 15;
                    }
                }

                const currentScroll = geo ? geo.scrollParent.scrollTop : 0;
                const absoluteMy = my + currentScroll;
                const absoluteMx = mx;

                let hoveredSect = null;
                const isDraggingPinned = (state.initialSection === "__pinned");
                
                if (geo && geo.sections) {
                    geo.sections.forEach(s => {
                        const isTargetPinned = (s.sect === "__pinned");
                        if (isDraggingPinned !== isTargetPinned) return;
                        if (absoluteMx >= s.absLeft && absoluteMx <= s.absRight && absoluteMy >= s.absTop && absoluteMy <= s.absBottom) {
                            hoveredSect = s.sect;
                            s.el.style.background = 'rgba(249, 115, 22, 0.05)';
                            s.el.style.outline = '2px dashed rgba(249, 115, 22, 0.4)';
                        } else {
                            s.el.style.background = '';
                            s.el.style.outline = '';
                        }
                    });
                }

                let hoveredNoteId = null;
                if (hoveredSect !== null && geo && geo.noteElements) {
                    geo.noteElements.forEach(n => {
                        if (n.sect !== hoveredSect) return;
                        const dx = absoluteMx - n.absCenterX;
                        const dy = absoluteMy - n.absCenterY;
                        if (Math.sqrt(dx*dx + dy*dy) < 90) hoveredNoteId = n.nid;
                    });
                }

                const now = Date.now();
                if (now - lastUpdateRef.current > 60 && (hoveredNoteId || hoveredSect !== null)) {
                    lastUpdateRef.current = now;
                    setLocalNotes(prev => {
                        let next = [...prev];
                        let changed = false;
                        const ni = next.findIndex(n => n.id === state.noteId);
                        if (ni === -1) return prev;

                        if (hoveredNoteId) {
                            const ti = next.findIndex(n => n.id === hoveredNoteId);
                            if (ti !== -1 && ni !== ti) {
                                const [rm] = next.splice(ni, 1);
                                next.splice(ti, 0, rm);
                                changed = true;
                            }
                        }

                        const curIdx = next.findIndex(n => n.id === state.noteId);
                        if (curIdx > -1 && hoveredSect !== null) {
                            const note = next[curIdx];
                            const targetIsPinned = (hoveredSect === "__pinned");
                            const targetSect = targetIsPinned ? (note.section || "") : hoveredSect;
                            if ((note.section || '') !== targetSect || !!note.isPinned !== targetIsPinned) {
                                next[curIdx] = { ...note, section: targetSect, isPinned: targetIsPinned };
                                changed = true;
                            }
                        }
                        return changed ? next : prev;
                    });
                }
            };

            const cleanupDrag = () => {
                const state = dragRef.current;
                const gs = gestureRef.current;
                
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                document.body.classList.remove('dragging-active');
                
                document.querySelectorAll('.drag-clone').forEach(el => el.remove());
                if (state && state.cloneEl) state.cloneEl.remove();

                if (state && state.originalEl) {
                    state.originalEl.style.opacity = '';
                    state.originalEl.style.transform = '';
                    state.originalEl.style.transition = '';

                            onBulkUpdate(state.noteId, { section: finalNote.section || '', isPinned: !!finalNote.isPinned });
                        }
                        const finalIdx = currentLocal.findIndex(n => n.id === state.noteId);
                        if (finalIdx > -1) {
                            const targetIdx = finalIdx > 0 ? finalIdx - 1 : 0;
                            const targetId = currentLocal[targetIdx].id;
                            if (targetId !== state.noteId) {
                                onReorderNote(state.noteId, targetId);
                            } else if (currentLocal.length > 1) {

                        return currentLocal;

                                                 <div className="absolute right-0 top-full mt-2 bg-slate-950/95 backdrop-blur-2xl rounded-2xl border border-white/10 shadow-2xl z-[130] py-2 w-48 animate-in fade-in slide-in-from-top-2 duration-200">
                                                     <button onClick={bulkDuplicate} className="w-full text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-cream-light/60 hover:bg-white/5 hover:text-cream-light transition-colors flex items-center gap-3">
                                                         <span className="material-symbols-outlined text-base">content_copy</span> Duplicate
                                                     </button>
                                                     <div className="h-px bg-white/5 mx-3 my-1"></div>
                                                     <button onClick={bulkDelete} className="w-full text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-red-400/80 hover:bg-red-500/10 hover:text-red-400 transition-colors flex items-center gap-3">
                                                         <span className="material-symbols-outlined text-base">delete</span> Delete
                                                     </button>
                                                 </div>
                                             )}
                                         </div>
                                    </div>
                                </div>
                            </React.Fragment>
                        ) : (
                            <Header user={user} title="Faiora" subtitle="Notes Archive" />
                        )}
                        <div className="px-4 md:px-0 pt-4">
                            {(searchQuery || labelFilter) && localNotes.filter(matchesFilter).length === 0 && (
                                <div className="flex flex-col items-center justify-center py-20 text-center animate-in fade-in slide-in-from-bottom-4 duration-500 font-montserrat">
                                    <div className="w-24 h-24 rounded-full bg-slate-900 border border-white/5 flex items-center justify-center mb-6 shadow-2xl">
                                        <span className="material-symbols-outlined text-5xl text-primary/40">search_off</span>
                                    </div>
                                    <h3 className="text-2xl font-bold text-cream-light mb-2 italic tracking-tight uppercase">No matches found</h3>
                                    <p className="text-white/30 text-[10px] uppercase tracking-[0.2em] font-bold max-w-xs mx-auto">We couldn't find any notes matching your search criteria.</p>
                                    <button onClick={() => { setLabelFilter(''); navigate('/notes', { replace: true }); }} className="mt-8 px-8 py-3 bg-primary/10 hover:bg-primary/20 text-primary border border-primary/30 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all">Clear Search</button>
                                </div>
                            )}

                                {(() => {
                                    let labelFilterShown = false;
                                    const pinnedFiltered = localNotes.filter(n => {
                                        const matches = matchesFilter(n);
                                        // Normal: pinned
                                        if (n.isPinned) return matches;
                                        // Anchor: dragged from pinned grid but currently unpinned in localNotes (e.g. pinned -> unpinned drag)
                                        if (dragState && dragState.noteId === n.id && dragState.initialSection === "__pinned") return true;
                                        return false;
                                    });
                                    const pinnedSection = pinnedFiltered.length === 0 ? null : (
                                        <section key="__pinned" className="mb-12 scale-in" data-drop-section="__pinned">
                                            <div className="flex items-center gap-4 mb-8">
                                                <span className="material-symbols-outlined text-primary/60 text-lg" style={{fontVariationSettings: "'FILL' 1"}}>push_pin</span>
                                                <h2 className="text-sm font-bold text-cream-light/90 uppercase tracking-[0.3em] font-display">PINNED</h2>
                                                <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                                                {(() => { labelFilterShown = true; return <LabelFilterDropdown />; })()}
                                            </div>
                                            {(isProbing && notes.length === 0) ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                                    {[...Array(3)].map((_, i) => <SkeletonNoteCard key={i} index={i} variant="compact" />)}
                                                </div>
                                            ) : (
                                                renderNoteGrid(pinnedFiltered, null, "__pinned")
                                            )}
                                        </section>
                                    );

                                    const customSections = (noteSections || []).map(sectionName => {
                                        const sNotes = localNotes.filter(n => {
                                            if (n.isPinned) return false;
                                            const matches = matchesFilter(n);
                                            // Normal: match section name
                                            if (n.section === sectionName) return matches;
                                            // Hidden Anchor: match initialSection if it's being dragged
                                            if (dragState && dragState.noteId === n.id && (dragState.initialSection || '') === sectionName) return true;
                                            return false;
                                        });
                                        // Hide empty sections when searching/filtering
                                        if ((searchQuery || labelFilter) && sNotes.length === 0) return null;
                                        const showDropdownHere = !labelFilterShown;
                                        if (showDropdownHere) labelFilterShown = true;
                                        
                                        return (
                                            <section key={sectionName} className="mb-12 animate-in fade-in slide-in-from-bottom-2 duration-500" data-drop-section={sectionName}>
                                                 <div className="flex items-center gap-4 mb-8">
                                                     <span className="material-symbols-outlined text-primary/60 text-lg">folder</span>
                                                     <h2 className="text-sm font-bold text-cream-light/90 uppercase tracking-[0.3em] font-display">{sectionName}</h2>
                                                     <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                                                     {showDropdownHere && <LabelFilterDropdown />}
                                                     <button onClick={() => handleSetPendingDeleteSection(sectionName)} className="text-white/20 hover:text-red-400 transition-colors" title="Delete section">
                                                         <span className="material-symbols-outlined text-sm">delete</span>
                                                     </button>
                                                 </div>
                                                {sNotes.length > 0 ? renderNoteGrid(sNotes, null, sectionName) : (
                                                    <div className="flex flex-col items-center justify-center py-10 text-center border border-dashed border-white/5 rounded-2xl">
                                                        <span className="material-symbols-outlined text-3xl text-white/5 mb-2">note_stack</span>
                                                        <p className="text-white/20 text-xs">Long-press a note to move it here</p>
                                                    </div>
                                                )}
                                            </section>
                                        );
                                    });

                                    const addSectionButton = (!searchQuery && !labelFilter) ? (
                                        <div className="mb-8">
                                            {showAddSection ? (
                                                <div className="flex items-center gap-3">
                                                    <input 
                                                        type="text" 
                                                        value={newSectionName} 
                                                        onChange={(e) => setNewSectionName(e.target.value)}
                                                        onKeyDown={(e) => e.key === 'Enter' && handleAddSectionSubmit()}
                                                        placeholder="Section name..."
                                                        className="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-cream-light placeholder:text-white/20 focus:outline-none focus:ring-0 focus:border-primary/40 font-montserrat uppercase tracking-widest"
                                                        style={{ caretColor: '#f97316' }}
                                                        autoFocus
                                                    />
                                                     <button 
                                                         onClick={handleAddSectionSubmit}
                                                         className="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors"
                                                     >
                                                         <span className="material-symbols-outlined text-lg">check</span>
                                                     </button>
                                                     <button 
                                                         onClick={() => { handleSetShowAddSection(false); setNewSectionName(''); }}
                                                         className="p-2 text-white/30 hover:text-white/60 rounded-lg transition-colors"
                                                     >
                                                         <span className="material-symbols-outlined text-lg">close</span>
                                                     </button>
                                                 </div>
                                             ) : (
                                                 <button 
                                                     onClick={() => handleSetShowAddSection(true)}
                                                     className="inline-flex items-center gap-2 text-[10px] font-bold text-primary/40 uppercase tracking-widest hover:text-primary/70 transition-colors"
                                                 >
                                                     <span className="material-symbols-outlined text-sm">add</span>
                                                     Add Section
                                                 </button>
                                             )}
                                         </div>
                                    ) : null;

                                    const allNotesFiltered = localNotes.filter(n => {
                                        if (n.isPinned) return false;
                                        // Normal logic: hidden if in a custom section
                                        if (noteSections.includes(n.section)) {
                                            // Anchor: dragged from All Notes grid but currently in a custom section
                                            if (dragState && dragState.noteId === n.id && (dragState.initialSection || "") === "") return true;
                                            return false;
                                        }
                                        const matches = matchesFilter(n);
                                        // Normal: No section or section not in noteSections
                                        if (!n.section || !noteSections.includes(n.section)) return matches;
                                        return false;
                                    });
                                    const showDropdownOnAll = !labelFilterShown;
                                    const allNotesSection = ((searchQuery || labelFilter) && allNotesFiltered.length === 0) ? null : (
                                        <section key="__allnotes" className="mb-10 animate-in fade-in slide-in-from-bottom-2 duration-500" data-drop-section="">
                                            <div className="flex items-center gap-4 mb-8">
                                                <h2 className="text-sm font-bold text-cream-light/90 uppercase tracking-[0.3em] font-display">ALL NOTES</h2>
                                                <div className="h-[1px] flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                                                {showDropdownOnAll && <LabelFilterDropdown />}
                                            </div>
                                            {(isProbing && notes.length === 0) ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 pb-32">
                                                    {[...Array(6)].map((_, i) => <SkeletonNoteCard key={i} index={i} />)}
                                                </div>
                                            ) : allNotesFiltered.length > 0 ? (
                                                <div className="pb-32">
                                                    {renderNoteGrid(allNotesFiltered, null, "")}
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center justify-center py-16 text-center">
                                                    <span className="material-symbols-outlined text-5xl text-white/5 mb-3">note_stack</span>
                                                    <p className="text-white/30 text-sm">{labelFilter ? 'No notes match this filter' : 'No notes here'}</p>
                                                </div>
                                            )}
                                        </section>
                                    );

                                    return <>{pinnedSection}{customSections}{addSectionButton}{allNotesSection}</>;
                                })()}

                        {/* Section Deletion Confirmation Modal */}
                        {pendingDeleteSection && (
                            <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] flex items-center justify-center p-6 animate-in fade-in duration-300">
                                <div className="glass-panel w-full max-w-md rounded-[2.5rem] border border-white/10 p-10 text-center animate-in zoom-in-95 duration-300 font-montserrat">
                                    <div className="w-20 h-20 rounded-full bg-red-500/20 border border-red-500/30 flex items-center justify-center mx-auto mb-8">
                                        <span className="material-symbols-outlined text-red-400 text-4xl">warning</span>
                                    </div>
                                    <h3 className="text-2xl font-bold text-cream-light mb-4">Delete Section?</h3>
                                    <p className="text-white/50 text-base leading-relaxed mb-10">
                                        Are you sure you want to delete <span className="text-primary font-bold">"{pendingDeleteSection}"</span>? Its notes will be automatically moved to <span className="text-white/80 font-semibold">ALL NOTES</span>.
                                    </p>
                                    <div className="flex flex-col gap-4">
                                         <button 
                                             onClick={() => {
                                                 onDeleteSection(pendingDeleteSection, false);
                                                 handleSetPendingDeleteSection(null);
                                             }}
                                             className="w-full py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-bold uppercase tracking-widest transition-all shadow-xl shadow-red-500/20"
                                         >
                                             Delete Section
                                         </button>
                                         <button 
                                             onClick={() => handleSetPendingDeleteSection(null)}
                                             className="w-full py-3 bg-transparent text-white/50 hover:text-white rounded-2xl font-bold uppercase tracking-widest transition-all mt-2"
                                         >
                                             Cancel
                                         </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        </div>
                    </div>

                </Layout>
            );
        });

        const CalendarPage = ({ user, notes, quickTasks = [], onOpenCreator, onEditNote, onToggleQuickTask, onEditQuickTask, onAddQuickTask, pomodoroTime, isPomodoroActive }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const today = new Date();

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = currentDate.toLocaleString('en-US', { month: 'long' });
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();

            const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
            const goToday = () => { setCurrentDate(new Date()); setSelectedDate(new Date()); };

            const isToday = (d) => d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
            const isSelected = (d) => d === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear();

            // Build reminder lookup: date string -> items array (notes + quick tasks)
            const remindersByDate = useMemo(() => {
                const map = {};
                // Note Reminders
                (notes || []).forEach(note => {
                    if (!note.reminderDate) return;
                    const d = parseDateString(note.reminderDate);
                    if (d) {
                        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
                        if (!map[key]) map[key] = [];
                        map[key].push({ ...note, type: 'note' });
                    }
                });
                // Quick Tasks
                (quickTasks || []).forEach(task => {
                    if (!task.dueDate) return;
                    const d = parseDateString(task.dueDate);
                    if (d) {
                        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
                        if (!map[key]) map[key] = [];
                        map[key].push({ ...task, type: 'quickTask' });
                    }
                });
                return map;
            }, [notes, quickTasks]);

            const getRemindersForDay = (day) => {
                const key = `${year}-${month}-${day}`;
                return remindersByDate[key] || [];
            };

            const selectedDayLabel = selectedDate.toLocaleString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            const dayReminders = getRemindersForDay(selectedDate.getDate());

            // Upcoming reminders (from today onwards)
            const upcomingReminders = useMemo(() => {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const allItems = [
                    ...(notes || []).filter(n => n.reminderDate).map(n => ({ ...n, type: 'note', sortDate: parseDateString(n.reminderDate) })),
                    ...(quickTasks || []).filter(t => t.dueDate).map(t => ({ ...t, type: 'quickTask', sortDate: parseDateString(t.dueDate) }))
                ];
                return allItems
                    .filter(item => item.sortDate >= now)
                    .sort((a, b) => a.sortDate - b.sortDate)
                    .slice(0, 8);
            }, [notes, quickTasks]);

            const cells = [];
            for (let i = firstDay - 1; i >= 0; i--) {
                cells.push({ day: prevMonthDays - i, current: false });
            }
            /* 2026-04-15: Restored corrupted calendar grid population logic */
            for (let d = 1; d <= daysInMonth; d++) {
                cells.push({ day: d, current: true });
            }
            const remaining = 7 - (cells.length % 7);
            if (remaining < 7) {
                for (let i = 1; i <= remaining; i++) {
                    cells.push({ day: i, current: false });
                }
            }

            return (
                /* 2026-04-15: Ensured FAB is enabled for CalendarPage */
                <Layout onOpenCreator={onOpenCreator} noPadding={true} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive}>
                    <div className="flex-1 flex flex-col md:flex-row md:h-full md:overflow-hidden">
                        <div className="flex-1 md:overflow-y-auto no-scrollbar px-0 md:px-10 pt-20 md:pt-12 pb-8">
                            <Header user={user} />
                            <div className="px-4 md:px-0  mx-2 mt-3">
                                <div className="flex items-center justify-between mb-4 md:mb-6">
                                <div className="flex items-center gap-2 md:gap-4">
                                    <h2 className="text-xl md:text-2xl font-display font-bold text-cream-light italic">{monthName} {year}</h2>
                                    <div className="flex gap-1">
                                        <button onClick={prevMonth} className="p-1 glass-panel rounded-full text-cream-light/60 hover:text-primary transition-colors"><span className="material-symbols-outlined text-base">chevron_left</span></button>
                                        <button onClick={nextMonth} className="p-1 glass-panel rounded-full text-cream-light/60 hover:text-primary transition-colors"><span className="material-symbols-outlined text-base">chevron_right</span></button>
                                    </div>
                                    <button onClick={goToday} className="text-[8px] md:text-[9px] font-bold text-primary/60 uppercase tracking-widest hover:text-primary transition-colors ml-1 md:ml-2">Today</button>
                                </div>
                            </div>
                            <div className="glass-panel rounded-xl md:rounded-2xl overflow-hidden border-white/5 shadow-2xl">
                                <div className="grid grid-cols-7 bg-white/5 text-center border-b border-white/5 py-2.5">
                                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                                        <div key={day} className="text-[9px] font-bold text-primary/60 uppercase tracking-widest">{day}</div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-7">
                                    {cells.map((cell, i) => {
                                        const reminders = cell.current ? getRemindersForDay(cell.day) : [];
                                        const todayMatch = cell.current && isToday(cell.day);
                                        const selectedMatch = cell.current && isSelected(cell.day);
                                        return (
                                            <div 
                                                key={i} 
                                                onClick={() => cell.current && setSelectedDate(new Date(year, month, cell.day))}
                                                className={`border-r border-b border-white/5 p-2 min-h-[100px] md:min-h-[110px] relative transition-colors cursor-pointer ${cell.current ? 'hover:bg-white/5' : 'opacity-25'} ${todayMatch ? 'bg-primary/10' : ''} ${selectedMatch && !todayMatch ? 'bg-white/5' : ''}`}
                                            >
                                                <span className={`text-xs font-sans ${todayMatch ? 'font-bold text-primary' : ''} ${selectedMatch && !todayMatch ? 'font-semibold text-cream-light' : ''}`}>{cell.day}</span>
                                                {todayMatch && <div className="absolute top-2.5 right-2.5 w-1.5 h-1.5 rounded-full bg-primary glow-orange"></div>}
                                                {reminders.length > 0 && (
                                                    <div className="flex flex-col mt-2">
                                                        {reminders.slice(0, 3).map((r, ri) => (
                                                            <div key={ri} className={`w-full line-clamp-2 overflow-hidden text-[9px] md:text-[10px] font-bold rounded-lg px-1.5 py-1 flex items-center gap-1.5 ${r.type === 'quickTask' ? 'bg-white/10 text-cream-light/80' : 'bg-primary/15 text-primary/90'} border border-white/5`}>
                                                                <span className="text-white/30"></span>
                                                                {r.type === 'quickTask' ? formatTaskText(r.text) : (r.title || 'Note')}
                                                            </div>
                                                        ))}
                                                        {reminders.length > 3 && <span className="text-[9px] font-bold text-primary/50 ml-1">+{reminders.length - 3} more</span>}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                </div>
                            </div>
                        </div>
                        <aside className="w-full md:w-96 border-t md:border-t-0 md:border-l border-white/5 bg-black/20 backdrop-blur-md p-6 overflow-y-auto no-scrollbar flex-shrink-0 md:rounded-none rounded-[2.5rem] mt-6 md:mt-0">
                            <div className="mb-6">
                                <div className="flex items-center gap-3 mb-1.5 justify-between">
                                    <h3 className="text-xl font-display font-bold text-cream-light">Daily Agenda</h3>
                                    <button 
                                        onClick={() => onAddQuickTask && onAddQuickTask(formatDateLocal(selectedDate))}
                                        className="w-10 h-10 rounded-full bg-primary/20 text-primary flex items-center justify-center hover:bg-primary hover:text-white transition-all shadow-lg active:scale-95"
                                        title="Add Task for this day"
                                    >
                                        <span className="material-symbols-outlined text-xl">add</span>
                                    </button>
                                </div>
                                <div className="h-px w-full bg-gradient-to-r from-primary/30 to-transparent mb-4"></div>
                                <p className="text-cream-light/40 text-[10px] font-sans uppercase tracking-[0.2em] font-bold">{selectedDayLabel}</p>
                            </div>
                            {dayReminders.length > 0 ? (
                                <div className="space-y-3 mb-8">
                                    {dayReminders.map((item, idx) => {
                                        if (item.type === 'note') {
                                            return (
                                                <div key={idx} onClick={() => onEditNote && onEditNote(item)} className="card-glow bg-orange-100/95 rounded-[2rem] p-5 border-b-4 border-orange-300/50 cursor-pointer hover:scale-[1.02] transition-transform relative overflow-hidden">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <h4 className="text-base font-bold text-orange-950/90 leading-tight truncate flex-1">{item.title || 'Untitled'}</h4>
                                                        {item.isLocked && <span className="material-symbols-outlined text-orange-950/40 text-sm">lock</span>}
                                                    </div>
                                                    <p className="text-xs text-orange-900/60 mt-1.5 font-sans font-medium capitalize">{formatReminderDate(item.reminderDate)}{item.labels && item.labels[0] ? ` • ${item.labels[0]}` : ''}</p>
                                                </div>
                                            );
                                        } else {
                                            const formatTime = (time) => {
                                                if (!time) return '';
                                                const [h, m] = time.split(':');
                                                const hours = parseInt(h);
                                                const ampm = hours >= 12 ? 'PM' : 'AM';
                                                const h12 = hours % 12 || 12;
                                                return `${h12}:${m} ${ampm}`;
                                            };
                                            return (
                                                <div key={idx} onClick={() => onEditQuickTask && onEditQuickTask(item)} className={`glass-panel rounded-[2rem] p-5 border-l-4 ${item.completed ? 'border-l-green-500/50 opacity-60' : 'border-l-primary shadow-lg shadow-primary/5'} hover:bg-white/5 transition-all cursor-pointer group`}>
                                                    <div className="flex items-center gap-4">
                                                        <div onClick={(e) => { e.stopPropagation(); onToggleQuickTask && onToggleQuickTask(item.id); }} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${item.completed ? 'bg-green-500/20 border-green-500 text-green-500' : 'border-white/20 text-transparent group-hover:border-primary/50'}`}>
                                                            {item.completed && <span className="material-symbols-outlined text-sm font-bold">check</span>}
                                                        </div>
                                                        <div className="flex-1">
                                                            <h4 className={`text-sm font-bold transition-all line-clamp-2 overflow-hidden ${item.completed ? 'text-cream-light/40 line-through' : 'text-cream-light'}`}>{formatTaskText(item.text)}</h4>
                                                            <div className="flex items-center gap-2 mt-1">
                                                                <span className="material-symbols-outlined text-[10px] text-primary/60">schedule</span>
                                                                                                                                <span className="text-[10px] font-bold text-white/20 uppercase tracking-widest leading-none">
                                                                    {item.dueTime ? formatDateMinimal(item.dueDate) : formatReminderDate(item.dueDate)}
                                                                    {item.dueTime ? ` @ ${formatTime(item.dueTime)}` : ''}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        }
                                    })}
                                </div>
                            ) : (
                                <div className="text-center py-8 mb-8">
                                    <span className="material-symbols-outlined text-3xl text-white/5 mb-2">event_available</span>
                                    <p className="text-white/20 text-xs font-sans">No reminders this day</p>
                                </div>
                            )}
                            {upcomingReminders.length > 0 && (
                                <div>
                                    <div className="flex items-center gap-3 mb-4">
                                        <h4 className="text-xs font-bold text-cream-light/60 uppercase tracking-[0.2em]">Upcoming</h4>
                                        <div className="h-px flex-1 bg-gradient-to-r from-primary/20 to-transparent"></div>
                                    </div>
                                    <div className="space-y-2.5">
                                        {upcomingReminders.map((item, idx) => (
                                                                                        <div key={idx} onClick={() => item.type === 'note' ? onEditNote(item) : onEditQuickTask(item)} className="flex items-start gap-3 p-3 rounded-2xl hover:bg-white/5 transition-colors cursor-pointer group">
                                                <div className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${item.type === 'quickTask' ? 'bg-cream-light/40' : 'bg-primary'}`}></div>
                                                <div className="flex-1 min-w-0">
