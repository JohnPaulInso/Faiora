        // --- Root Component ---
        


        const TransitionManager = ({ children, onTransitionStart, onTransitionEnd }) => {
            const location = useLocation();
            const [displayLocation, setDisplayLocation] = useState(location);
            const [isWiping, setIsWiping] = useState(false);
            const [isDissolving, setIsDissolving] = useState(false);
            const [transitionKey, setTransitionKey] = useState(0);

            const playFireSFX = () => {
                const audio = new Audio('fire_transition_sfx.mp3');
                audio.volume = 0.6;
                audio.play().catch(e => {
                    // Silent catch for autoplay restrictions
                });
                
                // Fade out after 1 second
                setTimeout(() => {
                    const fadeDuration = 500; // 0.5s fade
                    const step = 0.05;
                    const interval = fadeDuration / (0.4 / step);
                    
                    const fadeInterval = setInterval(() => {
                        if (audio.volume > step) {
                            audio.volume -= step;
                        } else {
                            audio.volume = 0;
                            clearInterval(fadeInterval);
                            audio.pause();
                        }
                    }, interval);
                }, 1000);
            };

            const lastPath = useRef(location.pathname);
            const timers = useRef([]);

            const clearTimers = () => {
                timers.current.forEach(t => clearTimeout(t));
                timers.current = [];
            };

            const startTransition = (newLoc) => {
                clearTimers();
                setIsWiping(true);
                setIsDissolving(true);
                setTransitionKey(prev => prev + 1);
                if (onTransitionStart) setTimeout(() => onTransitionStart(), 0);
                playFireSFX();

                const t1 = setTimeout(() => {
                    setDisplayLocation(newLoc);
                    setIsDissolving(false);
                }, 900);

                const t2 = setTimeout(() => {
                    setIsWiping(false);
                    if (onTransitionEnd) setTimeout(() => onTransitionEnd(), 0);
                }, 1000);
                
                timers.current = [t1, t2];
            };

            useEffect(() => {
                // Initial mount transition
                startTransition(location);
                return clearTimers;
            }, []);

            useEffect(() => {
                if (location.pathname !== lastPath.current) {
                    const params = new URLSearchParams(location.search);
                    if (params.has('search')) {
                        setDisplayLocation(location);
                        lastPath.current = location.pathname;
                        return;
                    }
                    lastPath.current = location.pathname;
                    startTransition(location);
                }
            }, [location.pathname]);

            return (
                <div className="relative w-full h-full overflow-hidden">
                    {isWiping && (
                        <div key={transitionKey} className="fire-wipe-overlay fire-wipe-active">
                            <div className="fire-wipe-sprite"></div>
                        </div>
                    )}
                    <div key={displayLocation.pathname} className={`w-full h-full transition-all duration-300 ${isDissolving ? 'dissolve-out' : 'dissolve-in'}`}>
                        <Routes location={displayLocation}>
                            {children}
                        </Routes>
                        {/* Fallback invisibility safety: If somehow stuck in dissolve-out for more than 5s, force dissolve-in via inline style if needed, 
                            but better to ensure isDissolving state is reliable */}
                    </div>
                </div>
            );
        };

        const QuickTaskModal = ({ onClose, onAdd, initialData = null, showToast, prefillDate = null }) => {
            const getTomorrow = () => {
                const d = new Date();
                d.setDate(d.getDate() + 1);
                return d.toISOString().split('T')[0];
            };
            const getNextMonday = () => {
                const d = new Date();
                d.setDate(d.getDate() + (1 + 7 - d.getDay()) % 7 || 7);
                return d.toISOString().split('T')[0];
            };
             const extractDateFromText = (input) => {
                let lower = input.toLowerCase();
                let cleanText = input;
                const now = new Date();
                let newDate = null;
                let newTime = null;

                // 1. Detect Times first to prevent date parsing interference (e.g. 10am)
                // Patterns: 2pm, 10:30am, 14:00, 2 pm
                const timeRegex = /\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b|\b([01]\d|2[0-3]):([0-5]\d)\b/gi;
                let timeMatch;
                if ((timeMatch = timeRegex.exec(lower)) !== null) {
                    let h, m = '00';
                    if (timeMatch[1]) { // am/pm format
                        h = parseInt(timeMatch[1]);
                        if (timeMatch[2]) m = timeMatch[2];
                        const ampm = timeMatch[3].toLowerCase();
                        if (ampm === 'pm' && h < 12) h += 12;
                        if (ampm === 'am' && h === 12) h = 0;
                    } else { // 24h format
                        h = parseInt(timeMatch[4]);
                        m = timeMatch[5];
                    }
                    newTime = `${h.toString().padStart(2, '0')}:${m}`;
                    cleanText = cleanText.replace(timeMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 2. Detect Specific Dates (e.g. mar 1, march 10)
                const monthNames = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
                const fullMonthNames = ['january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
                
                const dateRegex = new RegExp(`\\b(${monthNames.join('|')}|${fullMonthNames.join('|')})\\s+(\\d{1,2})\\b`, 'i');
                let dateMatch;
                if ((dateMatch = dateRegex.exec(lower)) !== null) {
                    const monthText = dateMatch[1].toLowerCase();
                    let monthIdx = monthNames.findIndex(m => monthText.startsWith(m));
                    const day = parseInt(dateMatch[2]);
                    
                    const targetDate = new Date(now.getFullYear(), monthIdx, day);
                    // If date has already passed this year, assume next year
                    if (targetDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                        targetDate.setFullYear(now.getFullYear() + 1);
                    }
                    newDate = targetDate.toISOString().split('T')[0];
                    cleanText = cleanText.replace(dateMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 3. Detect Relative Entities (tomorrow, next week, next monday)
                const relativePatterns = [
                    { regex: /\btomorrow\b/i, offset: 1 },
                    { regex: /\bnext week\b/i, offset: 7 }, // Next monday usually, but simpler +7
                    { regex: /\bnext (monday|mon|tuesday|tue|wednesday|wed|thursday|thu|friday|fri|saturday|sat|sunday|sun)\b/i }
                ];

                for (const p of relativePatterns) {
                    let match = p.regex.exec(lower);
                    if (match) {
                        const target = new Date();
                        if (p.offset) {
                            target.setDate(now.getDate() + p.offset);
                        } else {
                            // next [day]
                            const weekdays = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6, sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6 };
                            const targetDay = weekdays[match[1].toLowerCase()];
                            target.setDate(now.getDate() + (targetDay + 7 - now.getDay()) % 7 || 7);
                        }
                        newDate = target.toISOString().split('T')[0];
                        cleanText = cleanText.replace(match[0], '');
                        lower = cleanText.toLowerCase();
                    }
                }

                // 4. Relative Offsets (e.g. 5 min, 2 hrs, in 10m)
                const relativeTimeRegex = /\b(?:in\s+)?(\d+)\s*(m|min|mins|minutes|h|hr|hrs|hour|hours)\b/i;
                let relTimeMatch;
                if ((relTimeMatch = relativeTimeRegex.exec(lower)) !== null) {
                    const value = parseInt(relTimeMatch[1]);
                    const unit = relTimeMatch[2].toLowerCase();
                    const target = new Date(now);
                    
                    if (unit.startsWith('m')) {
                        target.setMinutes(now.getMinutes() + value);
                    } else if (unit.startsWith('h')) {
                        target.setHours(now.getHours() + value);
                    }
                    
                    newDate = target.toISOString().split('T')[0];
                    newTime = target.getHours().toString().padStart(2, '0') + ':' + target.getMinutes().toString().padStart(2, '0');
                    cleanText = cleanText.replace(relTimeMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 4. Fallback shared logic
                if (newDate && !newTime) newTime = '10:00';
                
                return { date: newDate, time: newTime, cleanText };
            };



             const getLaterTiming = () => {
                const now = new Date();
                const hour = now.getHours();
                // If it's 6PM or later (nighttime), default to 9AM tomorrow
                if (hour >= 18) {
                    const tomorrow = new Date(now);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    return {
                        date: tomorrow.toISOString().split('T')[0],
                        time: '09:00'
                    };
                }
                // Otherwise, default to 6 hours from now
                const d = new Date(Date.now() + 6 * 3600 * 1000);
                d.setMinutes(0);
                return {
                    date: d.toISOString().split('T')[0],
                    time: d.getHours().toString().padStart(2, '0') + ':00'
                };
            };

            const initialLater = getLaterTiming();

            const [text, setText] = useState((initialData && initialData.text) || '');
            const [dueDate, setDueDate] = useState((initialData && initialData.dueDate) || prefillDate || initialLater.date);
            const [dueTime, setDueTime] = useState((initialData && initialData.dueTime) || (prefillDate ? '10:00' : initialLater.time));
            const [isClosing, setIsClosing] = useState(false);
            const [showCustom, setShowCustom] = useState(!!prefillDate || !!(initialData && (initialData.dueDate || initialData.dueTime)));
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);

            // Ref to track if a history state was pushed by this modal
            const historyPushedRef = useRef(false);

            // Effect to manage browser history for this modal
            useEffect(() => {
                if (!isClosing) {
                    // Push a new state when the modal is opened
                    window.history.pushState({ modal: 'quickTask' }, '');
                    historyPushedRef.current = true;
                } else if (historyPushedRef.current) {
                    // If the modal is closing, and we previously pushed a state, go back
                    if (window.history.state && window.history.state.modal === 'quickTask') {
                        window.history.back();
                    }
                    historyPushedRef.current = false;
                }
            }, [isClosing]);


            useEffect(() => {
                const handler = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsDropdownOpen(false);
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

             const handleTextChange = (val) => {
                const { date, time, cleanText } = extractDateFromText(val);
                setText(cleanText);
                if (date) { setDueDate(date); setShowCustom(true); }
                if (time) { setDueTime(time); setShowCustom(true); }
            };

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(onClose, 200);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (text.trim()) {
                    onAdd(text.trim(), dueDate, dueTime);
                    if (showToast) showToast(initialData ? "Task updated!" : "Quick task added!");
                    handleClose();
                }
            };

            const getSelectedLabel = () => {
                const todayStr = new Date().toISOString().split('T')[0];
                const tomorrowStr = getTomorrow();
                const nextMonStr = getNextMonday();

                const formatTime = (t) => {
                    if (!t) return '';
                    const [h, m] = t.split(':');
                    const hours = parseInt(h);
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    return `${hours % 12 || 12}:${m} ${ampm}`;
                };

                const formatD = (d) => {
                    if(d === todayStr) return 'Today';
                    if(d === tomorrowStr) return 'Tomorrow';
                    const parts = (d || '').split('-');
                    return parts.length === 3 ? `${parts[1]}/${parts[2]}` : '';
                };

                if (showCustom) return { label: 'Custom', sub: `${formatD(dueDate)}, ${formatTime(dueTime)}`, icon: 'schedule' };
                if (dueDate === todayStr && dueTime === '18:00') return { label: 'Later today', sub: 'Today, 6:00 PM', icon: 'wb_twilight' };
                if (dueDate === tomorrowStr && dueTime === '10:00') return { label: 'Tomorrow', sub: 'Tomorrow, 10:00 AM', icon: 'event' };
                if (dueDate === nextMonStr && dueTime === '08:00') return { label: 'Next Monday', sub: 'Monday, 8:00 AM', icon: 'calendar_month', date: nextMonStr, t: '08:00' };
                return { label: 'Custom', sub: `${formatD(dueDate)}, ${formatTime(dueTime)}`, icon: 'schedule' };
            };

            const selected = getSelectedLabel();

            return (
                <div className={"fixed inset-0 z-[150] flex items-center justify-center p-4 transition-all duration-200 " + (isClosing ? 'opacity-0 scale-95' : 'animate-in fade-in duration-300')}>
                    <style>{`
                        .quick-task-input:focus {
                            border-color: #f97316 !important;
                            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2) !important;
                        }
                        .quick-option-btn {
                            width: 100%;
                            padding: 1rem 1.25rem;
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                            color: #cbd5e1;
                            font-size: 0.9rem;
                            transition: all 0.2s;
                            border-radius: 1rem;
                        }
                        .quick-option-btn:hover {
                            background: rgba(255,255,255,0.05);
                            color: #f97316;
                        }
                    `}</style>
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={handleClose}></div>
                    <div className="bg-[#0f172a] w-full max-w-sm rounded-[2.5rem] p-6 relative z-10 shadow-2xl border border-white/5 animate-in zoom-in-95 duration-300">
                        <div className="flex justify-between items-center mb-8">
                            <h3 className="text-xl font-bold text-cream-light font-montserrat tracking-wide">{initialData ? 'Edit Task' : 'New Quick Task'}</h3>
                            <button onClick={handleClose} className="text-white/20 hover:text-primary transition-colors">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-3">
                                <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Task Description</label>
                                <input 
                                    autoFocus
                                    type="text" 
                                    value={text}
                                    onChange={(e) => handleTextChange(e.target.value)}
                                    placeholder="What needs to be done?" 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat quick-task-input"
                                />
                            </div>
                            <div className="space-y-3 relative" ref={dropdownRef}>
                                <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Schedule Task</label>
                                <button 
                                    type="button"
                                    onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between group hover:bg-white/10 transition-all font-montserrat"
                                >
                                    <div className="flex items-center gap-3">
                                        <span className={`material-symbols-outlined text-xl ${isDropdownOpen ? 'text-primary' : 'text-cream-light/60'}`}>{selected.icon}</span>
                                        <div className="flex flex-col items-start translate-y-[-1px]">
                                            <span className="text-sm font-bold text-cream-light">{selected.label}</span>
                                            <span className="text-[9px] font-bold text-white/20 uppercase tracking-widest">{selected.sub}</span>
                                        </div>
                                    </div>
                                    <span className={`material-symbols-outlined transition-transform ${isDropdownOpen ? 'rotate-180 text-primary' : 'text-cream-light/30'}`}>expand_more</span>
                                </button>

                                {isDropdownOpen && (
                                    <div className="absolute top-full left-0 right-0 mt-2 bg-[#1e293b] border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                                         {[
                                            { id: 'later', label: 'Later today', time: initialLater.date === new Date().toISOString().split('T')[0] ? `Today, ${parseInt(initialLater.time.split(':')[0]) > 12 ? (parseInt(initialLater.time.split(':')[0])-12)+':00 PM' : initialLater.time.split(':')[0]+':00 AM'}` : 'Soon', icon: 'wb_twilight', date: initialLater.date, t: initialLater.time },
                                            { id: 'tomorrow', label: 'Tomorrow', time: 'Tomorrow, 10:00 AM', icon: 'event', date: getTomorrow(), t: '10:00' },
                                            { id: 'monday', label: 'Next Monday', time: 'Monday, 8:00 AM', icon: 'calendar_month', date: getNextMonday(), t: '08:00' },
                                            { id: 'custom', label: 'Custom', time: '', icon: 'schedule', date: null, t: null }
                                        ].map(opt => (
                                            <button
                                                key={opt.id}
                                                type="button"
                                                onClick={() => {
                                                    if (opt.id === 'custom') {
                                                        setShowCustom(true);
                                                    } else {
                                                        setShowCustom(false);
                                                        setDueDate(opt.date);
                                                        setDueTime(opt.t);
                                                    }
                                                    setIsDropdownOpen(false);
                                                }}
                                                className="w-full px-5 py-4 flex items-center justify-between hover:bg-white/5 transition-all text-left"
                                            >
                                                <div className="flex items-center gap-3">
                                                    <span className="material-symbols-outlined text-lg text-cream-light/40">{opt.icon}</span>
                                                    <span className={`text-sm font-bold ${selected.label === opt.label ? 'text-primary' : 'text-cream-light/80'}`}>{opt.label}</span>
                                                </div>
                                                {opt.time && <span className="text-[10px] font-bold text-white/20 uppercase tracking-widest">{opt.time}</span>}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {showCustom && (
                                <div className="grid grid-cols-2 gap-4 animate-in slide-in-from-top-2 duration-300">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Due Date</label>
                                        <input 
                                            type="date" 
                                            value={dueDate}
                                            onChange={(e) => setDueDate(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat text-sm quick-task-input"
                                        />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Due Time</label>
                                        <input 
                                            type="time" 
                                            value={dueTime}
                                            onChange={(e) => setDueTime(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat text-sm quick-task-input"
                                        />
                                    </div>
                                </div>
                            )}
                            <button 
                                type="submit" 
                                className="w-full bg-primary text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-primary-dark transition-all shadow-lg shadow-primary/20"
                            >
                                {initialData ? 'Update Task' : 'Add Task'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isTimerDone, setIsTimerDone] = useState(false);
            const [isAuthChecked, setIsAuthChecked] = useState(false);
            const [activeCollection, setActiveCollection] = useState('tasks');
            const [isCreatorOpen, setIsCreatorOpen] = useState(false);
            const [editingNote, setEditingNote] = useState(null);
            const [user, setUser] = useState(null);
            const [notes, setNotes] = useState([]);
            const [noteSections, setNoteSections] = useState(() => {
                try { return JSON.parse(localStorage.getItem('faiora_sections') || '[]'); } catch(e) { return []; }
            });
            const [quickTasks, setQuickTasks] = useState([]);
            const qtWriteGuard = useRef(0); // Timestamp of last local quick task write
            const [isQuickTaskModalOpen, setIsQuickTaskModalOpen] = useState(false);
            const [editingQuickTask, setEditingQuickTask] = useState(null);
            const [prefillDate, setPrefillDate] = useState(null);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [sharedNotes, setSharedNotes] = useState([]);
            const [publicNote, setPublicNote] = useState(null);
            const [isPublicLoading, setIsPublicLoading] = useState(false);

            const [toasts, setToasts] = useState([]);
            const [isTransitioning, setIsTransitioning] = useState(true);
            const videoRef = useRef();
            const prevPopState = useRef(0);

            // Ref to indicate if a modal was closed via code, to prevent double-handling by popstate
            const closingViaCode = useRef(false);

            useEffect(() => {
                 const handleBackButton = (e) => {
                     // If we're closing via code (close button), don't re-process
                     if (closingViaCode.current) {
                         closingViaCode.current = false;
                         return;
                     }

                     const now = Date.now();
                     const state = window.history.state;

                     // 1. Dispatch close event for all internal popups/dropdowns
                     window.dispatchEvent(new CustomEvent('faiora-close-popups'));

                     // 2. Handle Major Modals
                     if (isCreatorOpen) {
                         // If we are still in a 'creator' state after popping, it means we only closed a sub-popup
                         if (state && state.modal === 'creator') {
                             return; 
                         }
                         setEditingNote(null);
                         setIsCreatorOpen(false);
                         return;
                     }
                     if (isQuickTaskModalOpen || editingQuickTask) {
                         // Generic check for quicktask state
                         if (state && (state.modal === 'quickTask' || state.modal === 'quicktask')) {
                             return;
                         }
                         setIsQuickTaskModalOpen(false);
                         setEditingQuickTask(null);
                         return;
                     }

                    // 2. Navigation Logic — push state first to stay in the app
                    const path = window.location.hash.replace('#', '');
                    if (path !== '/' && path !== '') {
                        // Not on home — navigate to home
                        window.location.hash = '#/';
                    } else {
                        // On home, double-back to exit
                        if (now - prevPopState.current < 2000) {
                            showToast("Closing app...");
                            window.close();
                        } else {
                            showToast("Press back again to exit");
                            prevPopState.current = now;
                            // Push a state so the next back doesn't navigate away
                            window.history.pushState({ stayAlive: true }, '');
                        }
                    }
                };

                window.addEventListener('popstate', handleBackButton);
                return () => window.removeEventListener('popstate', handleBackButton);
            }, [isCreatorOpen, isQuickTaskModalOpen, editingQuickTask]);

            useEffect(() => {
                const handleOnline = () => {
                    setIsOnline(true);
                    showToast("Back online! Syncing...");
                };
                const handleOffline = () => {
                    setIsOnline(false);
                    showToast("Working offline");
                };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            const showToast = useCallback((message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            }, []);

            // Centralized loading and syncing
            useEffect(() => {
                if (!user || !activeCollection) return;

                // 1. Initial Load from LocalStorage (Instant)
                const lsKey = 'faiora_notes_' + user.uid;
                const qtKey = 'faiora_quick_tasks_' + user.uid;
                try {
                    const localData = JSON.parse(localStorage.getItem(lsKey) || '[]');
                    setNotes(localData);
                    
                    const localQT = JSON.parse(localStorage.getItem(qtKey) || '[]');
                    setQuickTasks(localQT);
                    FaioraNotifications.rescheduleAll(localQT);
                } catch(e) { console.warn("LocalStorage load fail", e); }

                // 2. Active Sync from Firestore (Background)
                const unsubscribe = db.collection(activeCollection).doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        const fetchedNotesMap = data && data.notes ? data.notes : {};
                        const fetchedNotes = Object.values(fetchedNotesMap);
                        
                        // Sync Quick Tasks — skip if we just wrote locally (prevents race condition)
                        if (Date.now() - qtWriteGuard.current > 3000) {
                            const fetchedQuickTasks = data.quickTasks || [];
                            setQuickTasks(fetchedQuickTasks);
                            localStorage.setItem('faiora_quick_tasks_' + user.uid, JSON.stringify(fetchedQuickTasks));
                            FaioraNotifications.rescheduleAll(fetchedQuickTasks);
                        }

                        // Centralized Sorting: Pinned first, then sortOrder, then updatedAt
                        fetchedNotes.sort((a, b) => {
                            if (a.isPinned && !b.isPinned) return -1;
                            if (!a.isPinned && b.isPinned) return 1;
                            const sortA = a.sortOrder || 0;
                            const sortB = b.sortOrder || 0;
                            if (sortA !== sortB) return sortA - sortB;
                            const timeA = a.updatedAt ? (a.updatedAt.toMillis ? a.updatedAt.toMillis() : new Date(a.updatedAt).getTime()) : 0;
                            const timeB = b.updatedAt ? (b.updatedAt.toMillis ? b.updatedAt.toMillis() : new Date(b.updatedAt).getTime()) : 0;
                            return timeB - timeA;
                        });

                        setNotes(fetchedNotes);
                        localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(fetchedNotes));

                        // Sync Sections
                        const fetchedSections = data.noteSections || [];
                        setNoteSections(fetchedSections);
                        localStorage.setItem('faiora_sections', JSON.stringify(fetchedSections));

                        console.log("App synced with cloud:", fetchedNotes.length, "notes");

                        // Ensure at least one Priority note exists
                        const hasPriority = fetchedNotes.some(n => (n.labels || []).includes('PRIORITY'));
                        if (!hasPriority && fetchedNotes.length > 0) {
                            handleRestoreDefaults();
                        }
                    }
                }, err => {
                    if (err.code !== 'permission-denied') console.warn("Firestore sync error", err);
                });

                return () => unsubscribe();
            }, [user, activeCollection]);

            // 3. Shared Notes Discovery (Email-based)
            useEffect(() => {
                if (!user || user.isAnonymous) return;

                // Listen for notes shared with this user's email
                const email = user.email ? user.email.toLowerCase() : '';
                if (!email) return;

                // This is a more complex query. For simplicity in this implementation, 
                // we'll assume a shared_notes_access collection if we wanted high scale,
                // but for now we'll query the tasks collection for any document where notes contain the user's email in sharedWith.
                // Note: Firestore doesn't easily support "array-contains" on nested map fields across all docs.
                // A better way: The owner adds a record to a 'shared_access' collection.
                
                const unsubscribe = db.collection('shared_access').where('sharedWith', '==', email).onSnapshot(snapshot => {
                    const sharedDocs = [];
                    snapshot.forEach(doc => {
                        sharedDocs.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Fetch the actual notes from their owners' docs
                    // (In a real app, this would be optimized)
                    setSharedNotes(sharedDocs);
                });

                return () => unsubscribe();
            }, [user]);

            // 4. Public Note Routing
            useEffect(() => {
                const handleRoute = async () => {
                    const hash = window.location.hash;
                    setPublicNote(null);
                };

                window.addEventListener('hashchange', handleRoute);
                handleRoute();
                return () => window.removeEventListener('hashchange', handleRoute);
            }, []);

            // 5. Public Share Relay (Guest Sync to Owner's Private DB)
            useEffect(() => {
                if (!user || user.isAnonymous) return;

                const unsubscribe = db.collection('public_shares')
                    .where('ownerId', '==', user.uid)
                    .onSnapshot(snapshot => {
                        snapshot.docChanges().forEach(change => {
                            if (change.type === 'modified') {
                                const guestData = change.doc.data();
                                const noteId = guestData.id;
                                const coll = guestData.ownerCollection || activeCollection || 'tasks';

                                // We use a functional update to get current notes without adding it to dependency array
                                setNotes(currentNotes => {
                                    const localNote = currentNotes.find(n => n.id === noteId);
                                    if (localNote) {
                                        // Prevent loops by checking if incoming update matches local state
                                        const fieldsToCompare = ['title', 'content', 'progress', 'isPinned', 'noteTheme', 'noteIcon', 'labels', 'reminderDate'];
                                        const isDifferent = fieldsToCompare.some(f => {
                                            if (f === 'labels') return JSON.stringify(localNote[f] || []) !== JSON.stringify(guestData[f] || []);
                                            return localNote[f] !== guestData[f];
                                        });

                                        if (isDifferent) {
                                            // Sync back to personal collection
                                            db.collection(coll).doc(user.uid).update({
                                                [`notes.${noteId}`]: {
                                                    ...localNote,
                                                    ...guestData,
                                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                                }
                                            }).catch(err => {
                                                if (err.code !== 'not-found') console.warn("Relay sync failed", err.message);
                                            });
                                        }
                                    }
                                    return currentNotes;
                                });
                            }
                        });
                    }, err => {
                        // Suppress background errors
                    });

                return () => unsubscribe();
            }, [user, activeCollection]);

            const handleUpdateNoteLocal = useCallback((updatedNote) => {
                setNotes(prev => {
                    const idx = prev.findIndex(n => n.id === updatedNote.id);
                    const newNotes = [...prev];
                    if (idx > -1) newNotes[idx] = updatedNote;
                    else newNotes.push(updatedNote);
                    
                    // Re-sort immediately: Pinned, sortOrder, updatedAt
                    newNotes.sort((a, b) => {
                        if (a.isPinned && !b.isPinned) return -1;
                        if (!a.isPinned && b.isPinned) return 1;
                        const sortA = a.sortOrder || 0;
                        const sortB = b.sortOrder || 0;
                        if (sortA !== sortB) return sortA - sortB;
                        const timeA = new Date(a.updatedAt).getTime();
                        const timeB = new Date(b.updatedAt).getTime();
                        return timeB - timeA;
                    });

                    if (user) {
                        localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    }
                    return newNotes;
                });
            }, [user]);

            const handleDeleteNoteLocal = useCallback((noteId) => {
                setNotes(prev => {
                    const newNotes = prev.filter(n => n.id !== noteId);
                    if (user) {
                        localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    }
                    return newNotes;
                });
            }, [user]);

            // Bulk update: partially update a note by id (or create if isNew)
            const handleBulkUpdate = useCallback((noteId, updates, isNew = false) => {
                setNotes(prev => {
                    let newNotes;
                    if (isNew) {
                        newNotes = [...prev, { ...updates, updatedAt: new Date().toISOString() }];
                    } else {
                        newNotes = prev.map(n => n.id === noteId ? { ...n, ...updates, updatedAt: new Date().toISOString() } : n);
                    }
                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    return newNotes;
                });
                // Sync to Firestore
                if (user && activeCollection) {
                    if (isNew) {
                        db.collection(activeCollection).doc(user.uid).update({
                            [`notes.${noteId}`]: { ...updates, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
                        }).catch(e => console.warn('Bulk create sync fail', e));
                    } else {
                        const fsUpdates = {};
                        Object.keys(updates).forEach(key => {
                            fsUpdates[`notes.${noteId}.${key}`] = updates[key];
                        });
                        fsUpdates[`notes.${noteId}.updatedAt`] = firebase.firestore.FieldValue.serverTimestamp();
                        db.collection(activeCollection).doc(user.uid).update(fsUpdates).catch(e => console.warn('Bulk update sync fail', e));
                    }
                }
            }, [user, activeCollection]);

            // Bulk delete: delete note and sync to Firestore
            const handleBulkDelete = useCallback((noteId) => {
                handleDeleteNoteLocal(noteId);
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).update({
                        [`notes.${noteId}`]: firebase.firestore.FieldValue.delete()
                    }).catch(e => console.warn('Bulk delete sync fail', e));
                }
            }, [user, activeCollection, handleDeleteNoteLocal]);

            const handleRestoreDefaults = useCallback(() => {
                if (!user || !activeCollection) return;
                const sampleNote = { 
                    id: 'note_priority_welcome', 
                    title: 'Your First Priority Note', 
                    labels: ['PRIORITY'], 
                    noteIcon: 'star', 
                    noteTheme: 'warm4', 
                    content: '<div>This is a default priority note. You can edit it or add more labeled with "PRIORITY" to see them on your dashboard.</div>',
                    homeOrder: 0
                };
                const notesMap = {
                    [sampleNote.id]: { ...sampleNote, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
                };
                db.collection(activeCollection).doc(user.uid).set({ notes: notesMap }, { merge: true })
                    .catch(e => console.error("Error restoring defaults:", e));
            }, [user, activeCollection]);

            const handleRemoveReminder = useCallback((noteId) => {
                setNotes(prev => {
                    const newNotes = prev.map(n => n.id === noteId ? { ...n, reminderDate: '', reminderTime: '' } : n);
                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    return newNotes;
                });
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).update({
                        [`notes.${noteId}.reminderDate`]: '',
                        [`notes.${noteId}.reminderTime`]: ''
                    }).catch(e => console.warn('Reminder remove sync fail', e));
                }
                showToast('Reminder removed');
            }, [user, activeCollection, showToast]);

            const handleReorderNote = useCallback((noteId, targetNoteId) => {
                setNotes(prev => {
                    const sourceIdx = prev.findIndex(n => n.id === noteId);
                    const targetIdx = prev.findIndex(n => n.id === targetNoteId);
                    if (sourceIdx === -1 || targetIdx === -1) return prev;
                    
                    const newNotes = [...prev];
                    const [removed] = newNotes.splice(sourceIdx, 1);
                    newNotes.splice(targetIdx, 0, removed);
                    
                    // Update sortOrder for all notes in this new order
                    const updatedNotes = newNotes.map((n, i) => ({ ...n, sortOrder: i }));
                    
                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(updatedNotes));
                    
                    // Sync to Firestore (Batch update sortOrder)
                    if (user && activeCollection) {
                        const updates = {};
                        updatedNotes.forEach(n => {
                            updates[`notes.${n.id}.sortOrder`] = n.sortOrder;
                        });
                        db.collection(activeCollection).doc(user.uid).update(updates).catch(e => console.warn('Sort sync fail', e));
                    }
                    return updatedNotes;
                });
            }, [user, activeCollection]);

            const handleReorderPriorityNote = useCallback((noteId, targetNoteId) => {
                setNotes(prev => {
                    // Only sort priorities
                    const priorities = prev.filter(n => (n.labels || []).includes('PRIORITY') && !n.isPinned);
                    const sourceIdx = priorities.findIndex(n => n.id === noteId);
                    const targetIdx = priorities.findIndex(n => n.id === targetNoteId);
                    if (sourceIdx === -1 || targetIdx === -1) return prev;

                    const newPriorities = [...priorities];
                    const [removed] = newPriorities.splice(sourceIdx, 1);
                    newPriorities.splice(targetIdx, 0, removed);

                    // Update homeOrder for these priority notes
                    const priorityUpdates = {};
                    newPriorities.forEach((n, i) => {
                        priorityUpdates[n.id] = i;
                    });

                    const newNotes = prev.map(n => {
                        if (priorityUpdates[n.id] !== undefined) {
                            return { ...n, homeOrder: priorityUpdates[n.id] };
                        }
                        return n;
                    });

                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));

                    if (user && activeCollection) {
                        const updates = {};
                        newPriorities.forEach((n, i) => {
                            updates[`notes.${n.id}.homeOrder`] = i;
                        });
                        db.collection(activeCollection).doc(user.uid).update(updates).catch(e => console.warn('HomeOrder sync fail', e));
                    }
                    return newNotes;
                });
            }, [user, activeCollection]);

            const handleSaveVersion = useCallback((noteId, snapshot) => {
                setNotes(prev => {
                    const newNotes = prev.map(n => {
                        if (n.id === noteId) {
                            const versions = n.versions || [];
                            const newVersion = {
                                ...snapshot,
                                date: new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }),
                                timestamp: Date.now()
                            };
                            return { ...n, versions: [newVersion, ...versions].slice(0, 10) }; // Keep last 10
                        }
                        return n;
                    });
                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    return newNotes;
                });

                // Sync to Firestore
                if (user && activeCollection) {
                    const note = notes.find(n => n.id === noteId);
                    if (note) {
                        const versions = note.versions || [];
                        const newVersion = {
                            ...snapshot,
                            date: new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }),
                            timestamp: Date.now()
                        };
                        const updatedVersions = [newVersion, ...versions].slice(0, 10);
                        db.collection(activeCollection).doc(user.uid).update({
                            [`notes.${noteId}.versions`]: updatedVersions
                        }).catch(e => console.warn('Version sync fail', e));
                    }
                }
                showToast('Version saved');
            }, [user, activeCollection, notes, showToast]);

            const handleAddSection = useCallback((name) => {
                if (!name.trim() || noteSections.includes(name.trim().toUpperCase())) return;
                const updated = [...noteSections, name.trim().toUpperCase()];
                setNoteSections(updated);
                localStorage.setItem('faiora_sections', JSON.stringify(updated));
                // Sync to Firestore
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).update({ noteSections: updated })
                        .catch(e => console.warn('Section add sync fail', e));
                }
            }, [user, activeCollection, noteSections]);

            const handleDeleteSection = useCallback((name, deleteNotes = false) => {
                const updated = noteSections.filter(s => s !== name);
                setNoteSections(updated);
                localStorage.setItem('faiora_sections', JSON.stringify(updated));
                
                let affectedNoteIds = [];
                setNotes(prev => {
                    if (deleteNotes) {
                        const newNotes = prev.filter(n => {
                            if (n.section === name) {
                                affectedNoteIds.push(n.id);
                                return false; // Delete it completely
                            }
                            return true;
                        });
                        if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                        return newNotes;
                    } else {
                        // Move notes from deleted section back to ALL NOTES
                        const newNotes = prev.map(n => {
                            if (n.section === name) {
                                affectedNoteIds.push(n.id);
                                return { ...n, section: '' };
                            }
                            return n;
                        });
                        if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                        return newNotes;
                    }
                });

                // Sync to Firestore (Batch update)
                if (user && activeCollection) {
                    const updates = { noteSections: updated };
                    if (affectedNoteIds.length > 0) {
                        affectedNoteIds.forEach(id => {
                            if (deleteNotes) {
                                updates[`notes.${id}`] = firebase.firestore.FieldValue.delete();
                            } else {
                                updates[`notes.${id}.section`] = '';
                            }
                        });
                    }
                    db.collection(activeCollection).doc(user.uid).update(updates).catch(e => console.warn('Section delete sync fail', e));
                }
            }, [user, activeCollection, noteSections]);

            const handleMoveNoteToSection = useCallback((noteId, sectionName) => {
                setNotes(prev => {
                    const newNotes = prev.map(n => n.id === noteId ? { ...n, section: sectionName } : n);
                    if (user) localStorage.setItem('faiora_notes_' + user.uid, JSON.stringify(newNotes));
                    return newNotes;
                });
                // Sync to Firestore
                if (user && activeCollection) {
                    db.collection(activeCollection).doc(user.uid).update({
                        [`notes.${noteId}.section`]: sectionName
                    }).catch(e => console.warn('Section move sync fail', e));
                }
                if (showToast) showToast('Moved to ' + (sectionName || 'All Notes'));
            }, [user, activeCollection, showToast]);

            const quickTasksRef = useRef(quickTasks);
            useEffect(() => { quickTasksRef.current = quickTasks; }, [quickTasks]);

            const handleUpdateQuickTasks = useCallback((updatedTasks) => {
                qtWriteGuard.current = Date.now();
                setQuickTasks(updatedTasks);
                quickTasksRef.current = updatedTasks;
                const currentUser = auth.currentUser;
                console.log('🔧 handleUpdateQuickTasks called, count:', updatedTasks.length, 'user:', currentUser?.uid);
                if (currentUser) {
                    localStorage.setItem('faiora_quick_tasks_' + currentUser.uid, JSON.stringify(updatedTasks));
                    if (activeCollection) {
                        db.collection(activeCollection).doc(currentUser.uid).set({ quickTasks: updatedTasks }, { merge: true })
                            .then(() => console.log('✅ QuickTasks saved to Firestore'))
                            .catch(e => console.error('❌ QuickTasks Firestore save FAILED:', e));
                    } else {
                        console.warn('⚠️ activeCollection is falsy:', activeCollection);
                    }
                } else {
                    console.warn('⚠️ No currentUser — cannot save quick tasks');
                }
            }, [activeCollection]);

            const handleAddQuickTask = useCallback((text, dueDate = '', dueTime = '') => {
                console.log('🆕 handleAddQuickTask called:', { text, dueDate, dueTime });
                const newTask = {
                    id: 'qt_' + Date.now(),
                    text,
                    dueDate,
                    dueTime,
                    completed: false,
                    createdAt: Date.now()
                };
                const updated = [newTask, ...quickTasksRef.current];
                handleUpdateQuickTasks(updated);
                FaioraNotifications.scheduleForTask(newTask);
            }, [handleUpdateQuickTasks]);

            const handleToggleQuickTask = (id) => {
                const updated = quickTasks.map(t => {
                    if (t.id === id) {
                        const newStatus = !t.completed;
                        return { 
                            ...t, 
                            completed: newStatus,
                            completedAt: newStatus ? Date.now() : null 
                        };
                    }
                    return t;
                });
                handleUpdateQuickTasks(updated);
                // Cancel notifications when completed, reschedule when uncompleted
                const task = updated.find(t => t.id === id);
                if (task) {
                    if (task.completed) {
                        FaioraNotifications.cancelForTask(id);
                    } else {
                        FaioraNotifications.scheduleForTask(task);
                    }
                }
            };

            const handleUpdateQuickTask = (id, text, dueDate, dueTime) => {
                const updated = quickTasks.map(t => t.id === id ? { ...t, text, dueDate, dueTime, updatedAt: Date.now() } : t);
                handleUpdateQuickTasks(updated);
                const updatedTask = updated.find(t => t.id === id);
                if (updatedTask) FaioraNotifications.scheduleForTask(updatedTask);
            };

            const handleDeleteQuickTask = (id) => {
                FaioraNotifications.cancelForTask(id);
                const updated = quickTasks.filter(t => t.id !== id);
                handleUpdateQuickTasks(updated);
            };

            const handleOpenCreator = useCallback(() => {
                setEditingNote(null);
                setIsCreatorOpen(true);
                // Push history so back button closes the modal instead of navigating away
                window.history.pushState({ modal: 'creator' }, '');
            }, []);

            const handleEditNote = useCallback((note) => {
                setEditingNote(note);
                setIsCreatorOpen(true);
                window.history.pushState({ modal: 'creator' }, '');
            }, []);

            const handleCloseCreator = () => {
                setEditingNote(null);
                setIsCreatorOpen(false);
                // Pop the history entry we pushed, but flag it so popstate handler doesn't re-close
                if (window.history.state && window.history.state.modal === 'creator') {
                    closingViaCode.current = true;
                    window.history.back();
                }
            };

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setIsAuthChecked(true);

                    if (u) {
                        // ROBUST PROBE: Check collections sequentially but prioritize 'tasks'
                        // and immediately resolve if notes are found.
                        const probeCollections = ['tasks', 'users', 'userdata', 'notes'];
                        
                        const tryProbe = async () => {
                            let bestCollection = 'tasks';
                            for (const coll of probeCollections) {
                                try {
                                    const doc = await db.collection(coll).doc(u.uid).get();
                                    if (doc.exists) {
                                        const data = doc.data();
                                        if (data && data.notes && Object.keys(data.notes).length > 0) {
                                            console.log(`Firestore probe: Found active data in '${coll}'`);
                                            setActiveCollection(coll);
                                            return;
                                        }
                                        bestCollection = coll; // Found a doc but maybe empty, keep as backup
                                    }
                                } catch (err) {
                                    if (err.code !== 'permission-denied') {
                                        console.warn(`Probe error for ${coll}:`, err.message);
                                    }
                                }
                            }
                            
                            // If we didn't find a high-priority collection with data, use the best one found or default
                            console.log(`Firestore probe: defaulting to '${bestCollection}'`);
                            setActiveCollection(bestCollection);

                            // Initial seed if absolutely empty
                            try {
                                const doc = await db.collection(bestCollection).doc(u.uid).get();
                                if (!doc.exists) {
                                    const sampleNote = { 
                                        id: 'note_priority_welcome', 
                                        title: 'Your First Priority Note', 
                                        labels: ['PRIORITY'], 
                                        noteIcon: 'star', 
                                        noteTheme: 'warm4', 
                                        content: '<div>This is a default priority note. You can edit it or add more labeled with "PRIORITY" to see them on your dashboard.</div>',
                                        homeOrder: 0
                                    };
                                    const notesMap = {
                                        [sampleNote.id]: { ...sampleNote, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
                                    };
                                    await db.collection(bestCollection).doc(u.uid).set({ notes: notesMap });
                                }
                            } catch (e) {
                                console.warn("Seed attempt failed:", e.message);
                            }
                        };

                        tryProbe();

                        localStorage.setItem('faiora_logged_in', 'true');
                        // Request notification permission on login
                        FaioraNotifications.requestPermission();
                    }
                });

                const authTimeout = setTimeout(() => {
                    setIsAuthChecked(true);
                }, 5000);

                return () => {
                    unsubscribe();
                    clearTimeout(authTimeout);
                };
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setIsTimerDone(true);
                }, 1000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const enforceSpeed = () => {
                    if (videoRef.current) {
                        videoRef.current.playbackRate = 1.5;
                    }
                };
                enforceSpeed();
                // Add listeners to reset if changed by context/extensions
                if (videoRef.current) {
                    videoRef.current.addEventListener('ratechange', enforceSpeed);
                    videoRef.current.addEventListener('playing', enforceSpeed);
                }
                return () => {
                    if (videoRef.current) {
                        videoRef.current.removeEventListener('ratechange', enforceSpeed);
                        videoRef.current.removeEventListener('playing', enforceSpeed);
                    }
                };
            }, [user, isTimerDone, isAuthChecked]);

            const handleLoadingComplete = useCallback(() => {
                setIsTimerDone(true);
            }, []);

            if (!isTimerDone || !isAuthChecked) {
                return <LoadingPage onComplete={handleLoadingComplete} />;
            }

            // Public Share Redirection Logic
            const hash = window.location.hash;
            if (hash.startsWith('#/share/')) {
                const token = hash.replace('#/share/', '');
                window.location.href = `share_note.html#/${token}`;
                return <LoadingPage onComplete={() => {}} />;
            }

            if (!user) {
                return <LoginModal />;
            }



            return (
                <HashRouter>
                    <video 
                        ref={videoRef}
                        className="fire-bg-video"
                        autoPlay 
                        loop 
                        muted 
                        playsInline
                        src="fire_bg_video.mp4"
                    />
                    <div className={isTransitioning ? 'page-transitioning' : ''}>
                        <TransitionManager 
                            onTransitionStart={() => setIsTransitioning(true)}
                            onTransitionEnd={() => setIsTransitioning(false)}
                        >
                         <Route path="/" element={<DashboardPage user={user} notes={notes} quickTasks={quickTasks} onOpenCreator={handleOpenCreator} onEditNote={handleEditNote} onRestoreDefaults={handleRestoreDefaults} onReorderPriorityNote={handleReorderPriorityNote} onToggleQuickTask={handleToggleQuickTask} onAddQuickTaskClick={() => { setIsQuickTaskModalOpen(true); }} onDeleteQuickTask={handleDeleteQuickTask} onUpdateQuickTask={handleUpdateQuickTask} onEditQuickTask={(task) => { setEditingQuickTask(task); }} editingQuickTask={editingQuickTask} setEditingQuickTask={setEditingQuickTask} isQuickTaskModalOpen={isQuickTaskModalOpen} setIsQuickTaskModalOpen={setIsQuickTaskModalOpen} onRemoveReminder={handleRemoveReminder} />} />
                        <Route path="/notes" element={<NotesPage user={user} notes={notes} onOpenCreator={handleOpenCreator} onEditNote={handleEditNote} noteSections={noteSections} onAddSection={handleAddSection} onDeleteSection={handleDeleteSection} onMoveNote={handleMoveNoteToSection} onReorderNote={handleReorderNote} onRemoveReminder={handleRemoveReminder} onBulkUpdate={handleBulkUpdate} onBulkDelete={handleBulkDelete} />} />
                        <Route path="/calendar" element={
                            <CalendarPage 
                                user={user} 
                                notes={notes} 
                                quickTasks={quickTasks}
                                onOpenCreator={handleOpenCreator} 
                                onEditNote={handleEditNote} 
                                onToggleQuickTask={handleToggleQuickTask}
                                 onEditQuickTask={(task) => {
                                     setEditingQuickTask(task);
                                     window.history.pushState({ modal: 'quicktask' }, '');
                                 }}
                                 onAddQuickTask={(date) => {
                                     setPrefillDate(date);
                                     setIsQuickTaskModalOpen(true);
                                     window.history.pushState({ modal: 'quicktask' }, '');
                                 }}
                            />
                        } />
                        <Route path="/stats" element={<StatsPage user={user} onOpenCreator={handleOpenCreator} />} />
                        <Route path="/streak" element={<StreakPage user={user} onOpenCreator={handleOpenCreator} />} />
                        <Route path="/clock" element={<ClockPage user={user} onOpenCreator={handleOpenCreator} />} />
                        </TransitionManager>
                    </div>
                    {isCreatorOpen && <TaskCreator onClose={handleCloseCreator} user={user} editingNote={editingNote} activeCollection={activeCollection} onUpdateNote={handleUpdateNoteLocal} onDeleteNote={handleDeleteNoteLocal} onSaveVersion={handleSaveVersion} showToast={showToast} />}
                    {isQuickTaskModalOpen && (
                        <QuickTaskModal 
                            prefillDate={prefillDate}
                            onClose={() => {
                                setIsQuickTaskModalOpen(false);
                                setPrefillDate(null);
                            }} 
                            onAdd={handleAddQuickTask} 
                            showToast={showToast} 
                        />
                    )}
                    {editingQuickTask && (
                        <QuickTaskModal 
                            initialData={editingQuickTask}
                            onClose={() => setEditingQuickTask(null)}
                            showToast={showToast}
                            onAdd={(text, date, time) => {
                                handleUpdateQuickTask(editingQuickTask.id, text, date, time);
                                setEditingQuickTask(null);
                            }}
                        />
                    )}
                    <div className="toast-container">
                        {toasts.map(toast => (
                            <div key={toast.id} className="toast-pill">
                                <span className="material-symbols-outlined text-primary text-xl">check_circle</span>
                                {toast.message}
                            </div>
                        ))}
                    </div>
                </HashRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
