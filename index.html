    <script>
        /* 
           LABEL: STARTUP-SCRIPT-OVERRIDE — Disabled startup fallback script
           FIX 2026-04-15: Removed loaders for a more direct app launch experience.
        */
        (function setupStartupFallback() {
            let fired = false;
            const trigger = () => {
                if (fired) return;
                fired = true;
                // LABEL: FAIORA-APP-READY-TRIGGER — Triggers app fade-in
                document.body.classList.add('faiora-react-ready');
                document.documentElement.classList.add('faiora-app-loaded');
            };

            window.addEventListener('faiora-app-ready', trigger);

            // SAFETY FALLBACK: If React/Auth takes > 2s, force show the app anyway
            // FIX 2026-04-15: Reduced from 5s to 2s for faster start.
            setTimeout(trigger, 2000);
        })();
    </script>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { createRoot } = ReactDOM;
        const { HashRouter, Routes, Route, Link, useNavigate, useLocation, Navigate } = ReactRouterDOM;

        const normalizeRouteLocation = (loc) => {
            if (!loc || typeof loc !== 'object') return { pathname: '/', search: '', hash: '', state: null, key: 'default' };
            return { ...loc, pathname: loc.pathname && loc.pathname !== '' ? loc.pathname : '/' };
        };

        class FaioraErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, err: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, err: error };
            }
            componentDidCatch(error, info) {
                console.error('FaioraErrorBoundary:', error, info?.componentStack);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-[100dvh] flex flex-col items-center justify-center p-8 text-cream-light text-center gap-4">
                            <p className="font-bold">Something went wrong loading the app.</p>
                            <p className="text-white/50 text-sm max-w-sm">{this.state.err?.message || 'Unknown error'}</p>
                            <button type="button" onClick={() => window.location.reload()} className="px-6 py-3 bg-primary text-white rounded-xl text-xs font-bold uppercase">Reload</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Capacitor / in-app WebView: empty or bare "#" hash yields no Route match → blank UI after login.
        (function ensureHashDefault() {
            try {
                const h = window.location.hash;
                if (h === '' || h === '#') {
                    window.location.hash = '#/';
                }
            } catch (e) { /* ignore */ }
        })();

        const formatDateLocal = (d = new Date()) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const parseDateString = (str) => {
            if (!str) return null;
            if (str.includes('T')) return new Date(str);
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        };

        const formatDueDate = (date, time) => {
            if (!date) return { label: '', isOverdue: false, isNearDeadline: false, isDueTomorrow: false };
            const d = parseDateString(date);
            const now = new Date();
            const today = formatDateLocal(now);
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = formatDateLocal(tomorrow);
            
            // Check for Overdue
            let isOverdue = false;
            const target = parseDateString(date);
            if (time) {
                const [h, m] = time.split(':');
                target.setHours(parseInt(h), parseInt(m), 0, 0);
            } else {
                target.setHours(23, 59, 59, 999);
            }
            
            if (now > target) {
                isOverdue = true;
            }

            let isDueTomorrow = false;
            if (date === today) {
                let label = isOverdue ? 'Past due' : 'Due Today';
                let isNearDeadline = false;
                if (time) {
                    const [h, m] = time.split(':');
                    const diffMs = target - now;
                    const diffHours = diffMs / (1000 * 60 * 60);
                    
                    if (diffHours > 0 && diffHours < 1) {
                        const mins = Math.max(1, Math.ceil(diffHours * 60));
                        isNearDeadline = true;
                        label = `Due in ${mins} MINS`;
                    } else if (diffHours > 0 && diffHours <= 4) {
                        isNearDeadline = true;
                        label = `Due in ${Math.ceil(diffHours)}${Math.ceil(diffHours) === 1 ? ' HR' : ' HRS'}`;
                    } else if (diffHours > 0 && diffHours <= 8) {
                        label = `Due in ${Math.ceil(diffHours)}${Math.ceil(diffHours) === 1 ? ' HR' : ' HRS'}`;
                    }
                    
                    const hours = parseInt(h);
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    const h12 = hours % 12 || 12;
                    label += ` • ${h12}:${m} ${ampm}`;
                }
                return { label, isOverdue, isNearDeadline, isDueTomorrow };
            }
            
            if (date === tomorrowStr) {
                let label = isOverdue ? 'Past due' : 'Due Tomorrow';
                let isNearDeadline = false;
                if (time) {
                    const [h, m] = time.split(':');
                    const tgt = parseDateString(date);
                    tgt.setHours(parseInt(h), parseInt(m), 0, 0);
                    const diffMs = tgt - now;
                    const diffHours = diffMs / (1000 * 60 * 60);
                    if (diffHours > 0 && diffHours < 1) {
                        const mins = Math.max(1, Math.ceil(diffHours * 60));
                        isNearDeadline = true;
                        label = `Due in ${mins} MINS`;
                    } else if (diffHours > 0 && diffHours <= 4) {
                        isNearDeadline = true;
                        label = `Due in ${Math.ceil(diffHours)}${Math.ceil(diffHours) === 1 ? ' HR' : ' HRS'}`;
                    }
                    const hours = parseInt(h);
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    const h12 = hours % 12 || 12;
                    label += ` • ${h12}:${m} ${ampm}`;
                }
                isDueTomorrow = true;
                return { label, isOverdue, isNearDeadline, isDueTomorrow };
            }

            const options = { month: 'short', day: 'numeric' };
            let str = d.toLocaleDateString('en-US', options);
            if (time) {
                const [h, m] = time.split(':');
                const hours = parseInt(h);
                const ampm = hours >= 12 ? 'PM' : 'AM';
                const h12 = hours % 12 || 12;
                str += ` • ${h12}:${m} ${ampm}`;
            }
            return { label: isOverdue ? `Past due • ${str}` : str, isOverdue, isNearDeadline: false, isDueTomorrow: false };
        };

        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyDktbyVgI7AAwaY2u-KsWBRwLZawy0949s",
            authDomain: "faiora-24f4a.firebaseapp.com",
            projectId: "faiora-24f4a",
            storageBucket: "faiora-24f4a.firebasestorage.app",
            messagingSenderId: "752265363994",
            appId: "1:752265363994:web:78795bfad67d2d541e07a3",
            measurementId: "G-B0DWSL1JMV"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable offline persistence with multi-tab support
        db.enablePersistence({ synchronizeTabs: true }).then(() => {
            console.log("✨ [FIREBASE] Multi-tab persistence enabled successfully");
        }).catch(err => {
            if (err.code === 'failed-precondition') {
                console.warn("⚠️ [FIREBASE] Multi-tab persistence already active in another tab/process. Sync should be consistent.");
            } else if (err.code === 'unimplemented') {
                console.warn("⚠️ [FIREBASE] Persistence not supported by browser");
            } else {
                console.error("❌ [FIREBASE] Persistence error:", err.message);
            }
        });

        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const isAndroidNative = () =>
            !!window.Capacitor &&
            typeof window.Capacitor.getPlatform === "function" &&
            window.Capacitor.getPlatform() === "android";

        const signInWithGoogle = async () => {
            if (isAndroidNative()) {
                const firebaseAuthPlugin = window.Capacitor?.Plugins?.FirebaseAuthentication;
                if (!firebaseAuthPlugin) {
                    throw new Error("FirebaseAuthentication plugin is not available on Android build.");
                }
                const nativeResult = await firebaseAuthPlugin.signInWithGoogle({
                    skipNativeAuth: true,
                    scopes: ["email", "profile"],
                    useCredentialManager: false
                });
                let idToken = nativeResult?.credential?.idToken;
                if (!idToken) {
                    const tokenResult = await firebaseAuthPlugin.getIdToken({ forceRefresh: true });
                    idToken = tokenResult?.token;
                }
                if (!idToken) {
                    throw new Error("Google sign-in did not return an ID token.");
                }
                const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
                const result = await auth.signInWithCredential(credential);
                if (result?.user) {
                    localStorage.setItem('faiora_logged_in', 'true');
                    window.dispatchEvent(new CustomEvent('faiora-signed-in', { detail: result.user }));
                }
                return result;
            }

            const result = await auth.signInWithPopup(googleProvider);
            if (result?.user) {
                localStorage.setItem('faiora_logged_in', 'true');
                window.dispatchEvent(new CustomEvent('faiora-signed-in', { detail: result.user }));
            }
            return result;
        };

        // ==========================================================================
        // LABEL: NOTIF-ENGINE — Push Notification Engine
        // ==========================================================================
        // Handles both:
        //   1. LOCAL notifications (setTimeout when app is open) — LABEL: NOTIF-LOCAL
        //   2. FCM token registration (for Cloud Functions push) — LABEL: NOTIF-FCM
        //
        // HOW IT WORKS:
        //   - On login, requests notification permission
        //   - Gets an FCM token from Firebase and stores it in Firestore
        //   - Cloud Functions use that token to send push even when app is closed
        //   - Local setTimeout scheduling still works as fallback when app is open
        // ==========================================================================
        const FaioraNotifications = (() => {
            const timers = new Map(); // taskId -> [timerIds]
            let swReady = false;
            let swRegistration = null;

            // ------------------------------------------------------------------
            // LABEL: NOTIF-SW — Register Service Worker
            // ------------------------------------------------------------------
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    swRegistration = reg;
                    swReady = true;
                    console.log('🔥 Faiora SW registered');
                    
                    // FORCE UPDATE: Ensure the phone gets the newest code (v1.0.4+) immediately
                    reg.update();

                    // Request persistent storage to help SW stay alive (best effort)
                    if (navigator.storage && navigator.storage.persist) {
                        navigator.storage.persist().then(granted => {
                            if (granted) console.log("💾 [Faiora] Persistent storage granted (Higher SW priority)");
                        });
                    }
                }).catch(err => console.warn('SW registration failed:', err));
            }

            // ------------------------------------------------------------------
            // LABEL: NOTIF-FCM — VAPID Key for FCM Web Push
            // ------------------------------------------------------------------
            // HOW TO GET THIS KEY:
            //   1. Go to Firebase Console → Project Settings → Cloud Messaging
            //   2. Under "Web Push certificates" → Click "Generate key pair"
            //   3. Copy the key and paste it below
            // ------------------------------------------------------------------
            const VAPID_KEY = 'BPEtleiswwW1JQ2b8rtlPBGHm2DhcSmxmDZh6ifdZusmLdD0HzOScot047EvfbSJkN9VbQlD04G4RaNCoBbdiFI';
            const hasNotificationApi = typeof window !== 'undefined' && typeof window.Notification !== 'undefined';

            // ------------------------------------------------------------------
            // LABEL: NOTIF-PERMISSION — Request notification permission + FCM token
            // ------------------------------------------------------------------
            const requestPermission = async () => {
                if (!('Notification' in window)) return 'unsupported';
                
                try {
                    const status = await Notification.requestPermission();
                    if (status === 'granted') {
                        console.log('🔔 Notification permission granted.');
                        registerFCMToken();
                    } else if (status === 'denied') {
                        console.warn('❌ Notification permission denied.');
                    }
                    return status;
                } catch (err) {
                    console.error('Error requesting notification permission:', err);
                    return hasNotificationApi ? Notification.permission : 'unsupported';
                }
            };

            const testNotification = async () => {
                if (!hasNotificationApi || Notification.permission !== 'granted') {
                    const res = await requestPermission();
                    if (res !== 'granted') return;
                }
                
                playNotifSFX();
                const title = "🔥 Faiora Test Alert";
                const body = "Your notification system is working! This is a local test.";
                
                if (swRegistration) {
                    swRegistration.showNotification(title, {
                        body,
                        icon: 'logo.png',
                        badge: 'logo.png',
                        tag: 'faiora-test',
                        renotify: true,
                        requireInteraction: true
                    });
                } else {
                    new Notification(title, { body, icon: 'logo.png' });
                }
                
                // Also trigger a token refresh to be sure
                registerFCMToken();
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-FCM-TOKEN — Get FCM token and store in Firestore
            // ------------------------------------------------------------------
            // This token is what Cloud Functions use to send push to YOUR device.
            // Stored in Firestore: fcmTokens/{userId} → { tokens: [...] }
            const registerFCMToken = async () => {
                try {
                    if (VAPID_KEY === 'YOUR_VAPID_KEY_HERE') {
                        console.warn('⚠️ FCM VAPID key not set! Background notifications won\'t work.');
                        return;
                    }

                    const messaging = firebase.messaging();
                    
                    // Ensure our sw.js is ready before getting token
                    let reg = swRegistration;
                    if (!reg && 'serviceWorker' in navigator) {
                        reg = await navigator.serviceWorker.ready;
                    }

                    const token = await messaging.getToken({ 
                        vapidKey: VAPID_KEY,
                        serviceWorkerRegistration: reg 
                    });

                    if (token && auth.currentUser) {
                        const userId = auth.currentUser.uid;
                        const tokenRef = db.collection('fcmTokens').doc(userId);
                        const doc = await tokenRef.get();

                        if (doc.exists) {
                            const existing = doc.data().tokens || [];
                            if (!existing.includes(token)) {
                                await tokenRef.update({
                                    tokens: firebase.firestore.FieldValue.arrayUnion(token),
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            }
                        } else {
                            await tokenRef.set({
                                tokens: [token],
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                        console.log('🔔 FCM token verified/registered');
                    }
                } catch (err) {
                    console.warn('FCM token registration failed:', err);
                }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-SFX — Play notification sound effect
            // ------------------------------------------------------------------
            const playNotifSFX = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const playTone = (freq, start, dur, vol = 0.15) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                        gain.gain.setValueAtTime(vol, ctx.currentTime + start);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + start);
                        osc.stop(ctx.currentTime + start + dur);
                    };
                    // Pleasant Chime: C6 -> E6 -> G6
                    playTone(1046.50, 0, 0.15, 0.12); 
                    playTone(1318.51, 0.12, 0.15, 0.1); 
                    playTone(1567.98, 0.24, 0.25, 0.08); 
                } catch(e) { /* AudioContext not available */ }
            };

            const playCheckSFX = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const playTone = (freq, start, dur, vol = 0.1) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
                        gain.gain.setValueAtTime(vol, ctx.currentTime + start);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + start);
                        osc.stop(ctx.currentTime + start + dur);
                    };
                    // Quick high-pitched "ding"
                    playTone(1046.50, 0, 0.1, 0.08); // C6
                    playTone(1318.51, 0.05, 0.15, 0.06); // E6
                } catch(e) { /* AudioContext not available */ }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-UTIL — Format time for notification title
            // ------------------------------------------------------------------
            const formatNotifTime = (dateObj) => {
                let hours = dateObj.getHours();
                const minutes = dateObj.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                if (hours === 0) hours = 12;
                const minStr = minutes === 0 ? '' : ':' + String(minutes).padStart(2, '0');
                return `${hours}${minStr}${ampm}`;
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-SEND — Show a local notification via Service Worker
            // ------------------------------------------------------------------
            const sendNotification = (title, body, tag) => {
                if (!swRegistration) return;
                playNotifSFX();
                swRegistration.showNotification(title, {
                    body,
                    icon: 'logo.png',
                    badge: 'logo.png',
                    tag,
                    renotify: true,
                    vibrate: [200, 100, 200],
                    requireInteraction: true,
                    data: { url: location.origin + location.pathname }
                });
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-SCHEDULE — Schedule local notifications for a task
            // ------------------------------------------------------------------
            // Schedules up to 3 setTimeout timers:
            //   1. At exact due time
            //   2. 2 hours before
            //   3. 1 day before (at 9 AM)
            
            const checkMissedNotifications = () => {
                const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                const now = Date.now();
                let hasMissed = false;

                Object.keys(scheduled).forEach(tag => {
                    const item = scheduled[tag];
                    if (item.timestamp < now) {
                        // missed!
                        sendNotification(item.title, item.body, tag);
                        delete scheduled[tag];
                        hasMissed = true;
                    }
                });

                if (hasMissed) {
                    localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                }
            };


            const scheduleForTask = (task) => {
                if (!task || !task.dueDate || task.completed) return;
                cancelForTask(task.id);

                const permitted = hasNotificationApi && Notification.permission === 'granted';
                if (!permitted) return;

                const dueTime = task.dueTime || '23:59';
                const dueDateTime = new Date(`${task.dueDate}T${dueTime}`);
                if (isNaN(dueDateTime.getTime())) return;

                const now = Date.now();
                const dueMs = dueDateTime.getTime();
                const taskTimers = [];
                const taskName = formatTaskText(task.text || task.title || 'Task');
                const timeStr = formatNotifTime(dueDateTime);

                // Timer 1: At exact due time
                if (dueMs > now) {
                    const id = setTimeout(() => {
                        sendNotification(`Task Reminder! 🔥`, `📌 Due Now: ${taskName}\n`, `faiora-due-${task.id}`);
                        // Sync to localStorage for offline catch-up
                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        scheduled[`faiora-due-${task.id}`] = { title: `Task Reminder! 🔥`, body: `📌 Due Now: ${taskName}\n`, timestamp: dueMs };
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    }, dueMs - now);
                    taskTimers.push(id);
                }

                // Timer 2: 1 hour before (Updated 2026-04-15)
                const oneHourBefore = dueMs - (1 * 60 * 60 * 1000);
                if (oneHourBefore > now) {
                    const id = setTimeout(() => {
                        sendNotification(`Task Reminder!  🔥`, `⏳ Due in 1hr: ${taskName}\n`, `faiora-1h-${task.id}`);
                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        scheduled[`faiora-1h-${task.id}`] = { title: `Task Reminder!  🔥`, body: `⏳ Due in 1hr: ${taskName}\n`, timestamp: dueMs };
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    }, oneHourBefore - now);
                    taskTimers.push(id);
                }

                // Timer 3: 24 hours before (Updated 2026-04-15)
                const twentyFourHoursBefore = dueMs - (24 * 60 * 60 * 1000);
                if (twentyFourHoursBefore > now) {
                    const id = setTimeout(() => {
                        sendNotification(`Task Reminder! 🔥`, `⚡ Due in 24hrs: ${taskName}\n`, `faiora-24h-${task.id}`);
                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        scheduled[`faiora-24h-${task.id}`] = { title: `Task Reminder! 🔥`, body: `⚡ Due in 24hrs: ${taskName}\n`, timestamp: dueMs };
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    }, twentyFourHoursBefore - now);
                    taskTimers.push(id);
                }

                if (taskTimers.length > 0) {
                    timers.set(task.id, taskTimers);
                }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-CANCEL — Cancel scheduled notifications for a task
            // ------------------------------------------------------------------
            const cancelForTask = (taskId) => {
                const existing = timers.get(taskId);
                if (existing) {
                    existing.forEach(id => clearTimeout(id));
                    timers.delete(taskId);
                }
                if (swRegistration) {
                    ['due', '2h', '1d'].forEach(prefix => {
                        swRegistration.getNotifications({ tag: `faiora-${prefix}-${taskId}` })
                            .then(notifs => {
                                notifs.forEach(n => n.close());
                            })
                            .catch(() => {});

                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        delete scheduled[`faiora-${prefix}-${taskId}`];
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    });
                }
            };

            // ------------------------------------------------------------------
            const rescheduleAll = (tasks) => {
                timers.forEach((timerIds) => timerIds.forEach(id => clearTimeout(id)));
                timers.clear();
                if (!tasks || !Array.isArray(tasks)) return;
                tasks.filter(t => t.dueDate && !t.completed).forEach(t => scheduleForTask(t));
            };

            const checkCloudHealth = async () => {
                try {
                    const userId = auth.currentUser ? auth.currentUser.uid : null;
                    if (!userId) return { connected: false, hasToken: false };

                    // Use the actual collection the app is currently using for sync
                    const activeColl = localStorage.getItem('faiora_active_collection') || 'tasks';
                    const status = { connected: false, hasToken: false };
                    
                    // 1. Connection check - Test write/read on the actual user document
                    const testRef = db.collection(activeColl).doc(userId);
                    await testRef.set({ _lastHealthCheck: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                    const doc = await testRef.get();
                    if (doc.exists) status.connected = true;

                    // 2. Token check
                    const tokenDoc = await db.collection('fcmTokens').doc(userId).get();
                    status.hasToken = tokenDoc.exists && (tokenDoc.data().tokens || []).length > 0;

                    return status;
                } catch (e) {
                    console.warn("Cloud health check failed:", e);
                    // If we get a permission error on write, but doc read works, maybe it's partially connected
                    return { connected: false, hasToken: false };
                }
            };

            const notifyNow = (title, body, tag = 'faiora-generic') => {
                if (!hasNotificationApi || Notification.permission !== 'granted') return;
                sendNotification(title, body, tag);
            };

            return { isSwReady: () => swReady, checkMissedNotifications, requestPermission, testNotification, registerFCMToken, scheduleForTask, cancelForTask, rescheduleAll, playCheckSFX, checkCloudHealth, notifyNow };

            const [pullDistance, setPullDistance] = useState(0);
            const [status, setStatus] = useState('idle');
            const startY = useRef(0);
            const startX = useRef(0);
            const isPulling = useRef(false);
            const gestureCancelled = useRef(false);
            const contentRef = useRef(null);
            const THRESHOLD = 100;

            const pullDistanceRef = useRef(0);
            const statusRef = useRef('idle');

            useEffect(() => {
                const el = contentRef.current;
                if (!el) return;

                const handleTouchStart = (e) => {
                    if (disabled || statusRef.current === 'refreshing') return;
                    
                    const scrollEl = el.querySelector('main') || el;
                    if (scrollEl.scrollTop <= 0) {
                        startY.current = e.touches[0].pageY;
                        startX.current = e.touches[0].pageX;
                        isPulling.current = true;
                        gestureCancelled.current = false;
                    } else {
                        isPulling.current = false;
                    }
                };

                const handleTouchMove = (e) => {
                    if (!isPulling.current || statusRef.current === 'refreshing' || gestureCancelled.current) return;

                    const touchY = e.touches[0].pageY;
                    const touchX = e.touches[0].pageX;
                    const diffY = touchY - startY.current;
                    const diffX = touchX - startX.current;

                    if (diffY < 0 || Math.abs(diffX) > Math.abs(diffY)) {
                        gestureCancelled.current = true;
                        if (pullDistanceRef.current > 0) {
                            pullDistanceRef.current = 0;
                            setPullDistance(0);
                            statusRef.current = 'idle';
                            setStatus('idle');
                        }
                        return;
                    }

                    if (diffY > 5) {
                        const currentPull = Math.min(180, diffY * 0.4);
                        pullDistanceRef.current = currentPull;
                        setPullDistance(currentPull);
                        
                        const newStatus = currentPull > THRESHOLD ? 'ready' : 'pulling';
                        statusRef.current = newStatus;
                        setStatus(newStatus);

                        if (currentPull > 5 && e.cancelable) {
                             e.preventDefault();
                        }
                    }
                };

                const handleTouchEnd = () => {
                    if (!isPulling.current) return;
                    const currentDistance = pullDistanceRef.current;
                    isPulling.current = false;

                    if (currentDistance > THRESHOLD && !gestureCancelled.current) {
                        statusRef.current = 'refreshing';
                        setStatus('refreshing');
                        pullDistanceRef.current = 100;
                        setPullDistance(100);
                        if (onRefresh) {
                            onRefresh().finally(() => {
                                setTimeout(() => {
                                    statusRef.current = 'idle';
                                    setStatus('idle');
                                    pullDistanceRef.current = 0;
                                    setPullDistance(0);
                                }, 500);
                            });
                        }
                    } else {
                        pullDistanceRef.current = 0;
                        setPullDistance(0);
                        statusRef.current = 'idle';
                        setStatus('idle');
                    }
                };

                el.addEventListener('touchstart', handleTouchStart, { passive: true });
                el.addEventListener('touchmove', handleTouchMove, { passive: false });
                el.addEventListener('touchend', handleTouchEnd, { passive: true });

                return () => {
                    el.removeEventListener('touchstart', handleTouchStart);
                    el.removeEventListener('touchmove', handleTouchMove);
                    el.removeEventListener('touchend', handleTouchEnd);
                };
            }, [disabled, onRefresh]);

            return (
                <div ref={contentRef} className="flex-1 h-full flex flex-col relative touch-pan-x touch-pan-y">
                    <div 
                        className="absolute left-0 w-full flex flex-col items-center justify-center pointer-events-none z-[150] transition-all duration-200"
                        style={{ 
                            height: `${pullDistance}px`,
                            top: '110px',
                            opacity: pullDistance > 30 ? 1 : 0
                        }}

                        <div className={`p-2.5 bg-slate-950 border border-white/10 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.6)] transition-transform ${status === 'refreshing' ? 'animate-spin' : ''}`}
                             style={{ transform: `rotate(${pullDistance * 2}deg) scale(${Math.min(1.1, pullDistance / 70)})` }}>
                            <span className="material-symbols-outlined text-primary text-3xl font-bold">
                                {status === 'ready' ? 'release_alert' : (status === 'refreshing' ? 'sync' : 'expand_circle_down')}
                            </span>
                        </div>
                        <p className="text-[10px] font-black text-primary tracking-[0.3em] mt-3 uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                            {status === 'pulling' ? 'Pull' : (status === 'ready' ? 'Release' : 'Syncing')}
                        </p>

                    {children}

            );

                    }
                    
                    const root = editorRef.current;
                    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
                    const ranges = [];
                    const query = searchQuery.toLowerCase();
                    
                    let node;
                    while(node = walker.nextNode()) {
                        const text = node.textContent.toLowerCase();
                        let startIndex = 0;
                        let index;
                        while((index = text.indexOf(query, startIndex)) !== -1) {
                            const range = new Range();
                            range.setStart(node, index);
                            range.setEnd(node, index + query.length);
                            ranges.push(range);
                            startIndex = index + query.length;
                        }
                    }
                    
                    setTotalMatches(ranges.length);
                    setMatchRanges(ranges);

                    const highlight = new Highlight(...ranges);
                    CSS.highlights.set('search-match', highlight);
                    
                    if (ranges.length > 0) {
                        const targetRange = ranges[(currentMatchIndex + ranges.length) % ranges.length];

                const fragment = range.extractContents();
                
                const walker = document.createTreeWalker(fragment, NodeFilter.SHOW_TEXT);
                while (walker.nextNode()) {

                        // Better capitalize: Force Title Case (every word starts with upper, rest lower)
                        node.nodeValue = text.toLowerCase().replace(/\b[a-z\u00c0-\u00ff]/g, (match) => match.toUpperCase());

                const isTouch = e.type.startsWith('touch');
                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                const startY = isTouch ? e.touches[0].clientY : e.clientY;
                const initialWidth = targetImage.offsetWidth;
                const initialHeight = targetImage.offsetHeight;
                const aR = initialWidth / initialHeight;
                const editorWidth = editorRef.current ? editorRef.current.offsetWidth : window.innerWidth;

                document.body.classList.add('resizing-active');
                if (handleType === 'br' || handleType === 'tl') {
                    document.body.style.cursor = 'nwse-resize';
                } else {
                    document.body.style.cursor = 'nesw-resize';

                const onMove = (moveEvent) => {
                    const currentX = isTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
                    const currentY = isTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;
                    
                    // Resizing logic with aspect ratio preservation
                    let deltaX = 0;
                    let deltaY = 0;

                    if (handleType === 'br') {
                        deltaX = currentX - startX;
                        deltaY = currentY - startY;
                    } else if (handleType === 'tl') {
                        deltaX = startX - currentX;
                        deltaY = startY - currentY;
                    } else if (handleType === 'tr') {
                        deltaX = currentX - startX;
                        deltaY = startY - currentY;
                    } else if (handleType === 'bl') {
                        deltaX = startX - currentX;
                        deltaY = currentY - startY;
                    }

                    // Use the larger delta to drive resizing
                    const dominantDelta = Math.abs(deltaX) > Math.abs(deltaY) ? deltaX : (deltaY * aR);
                    const newWidth = Math.max(80, Math.min(editorWidth - 40, initialWidth + dominantDelta));
                    
                    targetImage.style.width = newWidth + 'px';
                    targetImage.style.height = 'auto'; // Keep aspect ratio
                    
                    if (isTouch) moveEvent.preventDefault(); // Prevent scroll
                };

                const onEnd = () => {
                    document.removeEventListener('mousemove', onMove, true);
                    document.removeEventListener('mouseup', onEnd, true);
                    document.removeEventListener('touchmove', onMove, { passive: false });

                    document.body.classList.remove('resizing-active');
                    document.body.style.cursor = '';
                    setHasChanges(true);
                    hasChangesRef.current = true;
                    saveState();
                };

                document.addEventListener('mousemove', onMove, true);
                document.addEventListener('mouseup', onEnd, true);

                document.addEventListener('touchend', onEnd, true);
            };

            const handleImageMoveStart = (e, container) => {
                const isTouch = e.type.startsWith('touch');
                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                const startY = isTouch ? e.touches[0].clientY : e.clientY;
                const img = container.querySelector('img');
                if (!img) return;

                const rect = container.getBoundingClientRect();
                const offsetX = startX - rect.left;
                const offsetY = startY - rect.top;

                // Create ghost
                const ghost = container.cloneNode(true);
                ghost.className = 'image-drag-ghost';
                ghost.style.width = rect.width + 'px';
                ghost.style.height = rect.height + 'px';
                ghost.style.left = rect.left + 'px';
                ghost.style.top = rect.top + 'px';
                document.body.appendChild(ghost);

                container.classList.add('dragging-now');
                document.body.classList.add('dragging-image-active');

                // Marker
                const marker = document.createElement('div');
                marker.className = 'drop-insertion-marker';
                let currentDropTarget = null;

                const onMove = (moveEvent) => {
                    const curX = isTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
                    const curY = isTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;

                    // Update ghost position
                    ghost.style.left = (curX - offsetX) + 'px';
                    ghost.style.top = (curY - offsetY) + 'px';

                    // Find drop position using caret
                    let range;
                    if (document.caretRangeFromPoint) {
                        // Offset Y slightly to target the line center better
                        range = document.caretRangeFromPoint(curX, curY);
                    } else if (moveEvent.rangeParent) {
                        range = document.createRange();
                        range.setStart(moveEvent.rangeParent, moveEvent.rangeOffset);
                    }

                    if (range && editorRef.current.contains(range.startContainer)) {
                        // Ensure it's inside a block-level element if possible
                        let container = range.startContainer;
                        if (container.nodeType === 3) container = container.parentNode;
                        
                        // Avoid deep nesting inside complex spans if we can
                        const block = container.closest('div, p, li, h1, h2');
                        if (block && editorRef.current.contains(block)) {
                             // Correct range if we are at edge of text node
                             range.insertNode(marker);
                             currentDropTarget = range;
                        }
                    }

                    if (isTouch) moveEvent.preventDefault();
                };

                const onEnd = () => {
                    document.removeEventListener('mousemove', onMove, true);
                    document.removeEventListener('mouseup', onEnd, true);
                    document.removeEventListener('touchmove', onMove, { passive: false });
                    document.removeEventListener('touchend', onEnd, true);
                    
                    document.body.classList.remove('dragging-image-active');
                    container.classList.remove('dragging-now');
                ghost.remove();

                    if (currentDropTarget && editorRef.current.contains(marker)) {
                        marker.parentNode.insertBefore(container, marker);
                        marker.remove();
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    } else {
                        marker.remove();
                    }
                };

                document.addEventListener('mousemove', onMove, true);
                document.addEventListener('mouseup', onEnd, true);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd, true);
            };

            const handlePaste = (e) => {
                const clipboardData = e.clipboardData || window.clipboardData;
                if (!clipboardData) return;
                const items = clipboardData.items || [];
                const imageItem = Array.from(items).find(item => item.kind === 'file' && item.type.startsWith('image/'));
                if (imageItem) {
                    e.preventDefault();
                    const blob = imageItem.getAsFile();
                    if (blob) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const src = event.target && event.target.result ? event.target.result : '';
                            if (!src) return;
                            const imgHtml = `
                                <div class="resizable-image-container selected" contenteditable="false">
                                    <div class="image-toolbar">
                                        <button class="image-action-btn danger" data-action="image-delete">
                                            <span class="material-symbols-outlined text-[16px]">delete</span>
                                            Delete
                                        </button>
                                    </div>
                                    <img src="${src}" class="resizable-image selected" style="width: 250px" />
                                    <div class="resize-handle tl"></div>
                                    <div class="resize-handle tr"></div>
                                    <div class="resize-handle bl"></div>
                                    <div class="resize-handle br"></div>
                                </div>
                            `;
                            document.execCommand('insertHTML', false, imgHtml + '<div>&nbsp;</div>');
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        };
                        reader.readAsDataURL(blob);
                    }
                    return;
                }
                e.preventDefault();
                const text = clipboardData.getData('text');
                document.execCommand('insertText', false, text);
            };


            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imgHtml = `
                            <div class="resizable-image-container selected" contenteditable="false">
                                <div class="image-toolbar">
                                    <button class="image-action-btn danger" data-action="image-delete">
                                        <span class="material-symbols-outlined text-[16px]">delete</span>
                                        Delete
                                    </button>
                                </div>
                                <img src="${event.target.result}" class="resizable-image selected" style="width: 250px" />
                                <div class="resize-handle tl"></div>
                                <div class="resize-handle tr"></div>
                                <div class="resize-handle bl"></div>
                                <div class="resize-handle br"></div>
                            </div>
                        `;
                        document.execCommand('insertHTML', false, imgHtml + '<div>&nbsp;</div>');
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                const handleGlobalInteract = (e) => {
                    const target = e.target;
                    const isTouch = e.type.startsWith('touch');
                    const startX = isTouch ? e.touches[0].clientX : e.clientX;
                    const startY = isTouch ? e.touches[0].clientY : e.clientY;
                    
                    // Clear helper
                    const clearAll = () => {
                        document.querySelectorAll('.resizable-image.selected, .resizable-image-container.selected').forEach(el => el.classList.remove('selected'));
                        setSelectedImage(null);
                    };

                    // 1. Handle clicking on an image
                    if (target.classList.contains('resizable-image')) {
                        e.stopPropagation();
                        // On touch, we might not want to prevent default if we want focus, but for selection it's better to prevent.
                        if (!isTouch) e.preventDefault(); 
                        
                        clearAll();
                        const container = target.closest('.resizable-image-container');
                        if (container) container.classList.add('selected');
                        target.classList.add('selected');
                        setSelectedImage(target);

                        // Long Press to Move
                        const timer = setTimeout(() => {
                            if (container) handleImageMoveStart(e, container);
                        }, 500);
                        
                        const clearTimer = () => clearTimeout(timer);
                        document.addEventListener('mouseup', clearTimer, { once: true });
                        document.addEventListener('touchend', clearTimer, { once: true });
                        document.addEventListener('mousemove', (me) => {
                            if (Math.abs(me.clientX - startX) > 10 || Math.abs(me.clientY - startY) > 10) clearTimer();
                        }, { once: true });
                        
                        return;
                    }
                    
                    // 2. Handle clicking a resize handle (Remove crop handles)
                    if (target.classList.contains('resize-handle')) {
                        e.stopPropagation();
                        e.preventDefault();
                        const handleType = target.classList.contains('tl') ? 'tl' :
                                         target.classList.contains('tr') ? 'tr' :
                                         target.classList.contains('bl') ? 'bl' : 'br';
                        
                        const container = target.closest('.resizable-image-container');
                        const img = container ? container.querySelector('img') : null;
                        if (img) handleImageResize(e, img, handleType);
                        return;
                    }

                    // 4. Handle Action Buttons (Delete)
                    const action = target.closest('[data-action]') ? target.closest('[data-action]').dataset.action : null;
                    if (action) {
                        e.stopPropagation();
                        e.preventDefault();
                        const container = target.closest('.resizable-image-container');
                        
                        if (action === 'image-delete' && container) {
                            container.remove();
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        }
                        return;
                    }

                    // 3. Deselect when clicking outside
                    if (selectedImage && !target.closest('.resizable-image-container')) {
                        clearAll();
                    }
                };
                
                document.addEventListener('mousedown', handleGlobalInteract, true);
                document.addEventListener('touchstart', handleGlobalInteract, { capture: true, passive: false });
                
                return () => {
                    document.removeEventListener('mousedown', handleGlobalInteract, true);
                    document.removeEventListener('touchstart', handleGlobalInteract, true);
                };
            }, [selectedImage]);

            const ownerId = editingNote ? editingNote.ownerId : user?.uid;
            const canEdit = useMemo(() => {
                if (!user) return isPublic && allowPublicEdit;
                if (!ownerId || user.uid === ownerId) return true;
                if (user.email && sharedWith.includes(user.email.toLowerCase())) return true;

                                <div className="absolute top-24 right-10 pointer-events-none opacity-[0.07] select-none">

                                </div>

                                            <span className="material-symbols-outlined text-[22px]">arrow_back</span>
                                        </button>
                                    <input 
                                        type="text" 
                                        placeholder="Main title" 
                                        maxLength={24}

                                        className="bg-transparent border-none text-2xl md:text-4xl font-bold text-slate-800 placeholder:text-slate-600 focus:ring-0 w-full tracking-tight px-0 md:px-4 font-display"
                                        value={title}
                                        onChange={(e) => { 
                                            if(!canEdit) return;
                                            const val = e.target.value;
                                            setTitle(val); 
                                            setHasChanges(true); 
                                            hasChangesRef.current = true;
                                            // Fast debounced live save for title changes
                                            if (debouncedSaveTimer.current) clearTimeout(debouncedSaveTimer.current);
                                            debouncedSaveTimer.current = setTimeout(() => {
                                                const html = editorRef.current ? editorRef.current.innerHTML : content;
                                                saveToFirestore({ 
                                                    title: val, content: html, progress, isPinned, noteTheme, noteIcon, 
                                                    labels, reminderDate, sharedWith,
                                                    section: (editingNote && editingNote.section) ? editingNote.section : ''
                                                }, true);
                                            }, 300);
                                        }}
                                        onBlur={() => {
                                            if(!canEdit) return;
                                            const formatted = formatTitle(title);
                                            setTitle(formatted);
                                            saveToFirestore({ title: formatted, content: (editorRef.current ? editorRef.current.innerHTML : content), progress, isPinned, noteTheme, noteIcon, labels, reminderDate, section: (editingNote ? editingNote.section : '') || '' }, true);
                                        }}
                                    />
                                    </div>
                                    <div className="flex flex-wrap items-center gap-2 px-0 md:px-4">
                                        {labels.map(label => (
                                            <span key={label} className="text-[10px] font-bold uppercase tracking-widest bg-primary/10 text-primary px-2 py-1 rounded-md flex items-center gap-1 font-montserrat">
                                                {label}
                                                {/* FIX 2026-04-15: label-remove-btn - saves updated labels directly to Firestore instead of stale saveState */}
                                                {canEdit && (
                                                    <button onClick={() => { const newLabels = labels.filter(l => l !== label); setLabels(newLabels); setHasChanges(true); hasChangesRef.current = true; saveToFirestore({ title, content: (editorRef.current ? editorRef.current.innerHTML : content), progress, isPinned, noteTheme, noteIcon, labels: newLabels, reminderDate, section: (editingNote ? editingNote.section : '') || '' }, true); }} className="hover:text-primary-dark">
                                                        <span className="material-symbols-outlined text-xs">close</span>
                                                    </button>
                                                )}
                                            </span>
                                        ))}
                                        {reminderDate && (
                                            <span className="inline-flex items-center gap-1 text-[10px] font-bold font-montserrat text-primary bg-primary/10 px-2 py-1 rounded-md">
                                                <span className="material-symbols-outlined text-xs">notifications_active</span>
                                                {formatReminderDate(reminderDate)}
                                            </span>
                                        )}
                                    </div>
                                </div>
                                <div className="flex items-center gap-0.5 flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setIsPinned(!isPinned); setHasChanges(true); hasChangesRef.current = true; saveState(); }}
                                        className={"p-2 rounded-full transition-all " + (isPinned ? "text-primary bg-primary/10" : "text-slate-400 hover:text-slate-600")}
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[22px] md:text-[24px]" style={isPinned ? {fontVariationSettings: "'FILL' 1"} : {}}>push_pin</span>
                                    </button>
                                    <button 
                                        onClick={handleClose}
                                        className="hidden md:block p-2 rounded-full text-slate-400 hover:text-slate-600 hover:bg-black/5 transition-all"
                                    >
                                        <span className="material-symbols-outlined text-[24px]">close</span>
                                    </button>
                                </div>
                            </div>
                            {isSearchOpen && (
                                <div className="note-search-bar fixed top-4 right-4 md:right-12 z-[200] flex items-center gap-1.5 bg-white/95 backdrop-blur-2xl p-1.5 pr-2 rounded-xl border border-black/10 shadow-[0_8px_30px_rgb(0,0,0,0.12)] animate-in slide-in-from-top-4 zoom-in-95 duration-300 ring-1 ring-black/5">
                                    <div className="flex items-center flex-1 bg-black/[0.03] rounded-lg px-2 py-1">
                                        <span className="material-symbols-outlined text-slate-400 text-sm">search</span>
                                        <input 
                                            type="text" 
                                            placeholder="Find..." 
                                            className="bg-transparent border-none w-24 md:w-40 text-[13px] text-slate-700 placeholder:text-slate-400 focus:ring-0 px-1.5 font-montserrat h-6"
                                            value={searchQuery}
                                            onChange={(e) => {
                                                setSearchQuery(e.target.value);
                                                setCurrentMatchIndex(0);
                                            }}
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter') {
                                                    e.preventDefault();
                                                    setCurrentMatchIndex(prev => prev + (e.shiftKey ? -1 : 1));
                                                }
                                            }}
                                            autoFocus
                                        />
                                    </div>
                                    {totalMatches > 0 && (
                                        <span className="text-[10px] font-bold text-slate-400 font-montserrat flex-shrink-0 px-1">
                                            {((currentMatchIndex % totalMatches + totalMatches) % totalMatches) + 1}/{totalMatches}
                                        </span>

                                    <div className="flex items-center gap-0.5 border-l border-black/5 pl-1 ml-0.5">
                                        <button

                                        <button

                                            <span className="material-symbols-outlined text-base">keyboard_arrow_down</span>
                                        </button>
                                        <button 
                                            onClick={() => { setIsSearchOpen(false); setSearchQuery(''); }}
                                            className="p-1 hover:bg-black/5 rounded-md text-slate-400 hover:text-rose-500 transition-colors"
                                        >
                                            <span className="material-symbols-outlined text-base">close</span>
                                        </button>
                                    </div>
                                </div>
                            )}
                            <div className="flex-1">
                                <div 
                                    ref={editorRef}
                                    contentEditable={canEdit ? "true" : "false"}
                                    className="note-editor-area"
                                    data-placeholder="Start typing your notes..."
                                    onInput={(e) => { 
                                        if(!canEdit) return; 
                                        setHasChanges(true); 
                                        hasChangesRef.current = true;
                                        // Fast debounced live save for real-time sync
                                        if (debouncedSaveTimer.current) clearTimeout(debouncedSaveTimer.current);
                                        debouncedSaveTimer.current = setTimeout(() => {
                                            const html = editorRef.current ? editorRef.current.innerHTML : content;
                                            saveToFirestore({ 
                                                title, content: html, progress, isPinned, noteTheme, noteIcon, 
                                                labels, reminderDate, sharedWith,
                                                section: (editingNote && editingNote.section) ? editingNote.section : ''
                                            }, true);
                                        }, 300);

                                        // Debounced history save for undo/redo
                                        if (debouncedHistoryTimer.current) clearTimeout(debouncedHistoryTimer.current);
                                        debouncedHistoryTimer.current = setTimeout(() => {
                                            saveState();
                                        }, 1000);
                                    }}
                                    onBlur={saveState}
                                    onClick={handleEditorClick}
                                    onPaste={handlePaste}
                                    onKeyDown={handleEditorKeyDown}
                                    dangerouslySetInnerHTML={{ __html: initialContent }}
                                />
                            </div>
                        </div>
                        <div className="task-creator-footer mt-auto flex items-center justify-between p-1 md:p-2 bg-white/50 backdrop-blur-xl border-t border-black/5 relative z-[100] gap-1 md:gap-2 overflow-visible">
                            {/* Left Side: Main Tools Group */}
                            <div className="flex items-center gap-0 md:gap-1 flex-nowrap overflow-visible">
                                {/* Nested Horizontal Formatting Dropdown */}
                                 <div className="relative flex-shrink-0">

                                    <button 
                                        id="notepad_format_btn"
                                        onClick={() => { if(!canEdit) return; setActivePopup(activePopup === 'format' ? null : 'format'); }} 
                                        className={"footer-action-btn h-[32px] w-[32px] flex items-center justify-center transition-all rounded-xl " + (activePopup === 'format' ? "bg-black/5 text-secondary" : "text-secondary hover:bg-black/5") + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                        title="Formatting"
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[22px]">format_color_text</span>
                                    </button>
                                    
                                    {activePopup === 'format' && (
                                        <div className="format-popup-bar absolute bottom-[calc(100%+8px)] left-1 bg-white rounded-2xl pl-3 shadow-xl border border-black/5 flex flex-nowrap items-center p-2 z-[150] animate-in slide-in-from-bottom-2 duration-200">
                                                
                                                {/* Style Sub-menu Trigger */}
                                                 <div className="relative px-2">
                                                     <button 
                                                         onClick={() => handleSetActiveSubPopup(activeSubPopup === 'style' ? null : 'style')}
                                                         className={"h-10 pl-3 pr-3 flex items-center justify-center gap-1.5 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'style' ? "bg-black/5" : "hover:bg-black/5")}
                                                     >
                                                        <span className="text-[14px] font-bold tracking-tight uppercase font-montserrat">H1</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {/* Style Horizontal Bar */}
                                                    {activeSubPopup === 'style' && (
                                                        <div className="absolute bottom-full left-0 mb-2 bg-white rounded-xl shadow-2xl border border-black/10 flex items-center p-1.5 px-3 z-[160] animate-in slide-in-from-bottom-2 duration-200 gap-2 w-max whitespace-nowrap">
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('h1'); }} className="h-9 px-2 flex items-center hover:bg-black/5 rounded-md text-base font-bold text-slate-700 font-montserrat">H1</button>
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('h2'); }} className="h-9 px-2 flex items-center hover:bg-black/5 rounded-md text-sm font-bold text-slate-600 font-montserrat">H2</button>
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('normal'); }} className="centered h-9 px-6 flex items-center text-center justify-center hover:bg-black/5 rounded-md text-xs text-slate-500 font-montserrat">Normal</button>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/10 mx-1"></div>

                                                {/* Case Sub-menu Trigger */}
                                                <div className="relative">
                                                     <button 
                                                         onClick={() => handleSetActiveSubPopup(activeSubPopup === 'case' ? null : 'case')}
                                                         className={"w-10 h-10 flex items-center justify-center gap-1 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'case' ? "bg-black/5" : "hover:bg-black/5")}
                                                     >

                                                    {/* Case Horizontal Bar */}
                                                    {activeSubPopup === 'case' && (

        const QuickTaskItem = React.memo(({ task, onToggle, onDelete, onEdit }) => {

        // --- Page Components ---

        const DashboardPage = ({ user, notes, quickTasks, onOpenCreator, onEditNote, onRestoreDefaults, onReorderPriorityNote, onToggleQuickTask, onAddQuickTaskClick, onDeleteQuickTask, onUpdateQuickTask, onEditQuickTask, editingQuickTask, setEditingQuickTask, isQuickTaskModalOpen, setIsQuickTaskModalOpen, onRemoveReminder, isProbing, isFirstSyncDone, pomodoroTime, isPomodoroActive }) => {
            const navigate = useNavigate();

                docMoveRef.current = null;
                docEndRef.current = null;
            };

            const [localNotes, setLocalNotes] = useState(() => 
                 notes
                     .filter(n => (n.labels || []).some(l => l.toUpperCase() === 'PRIORITY'))
                     .sort((a, b) => {
                         const orderA = a.homeOrder || 0;
                         const orderB = b.homeOrder || 0;
                         if (orderA !== orderB) return orderA - orderB;
                         const timeA = a.updatedAt ? (a.updatedAt.toMillis ? a.updatedAt.toMillis() : new Date(a.updatedAt).getTime()) : 0;
                         const timeB = b.updatedAt ? (b.updatedAt.toMillis ? b.updatedAt.toMillis() : new Date(b.updatedAt).getTime()) : 0;
                         return timeB - timeA;
                     })
             );
            const sortedQuickTasks = useMemo(() => {
                const tasks = [...quickTasks];
                tasks.sort((a, b) => {
                    // 1. Completion status (uncompleted first)
                    if (a.completed !== b.completed) return a.completed ? 1 : -1;
                    
                    // 2. Deadline priority (Earliest first)
                    const hasA = !!a.dueDate;
                    const hasB = !!b.dueDate;
                    if (hasA || hasB) {
                        if (hasA && !hasB) return -1;
                        if (!hasA && hasB) return 1;
                        
                        // Both have deadlines, compare date
                        if (a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
                        
                        // Same date, compare time (default to end of day if missing)
                        const tA = a.dueTime || '23:59';
                        const tB = b.dueTime || '23:59';
                        if (tA !== tB) return tA.localeCompare(tB);
                    }

                    // 3. Creation date (Newest first) as final tie-breaker
                    const dateA = a.createdAt || 0;
                    const dateB = b.createdAt || 0;
                    return dateB - dateA;
                });
                return tasks;
            }, [quickTasks]);

            const isLoading = isProbing || !isFirstSyncDone;

            const groupedQuickTasks = useMemo(() => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const inTwoDays = new Date(today);
                inTwoDays.setDate(inTwoDays.getDate() + 2);
                const weekEnd = new Date(today);
                weekEnd.setDate(weekEnd.getDate() + 7);

                const groups = {
                    today: [],
                    tomorrow: [],
                    in2days: [],
                    thisWeek: [],
                    completed: []
                };

                sortedQuickTasks.forEach(task => {
                    if (task.completed) {
                        groups.completed.push(task);
                        return;
                    }
                    if (!task.dueDate) {
                        groups.today.push(task);
                        return;
                    }
                    const due = new Date(`${task.dueDate}T00:00:00`);
                    if (isNaN(due.getTime())) {
                        groups.thisWeek.push(task);
                        return;
                    }
                    if (due.getTime() <= today.getTime()) {
                        groups.today.push(task);
                    } else if (due.getTime() === tomorrow.getTime()) {
                        groups.tomorrow.push(task);
                    } else if (due.getTime() === inTwoDays.getTime()) {
                        groups.in2days.push(task);
                    } else if (due.getTime() <= weekEnd.getTime()) {
                        groups.thisWeek.push(task);
                    } else {
                        groups.thisWeek.push(task);
                    }
                });

                return groups;
            }, [sortedQuickTasks]);

            // Sync localNotes with notes prop when not dragging
            // [FIX 2026-04-16] Stabilized with JSON comparison to prevent infinite loop during Pomodoro ticks
            const lastSyncRef = useRef('');
            useEffect(() => {
                const currentSync = JSON.stringify(notes.map(n => ({ id: n.id, updatedAt: n.updatedAt, homeOrder: n.homeOrder, labels: n.labels })));
                if (!dragState && currentSync !== lastSyncRef.current) {
                    lastSyncRef.current = currentSync;
                    const priorities = notes
                        .filter(n => (n.labels || []).some(l => l.toUpperCase() === 'PRIORITY'))
                        .sort((a, b) => {
                            const orderA = a.homeOrder || 0;
                            const orderB = b.homeOrder || 0;
                            if (orderA !== orderB) return orderA - orderB;
                            const timeA = a.updatedAt ? (a.updatedAt.toMillis ? a.updatedAt.toMillis() : new Date(a.updatedAt).getTime()) : 0;

                    scrolling: false,

                };

                        if (Math.abs(mx - gs.startX) > 15 || Math.abs(my - gs.startY) > 15) {

                    try { cardEl.setPointerCapture(pointerId); } catch(err) {}

                    const rect = cardEl.getBoundingClientRect();
                    const clone = cardEl.cloneNode(true);
                    clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;z-index:9999;pointer-events:none;opacity:0.9;transform:scale(1.05) rotate(2deg);box-shadow:0 25px 60px rgba(0,0,0,0.5), 0 0 30px rgba(249, 115, 22, 0.3);transition:transform 0.15s ease, box-shadow 0.15s ease;border-radius:1.5rem;`;
                    document.body.appendChild(clone);
