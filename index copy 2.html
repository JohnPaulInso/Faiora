        // ==========================================================================
        // LABEL: ALARM-OVERLAY-SYSTEM — Samsung-inspired alarm dismissal

        const SamsungAlarmOverlay = ({ alarm, onDismiss }) => {
            const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const threshold = 140; 
            
            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (clientX === undefined) return;

                const dx = clientX - window.innerWidth / 2;
                const dy = clientY - (window.innerHeight * 0.75); // Moved interaction center lower
                setDragPos({ x: dx, y: dy });
            };

            const handlePointerUp = () => {
                const dist = Math.sqrt(dragPos.x ** 2 + dragPos.y ** 2);
                if (dist > threshold) {
                    onDismiss();
                } else {
                    setDragPos({ x: 0, y: 0 });
                }
                setIsDragging(false);
            };

            const dist = Math.sqrt(dragPos.x ** 2 + dragPos.y ** 2);
            const isTargetReached = dist > threshold;
            const currentFillScale = (Math.min(dist, threshold) / threshold) * 3.5;

            return (
                <div id="faiora_alarm_ringing_overlay" className="fixed inset-0 z-[2000] bg-black flex flex-col items-center justify-start overflow-hidden">
                    {/* Background Glow */}
                    <div className="absolute inset-x-0 top-0 h-[60vh] bg-gradient-to-b from-primary/15 to-transparent blur-[120px] pointer-events-none opacity-50" />
                    
                    {/* Ringing Info - Moved lower and text sized up */}

                        {/* overlay_time_display — Short Summary: Large high-contrast time readout */}

                            {alarm.time || '00:00'}
                        </h1>
                        
                        {/* overlay_alarm_label — Short Summary: The custom name given to the alarm */}
                        <h2 id="alarm_overlay_label" className="text-3xl font-display italic text-white/50 tracking-wide">{alarm.label || 'Alarm'}</h2>
                    </div>

                    {/* Samsung-Style Interaction Area - Repositioned for one-handed reach */}
                    <div className="absolute bottom-24 left-0 right-0 flex flex-col items-center z-20">
                        <div className="relative flex items-center justify-center h-72 w-full">
                            
                            {/* Outer Guidance Ring */}
                            <div 
                                className={`absolute rounded-full border-2 transition-all duration-500 ease-out ${isDragging ? 'border-primary/50 scale-110' : 'border-white/5 scale-100'}`}
                                style={{ width: threshold * 2.2, height: threshold * 2.2 }}
                            />

                            {/* Growing Expansion Circle */}
                            {isDragging && (
                                <div 
                                    className={`absolute rounded-full transition-shadow duration-100 ${isTargetReached ? 'bg-primary/80 shadow-[0_0_80px_rgba(249,115,22,1)]' : 'bg-primary/20'}`}
                                    style={{ 
                                        width: '80px', 
                                        height: '80px', 
                                        transform: `scale(${currentFillScale})`,
                                        opacity: 0.8
                                    }}
                                />
                            )}

                            {/* Animated Ripples */}
                            {!isDragging && (
                                <React.Fragment>
                                    <div className="alarm-ripple-ring !border-primary/20 !w-24 !h-24" style={{ animationDelay: '0s' }} />
                                    <div className="alarm-ripple-ring !border-primary/10 !w-24 !h-24" style={{ animationDelay: '0.8s' }} />
                                </React.Fragment>
                            )}

                            {/* Main Interaction Trigger (Circular X) */}
                            <div 
                                onPointerDown={() => setIsDragging(true)}
                                onPointerMove={handlePointerMove}
                                onPointerUp={handlePointerUp}
                                onPointerCancel={handlePointerUp}
                                className={`relative h-28 w-28 rounded-full flex items-center justify-center border-4 transition-all duration-300 z-30 ${isTargetReached ? 'border-white bg-primary scale-125' : (isDragging ? 'border-primary bg-primary/20' : 'border-white/10 bg-white/5')} backdrop-blur-xl cursor-grab active:cursor-grabbing touch-none`}
                            >
                                <span className={`material-symbols-outlined text-5xl transition-all duration-300 ${isTargetReached ? 'text-white' : 'text-primary'}`}>
                                    {isTargetReached ? 'check' : 'close'}
                                </span>
                            </div>
                            
                            {!isDragging && (
                                <div className="absolute -bottom-12 flex flex-col items-center gap-2 opacity-30">
                                    <span className="material-symbols-outlined text-sm animate-bounce">keyboard_double_arrow_up</span>
                                    <p className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Swipe to Stop</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

        // ==========================================================================
        // LABEL: APP-CORE — Main application component

        // ==========================================================================
        const App = () => {
            const [showPermissionModal, setShowPermissionModal] = useState(false);

            const [isTimerDone, setIsTimerDone] = useState(false);
            const [activeCollection, setActiveCollection] = useState(() => localStorage.getItem('faiora_active_collection') || 'tasks');
            const [isProbing, setIsProbing] = useState(true);

            const [isVideoReady, setIsVideoReady] = useState(false);
            const [isAuthChecked, setIsAuthChecked] = useState(false);

            const [isSyncHealthy, setIsSyncHealthy] = useState(true); // [NEW 2026-04-20] Network health status
            const [masterUidOverride, setMasterUidOverride] = useState(() => localStorage.getItem('faiora_uid_override') || '');
            const [lastDeepScan, setLastDeepScan] = useState(0);
            const [isCreatorOpen, setIsCreatorOpen] = useState(false);
            const [editingNote, setEditingNote] = useState(null);
            const [user, setUser] = useState(null);
            const [notes, setNotes] = useState([]);
            const [trashNotes, setTrashNotes] = useState([]);
            const [trashQuickTasks, setTrashQuickTasks] = useState([]);
            const [noteSections, setNoteSections] = useState(() => {
                try { return JSON.parse(localStorage.getItem('faiora_sections') || '[]'); } catch(e) { return []; }
            });
            const [quickTasks, setQuickTasks] = useState([]);
            const [alarms, setAlarms] = useState([]);
            const [quickTasksCollection, setQuickTasksCollection] = useState(() => localStorage.getItem('faiora_quick_tasks_collection') || localStorage.getItem('faiora_active_collection') || 'tasks');
            const [isQuickTaskModalOpen, setIsQuickTaskModalOpen] = useState(false);
            const [editingQuickTask, setEditingQuickTask] = useState(null);
            const [prefillDate, setPrefillDate] = useState(null);
            const [isOnline, setIsOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
            const [sharedNotes, setSharedNotes] = useState([]);
            const [publicNote, setPublicNote] = useState(null);
            const [profileData, setProfileData] = useState({});
            const [settingsData, setSettingsData] = useState({});
            const [gamification, setGamification] = useState({ currentStreak: 0, longestStreak: 0, lastLoginDate: null, rewards: [] });
            const [alarmOverlayPermission, setAlarmOverlayPermission] = useState(() => FaioraNotifications.hasAlarmOverlayPermission ? FaioraNotifications.hasAlarmOverlayPermission() : false);
            const migrationDoneRef = useRef(false);
            const isStreakCheckedRef = useRef(false);
            const alarmTimersRef = useRef(new Map());
            const activeCollectionRef = useRef(activeCollection);
            const trashNotesRef = useRef(trashNotes || []);
            const trashQuickTasksRef = useRef(trashQuickTasks || []);
            const notesRef = useRef(notes || []);
            const quickTasksRef = useRef(quickTasks || []);
            const alarmsRef = useRef(alarms || []); 
            const isProbingRef = useRef(isProbing);
            const coldBootNeedsUnifiedHydrationRef = useRef(true);
            const quickTasksCollectionRef = useRef(quickTasksCollection);
            const reminderMarksRef = useRef({});
            
            useEffect(() => { activeCollectionRef.current = activeCollection; }, [activeCollection]);
            useEffect(() => { trashNotesRef.current = trashNotes; }, [trashNotes]);
            useEffect(() => { trashQuickTasksRef.current = trashQuickTasks; }, [trashQuickTasks]);
            useEffect(() => { notesRef.current = notes; }, [notes]);
            useEffect(() => { quickTasksRef.current = quickTasks; }, [quickTasks]);
            useEffect(() => { alarmsRef.current = alarms; }, [alarms]);
            useEffect(() => { isProbingRef.current = isProbing; }, [isProbing]);
            useEffect(() => { quickTasksCollectionRef.current = quickTasksCollection; }, [quickTasksCollection]);
            useEffect(() => {
                if (!user?.uid) {
                    reminderMarksRef.current = {};
                    return;
                }
                try {
                    reminderMarksRef.current = JSON.parse(localStorage.getItem('faiora_reminder_marks_' + user.uid) || '{}');
                } catch (error) {
                    reminderMarksRef.current = {};
                }
            }, [user?.uid]);
            useEffect(() => {
                isStreakCheckedRef.current = false;
            }, [user?.uid]);

            const showToast = useCallback((message) => {
                if (!message) return;
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev.slice(-1), { id, message }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            }, []);
            const refreshAlarmOverlayPermission = useCallback(() => {
                if (!FaioraNotifications.hasAlarmOverlayPermission) return false;
                const granted = !!FaioraNotifications.hasAlarmOverlayPermission();
                setAlarmOverlayPermission(granted);
                return granted;
            }, []);
            const requestAlarmOverlayPermission = useCallback(() => {
                if (!FaioraNotifications.requestAlarmOverlayPermission) return;
                FaioraNotifications.requestAlarmOverlayPermission();
            }, []);
            const applyNativeAlarmEvents = useCallback((events = []) => {
                if (!Array.isArray(events) || !events.length) return;
                const eventMap = new Map();
                events.forEach(event => {
                    if (!event?.alarmId) return;
                    eventMap.set(String(event.alarmId), event);
                });
                if (!eventMap.size) return;
                const nextAlarms = (alarmsRef.current || []).map(alarm => {
                    const event = eventMap.get(String(alarm.id));
                    if (!event) return alarm;
                    const updatedAt = event.triggeredAt || Date.now();
                    if (event.type === 'triggered' && !event.repeatDaily) {
                        return { ...alarm, enabled: false, lastTriggeredAt: updatedAt, updatedAt };
                    }
                    if (event.type === 'triggered') {
                        return { ...alarm, lastTriggeredAt: updatedAt, updatedAt };
                    }
                    return alarm;
                });
                if (JSON.stringify(nextAlarms) !== JSON.stringify(alarmsRef.current || [])) {
                    setAlarms(nextAlarms);
                    alarmsRef.current = nextAlarms;
                    const currentUser = auth.currentUser;
                    if (currentUser) {
                        localStorage.setItem('faiora_alarms_' + currentUser.uid, JSON.stringify(nextAlarms));
                        const alarmCollection = quickTasksCollectionRef.current || activeCollectionRef.current;
                        if (!isProbingRef.current && alarmCollection) {
                            db.collection(alarmCollection).doc(currentUser.uid).set({ alarms: nextAlarms }, { merge: true }).catch(() => {});
                        }
                    }
                    rescheduleAlarms(nextAlarms);
                }
            }, [rescheduleAlarms]);

            useEffect(() => {
                return FaioraNotifications.subscribeInApp((alert) => {
                    if (!alert) return;
                    const normalized = {
                        id: alert.id || (Date.now() + Math.random()),
                        title: alert.title || 'Faiora Alert',
                        body: alert.body || '',
                        type: alert.type || 'generic',
                        tag: alert.tag || '',
                        taskId: alert.taskId || '',
                        alarmId: alert.alarmId || '',
                        time: alert.time || '',
                        label: alert.label || ''
                    };
                    if (normalized.type === 'alarm') {
                        setActiveAlarmAlert(prev => prev && prev.alarmId === normalized.alarmId ? prev : normalized);
                    }
                });
            }, []);

            const handleSnoozeAlarm = useCallback((alarmId) => {
                const alarm = (alarmsRef.current || []).find(a => a.id === alarmId);
                if (!alarm) return;
                
                const snoozeTime = 5; // minutes
                const target = new Date(Date.now() + snoozeTime * 60000);
                
                // Temporary snooze alarm payload
                const snoozePayload = {
                    ...alarm,
                    id: alarm.id + '_snooze',
                    isSnoozeEntry: true,
                    time: target.getHours().toString().padStart(2, '0') + ':' + target.getMinutes().toString().padStart(2, '0')
                };

                // Trigger in-app alert after 5 mins
                const tid = setTimeout(() => {
                    FaioraNotifications.emitInAppAlert({
                        type: 'alarm',
                        alarmId: alarm.id,
                        isSnoozedCycle: true, // Marker for 'Missed' logic on next timeout
                        label: alarm.label || 'Alarm',
                        time: snoozePayload.time,
                        title: 'Alarm Ringing (Snoozed)',
                        body: `Snooze finished: ${alarm.label || 'Alarm'}`
                    });
                }, snoozeTime * 60000);

                alarmTimersRef.current.set(alarm.id + '_snooze', [tid]);
                showToast("Snoozed for 5 minutes");
            }, [showToast]);

            const handleMissedAlarm = useCallback((alarmId) => {
                const alarm = (alarmsRef.current || []).find(a => a.id === alarmId);
                const nextAlarms = (alarmsRef.current || []).map(a => 
                    a.id === alarmId ? { ...a, status: 'missed', updatedAt: Date.now() } : a
                );
                setAlarms(nextAlarms);
                showToast(`Missed alarm: ${alarm?.label || 'Alarm'}`);
                
                if (auth.currentUser) {
                    const coll = quickTasksCollectionRef.current || activeCollectionRef.current;
                    db.collection(coll).doc(auth.currentUser.uid).set({ alarms: nextAlarms }, { merge: true }).catch(() => {});
                }
            }, [showToast]);

            const dismissAlarmAlert = useCallback((alarmId = '') => {
                setActiveAlarmAlert(current => {
                    if (!current) return null;
                    if (alarmId && current.alarmId !== alarmId) return current;
                    return null;
                });
                // FIX 2026-04-22: Resolved ReferenceError by calling stopAlarmSFX via the FaioraNotifications engine
                if (FaioraNotifications.stopAlarmSFX) {
                    FaioraNotifications.stopAlarmSFX();
                }
                if (navigator.vibrate) {
                    try { navigator.vibrate(0); } catch (error) {}
                }
                FaioraNotifications.removeDeliveredAlarmNotifications(alarmId);
            }, []);

            useEffect(() => {
                 if (!activeAlarmAlert) {
                     // FIX 2026-04-22: Restore system bars when alarm is dismissed
                     if (window.Capacitor?.Plugins?.StatusBar) {
                         try { window.Capacitor.Plugins.StatusBar.show(); } catch(e) {}
                     }
                     return;
                 }

                 // FIX 2026-04-22: Hide StatusBar to overlap navigation/notification bars (Immersive Mode)
                 if (window.Capacitor?.Plugins?.StatusBar) {
                     try { window.Capacitor.Plugins.StatusBar.hide(); } catch(e) {}
                 }

                 FaioraNotifications.playAlarmSFX();
                
                // --- AUTO-SNOOZE & MISSED LOGIC ---
                // FIX 2026-04-22: 30s timeout for auto-snooze. If it rings again and timeout occurs, mark as MISSED.
                const AUTO_TIMEOUT = 30000; 
                const timeoutTimer = setTimeout(() => {
                    const isAlreadySnoozed = activeAlarmAlert.isSnoozedCycle || false;
                    
                    if (isAlreadySnoozed) {
                        // Mark as missed
                        console.log("⏰ [ALARM] Auto-timeout reached on snooze cycle. Marking as MISSED.");
                        handleMissedAlarm(activeAlarmAlert.alarmId);
                    } else {
                        // Auto snooze for 5 minutes

                        handleSnoozeAlarm(activeAlarmAlert.alarmId);
                    }
                    dismissAlarmAlert(activeAlarmAlert.alarmId);
                }, AUTO_TIMEOUT);

                if (navigator.vibrate) {
                    try { navigator.vibrate([500, 180, 500, 180, 800]); } catch (error) {}
                }
                const vibrateTimer = setInterval(() => {
                    if (navigator.vibrate) {
                        try { navigator.vibrate([500, 180, 500, 180, 800]); } catch (error) {}

                return () => {
                    clearTimeout(timeoutTimer);
                    clearInterval(vibrateTimer);
                    if (navigator.vibrate) {
                        try { navigator.vibrate(0); } catch (error) {}
                    }
                };
            }, [activeAlarmAlert, dismissAlarmAlert, handleSnoozeAlarm, handleMissedAlarm]);
            const persistReminderMarks = useCallback((nextMarks) => {

                // The 'Deep Search' intensive sweep was over-triggering during boot, causing
                // network congestion and the '1-2 minute' loading stall.
                // We now wait until the primary discovery (isProbing) has fully settled.
                if (isProbing || !isFirstSyncDone || !user) return;
                
                const notesEmpty = notes.length === 0;
                const tasksExist = quickTasks.length > 0;
                const canRetry = Date.now() - lastDeepScan > 60000; // Only once per minute
                
                if (notesEmpty && tasksExist && canRetry) {
                    setLastDeepScan(Date.now());
                    console.log("🕵️ [DEEP SEARCH] Notes verified missing. Triggering recovery fallback...");
                    if (window.faiora_deep_scan) {
                        window.faiora_deep_scan();
                        if (showToast) showToast("Still finding your notes... performing a deeper scan.");
                    }
                }
            }, [isFirstSyncDone, isProbing, notes.length, quickTasks.length, user]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setIsTimerDone(true);
                }, 1000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const enforceSpeed = () => {
                    if (videoRef.current) {
                        videoRef.current.playbackRate = 1.5;
                    }
                };
                enforceSpeed();
                // Add listeners to reset if changed by context/extensions
                if (videoRef.current) {
                    videoRef.current.addEventListener('ratechange', enforceSpeed);
                    videoRef.current.addEventListener('playing', enforceSpeed);
                }
                return () => {
                    if (videoRef.current) {
                        videoRef.current.removeEventListener('ratechange', enforceSpeed);
                        videoRef.current.removeEventListener('playing', enforceSpeed);
                    }
                };
            }, [user, isTimerDone, isAuthChecked]);

            const handleLoadingComplete = useCallback(() => {
                setIsTimerDone(true);
            }, []);

            // FIX 2026-04-17: Optimized Readiness Check. Show app if:
            // 1. Auth checked AND (no user OR sync done)
            // 2. OR if we have cached notes in LocalStorage, show app immediately while sync runs in background [OPTIMISTIC REVEAL]
            useEffect(() => { 
                if (!isAuthChecked) return;

                const hasLocalData = () => {
                    if (!user) return false;
                    const lsNotes = localStorage.getItem('faiora_notes_' + user.uid);
                    return lsNotes && lsNotes !== '[]' && lsNotes !== 'null';
                };

                const shouldReveal = !user || (!isProbing && isFirstSyncDone) || hasLocalData();
                
                if (shouldReveal) {
                    window.dispatchEvent(new CustomEvent('faiora-app-ready'));
                }
            }, [isAuthChecked, user, isProbing, isFirstSyncDone]);
           

            // Redirection logic for tokens...
            const hash = window.location.hash;
            if (hash.startsWith('#/share/')) {
                const token = hash.replace('#/share/', '');
                window.location.href = `share_note.html#/${token}`;
                return null; // Simplified from LoadingPage
            }

            // FIX 2026-04-15: Wait for auth check to finish before showing LoginModal
            // This prevents the Google login prompt from flashing when the user is already logged in.
            if (!isAuthChecked) {
                return null;
            }

            if (!user) {
                return <LoginModal />;
            }

            // ==========================================================================
            // LABEL: APP-RENDER — Main JSX Structure and Routing
            // ==========================================================================
            return (
                <HashRouter>
                    <FaioraErrorBoundary>
                    <NotificationBanner user={user} />
                    <video 
                        ref={videoRef}
                        className={`fire-bg-video ${isVideoReady ? 'is-ready' : ''}`}
                        autoPlay 
                        loop 
                        muted 
                        playsInline
                        onPlaying={() => setIsVideoReady(true)}
                        onError={() => setIsVideoReady(false)}
                        src="fire_bg_video.mp4"
                    />
                    <div className={isTransitioning ? 'page-transitioning' : ''}>
                        <TransitionManager 
                            onTransitionStart={() => setIsTransitioning(true)}
                            onTransitionEnd={() => setIsTransitioning(false)}
                        >
                        <Route path="/" element={<DashboardPage user={user} notes={notes} quickTasks={quickTasks} alarms={alarms} onOpenCreator={handleOpenCreator} onEditNote={handleRequestEditNote} onReorderPriorityNote={handleReorderPriorityNote} onToggleQuickTask={handleToggleQuickTask} onAddQuickTaskClick={() => { handleOpenQuickTaskModal(); }} onDeleteQuickTask={handleDeleteQuickTask} onUpdateQuickTask={handleUpdateQuickTask} onEditQuickTask={handleOpenQuickTaskEditor} editingQuickTask={editingQuickTask} setEditingQuickTask={setEditingQuickTask} isQuickTaskModalOpen={isQuickTaskModalOpen} setIsQuickTaskModalOpen={setIsQuickTaskModalOpen} onRemoveReminder={handleRemoveReminder} isProbing={isProbing} isFirstSyncDone={isFirstSyncDone} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} setIsPomodoroActive={setIsPomodoroActive} />} />
                        <Route path="/notes" element={<NotesPage user={user} notes={notes} onOpenCreator={handleOpenCreator} onEditNote={handleRequestEditNote} noteSections={noteSections} onAddSection={handleAddSection} onDeleteSection={handleDeleteSection} onMoveNote={handleMoveNoteToSection} onReorderNote={handleReorderNote} onRemoveReminder={handleRemoveReminder} onBulkUpdate={handleBulkUpdate} onBulkDelete={handleBulkDelete} isProbing={isProbing} isFirstSyncDone={isFirstSyncDone} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/quick-tasks" element={<QuickTasksPage user={user} quickTasks={quickTasks} onOpenCreator={handleOpenCreator} onToggleQuickTask={handleToggleQuickTask} onAddQuickTaskClick={() => { handleOpenQuickTaskModal(); }} onDeleteQuickTask={handleDeleteQuickTask} onEditQuickTask={handleOpenQuickTaskEditor} isProbing={isProbing} isFirstSyncDone={isFirstSyncDone} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/calendar" element={
                            <CalendarPage 
                                user={user} 
                                notes={notes} 
                                quickTasks={quickTasks}
                                onOpenCreator={handleOpenCreator} 
                                onEditNote={handleRequestEditNote} 
                                onToggleQuickTask={handleToggleQuickTask}
                                 onEditQuickTask={handleOpenQuickTaskEditor}
                                 onAddQuickTask={handleOpenQuickTaskModal}
                                pomodoroTime={pomodoroTime}
                                isPomodoroActive={isPomodoroActive}
                            />
                        } />
                        <Route path="/stats" element={<StatsPage user={user} onOpenCreator={handleOpenCreator} quickTasks={quickTasks} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/streak" element={<StreakPage user={user} onOpenCreator={handleOpenCreator} gamification={gamification} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        <Route path="/alarms" element={<ClockPage user={user} onOpenCreator={handleOpenCreator} alarms={alarms} onAddAlarm={handleAddAlarm} onToggleAlarm={handleToggleAlarm} onDeleteAlarm={handleDeleteAlarm} pomodoroTime={pomodoroTime} setPomodoroTime={setPomodoroTime} isPomodoroActive={isPomodoroActive} setIsPomodoroActive={setIsPomodoroActive} pomodoroSessions={pomodoroSessions} alarmOverlayPermission={alarmOverlayPermission} onRequestAlarmOverlayPermission={requestAlarmOverlayPermission} onRefreshAlarmOverlayPermission={refreshAlarmOverlayPermission} hasNativeAlarmBridge={FaioraNotifications.hasNativeAlarmBridge ? FaioraNotifications.hasNativeAlarmBridge() : false} alarmsOnly={true} />} />
                        <Route path="/clock" element={<Navigate to="/alarms" replace />} />
                        <Route path="/profile" element={<EnhancedProfilePage user={user} onOpenCreator={handleOpenCreator} profileData={profileData} onSaveProfile={handleSaveProfile} quickTasks={quickTasks} gamification={gamification} pomodoroTime={pomodoroTime} setPomodoroTime={setPomodoroTime} isPomodoroActive={isPomodoroActive} setIsPomodoroActive={setIsPomodoroActive} pomodoroSessions={pomodoroSessions} activeCollection={activeCollection} cloudFieldsCount={cloudFieldsCount} showToast={showToast} isSyncHealthy={isSyncHealthy} />} />
                        <Route path="/settings" element={<SettingsPage user={user} onOpenCreator={handleOpenCreator} settingsData={settingsData} onSaveSettings={handleSaveSettings} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} showToast={showToast} />} />
                        <Route path="/trash" element={<TrashPage user={user} onOpenCreator={handleOpenCreator} trashNotes={trashNotes} trashQuickTasks={trashQuickTasks} onRestoreNote={handleRestoreNote} onRestoreQuickTask={handleRestoreQuickTask} onPermanentDelete={handlePermanentDelete} onPermanentDeleteQuickTask={handlePermanentDeleteQuickTask} onEmptyTrash={handleEmptyTrash} onEmptyQuickTaskTrash={handleEmptyQuickTaskTrash} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive} />} />
                        </TransitionManager>
                    </div>
                     {isCreatorOpen && <TaskCreator onClose={handleCloseCreator} user={user} editingNote={editingNote} activeCollection={activeCollection} onUpdateNote={handleUpdateNoteLocal} onDeleteNote={handleDeleteNoteLocal} onSaveVersion={handleSaveVersion} showToast={showToast} notes={notes} onToggleLock={handleRemoveLock} onOpenLockSet={handleOpenSetLock} />}
                     {isSetLockModalOpen && <SetLockModal onClose={handleCloseSetLock} showToast={showToast} onSet={handleSetLock} />}
                     {unlockingNote && (
                         <UnlockModal 
                            hint={unlockingNote.pinHint} 
                            showToast={showToast}
                            onClose={handleCloseUnlockModal}
                            onUnlock={async (p) => {
                                const hash = await hashPIN(p);
                                if (hash === unlockingNote.pinHash) {
                                    const note = unlockingNote;
                                    setTimeout(() => handleEditNote(note), 220);
                                    return true;
                                }
                                return false;
                            }}
                         />
                     )}
                    {isQuickTaskModalOpen && (
                        <QuickTaskModal 
                            prefillDate={prefillDate}
                            onClose={handleCloseQuickTaskModal} 
                            onAdd={handleAddQuickTask} 
                            showToast={showToast} 
                        />
                    )}
                    {editingQuickTask && (
                        <QuickTaskModal 
                            initialData={editingQuickTask}
                            onClose={handleCloseQuickTaskEditor}
                            showToast={showToast}
                            onAdd={(text, date, time) => {
                                handleUpdateQuickTask(editingQuickTask.id, text, date, time);
                            }}
                        />
                    )}
                    {/* LABEL: OVERLAY-ALARM-PORTAL — Custom Samsung-style ringing interface */}
                    {activeAlarmAlert && typeof document !== 'undefined' && ReactDOM.createPortal(
                        <SamsungAlarmOverlay 
                            alarm={activeAlarmAlert} 
                            onDismiss={() => dismissAlarmAlert(activeAlarmAlert.alarmId)} 
                        />,
                        document.body
                    )}

                    {/* LABEL: PERMISSION-MODAL-PORTAL — Prompt for overlay permissions */}
                    {showPermissionModal && typeof document !== 'undefined' && ReactDOM.createPortal(
                        <PermissionModal 
                            onGrant={() => {
                                requestAlarmOverlayPermission();
                                setShowPermissionModal(false);
                            }}
                            onSkip={() => {
                                localStorage.setItem('faiora_overlay_prompt_skipped', 'true');
                                setShowPermissionModal(false);
                            }}
                        />,
                        document.body
                    )}
                    {typeof document !== 'undefined' && ReactDOM.createPortal(
                        <div className="toast-container">
                            {toasts.slice(-2).map(toast => (
                                <div key={toast.id} className="toast-pill">
                                    <span className="material-symbols-outlined text-primary text-xl">check_circle</span>
                                    {toast.message}
                                </div>
                            ))}
                        </div>,
                        document.body
                    )}

                    {/* Task Snackbars */}
                    <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[20000] flex flex-col-reverse gap-3 pointer-events-none w-full max-w-sm px-4">
                        <style>{`
                            .task-snackbar {
                                background: rgba(15, 23, 42, 0.9);
                                backdrop-filter: blur(12px);
                                border: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 1.25rem;
                                padding: 0.85rem 1.25rem;
                                display: flex;
                                align-items: center;
                                justify-content: space-between;
                                color: #f8fafc;
                                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
                                pointer-events: auto;
                                animation: snackbar-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                            }
                            @keyframes snackbar-in {
                                from { opacity: 0; transform: translateY(20px) scale(0.9); }
                                to { opacity: 1; transform: translateY(0) scale(1); }
                            }
                            @keyframes alarm-ripple {
                                0% { transform: scale(1); opacity: 0.5; }
                                100% { transform: scale(2.2); opacity: 0; }
                            }
                            @keyframes slide-up {
                                from { transform: translateY(100%); opacity: 0; }
                                to { transform: translateY(0); opacity: 1; }
                            }
                            .alarm-ripple-ring {
                                position: absolute;
                                inset: -20px;
                                border: 2px solid rgba(249, 115, 22, 0.4);
                                border-radius: 9999px;
                                animation: alarm-ripple 2s infinite;
                            }
                            .samsung-swipe-track {
                                position: relative;
                                width: 280px;
                                height: 80px;
                                background: rgba(255, 255, 255, 0.05);
                                border: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 9999px;
                                margin: 40px auto 0;
                                overflow: hidden;
                                display: flex;
                                items-center: center;
                                padding: 6px;
                            }
                            .permission-sheet-overlay {
                                position: fixed;
                                inset: 0;
                                z-index: 2000;
                                background: rgba(0, 0, 0, 0.6);
                                backdrop-blur: 4px;
                                animation: fadeIn 0.3s ease-out;
                            }
                            .permission-sheet {
                                position: fixed;
                                left: 0;
                                right: 0;
                                bottom: 0;
                                z-index: 2001;
                                background: #0c0a09;
                                border-top: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 32px 32px 0 0;
                                padding: 24px 20px 24px;
                                animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                                box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
                            }
                        `}</style>
                        {taskSnackbars.slice(-1).map(snack => (
                            <div key={snack.id} className="task-snackbar group">
                                <div className="flex items-center gap-3">
                                    <span className="material-symbols-outlined text-primary text-xl">
                                        {snack.message.includes('deleted') ? 'delete' : 'check_circle'}
                                    </span>
                                    <span className="text-sm font-medium">{snack.message}</span>
                                </div>
                                <button 
                                    onClick={() => {
                                        snack.onUndo();
                                        setTaskSnackbars(prev => prev.filter(s => s.id !== snack.id));
                                    }}
                                    className="text-primary text-xs font-bold uppercase tracking-wider px-3 py-1.5 hover:bg-primary/10 rounded-lg transition-colors"
                                >
                                    Undo
                                </button>
                            </div>
                        ))}
                    </div>
                    </FaioraErrorBoundary>
                </HashRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
