        // ==========================================================================
        // LABEL: PAGE-CALENDAR
        // Path: /calendar
        // Includes: Monthly View, Detailed Day View
        // ==========================================================================
        const CalendarPage = ({ user, notes, quickTasks = [], onOpenCreator, onEditNote, onToggleQuickTask, onEditQuickTask, onAddQuickTask, pomodoroTime, isPomodoroActive }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [taskSearchQuery, setTaskSearchQuery] = useState('');
            const quickTaskMatchesRef = useRef(null);
            const today = new Date();

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = currentDate.toLocaleString('en-US', { month: 'long' });
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();

            const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
            const goToday = () => { setCurrentDate(new Date()); setSelectedDate(new Date()); };

            const isToday = (d) => d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
            const isSelected = (d) => d === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear();

            // Build reminder lookup: date string -> items array (notes + quick tasks)
            const remindersByDate = useMemo(() => {
                const map = {};
                // Note Reminders
                (notes || []).forEach(note => {
                    if (!note.reminderDate) return;
                    const d = parseDateString(note.reminderDate);
                    if (d) {
                        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
                        if (!map[key]) map[key] = [];
                        map[key].push({ ...note, type: 'note' });
                    }
                });
                // Quick Tasks
                (quickTasks || []).forEach(task => {
                    if (!task.dueDate) return;
                    const d = parseDateString(task.dueDate);
                    if (d) {
                        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
                        if (!map[key]) map[key] = [];
                        map[key].push({ ...task, type: 'quickTask' });
                    }
                });
                return map;
            }, [notes, quickTasks]);

            const getRemindersForDay = (day) => {
                const key = `${year}-${month}-${day}`;
                return remindersByDate[key] || [];
            };

            const selectedDayLabel = selectedDate.toLocaleString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            const dayReminders = getRemindersForDay(selectedDate.getDate());

            // Upcoming reminders (from today onwards)
            const upcomingReminders = useMemo(() => {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const allItems = [
                    ...(notes || []).filter(n => n.reminderDate).map(n => ({ ...n, type: 'note', sortDate: parseDateString(n.reminderDate) })),
                    ...(quickTasks || []).filter(t => t.dueDate).map(t => ({ ...t, type: 'quickTask', sortDate: parseDateString(t.dueDate) }))
                ];
                return allItems
                    .filter(item => item.sortDate >= now)
                    .sort((a, b) => a.sortDate - b.sortDate)
                    .slice(0, 8);
            }, [notes, quickTasks]);

            const normalizedTaskSearch = taskSearchQuery.trim().toLowerCase();
            const quickTaskSearchResults = useMemo(() => {
                if (!normalizedTaskSearch) return [];

                const todayIso = formatDateLocal();
                const tomorrowDate = new Date();
                tomorrowDate.setDate(tomorrowDate.getDate() + 1);
                const tomorrowIso = formatDateLocal(tomorrowDate);
                const getTaskSortTime = (task) => {
                    if (!task?.dueDate) return Number.MAX_SAFE_INTEGER;
                    const parsed = new Date(`${task.dueDate}T${task.dueTime || '23:59'}`).getTime();
                    return Number.isNaN(parsed) ? Number.MAX_SAFE_INTEGER : parsed;
                };

                return (quickTasks || [])
                    .filter(task => {
                        if (!task?.dueDate) return false;
                        const dueDateObj = parseDateString(task.dueDate);
                        const dueLabels = [
                            task.dueDate,
                            formatReminderDate(task.dueDate),
                            formatDateMinimal(task.dueDate)
                        ];
                        if (dueDateObj && !Number.isNaN(dueDateObj.getTime())) {
                            dueLabels.push(dueDateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }));
                            dueLabels.push(dueDateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }));
                        }
                        if (task.dueDate === todayIso) dueLabels.push('today');
                        if (task.dueDate === tomorrowIso) dueLabels.push('tomorrow');

                        const haystack = [
                            formatTaskText(task.text),
                            dueLabels.join(' ')
                        ].join(' ').toLowerCase();
                        return haystack.includes(normalizedTaskSearch);
                    })
                    .sort((a, b) => getTaskSortTime(a) - getTaskSortTime(b))
                    .slice(0, 12);
            }, [normalizedTaskSearch, quickTasks]);

            const jumpToQuickTaskDate = useCallback((task) => {
                if (!task?.dueDate) return;
                const nextDate = parseDateString(task.dueDate);
                if (!nextDate || Number.isNaN(nextDate.getTime())) return;
                setCurrentDate(new Date(nextDate.getFullYear(), nextDate.getMonth(), 1));
                setSelectedDate(new Date(nextDate.getFullYear(), nextDate.getMonth(), nextDate.getDate()));
                setTaskSearchQuery('');
            }, []);
            const handleQuickTaskSearchSubmit = useCallback((query) => {
                const trimmed = String(query || '').trim();
                if (!trimmed) return;
                if (quickTaskSearchResults.length > 0) {
                    jumpToQuickTaskDate(quickTaskSearchResults[0]);
                }
            }, [jumpToQuickTaskDate, quickTaskSearchResults]);

            useEffect(() => {
                if (!normalizedTaskSearch || !quickTaskMatchesRef.current) return;
                const timer = setTimeout(() => {
                    quickTaskMatchesRef.current?.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }, 120);
                return () => clearTimeout(timer);
            }, [normalizedTaskSearch, quickTaskSearchResults.length]);

            const cells = [];
            for (let i = firstDay - 1; i >= 0; i--) {
                cells.push({ day: prevMonthDays - i, current: false });
            }
            /* 2026-04-15: Restored corrupted calendar grid population logic */
            for (let d = 1; d <= daysInMonth; d++) {
                cells.push({ day: d, current: true });
            }
            const remaining = 7 - (cells.length % 7);
            if (remaining < 7) {
                for (let i = 1; i <= remaining; i++) {
                    cells.push({ day: i, current: false });
                }
            }

            return (
                /* 2026-04-15: Ensured FAB is enabled for CalendarPage */
                <Layout 
                    onFabClick={() => onAddQuickTask && onAddQuickTask(formatDateLocal(selectedDate))} 
                    noPadding={true} 
                    pomodoroTime={pomodoroTime} 
                    isPomodoroActive={isPomodoroActive}
                >
                    <div className="flex-1 flex flex-col md:flex-row md:h-full md:overflow-hidden">
                        <div className="flex-1 md:overflow-y-auto no-scrollbar px-0 md:px-10 pt-0 pb-8">
                            <div className="sticky top-0 z-[100] py-4 px-4 md:px-12 -mx-4 md:-mx-10 mb-2">
                                <Header
                                    user={user}
                                    searchValue={taskSearchQuery}
                                    onSearchChange={setTaskSearchQuery}
                                    onSearchSubmit={handleQuickTaskSearchSubmit}
                                    searchPlaceholder="Search quick task"
                                />
                            </div>
                            <div className="px-4 md:px-0 mx-2 mt-24 md:mt-10">
                                <div className="flex items-center justify-between mb-8 md:mb-12">
                                    <div className="flex items-center justify-between w-full">
                                        <button onClick={prevMonth} className="w-10 h-10 glass-panel rounded-full text-cream-light/60 hover:text-primary transition-all flex items-center justify-center border border-white/5 hover:border-primary/20"><span className="material-symbols-outlined text-lg">chevron_left</span></button>
                                        
                                        {/* FIX 2026-04-22: Month title is now perfectly centered between arrows as requested */}
                                        <div className="flex-1 text-center">
                                            <h2 className="text-xl md:text-3xl font-display font-bold text-cream-light tracking-[0.10em] md:tracking-[0.20em] uppercase">{monthName} {year}</h2>
                                        </div>

                                        <button onClick={nextMonth} className="w-10 h-10 glass-panel rounded-full text-cream-light/60 hover:text-primary transition-all flex items-center justify-center border border-white/5 hover:border-primary/20"><span className="material-symbols-outlined text-lg">chevron_right</span></button>
                                    </div>
                                </div>
                            <div className="glass-panel rounded-xl md:rounded-2xl overflow-hidden border-white/5 shadow-2xl">
                                <div className="grid grid-cols-7 bg-white/5 text-center border-b border-white/5 py-2.5">
                                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                                        <div key={day} className="text-[9px] font-bold text-primary/60 uppercase tracking-widest">{day}</div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-7">
                                    {cells.map((cell, i) => {
                                        const reminders = cell.current ? getRemindersForDay(cell.day) : [];
                                        const todayMatch = cell.current && isToday(cell.day);
                                        const selectedMatch = cell.current && isSelected(cell.day);
                                        return (
                                            <div 
                                                key={i} 
                                                onClick={() => cell.current && setSelectedDate(new Date(year, month, cell.day))}
                                                className={`border-r border-b border-white/5 p-2 min-h-[100px] md:min-h-[110px] relative transition-colors cursor-pointer ${cell.current ? 'hover:bg-white/5' : 'opacity-25'} ${todayMatch ? 'bg-primary/10' : ''} ${selectedMatch && !todayMatch ? 'bg-white/5' : ''}`}
                                            >
                                                <span className={`text-xs font-sans ${todayMatch ? 'font-bold text-primary' : ''} ${selectedMatch && !todayMatch ? 'font-semibold text-cream-light' : ''}`}>{cell.day}</span>
                                                {todayMatch && <div className="absolute top-2.5 right-2.5 w-1.5 h-1.5 rounded-full bg-primary glow-orange"></div>}
                                                {reminders.length > 0 && (
                                                    <div className="flex flex-col mt-2">
                                                        {reminders.slice(0, 3).map((r, ri) => (
                                                            <div key={ri} className={`w-full line-clamp-2 overflow-hidden text-[8px] md:text-[9px] leading-tight font-bold rounded-md px-1 py-0.5 flex items-center gap-1 ${r.type === 'quickTask' ? 'bg-white/10 text-cream-light/80' : 'bg-primary/15 text-primary/90'} border border-white/5`}>
                                                                <span className="text-white/30"></span>
                                                                {r.type === 'quickTask' ? formatTaskText(r.text) : (r.title || 'Note')}
                                                            </div>
                                                        ))}
                                {reminders.length > 3 && <span className="text-[7px] md:text-[8px] font-bold text-primary/45 ml-0.5">+{reminders.length - 3} more</span>}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                </div>
                            </div>
                        </div>
                        <aside className="w-full md:w-96 border-t md:border-t-0 md:border-l border-white/5 bg-black/20 backdrop-blur-md p-6 overflow-y-auto no-scrollbar flex-shrink-0 md:rounded-none rounded-[2.5rem] mt-6 md:mt-0">
                            <div ref={quickTaskMatchesRef} className="mb-6 glass-panel rounded-[2rem] p-4 border border-white/5">
                                <div className="flex items-center gap-3 mb-3">
                                    <span className="material-symbols-outlined text-primary">search</span>
                                    <div>
                                        <h3 className="text-[11px] font-bold text-cream-light/60 uppercase tracking-[0.24em]">
                                            {normalizedTaskSearch ? 'Matches' : 'Task Search'}
                                        </h3>
                                        <p className="text-[9px] text-white/20 font-bold uppercase tracking-[0.16em] mt-1">
                                            {normalizedTaskSearch ? 'Select a result to jump' : 'Search tasks from the header'}
                                        </p>
                                    </div>
                                </div>
                                {normalizedTaskSearch ? (
                                    <div className="space-y-2">
                                        {quickTaskSearchResults.length > 0 ? (
                                            quickTaskSearchResults.map(task => (
                                                <button
                                                    key={task.id}
                                                    type="button"
                                                    onClick={() => jumpToQuickTaskDate(task)}
                                                    className="w-full text-left rounded-2xl border border-white/5 bg-white/5 px-4 py-3 hover:bg-white/10 hover:border-primary/20 transition-all"
                                                >
                                                    <p className="text-sm font-bold text-cream-light/90 line-clamp-2">{formatTaskText(task.text)}</p>
                                                    <p className="text-[10px] font-bold text-primary/70 uppercase tracking-[0.18em] mt-2">
                                                        {task.dueTime ? `${formatDateMinimal(task.dueDate)} @ ${task.dueTime}` : formatReminderDate(task.dueDate)}
                                                    </p>
                                                </button>
                                            ))
                                        ) : (
                                            <div className="rounded-2xl border border-white/5 bg-white/5 px-4 py-4 text-xs text-white/35">
                                                No quick tasks matched that search. Try a task word, `today`, `tomorrow`, or a date like `Apr 24`.
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="rounded-2xl border border-dashed border-white/10 bg-white/[0.03] px-4 py-4 text-xs text-white/35 leading-relaxed">
                                        Search from the header with a task word or date. Press Enter to jump to the first match.
                                    </div>
                                )}
                            </div>
                            <div className="mb-6">
                                <div className="flex items-center gap-3 mb-1.5 justify-between">
                                    <h3 className="text-xl font-display font-bold text-cream-light">Daily Agenda</h3>
                                    <button 
                                        onClick={() => onAddQuickTask && onAddQuickTask(formatDateLocal(selectedDate))}
                                        className="w-10 h-10 rounded-full bg-primary/20 text-primary flex items-center justify-center hover:bg-primary hover:text-white transition-all shadow-lg active:scale-95"
                                        title="Add Task for this day"
                                    >
                                        <span className="material-symbols-outlined text-xl">add</span>
                                    </button>
                                </div>
                                <div className="h-px w-full bg-gradient-to-r from-primary/30 to-transparent mb-4"></div>
                                <p className="text-cream-light/40 text-[10px] font-sans uppercase tracking-[0.2em] font-bold">{selectedDayLabel}</p>
                            </div>
                            {dayReminders.length > 0 ? (
                                <div className="space-y-3 mb-8">
                                    {dayReminders.map((item, idx) => {
                                        if (item.type === 'note') {
                                            return (
                                                <div key={idx} onClick={() => onEditNote && onEditNote(item)} className="card-glow bg-orange-100/95 rounded-[2rem] p-5 border-b-4 border-orange-300/50 cursor-pointer hover:scale-[1.02] transition-transform relative overflow-hidden">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <h4 className="text-base font-bold text-orange-950/90 leading-tight truncate flex-1">{item.title || 'Untitled'}</h4>
                                                        {item.isLocked && <span className="material-symbols-outlined text-orange-950/40 text-sm">lock</span>}
                                                    </div>
                                                    <p className="text-xs text-orange-900/60 mt-1.5 font-sans font-medium capitalize">{formatReminderDate(item.reminderDate)}{item.labels && item.labels[0] ? ` • ${item.labels[0]}` : ''}</p>
                                                </div>
                                            );
                                        } else {
                                            /* REMOVED: formatTime 2026-04-20 - Now uses global utility */
                                            return (
                                                <div key={idx} onClick={() => onEditQuickTask && onEditQuickTask(item)} className={`glass-panel rounded-[2rem] p-5 border-l-4 ${item.completed ? 'border-l-green-500/50 opacity-60' : 'border-l-primary shadow-lg shadow-primary/5'} hover:bg-white/5 transition-all cursor-pointer group`}>
                                                    <div className="flex items-center gap-4">
                                                        <div onClick={(e) => { e.stopPropagation(); onToggleQuickTask && onToggleQuickTask(item.id); }} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${item.completed ? 'bg-green-500/20 border-green-500 text-green-500' : 'border-white/20 text-transparent group-hover:border-primary/50'}`}>
                                                            {item.completed && <span className="material-symbols-outlined text-sm font-bold">check</span>}
                                                        </div>
                                                        <div className="flex-1">
                                                            <h4 className={`text-sm font-bold transition-all line-clamp-2 overflow-hidden ${item.completed ? 'text-cream-light/40 line-through' : 'text-cream-light'}`}>{formatTaskText(item.text)}</h4>
                                                            <div className="flex items-center gap-2 mt-1">
                                                                <span className="material-symbols-outlined text-[10px] text-primary/60">schedule</span>
                                                                                                                                <span className="text-[10px] font-bold text-white/20 uppercase tracking-widest leading-none">
                                                                    {item.dueTime ? formatDateMinimal(item.dueDate) : formatReminderDate(item.dueDate)}
                                                                    {item.dueTime ? ` @ ${formatTime(item.dueTime)}` : ''}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        }
                                    })}
                                </div>
                            ) : (
                                <div className="text-center py-8 mb-8">
                                    <span className="material-symbols-outlined text-3xl text-white/5 mb-2">event_available</span>
                                    <p className="text-white/20 text-xs font-sans">No reminders this day</p>
                                </div>
                            )}
                            {upcomingReminders.length > 0 && (
                                <div>
                                    <div className="flex items-center gap-3 mb-4">
                                        <h4 className="text-xs font-bold text-cream-light/60 uppercase tracking-[0.2em]">Upcoming</h4>
                                        <div className="h-px flex-1 bg-gradient-to-r from-primary/20 to-transparent"></div>
                                    </div>
                                    <div className="space-y-2.5">
                                        {upcomingReminders.map((item, idx) => (
                                                                                        <div key={idx} onClick={() => item.type === 'note' ? onEditNote(item) : onEditQuickTask(item)} className="flex items-start gap-3 p-3 rounded-2xl hover:bg-white/5 transition-colors cursor-pointer group">
                                                <div className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${item.type === 'quickTask' ? 'bg-cream-light/40' : 'bg-primary'}`}></div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-xs font-semibold text-cream-light/80 truncate">{item.type === 'quickTask' ? formatTaskText(item.text) : (item.title || 'Untitled')}</p>
                                                    <p className="text-[9px] text-cream-light/30 font-sans mt-0.5">{item.type === 'note' ? formatReminderDate(item.reminderDate) : item.dueDate}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </aside>
                    </div>
                </Layout>
            );
        };

        const QuickTasksPage = ({ user, quickTasks = [], onOpenCreator, onToggleQuickTask, onAddQuickTaskClick, onDeleteQuickTask, onEditQuickTask, isProbing, isFirstSyncDone, pomodoroTime, isPomodoroActive }) => {
            const location = useLocation();
            const queryParams = new URLSearchParams(location.search);
            const searchQuery = (queryParams.get('search') || '').toLowerCase();

            const filteredTasks = useMemo(() => {
                if (!searchQuery) return quickTasks;
                return quickTasks.filter(t => 
                    (t.text || t.title || '').toLowerCase().includes(searchQuery)
                );
            }, [quickTasks, searchQuery]);

            const groupedQuickTasks = useMemo(() => groupQuickTasksBySchedule(filteredTasks), [filteredTasks]);
            const sections = [
                { key: 'today', label: 'Today', items: groupedQuickTasks.today },
                { key: 'tomorrow', label: 'Tomorrow', items: groupedQuickTasks.tomorrow },
                { key: 'upcoming', label: 'Upcoming', items: groupedQuickTasks.upcoming },
                { key: 'completed', label: 'Finished', items: groupedQuickTasks.completed }
            ];

            return (
                <Layout onOpenCreator={onOpenCreator} onFabClick={onAddQuickTaskClick} pomodoroTime={pomodoroTime} isPomodoroActive={isPomodoroActive}>
                    <div className="max-w-6xl mx-auto w-full px-4 md:px-8 pt-0 pb-24">
                        <div className="sticky top-0 z-[100] py-4 px-4 md:px-8 -mx-4 md:-mx-8 mb-6">
                            <Header user={user} subtitle="All quick tasks" showSearch={true} desktopSearchPlaceholder="Search tasks..." mobileSearchPlaceholder="Search tasks..." />
                        </div>
                        <div className="flex items-center gap-4 mt-24 md:mt-10 mb-10 md:mb-16">
                            {/* FIX 2026-04-22: Page Header style matched to homepage serif aesthetic (non-italic) for consistency */}
                            <h1 className="text-xl md:text-3xl font-display font-bold text-cream-light tracking-[0.15em] md:tracking-[0.25em] uppercase">Quick Tasks</h1>
                            <div className="h-px flex-1 bg-gradient-to-r from-primary/30 to-transparent"></div>
                        </div>

                        <div className="space-y-6">

                            {(isProbing || !isFirstSyncDone) ? (
                                <div className="space-y-4">
                                    {[...Array(6)].map((_, i) => <SkeletonQuickTask key={i} />)}
                                </div>
                            ) : filteredTasks.length === 0 ? (
                                <div className="glass-panel p-10 rounded-3xl text-center border-dashed border-white/5">
                                    <p className="text-white/20 text-sm font-bold uppercase tracking-widest">{searchQuery ? 'No tasks match your search' : 'No quick tasks yet'}</p>
                                </div>
                            ) : (
                                <div className="space-y-8">
                                    {sections.map(section => (
                                        section.items.length > 0 && (
                                            <section key={section.key} className="space-y-4">
                                                <div className="flex items-center gap-3">
                                                    <h2 className="text-xs md:text-sm font-bold uppercase tracking-[0.28em] text-primary/75">{section.label}</h2>
                                                    <div className="h-px flex-1 bg-gradient-to-r from-primary/20 to-transparent"></div>
                                                    <span className="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-[10px] font-bold uppercase tracking-[0.18em] text-white/35">{section.items.length}</span>
                                                </div>
                                                <div className="space-y-4">
                                                    {section.items.map(task => (
                                                        <QuickTaskItem
                                                            key={task.id}

        const ALARM_AMPM = ['AM', 'PM'];

        const AlarmWheelColumn = React.memo(({ values, selected, onChange, label, infinite = false }) => {
            const scrollRef = useRef(null);
            const [currentIdx, setCurrentIdx] = useState(-1);
            const isManualScroll = useRef(false);
            const isProgrammaticScroll = useRef(false);
            const isJumping = useRef(false);
            const scrollTimeout = useRef(null);
            const lastSentValue = useRef(selected);
            const itemHeight = 60;
            const momentumRef = useRef(null);
            const dragRef = useRef({ isDragging: false, startY: 0, scrollTop: 0, lastY: 0, lastTime: 0, velocity: 0, lastIdx: -1 });

            const offset = infinite ? values.length : 0;
            const displayValues = infinite ? [...values, ...values, ...values] : values;

            const stopMomentum = () => {
                if (momentumRef.current) cancelAnimationFrame(momentumRef.current);
                momentumRef.current = null;
            };

            const snapToCenter = (currentTop) => {
                if (!scrollRef.current) return;
                const totalOffset = infinite ? 1 : 0;
                const finalIdx = Math.round(currentTop / itemHeight) + totalOffset;
                const finalBaseIdx = infinite ? finalIdx % values.length : finalIdx;

                if (finalBaseIdx >= 0 && finalBaseIdx < values.length) {
                    const targetTop = (finalIdx - totalOffset) * itemHeight;
                    scrollRef.current.scrollTo({ top: targetTop, behavior: 'smooth' });
                    
                    const newVal = values[finalBaseIdx];
                    if (newVal !== selected && newVal !== lastSentValue.current) {
                        lastSentValue.current = newVal;
                        onChange(newVal);
                    }
                }
            };

            const runMomentum = (velocity) => {
                if (!scrollRef.current || Math.abs(velocity) < 0.5) {
                    snapToCenter(scrollRef.current.scrollTop);
                    return;
                }

                scrollRef.current.scrollTop += velocity;
                isManualScroll.current = true;

                if (infinite) {
                    const threshold = values.length * itemHeight;
                    if (scrollRef.current.scrollTop < threshold * 0.5) scrollRef.current.scrollTop += threshold;
                    else if (scrollRef.current.scrollTop > threshold * 1.5) scrollRef.current.scrollTop -= threshold;
                }

                const cIdx = Math.round(scrollRef.current.scrollTop / itemHeight) + (infinite ? 1 : 0);
                if (cIdx !== dragRef.current.lastIdx) {
                    dragRef.current.lastIdx = cIdx;
                    setCurrentIdx(cIdx);
                    if (navigator.vibrate) try { navigator.vibrate(1); } catch(e) {}
                }

                momentumRef.current = requestAnimationFrame(() => runMomentum(velocity * 0.95));
            };

            useEffect(() => {
                if (!scrollRef.current || isManualScroll.current || isJumping.current || momentumRef.current) return;
                
                // FIX 2026-04-22: Added 100ms timeout to ensure the modal is fully rendered/visible before initial scroll sync.
                // This prevents the "misaligned/broken" UI on first opening.
                const initTimer = setTimeout(() => {
                    if (!scrollRef.current) return;
                    const baseIdx = values.findIndex(v => String(v) === String(selected));
                    if (baseIdx === -1) return;
                    
                    const targetPos = infinite ? (baseIdx + offset) * itemHeight : (baseIdx * itemHeight);
                    const finalScrollTop = infinite ? targetPos - itemHeight : targetPos;
                    
                    const cIdx = Math.round(finalScrollTop / itemHeight) + (infinite ? 1 : 0);
                    setCurrentIdx(cIdx);
                    lastSentValue.current = selected;

                    if (Math.abs(scrollRef.current.scrollTop - finalScrollTop) > 1) {
                        isProgrammaticScroll.current = true;
                        scrollRef.current.scrollTop = finalScrollTop;
                        setTimeout(() => { isProgrammaticScroll.current = false; }, 150);
                    }
                }, 100);
                
                return () => clearTimeout(initTimer);
            }, [selected, values, offset, infinite]);

            const handleScroll = () => {
                if (!scrollRef.current || isProgrammaticScroll.current) return;
                const top = scrollRef.current.scrollTop;
                const cIdx = Math.round(top / itemHeight) + (infinite ? 1 : 0);
                if (cIdx !== currentIdx) setCurrentIdx(cIdx);
            };

            const handlePointerDown = (e) => {
                stopMomentum();
                dragRef.current = {
                    isDragging: true,
                    startY: e.clientY,
                    scrollTop: scrollRef.current.scrollTop,
                    lastY: e.clientY,
                    lastTime: Date.now(),
                    velocity: 0,
                    lastIdx: Math.round(scrollRef.current.scrollTop / itemHeight) + (infinite ? 1 : 0)
                };
                if (scrollRef.current.setPointerCapture) try { scrollRef.current.setPointerCapture(e.pointerId); } catch(err) {}
                isManualScroll.current = true;
            };

            const handlePointerMove = (e) => {
                if (!dragRef.current.isDragging) return;
                const now = Date.now();
                const dt = Math.max(1, now - dragRef.current.lastTime);
                const dy = e.clientY - dragRef.current.lastY;
                dragRef.current.velocity = -dy / dt * 16;
                scrollRef.current.scrollTop -= dy;
                dragRef.current.lastY = e.clientY;
                dragRef.current.lastTime = now;
                if (infinite) {
                    const threshold = values.length * itemHeight;
                    if (scrollRef.current.scrollTop < threshold * 0.5) scrollRef.current.scrollTop += threshold;
                    else if (scrollRef.current.scrollTop > threshold * 1.5) scrollRef.current.scrollTop -= threshold;
                }
            };

            const handlePointerUp = (e) => {
                dragRef.current.isDragging = false;
                if (scrollRef.current.releasePointerCapture) try { scrollRef.current.releasePointerCapture(e.pointerId); } catch(err) {}
                if (Math.abs(dragRef.current.velocity) > 2) runMomentum(dragRef.current.velocity);
                else snapToCenter(scrollRef.current.scrollTop);
            };

            return (
                <div className="flex flex-col items-center relative overflow-hidden">
                    {label && <p className="text-[11px] font-black uppercase tracking-[0.2em] text-primary/40 mb-2">{label}</p>}
                    <div
                        ref={scrollRef}
                        onScroll={handleScroll}
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerCancel={handlePointerUp}
                        className="h-[180px] w-full overflow-y-hidden no-scrollbar select-none relative z-10 touch-none pointer-events-auto"
                        style={{ scrollbarWidth: 'none', perspective: '800px' }}
                    >
                        {!infinite && <div className="h-[60px] pointer-events-none" />}

                            /* FIX 2026-04-22: Enhanced visibility for "ghost" numbers (non-active items) as requested */
                            return (

                                        transform: isActive ? 'scale(1.1) translateZ(40px)' : 'scale(0.85) translateZ(0px)',
                                        opacity: isActive ? 1 : 0.45
                                    }}
                                >
                                    {v}
                                </div>
                            );
                        })}
                        {!infinite && <div className="h-[60px] pointer-events-none" />}
                    </div>
                </div>
            );
        });

        const AlarmDayCircle = ({ day, active, onToggle }) => {

                let isMounted = true;

                const evaluateVisibility = async () => {
                    const dismissed = localStorage.getItem('faiora_notif_banner_dismissed');
                    if (dismissed) {
                        const dismissedAt = parseInt(dismissed);
                        const sevenDays = 7 * 24 * 60 * 60 * 1000;
                        if (Date.now() - dismissedAt < sevenDays) return;
                    }

                    let shouldPrompt = false;
                    if (FaioraNotifications.hasNativeLocalNotifications()) {
                        try {
                            const plugin = window.Capacitor?.Plugins?.LocalNotifications;
                            const current = await plugin?.checkPermissions?.();
                            shouldPrompt = current?.display === 'prompt';
                        } catch (error) {
                            console.warn('Native notification banner check failed', error);
                        }
                    } else if ('Notification' in window) {
                        shouldPrompt = Notification.permission !== 'granted' && Notification.permission !== 'denied';
                    }

                    if (!shouldPrompt || !isMounted) return;
                    const timer = setTimeout(() => {
                        if (isMounted) setVisible(true);
                    }, 2000);
                    return () => clearTimeout(timer);
                };

                let cleanup = null;
                evaluateVisibility().then(fn => {
                    cleanup = fn;
                });

                return () => {
                    isMounted = false;

                };

        /* TransitionManager - handles page navigation transitions with fire-wipe overlay and content dissolve */
        /* FIX 2026-04-15: Added fade-in/fade-out dissolve animation on route content behind the fire sprite */
        const TransitionManager = ({ children, onTransitionStart, onTransitionEnd }) => {
            const FIRE_WIPE_DURATION_MS = 1200; // FIX 2026-04-15: Reduced from 1850ms for faster page switching
            const location = useLocation();
            const [displayLocation, setDisplayLocation] = useState(() => normalizeRouteLocation(location));
            const [isWiping, setIsWiping] = useState(false);
            const [isDissolving, setIsDissolving] = useState(false);
            const [isFadingIn, setIsFadingIn] = useState(false);
            const [transitionKey, setTransitionKey] = useState(0);

            const playFireSFX = () => {
                const audio = new Audio('fire_transition_sfx.mp3');
                audio.volume = 0.6;
                audio.play().catch(e => {
                    // Silent catch for autoplay restrictions
                });
                
                // Fade out after 1 second
                setTimeout(() => {
                    const fadeDuration = 500; // 0.5s fade
                    const step = 0.05;
                    const interval = fadeDuration / (0.4 / step);
                    
                    const fadeInterval = setInterval(() => {
                        if (audio.volume > step) {
                            audio.volume -= step;
                        } else {
                            audio.volume = 0;
                            clearInterval(fadeInterval);
                            audio.pause();
                        }
                    }, interval);
                }, 1000);
            };

            const lastPath = useRef(location.pathname || '/');
            const timers = useRef([]);

            const clearTimers = () => {
                timers.current.forEach(t => clearTimeout(t));
                timers.current = [];
            };

            const startTransition = (newLoc) => {
                clearTimers();
                setIsWiping(true);
                setIsDissolving(true);
                setIsFadingIn(false);
                setTransitionKey(prev => prev + 1);
                if (onTransitionStart) setTimeout(() => onTransitionStart(), 0);
                playFireSFX();

                /* t1: At 450ms, swap route content but keep it hidden (still dissolve-out) */
                const t1 = setTimeout(() => {
                    setDisplayLocation(normalizeRouteLocation(newLoc));
                }, 450); // FIX 2026-04-15: Reduced from 850ms

                /* t2: At 750ms, start the smooth fade-in as fire sprite begins to clear */
                /* Fire sprite peak is faster now, so content appears earlier for snappier feel */
                const t2 = setTimeout(() => {
                    setIsDissolving(false);
                    setIsFadingIn(true);
                }, 750); // FIX 2026-04-15: Reduced from 1300ms

                /* t3: Re-enable nav bar faster (at 600ms instead of 1100ms) */
                /* This eliminates the 'stuck' feeling during the fire sweep on mobile */
                const t3 = setTimeout(() => {
                    if (onTransitionEnd) setTimeout(() => onTransitionEnd(), 0);
                }, 600); // FIX 2026-04-15: Reduced from 1100ms

                /* t4: Fire sprite ends at 1200ms, remove fire overlay */
                const t4 = setTimeout(() => {
                    setIsWiping(false);
                }, FIRE_WIPE_DURATION_MS);

                /* t5: At 1500ms, fade-in animation done, cleanup dissolve state */
                const t5 = setTimeout(() => {
                    setIsFadingIn(false);
                }, 1500); // FIX 2026-04-15: Reduced from 2200ms
                
                timers.current = [t1, t2, t3, t4, t5];
            };

            useEffect(() => {
                // Do not run startTransition on first mount: it applies dissolve-out (opacity: 0) to all
                // routes until timers fire, which looks like a blank screen right after login when HashRouter mounts.
                setDisplayLocation(normalizeRouteLocation(location));
                lastPath.current = location.pathname || '/';
            }, []);

            useEffect(() => {
                const safety = setTimeout(() => {
                    setIsDissolving(false);
                    setIsWiping(false);
                    setIsFadingIn(false);
                }, 1600); // FIX 2026-04-15: Reduced from 2500ms safety limit
                return () => clearTimeout(safety);
            }, []);

            useEffect(() => {
                const path = location.pathname || '/';
                if (path !== lastPath.current) {
                    const params = new URLSearchParams(location.search);
                    if (params.has('search')) {
                        setDisplayLocation(normalizeRouteLocation(location));
                        lastPath.current = path;
                        return;
                    }
                    lastPath.current = path;
                    startTransition(location);
                }
            }, [location.pathname]);

            /* route-transition-shell - dissolve class determines fade-out/fade-in state */
            const dissolveClass = isDissolving ? 'route-dissolve-out' : (isFadingIn ? 'route-dissolve-in' : '');

            return (
                <div className="relative w-full h-full overflow-hidden">
                    {isWiping && (
                        <div key={transitionKey} className="fire-wipe-overlay fire-wipe-active">
                            <div className="fire-wipe-sprite"></div>
                        </div>
                    )}
                    <div key={displayLocation.pathname || '/'} className={"app-route-shell w-full h-full min-h-0 flex flex-col " + dissolveClass}>
                        <Routes location={normalizeRouteLocation(displayLocation)}>
                            {children}
                            <Route path="*" element={<Navigate to="/" replace />} />
                        </Routes>
                    </div>
                </div>
            );
        };

        const QuickTaskModal = ({ onClose, onAdd, initialData = null, showToast, prefillDate = null }) => {
            const getTomorrow = () => {

            const getNextMonday = () => {

                d.setDate(d.getDate() + (1 + 7 - d.getDay()) % 7 || 7);
                return formatDateLocal(d);

             const extractDateFromText = (input) => {
                let lower = input.toLowerCase();
                let cleanText = input;
                const now = new Date();
                let newDate = null;
                let newTime = null;

                // 1. Detect Times first to prevent date parsing interference (e.g. 10am)
                // Patterns: 2pm, 10:30am, 14:00, 2 pm
                const timeRegex = /\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b|\b([01]\d|2[0-3]):([0-5]\d)\b/gi;
                let timeMatch;
                if ((timeMatch = timeRegex.exec(lower)) !== null) {
                    let h, m = '00';
                    if (timeMatch[1]) { // am/pm format
                        h = parseInt(timeMatch[1]);
                        if (timeMatch[2]) m = timeMatch[2];
                        const ampm = timeMatch[3].toLowerCase();
                        if (ampm === 'pm' && h < 12) h += 12;
                        if (ampm === 'am' && h === 12) h = 0;
                    } else { // 24h format
                        h = parseInt(timeMatch[4]);
                        m = timeMatch[5];
                    }
                    newTime = `${h.toString().padStart(2, '0')}:${m}`;
                    cleanText = cleanText.replace(timeMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                 // 2. Detect Specific Dates (e.g. mar 1, march 10, this 15)
                const monthNames = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
                const fullMonthNames = ['january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
                
                // Generic date like "march 15", "mar 15", or "mar15"
                const dateRegex = new RegExp(`\\b(${monthNames.join('|')}|${fullMonthNames.join('|')})\\s*(\\d{1,2})\\b`, 'i');
                let dateMatch = dateRegex.exec(lower);
                
                // "this 15" format
                const thisDateRegex = /\bthis\s+(\d{1,2})\b/i;
                let thisDateMatch = thisDateRegex.exec(lower);

                if (dateMatch) {
                    const monthText = dateMatch[1].toLowerCase();
                    let monthIdx = monthNames.findIndex(m => monthText.startsWith(m));
                    if (monthIdx === -1) monthIdx = fullMonthNames.findIndex(m => m.startsWith(monthText));
                    const day = parseInt(dateMatch[2]);
                    
                    const targetDate = new Date(now.getFullYear(), monthIdx, day);
                    const matchIdx = dateMatch.index;
                    const fullMatch = dateMatch[0];
                    const nextChar = lower[matchIdx + fullMatch.length];

                    // Refinement: only commit if:
                    // 1. Next char exists (e.g. user typed a space after "mar 1 ")
                    // 2. OR the day is > 3 (e.g. "mar 4" is definitely not "mar 40")
                    // 3. OR it's a 2-digit day (handled by day > 3 mostly, but explicit check for 10-31)
                    if (day >= 1 && day <= 31) {
                        const targetDateStr = formatDateLocal(targetDate);
                        const tempCleanText = cleanText.replace(dateMatch[0], '');
                        if (nextChar || day > 3) {
                           if (targetDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                               targetDate.setFullYear(now.getFullYear() + 1);
                           }
                           newDate = formatDateLocal(targetDate);
                           cleanText = tempCleanText;
                           lower = cleanText.toLowerCase();
                        } else {
                           // Pending single digit
                           return { date: targetDateStr, time: newTime || '10:00', cleanText: tempCleanText, isPending: true };
                        }
                    }
                } else if (thisDateMatch) {
                    const day = parseInt(thisDateMatch[1]);
                    let targetDate = new Date(now.getFullYear(), now.getMonth(), day);
                    // If 15th of this month has passed, move to next month
                    if (targetDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                        targetDate = new Date(now.getFullYear(), now.getMonth() + 1, day);
                    }
                    newDate = formatDateLocal(targetDate);
                    cleanText = cleanText.replace(thisDateMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 3. Detect Relative Entities (tomorrow, next week, wed, thu, thur)
                const relativePatterns = [
                    { regex: /\btomorrow\b/i, offset: 1 },
                    { regex: /\bnext week\b/i, offset: 7 },
                    { regex: /\b(?:next\s+)?(monday|mon|tuesday|tue|wednesday|wed|thursday|thu|thur|thurs|friday|fri|saturday|sat|sunday|sun)\b/i }
                ];

                for (const p of relativePatterns) {
                    let match = p.regex.exec(lower);
                    if (match) {
                        const target = new Date();
                        if (p.offset) {
                            target.setDate(now.getDate() + p.offset);
                        } else {
                            const weekdays = { 
                                sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, thur: 4, thurs: 4, fri: 5, sat: 6, 
                                sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6 
                            };
                            const targetDay = weekdays[match[1].toLowerCase()];
                            // Calculate days until next occurrence
                            let diff = (targetDay + 7 - now.getDay()) % 7;
                            // If it's today, move to next week for "closest future"
                            if (diff === 0) diff = 7;
                            target.setDate(now.getDate() + diff);
                        }
                        newDate = formatDateLocal(target);
                        cleanText = cleanText.replace(match[0], '');
                        lower = cleanText.toLowerCase();
                        break; // Only one date per task description
                    }
                }

                // 4. Relative Offsets (e.g. 5 min, 2 hrs, in 10m)
                const relativeTimeRegex = /\b(?:in\s+)?(\d+)\s*(m|min|mins|minutes|h|hr|hrs|hour|hours)\b/i;
                let relTimeMatch;
                if ((relTimeMatch = relativeTimeRegex.exec(lower)) !== null) {
                    const value = parseInt(relTimeMatch[1]);
                    const unit = relTimeMatch[2].toLowerCase();
                    const target = new Date(now);
                    
                    if (unit.startsWith('m')) {
                        target.setMinutes(now.getMinutes() + value);
                    } else if (unit.startsWith('h')) {
                        target.setHours(now.getHours() + value);
                    }
                    
                    newDate = formatDateLocal(target);
                    newTime = target.getHours().toString().padStart(2, '0') + ':' + target.getMinutes().toString().padStart(2, '0');
                    cleanText = cleanText.replace(relTimeMatch[0], '');
                    lower = cleanText.toLowerCase();
                }

                // 4. Fallback shared logic
                if (newDate && !newTime) newTime = '10:00';
                
                return { date: newDate, time: newTime, cleanText, isPending: false };
            };



             const getLaterTiming = () => {
                const now = new Date();
                const hour = now.getHours();
                
                // 6PM - 6AM -> Tomorrow 10AM
                if (hour >= 18 || hour < 6) {
                    const target = new Date(now);
                    if (hour >= 18) target.setDate(target.getDate() + 1);
                    return {
                        date: formatDateLocal(target),
                        time: '10:00'
                    };
                }
                
                // 6AM - 6PM -> 4 Hours later
                const future = new Date(now.getTime() + 4 * 60 * 60 * 1000);
                return {
                    date: formatDateLocal(future),
                    time: future.getHours().toString().padStart(2, '0') + ':' + future.getMinutes().toString().padStart(2, '0')
                };
            };

            const initialLater = getLaterTiming();

            const [text, setText] = useState((initialData && initialData.text) || '');
            const [dueDate, setDueDate] = useState((initialData && initialData.dueDate) || prefillDate || initialLater.date);
            const [dueTime, setDueTime] = useState((initialData && initialData.dueTime) || (prefillDate ? '10:00' : initialLater.time));
            const [isClosing, setIsClosing] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showCustom, setShowCustom] = useState(!!prefillDate || !!(initialData && (initialData.dueDate || initialData.dueTime)));
            const [selectedPreset, setSelectedPreset] = useState(() => {
                if (showCustom) return 'custom';
                if (prefillDate) return 'custom'; // though prefillDate implies custom usually
                return 'later';
            });
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [pendingExtraction, setPendingExtraction] = useState(null);
            const dropdownRef = useRef(null);

            // Ref to track if a history state was pushed by this modal
            const historyPushedRef = useRef(false);

            // Effect to manage browser history for this modal
            useEffect(() => {
                if (!isClosing) {
                    // Push a new state when the modal is opened
                    window.history.pushState({ modal: 'quickTask' }, '');
                    historyPushedRef.current = true;
                } else if (historyPushedRef.current) {
                    // If the modal is closing, and we previously pushed a state, go back
                    if (window.history.state && window.history.state.modal === 'quickTask') {
                        window.history.back();
                    }
                    historyPushedRef.current = false;
                }
            }, [isClosing]);


            useEffect(() => {
                const handler = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsDropdownOpen(false);
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

              const handleTextChange = (val) => {
                const { date, time, cleanText, isPending } = extractDateFromText(val);
                if (isPending) {
                    setText(val);
                    setPendingExtraction({ date, time, cleanText });
                } else {
                    setText(cleanText);
                    setPendingExtraction(null);
                    if (date) { setDueDate(date); setShowCustom(true); setSelectedPreset('custom'); }
                    if (time) { setDueTime(time); setShowCustom(true); setSelectedPreset('custom'); }
                }
            };

            useEffect(() => {
                if (pendingExtraction) {
                    const timer = setTimeout(() => {
                        const { date, time, cleanText } = pendingExtraction;
                        setText(cleanText);
                        if (date) { setDueDate(date); setShowCustom(true); setSelectedPreset('custom'); }
                        if (time) { setDueTime(time); setShowCustom(true); setSelectedPreset('custom'); }
                        setPendingExtraction(null);
                    }, 2000);
                    return () => clearTimeout(timer);
                }
            }, [pendingExtraction, dueDate, dueTime]);

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(onClose, 200);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (text.trim() && !isSubmitting) {
                    setIsSubmitting(true);
                    onAdd(text.trim(), dueDate, dueTime);
                    if (showToast) showToast(initialData ? "Task updated!" : "Quick task added!");
                    // Close through the parent immediately so APK/WebView does not get stuck with the modal still mounted.
                    if (typeof onClose === 'function') onClose();
                }
            };

            const getSelectedLabel = () => {
                const todayStr = formatDateLocal();
                const tomorrowStr = getTomorrow();
                const nextMonStr = getNextMonday();

                /* REMOVED: formatTime 2026-04-20 - Now uses global utility */

                const formatD = (d) => {
                    if(d === todayStr) return 'Today';
                    if(d === tomorrowStr) return 'Tomorrow';
                    const parts = (d || '').split('-');
                    return parts.length === 3 ? `${parts[1]}/${parts[2]}` : '';
                };

                // Use logic to determine which preset to show if possible
                if (selectedPreset === 'later') {
                    const isLaterMatch = (dueDate === initialLater.date && dueTime === initialLater.time);
                    if (isLaterMatch) {
                        return { label: 'Later', sub: (initialLater.date === todayStr ? 'Today, ' : 'Tomorrow, ') + formatTime(initialLater.time), icon: 'wb_twilight' };
                    }
                }
                
                if (selectedPreset === 'tomorrow') {
                    if (dueDate === tomorrowStr && dueTime === '10:00') {
                        return { label: 'Tomorrow', sub: 'Tomorrow, 10:00 AM', icon: 'event' };
                    }
                }
                
                if (selectedPreset === 'monday') {
                    if (dueDate === nextMonStr && dueTime === '08:00') {
                        return { label: 'Next Monday', sub: 'Monday, 8:00 AM', icon: 'calendar_month' };
                    }
                }

                if (showCustom || selectedPreset === 'custom') {
                    return { label: 'Custom', sub: `${formatD(dueDate)}, ${formatTime(dueTime)}`, icon: 'schedule' };
                }

                // Fallback smart matching if preset is somehow lost or doesn't match
                if (dueDate === initialLater.date && dueTime === initialLater.time) return { label: 'Later', sub: (initialLater.date === todayStr ? 'Today, ' : 'Tomorrow, ') + formatTime(initialLater.time), icon: 'wb_twilight' };
                if (dueDate === tomorrowStr && dueTime === '10:00') return { label: 'Tomorrow', sub: 'Tomorrow, 10:00 AM', icon: 'event' };
                if (dueDate === nextMonStr && dueTime === '08:00') return { label: 'Next Monday', sub: 'Monday, 8:00 AM', icon: 'calendar_month' };
                return { label: 'Custom', sub: `${formatD(dueDate)}, ${formatTime(dueTime)}`, icon: 'schedule' };
            };

            const selected = getSelectedLabel();

            /* quick-task-modal - z-index raised above header */
            /* quick-task-modal - raised z-index to 999 */
            /* FIX 2026-04-15: Raised to z-[999] (was 500) */
            return (
                <div className={"fixed inset-0 z-[999] flex items-center justify-center p-4 transition-all duration-200 " + (isClosing ? 'opacity-0 scale-95' : 'animate-in fade-in duration-300')}>
                    <style>{`
                        .quick-task-input:focus {
                            border-color: #f97316 !important;
                            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2) !important;
                        }
                        .quick-option-btn {
                            width: 100%;
                            padding: 1rem 1.25rem;
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                            color: #cbd5e1;
                            font-size: 0.9rem;
                            transition: all 0.2s;
                            border-radius: 1rem;
                        }
                        .quick-option-btn:hover {
                            background: rgba(255,255,255,0.05);
                            color: #f97316;
                        }
                    `}</style>
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={handleClose}></div>
                    <div className="bg-[#0f172a] w-full max-w-sm rounded-[2.5rem] p-6 relative z-10 shadow-2xl border border-white/5 animate-in zoom-in-95 duration-300">
                        <div className="flex justify-between items-center mb-8">
                            <h3 className="text-xl font-bold text-cream-light font-montserrat tracking-wide">{initialData ? 'Edit Task' : 'New Quick Task'}</h3>
                            <button onClick={handleClose} className="text-white/20 hover:text-primary transition-colors">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-3">
                                <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Task Description</label>
                                <textarea
                                    autoFocus
                                    value={text}
                                    onChange={(e) => handleTextChange(e.target.value)}
                                    placeholder="What needs to be done? (Each new line creates a new quick task)"
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat quick-task-input"
                                    rows={4}
                                    style={{ textTransform: 'capitalize', resize: 'none' }}
                                    disabled={isSubmitting}
                                />
                            </div>
                            <div className="space-y-3 relative" ref={dropdownRef}>
                                <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Schedule Task</label>
                                <button 
                                    type="button"
                                    onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between group hover:bg-white/10 transition-all font-montserrat"
                                >
                                    <div className="flex items-center gap-3">
                                        <span className={`material-symbols-outlined text-xl ${isDropdownOpen ? 'text-primary' : 'text-cream-light/60'}`}>{selected.icon}</span>
                                        <div className="flex flex-col items-start translate-y-[-1px]">
                                            <span className="text-sm font-bold text-cream-light">{selected.label}</span>
                                            <span className="text-[9px] font-bold text-white/20 uppercase tracking-widest">{selected.sub}</span>
                                        </div>
                                    </div>
                                    <span className={`material-symbols-outlined transition-transform ${isDropdownOpen ? 'rotate-180 text-primary' : 'text-cream-light/30'}`}>expand_more</span>
                                </button>

                                {isDropdownOpen && (
                                    <div className="absolute top-full left-0 right-0 mt-2 bg-[#1e293b] border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                                         {[
                                            { id: 'later', label: 'Later', time: (() => {
                                                const h = parseInt(initialLater.time.split(':')[0]);
                                                const m = initialLater.time.split(':')[1];
                                                const ampm = h >= 12 ? 'PM' : 'AM';
                                                const h12 = h % 12 || 12;
                                                const day = initialLater.date === formatDateLocal() ? 'Today' : 'Tomorrow';
                                                return `${day}, ${h12}:${m} ${ampm}`;
                                            })(), icon: 'wb_twilight', date: initialLater.date, t: initialLater.time },
                                            { id: 'tomorrow', label: 'Tomorrow', time: 'Tomorrow, 10:00 AM', icon: 'event', date: getTomorrow(), t: '10:00' },
                                            { id: 'monday', label: 'Next Monday', time: 'Monday, 8:00 AM', icon: 'calendar_month', date: getNextMonday(), t: '08:00' },
                                            { id: 'custom', label: 'Custom', time: '', icon: 'schedule', date: null, t: null }
                                        ].map(opt => (
                                            <button
                                                key={opt.id}
                                                type="button"
                                                onClick={() => {
                                                    setSelectedPreset(opt.id);
                                                    setPendingExtraction(null);
                                                    if (opt.id === 'custom') {
                                                        setShowCustom(true);
                                                    } else {
                                                        setShowCustom(false);
                                                        setDueDate(opt.date);
                                                        setDueTime(opt.t);
                                                    }
                                                    setIsDropdownOpen(false);
                                                }}
                                                className="w-full px-5 py-4 flex items-center justify-between hover:bg-white/5 transition-all text-left"
                                            >
                                                <div className="flex items-center gap-3">
                                                    <span className="material-symbols-outlined text-lg text-cream-light/40">{opt.icon}</span>
                                                    <span className={`text-sm font-bold ${selected.label === opt.label ? 'text-primary' : 'text-cream-light/80'}`}>{opt.label}</span>
                                                </div>
                                                {opt.time && <span className="text-[10px] font-bold text-white/20 uppercase tracking-widest">{opt.time}</span>}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {showCustom && (
                                <div className="grid grid-cols-2 gap-4 animate-in slide-in-from-top-2 duration-300">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Due Date</label>
                                        <input 
                                            type="date" 
                                            value={dueDate}
                                            onChange={(e) => setDueDate(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat text-sm quick-task-input"
                                        />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-cream-light/40 uppercase tracking-[0.2em] px-1 font-montserrat">Due Time</label>
                                        <input 
                                            type="time" 
                                            value={dueTime}
                                            onChange={(e) => setDueTime(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat text-sm quick-task-input"
                                        />
                                    </div>
                                </div>
                            )}
                            <button 
                                type="submit" 
                                className="w-full bg-primary text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-primary-dark transition-all shadow-lg shadow-primary/20"
                            >
                                {initialData ? 'Update Task' : 'Add Task'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const SetLockModal = ({ onSet, onClose, showToast }) => {
            const [pin, setPin] = useState("");
            const [confirmPin, setConfirmPin] = useState("");
            const [step, setStep] = useState(1); // 1: set, 2: confirm, 3: hint
            const [hint, setHint] = useState("");
            const [isClosing, setIsClosing] = useState(false);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (step === 3) return; // Let the input field handle its own events
                    
                    if (e.key >= '0' && e.key <= '9') {
                        const key = parseInt(e.key);
                        if (step === 1 && pin.length < 6) {
                            const newVal = pin + key;
                            setPin(newVal);
                            if (newVal.length === 6) {
                                setTimeout(() => handleSubmit(null, newVal), 200);
                            }
                        } else if (step === 2 && confirmPin.length < 6) {
                            const newVal = confirmPin + key;
                            setConfirmPin(newVal);
                            if (newVal.length === 6) {
                                setTimeout(() => handleSubmit(null, newVal), 200);
                            }
                        }
                    } else if (e.key === 'Backspace') {
                        if (step === 1) setPin(prev => prev.slice(0, -1));
                        else setConfirmPin(prev => prev.slice(0, -1));
                    } else if (e.key === 'Escape') {
                        handleClose();
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [pin, confirmPin, step]);

            const handleClose = () => {
                setIsClosing(true);
                setTimeout(onClose, 200);
            };

            const handleSubmit = async (e, finalPin) => {
                if (e && e.preventDefault) e.preventDefault();
                const currentPin = finalPin || (step === 1 ? pin : confirmPin);

                if (step === 1) {
                    if (currentPin.length !== 6) return;
                    setStep(2);
                } else if (step === 2) {
                    if (pin !== currentPin) {
                        showToast("PINs do not match");
                        setConfirmPin("");
                        return;
                    }
                    setStep(3);
                } else {
                    const hash = await hashPIN(pin);
                    onSet(hash, hint);
                    handleClose();
                }
            };

            /* set-lock-modal - raised z-index to 999 */
            /* FIX 2026-04-15: Raised to z-[999] (was 500) */
            return (
                <div className={"fixed inset-0 z-[999] flex items-center justify-center p-4 transition-all duration-200 " + (isClosing ? 'opacity-0 scale-95' : 'animate-in fade-in zoom-in-95 duration-300')}>
                    <style>{`
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            25% { transform: translateX(-10px); }
                            75% { transform: translateX(10px); }
                        }
                    `}</style>
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={handleClose}></div>
                    <div className="bg-[#0f172a] w-full max-w-sm rounded-[2.5rem] p-8 relative z-[210] shadow-2xl border border-white/5">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <span className="material-symbols-outlined text-primary text-3xl">lock</span>
                            </div>
                            <h3 className="text-xl font-bold text-cream-light font-montserrat tracking-tight">
                                {step === 1 ? 'Set Note PIN' : step === 2 ? 'Confirm PIN' : 'Security Hint'}
                            </h3>
                            <p className="text-slate-400 text-sm mt-2">
                                {step === 1 ? 'Choose a 6-digit PIN for this note.' : step === 2 ? 'Re-enter your PIN to confirm.' : 'Add a hint to help you remember.'}
                            </p>
                        </div>

                        {step < 3 ? (
                            <div className="flex justify-center gap-2 mb-8">
                                {[...Array(6)].map((_, i) => {
                                    const val = step === 1 ? pin[i] : confirmPin[i];
                                    return (
                                        <div key={i} className={`w-10 h-10 rounded-xl border-2 flex items-center justify-center transition-all ${val ? 'border-primary bg-primary/10' : 'border-white/10 bg-white/5'}`}>
                                            {val && <div className="w-2 h-2 bg-primary rounded-full"></div>}
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="mb-8">
                                <input 
                                    autoFocus
                                    type="text"
                                    placeholder="e.g. My birthday, Favorite year..."
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cream-light placeholder:text-white/10 focus:ring-2 focus:ring-primary/20 transition-all font-montserrat text-sm"
                                    value={hint}
