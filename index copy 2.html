    -->
    <script id="faiora-console-purifier-nuclear">
        (function() {
            const forbidden = [
                "Cross-Origin-Opener-Policy", "window.closed", "runtime.lastError",
                "cdn.tailwindcss.com", "in-browser Babel", "deoptimised", "[BABEL]",
                "enableMultiTabIndexedDbPersistence", "message port closed",
                "Notification permission", "permission-denied", "Missing or insufficient permissions",
                "capacitor.js", "applogo.png", "[SYNC]", "[AUTH]", "[FIREBASE]", "[FAIORA]",
                "FCM token", "SW registered", "Persistent storage",
                "AdUnit", "Feature is disabled", "content-script.js"
            ];
            const handler = {
                get(target, prop) {
                    const original = target[prop];
                    if (typeof original === 'function') {
                        return (...args) => {
                            const msg = args.map(a => String(a || '')).join(" ");
                            if (forbidden.some(f => msg.includes(f))) return;
                            return original.apply(target, args);
                        };
                    }
                    return original;
                }
            };
            window.console = new Proxy(window.console, handler);
            window.onunhandledrejection = (e) => {
                const msg = String(e.reason?.message || '');
                if (forbidden.some(f => msg.includes(f))) { e.preventDefault(); return false; }
            };
        })();
    </script>

    <script>
        /*

            // SAFETY FALLBACK: If React/Auth takes too long, force show the app anyway

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { createRoot } = ReactDOM;
        const { HashRouter, Routes, Route, Link, useNavigate, useLocation, Navigate } = ReactRouterDOM;

        const normalizeRouteLocation = (loc) => {
            if (!loc || typeof loc !== 'object') return { pathname: '/', search: '', hash: '', state: null, key: 'default' };
            return { ...loc, pathname: loc.pathname && loc.pathname !== '' ? loc.pathname : '/' };
        };

        // LABEL: FaioraErrorBoundary — Catches React rendering errors and displays a recovery UI
        // FIX 2026-04-20: Added labels and IDs for easier tracking
        class FaioraErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, err: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, err: error };
            }
            componentDidCatch(error, info) {
                console.error('FaioraErrorBoundary:', error, info?.componentStack);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div id="faiora_error_crash_screen" className="min-h-[100dvh] flex flex-col items-center justify-center p-8 text-cream-light text-center gap-4">
                            {/* crash_screen_error_msg — Summary: Displays the error message from the crash */}
                            <p className="font-bold">Something went wrong loading the app.</p>
                            <p className="text-white/50 text-sm max-w-sm">{this.state.err?.message || 'Unknown error'}</p>
                            <button id="faiora_error_reload_btn" type="button" onClick={() => window.location.reload()} className="px-6 py-3 bg-primary text-white rounded-xl text-xs font-bold uppercase">Reload</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Capacitor / in-app WebView: empty or bare "#" hash yields no Route match → blank UI after login.
        (function ensureHashDefault() {
            try {
                const h = window.location.hash;
                if (h === '' || h === '#') {
                    window.location.hash = '#/';
                }
            } catch (e) { /* ignore */ }
        })();

        const formatDateLocal = (d = new Date()) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const parseDateString = (str) => {
            if (!str) return null;
            if (str.includes('T')) return new Date(str);
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        };

        // LABEL: ALARM-UTILITIES — Critical date calculation helpers for scheduling & UI readouts
        // =========================================================================================
        const getAlarmScheduleDate = (timeOrAlarm, daysInput) => {
            let time = '';
            let days = [];

            if (typeof timeOrAlarm === 'object' && timeOrAlarm !== null) {
                time = timeOrAlarm.time;
                days = timeOrAlarm.days || [];
            } else {
                time = timeOrAlarm;
                days = daysInput || [];
            }

            if (!time) return null;
            const [hours, minutes] = String(time).split(':').map(Number);
            if (Number.isNaN(hours) || Number.isNaN(minutes)) return null;
            
            let target = new Date();
            target.setHours(hours, minutes, 0, 0);
            
            // If the time has already passed today, start checking from tomorrow
            if (target.getTime() <= Date.now()) {
                target.setDate(target.getDate() + 1);
            }

            // If specific days are selected, find the next valid day
            if (days && days.length > 0) {
                let loopLimit = 8; // Max 1 week search
                while (!days.includes(target.getDay()) && loopLimit > 0) {
                    target.setDate(target.getDate() + 1);
                    loopLimit--;
                }
            }
            
            return target;
        };

        const getWaitTimeText = (targetDate) => {
            if (!targetDate) return '';
            const diffMs = targetDate.getTime() - Date.now();
            if (diffMs <= 0) return 'Alarm ringing';
            
            const diffMin = Math.floor(diffMs / 60000);
            const diffHrs = Math.floor(diffMin / 60);
            const diffDays = Math.floor(diffHrs / 24);
            
            if (diffDays > 0) {
                const remHrs = diffHrs % 24;
                return `Alarm in ${diffDays} day${diffDays > 1 ? 's' : ''} ${remHrs > 0 ? `and ${remHrs} hour${remHrs > 1 ? 's' : ''}` : ''}`;
            }
            if (diffHrs > 0) {
                const remMin = diffMin % 60;
                return `Alarm in ${diffHrs} hour${diffHrs > 1 ? 's' : ''} ${remMin > 0 ? `and ${remMin} minute${remMin > 1 ? 's' : ''}` : ''}`;
            }
            return `Alarm in ${diffMin} minute${diffMin > 1 ? 's' : ''}`;
        };

        const formatDueDate = (date, time) => {
            if (!date) return { label: '', isOverdue: false, isNearDeadline: false, isDueTomorrow: false };
            const d = parseDateString(date);
            const now = new Date();
            const today = formatDateLocal(now);
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = formatDateLocal(tomorrow);
            
            // Check for Overdue
            let isOverdue = false;
            const target = parseDateString(date);
            if (time) {
                const [h, m] = time.split(':');
                target.setHours(parseInt(h), parseInt(m), 0, 0);
            } else {
                target.setHours(23, 59, 59, 999);
            }
            
            if (now > target) {
                isOverdue = true;
            }

            let isDueTomorrow = false;
            if (date === today) {
                let label = isOverdue ? 'Past due' : 'Due Today';
                let isNearDeadline = false;
                if (time) {
                    const [h, m] = time.split(':');
                    const diffMs = target - now;
                    const diffHours = diffMs / (1000 * 60 * 60);
                    
                    if (diffHours > 0 && diffHours < 1) {
                        const mins = Math.max(1, Math.ceil(diffHours * 60));
                        isNearDeadline = true;
                        label = `Due in ${mins} MINS`;
                    } else if (diffHours > 0 && diffHours <= 4) {
                        isNearDeadline = true;
                        label = `Due in ${Math.ceil(diffHours)}${Math.ceil(diffHours) === 1 ? ' HR' : ' HRS'}`;
                    } else if (diffHours > 0 && diffHours <= 8) {
                        label = `Due in ${Math.ceil(diffHours)}${Math.ceil(diffHours) === 1 ? ' HR' : ' HRS'}`;
                    }
                    
                    const hours = parseInt(h);
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    const h12 = hours % 12 || 12;
                    label += ` • ${h12}:${m} ${ampm}`;
                }
                return { label, isOverdue, isNearDeadline, isDueTomorrow };
            }
            
            if (date === tomorrowStr) {
                let label = isOverdue ? 'Past due' : 'Due Tomorrow';
                let isNearDeadline = false;
                if (time) {
                    const [h, m] = time.split(':');
                    const tgt = parseDateString(date);
                    tgt.setHours(parseInt(h), parseInt(m), 0, 0);
                    const diffMs = tgt - now;
                    const diffHours = diffMs / (1000 * 60 * 60);
                    if (diffHours > 0 && diffHours < 1) {
                        const mins = Math.max(1, Math.ceil(diffHours * 60));
                        isNearDeadline = true;
                        label = `Due in ${mins} MINS`;
                    } else if (diffHours > 0 && diffHours <= 4) {
                        isNearDeadline = true;
                        label = `Due in ${Math.ceil(diffHours)}${Math.ceil(diffHours) === 1 ? ' HR' : ' HRS'}`;
                    }
                    const hours = parseInt(h);
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    const h12 = hours % 12 || 12;
                    label += ` • ${h12}:${m} ${ampm}`;
                }
                isDueTomorrow = true;
                return { label, isOverdue, isNearDeadline, isDueTomorrow };
            }

            const options = { month: 'short', day: 'numeric' };
            let str = d.toLocaleDateString('en-US', options);
            if (time) {
                const [h, m] = time.split(':');
                const hours = parseInt(h);
                const ampm = hours >= 12 ? 'PM' : 'AM';
                const h12 = hours % 12 || 12;
                str += ` • ${h12}:${m} ${ampm}`;
            }
            return { label: isOverdue ? `Past due • ${str}` : str, isOverdue, isNearDeadline: false, isDueTomorrow: false };
        };

        // --- GLOBAL UTILITY ---
        // LABEL: formatTime — Converts 24h time string (HH:mm) to 12h AM/PM format
        // FIX 2026-04-20: Moved to global scope to resolve "formatTime is not defined" error in Alarms/Clock page
        const formatTime = (time) => {
            if (!time) return '';
            const [h, m] = String(time).split(':');
            const hours = parseInt(h);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const h12 = hours % 12 || 12;
            return `${h12}:${m} ${ampm}`;
        };

        const sortQuickTasksList = (quickTasks = []) => {
            const tasks = [...(Array.isArray(quickTasks) ? quickTasks : [])];
            tasks.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;

                const hasA = !!a.dueDate;
                const hasB = !!b.dueDate;
                if (hasA || hasB) {
                    if (hasA && !hasB) return -1;
                    if (!hasA && hasB) return 1;
                    if (a.dueDate !== b.dueDate) return String(a.dueDate || '').localeCompare(String(b.dueDate || ''));

                    const tA = a.dueTime || '23:59';
                    const tB = b.dueTime || '23:59';
                    if (tA !== tB) return tA.localeCompare(tB);
                }

                const dateA = a.createdAt || 0;
                const dateB = b.createdAt || 0;
                return dateB - dateA;
            });
            return tasks;
        };

        const groupQuickTasksBySchedule = (quickTasks = []) => {
            const sortedQuickTasks = sortQuickTasksList(quickTasks);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const groups = {
                today: [],
                tomorrow: [],
                upcoming: [],
                completed: []
            };

            sortedQuickTasks.forEach(task => {
                if (task.completed) {
                    groups.completed.push(task);
                    return;
                }
                if (!task.dueDate) {
                    groups.today.push(task);
                    return;
                }

                const due = new Date(`${task.dueDate}T00:00:00`);
                if (Number.isNaN(due.getTime())) {
                    groups.upcoming.push(task);
                    return;
                }

                if (due.getTime() <= today.getTime()) {
                    groups.today.push(task);
                } else if (due.getTime() === tomorrow.getTime()) {
                    groups.tomorrow.push(task);
                } else {
                    groups.upcoming.push(task);
                }
            });

            return groups;
        };

        const buildQuickTaskStats = (quickTasks = []) => {
            const all = Array.isArray(quickTasks) ? quickTasks : [];
            const completed = all.filter(t => t.completed);
            const pending = all.filter(t => !t.completed);
            const total = all.length;
            const completionRate = total ? Math.round((completed.length / total) * 100) : 0;

            const startOfToday = new Date();
            startOfToday.setHours(0, 0, 0, 0);
            const endOfToday = new Date(startOfToday);
            endOfToday.setDate(endOfToday.getDate() + 1);
            const tomorrow = new Date(startOfToday);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dayAfterTomorrow = new Date(tomorrow);
            dayAfterTomorrow.setDate(dayAfterTomorrow.getDate() + 1);

            const doneToday = completed.filter(t => t.completedAt && t.completedAt >= startOfToday.getTime() && t.completedAt < endOfToday.getTime()).length;
            const overdue = pending.filter(t => {
                if (!t.dueDate) return false;
                const due = new Date(`${t.dueDate}T${t.dueTime || '23:59'}`).getTime();
                return !Number.isNaN(due) && due < Date.now();
            }).length;
            const dueToday = pending.filter(t => t.dueDate === formatDateLocal(startOfToday)).length;
            const dueTomorrow = pending.filter(t => t.dueDate === formatDateLocal(tomorrow)).length;
            const noDate = pending.filter(t => !t.dueDate).length;

            const weekBuckets = Array.from({ length: 7 }).map((_, idx) => {
                const d = new Date(startOfToday);
                d.setDate(d.getDate() - (6 - idx));
                const key = d.toLocaleDateString('en-US', { weekday: 'short' });
                return { key, done: 0 };
            });

            completed.forEach(t => {
                if (!t.completedAt) return;
                const d = new Date(t.completedAt);
                d.setHours(0, 0, 0, 0);
                const diffDays = Math.floor((startOfToday.getTime() - d.getTime()) / (24 * 60 * 60 * 1000));
                if (diffDays >= 0 && diffDays < 7) {
                    const idx = 6 - diffDays;
                    weekBuckets[idx].done += 1;
                }
            });

            const nextDueTask = sortQuickTasksList(pending.filter(t => !!t.dueDate))[0] || null;
            return { total, completed: completed.length, pending: pending.length, completionRate, doneToday, overdue, dueToday, dueTomorrow, noDate, weekBuckets, nextDueTask };
        };

        const getTodayEnabledAlarms = (alarms = []) => {
            const start = new Date();
            start.setHours(0, 0, 0, 0);
            const end = new Date(start);
            end.setDate(end.getDate() + 1);

            return [...(Array.isArray(alarms) ? alarms : [])]
                .filter(alarm => alarm?.enabled)
                .map(alarm => {
                    try {
                        return { alarm, date: getAlarmScheduleDate(alarm) };
                    } catch (error) {
                        return null;
                    }
                })
                .filter(Boolean)
                .filter(entry => entry.date >= start && entry.date < end)
                .sort((a, b) => a.date - b.date);
        };


        // ==========================================================================
        // LABEL: FIREBASE & AUTH — Initialization and Google Sign-In
        // ==========================================================================
        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyDktbyVgI7AAwaY2u-KsWBRwLZawy0949s",
            authDomain: "faiora-24f4a.firebaseapp.com",
            projectId: "faiora-24f4a",
            storageBucket: "faiora-24f4a.firebasestorage.app",
            messagingSenderId: "752265363994",
            appId: "1:752265363994:web:78795bfad67d2d541e07a3",
            measurementId: "G-B0DWSL1JMV"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const isAndroidNative = () =>
            !!window.Capacitor &&
            typeof window.Capacitor.getPlatform === "function" &&
            window.Capacitor.getPlatform() === "android";

        // [FIX 2026-04-19] THE FINAL STAND: Atomic Firestore Settings 
        // Move settings to absolute earliest point to ensure they are applied BEFORE persistence.
        if (isAndroidNative()) {
            db.settings({
                experimentalForceLongPolling: true,
                ignoreUndefinedProperties: true,
                host: "firestore.googleapis.com",
                ssl: true
            });
            console.log("✨ [FIREBASE] Final Stand: High-Compatibility Long-Polling enabled.");
        }

        // Enable offline persistence with multi-tab support — [FIX 2026-04-19] Disable synchronizeTabs on Android APK
        // to prevent potential database locks in the single-view Capacitor environment.
        db.enablePersistence({ synchronizeTabs: !isAndroidNative() }).then(() => {
            console.log("✨ [FIREBASE] Persistence enabled (Native: " + isAndroidNative() + ")");
        }).catch(err => {
            if (err.code === 'failed-precondition') {
                console.warn("⚠️ [FIREBASE] Multi-tab persistence already active in another tab/process. Sync should be consistent.");
            } else if (err.code === 'unimplemented') {
                console.warn("⚠️ [FIREBASE] Persistence not supported by browser");
            } else {
                console.error("❌ [FIREBASE] Persistence error:", err.message);
            }
        });

        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const signInWithGoogle = async () => {
            if (isAndroidNative()) {
                const firebaseAuthPlugin = window.Capacitor?.Plugins?.FirebaseAuthentication;
                if (!firebaseAuthPlugin) {
                    throw new Error("FirebaseAuthentication plugin is not available on Android build.");
                }
                const nativeResult = await firebaseAuthPlugin.signInWithGoogle({
                    skipNativeAuth: true,
                    scopes: ["email", "profile"],
                    useCredentialManager: false
                });
                let idToken = nativeResult?.credential?.idToken;
                if (!idToken) {
                    const tokenResult = await firebaseAuthPlugin.getIdToken({ forceRefresh: true });
                    idToken = tokenResult?.token;
                }
                if (!idToken) {
                    throw new Error("Google sign-in did not return an ID token.");
                }
                const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
                const result = await auth.signInWithCredential(credential);
                if (result?.user) {
                    localStorage.setItem('faiora_logged_in', 'true');
                    // FIX 2026-04-22: Added specific event detail for easier tracking
                    window.dispatchEvent(new CustomEvent('faiora-signed-in', { detail: result.user, source: 'native' }));
                }
                return result;
            }

            const result = await auth.signInWithPopup(googleProvider);
            if (result?.user) {
                localStorage.setItem('faiora_logged_in', 'true');
                // FIX 2026-04-22: Added specific event detail for easier tracking
                window.dispatchEvent(new CustomEvent('faiora-signed-in', { detail: result.user, source: 'popup' }));
            }
            return result;
        };

        // ==========================================================================
        // LABEL: NOTIFICATION ENGINE — Push & Local Notifications
        // ==========================================================================
        const FaioraNotifications = (() => {
            const timers = new Map(); // taskId -> [timerIds]
            let swReady = false;
            let swRegistration = null;

            // ------------------------------------------------------------------
            // LABEL: NOTIF-SW — Register Service Worker (Deep Delay to prevent extension race)
            // ------------------------------------------------------------------
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    // FIX 2026-04-22: Deep 2000ms delay to satisfy Chrome Extensions (AdBlock, etc.)
                    // This prevents the "Unchecked runtime.lastError: message port closed" console spam.
                    setTimeout(() => {
                        navigator.serviceWorker.register('sw.js').then(reg => {
                            swRegistration = reg;
                            swReady = true;

                Object.keys(scheduled).forEach(tag => {
                    const item = scheduled[tag];
                    if (item.timestamp < now) {
                        // missed!
                        sendNotification(item.title, item.body, tag);
                        delete scheduled[tag];
                        hasMissed = true;
                    }
                });

                if (hasMissed) {
                    localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                }
            };


            const scheduleForTask = async (task) => {
                if (!task || !task.dueDate || task.completed) return;
                cancelForTask(task.id);
                await cancelNativeTaskNotifications(task.id);
                const nativeScheduled = await scheduleNativeTaskNotifications(task);
                if (nativeScheduled) return;

                const permitted = hasNotificationApi && Notification.permission === 'granted';
                if (!permitted) return;

                const dueTime = task.dueTime || '23:59';
                const dueDateTime = new Date(`${task.dueDate}T${dueTime}`);
                if (isNaN(dueDateTime.getTime())) return;

                const now = Date.now();
                const dueMs = dueDateTime.getTime();
                const taskTimers = [];
                const taskName = formatTaskText(task.text || task.title || 'Task');
                const timeStr = formatNotifTime(dueDateTime);

                // Timer 1: At exact due time
                if (dueMs > now) {
                    const id = setTimeout(() => {
                        sendNotification(`Task Reminder! 🔥`, `📌 Due Now: ${taskName}\n`, `faiora-due-${task.id}`);
                        // Sync to localStorage for offline catch-up
                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        scheduled[`faiora-due-${task.id}`] = { title: `Task Reminder! 🔥`, body: `📌 Due Now: ${taskName}\n`, timestamp: dueMs };
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    }, dueMs - now);
                    taskTimers.push(id);
                }

                // Timer 2: 1 hour before (Updated 2026-04-15)
                const oneHourBefore = dueMs - (1 * 60 * 60 * 1000);
                if (oneHourBefore > now) {
                    const id = setTimeout(() => {
                        sendNotification(`Task Reminder! 🔥`, `⏳ Due in 1hr: ${taskName}\n`, `faiora-1h-${task.id}`);
                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        scheduled[`faiora-1h-${task.id}`] = { title: `Task Reminder! 🔥`, body: `⏳ Due in 1hr: ${taskName}\n`, timestamp: dueMs };
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    }, oneHourBefore - now);
                    taskTimers.push(id);
                }

                // Timer 3: 24 hours before (Updated 2026-04-15)
                const twentyFourHoursBefore = dueMs - (24 * 60 * 60 * 1000);
                if (twentyFourHoursBefore > now) {
                    const id = setTimeout(() => {
                        sendNotification(`Task Reminder! 🔥`, `⚡ Due in 24hrs: ${taskName}\n`, `faiora-24h-${task.id}`);
                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        scheduled[`faiora-24h-${task.id}`] = { title: `Task Reminder! 🔥`, body: `⚡ Due in 24hrs: ${taskName}\n`, timestamp: dueMs };
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    }, twentyFourHoursBefore - now);
                    taskTimers.push(id);
                }

                if (taskTimers.length > 0) {
                    timers.set(task.id, taskTimers);
                }
            };

            // ------------------------------------------------------------------
            // LABEL: NOTIF-LOCAL-CANCEL — Cancel scheduled notifications for a task
            // ------------------------------------------------------------------
            const cancelForTask = (taskId) => {
                const existing = timers.get(taskId);
                if (existing) {
                    existing.forEach(id => clearTimeout(id));
                    timers.delete(taskId);
                }
                cancelNativeTaskNotifications(taskId);
                if (swRegistration) {
                    ['faiora-due', 'faiora-1h', 'faiora-24h'].forEach(prefix => {
                        swRegistration.getNotifications({ tag: `${prefix}-${taskId}` })
                            .then(notifs => {
                                notifs.forEach(n => n.close());
                            })
                            .catch(() => {});

                        const scheduled = JSON.parse(localStorage.getItem('faiora_scheduled_notifs') || '{}');
                        delete scheduled[`${prefix}-${taskId}`];
                        localStorage.setItem('faiora_scheduled_notifs', JSON.stringify(scheduled));
                    });
                }
            };

            // ------------------------------------------------------------------
            const rescheduleAll = (tasks) => {
                timers.forEach((timerIds) => timerIds.forEach(id => clearTimeout(id)));
                timers.clear();
                if (!tasks || !Array.isArray(tasks)) return;
                tasks.filter(t => t.dueDate && !t.completed).forEach(t => scheduleForTask(t));
            };

            const checkCloudHealth = async () => {
                try {
                    const userId = auth.currentUser ? auth.currentUser.uid : null;
                    if (!userId) return { connected: false, hasToken: false };

                    // Use the actual collection the app is currently using for sync
                    const activeColl = localStorage.getItem('faiora_active_collection') || 'tasks';
                    const status = { connected: false, hasToken: false };
                    
                    // 1. Connection check - Test write/read on the actual user document
                    const testRef = db.collection(activeColl).doc(userId);
                    await testRef.set({ _lastHealthCheck: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                    const doc = await testRef.get();
                    if (doc.exists) status.connected = true;

                    // 2. Token check
                    const tokenDoc = await db.collection('fcmTokens').doc(userId).get();
                    status.hasToken = tokenDoc.exists && (tokenDoc.data().tokens || []).length > 0;

                    return status;
                } catch (e) {
                    console.warn("Cloud health check failed:", e);
                    // If we get a permission error on write, but doc read works, maybe it's partially connected
                    return { connected: false, hasToken: false };
                }
            };

            const notifyNow = async (title, body, tag = 'faiora-generic', extra = {}) => {
                if (hasNativeLocalNotifications()) {
                    const hasPermission = await hasNativeNotificationPermission();
                    if (hasPermission) {
                        await sendNotification(title, body, tag, extra);
                        return;
                    }
                }
                if (!hasNotificationApi || Notification.permission !== 'granted') return;
                sendNotification(title, body, tag, extra);
            };

            return {
                isSwReady: () => swReady,
                checkMissedNotifications,
                requestPermission,
                testNotification,
                registerFCMToken,
                scheduleForTask,
                cancelForTask,
                rescheduleAll,
                playCheckSFX,

                playAlarmSFX,
                stopAlarmSFX, // FIX 2026-04-22: Exported stopAlarmSFX to avoid ReferenceError in App core

                getDeliveredNotifications,
                show: (title, body, tag = 'faiora-generic', extra = {}) => notifyNow(title, body, tag, extra)
            };
        })();

        // LABEL: PullToRefresh — Implements mobile "pull down to refresh" gestures
        // FIX 2026-04-20: Added labels and IDs for easier tracking
        const PullToRefresh = ({ children, onRefresh, disabled = false }) => {
            const [pullDistance, setPullDistance] = useState(0);
            const [status, setStatus] = useState('idle'); // idle, pulling, ready, refreshing
            const pullDistanceRef = useRef(0);
            const isPulling = useRef(false);
            const startY = useRef(0);
            const statusRef = useRef('idle');
            const contentRef = useRef(null);
            const THRESHOLD = 85;
            const gestureCancelled = useRef(false);

            useEffect(() => {
                if (disabled) return;
                const el = contentRef.current;
                if (!el) return;

                const handleTouchStart = (e) => {
                    const scrollContainer = e.target.closest('.overflow-y-auto');
                    if (scrollContainer && scrollContainer.scrollTop > 0) return;
                    
                    isPulling.current = true;
                    startY.current = e.touches[0].pageY;
                    gestureCancelled.current = false;
                };

                const handleTouchMove = (e) => {
                    if (!isPulling.current) return;
                    const y = e.touches[0].pageY;
                    const diffY = y - startY.current;

                    if (diffY < 0) {
                        isPulling.current = false;
                        return;
                    }

                    if (diffY > 5) {
                        const currentPull = Math.min(180, diffY * 0.4);
                        pullDistanceRef.current = currentPull;
                        setPullDistance(currentPull);
                        
                        const newStatus = currentPull > THRESHOLD ? 'ready' : 'pulling';
                        statusRef.current = newStatus;
                        setStatus(newStatus);

                        if (currentPull > 5 && e.cancelable) {
                             e.preventDefault();
                        }
                    }
                };

                const handleTouchEnd = () => {
                    if (!isPulling.current) return;
                    const currentDistance = pullDistanceRef.current;
                    isPulling.current = false;

                    if (currentDistance > THRESHOLD && !gestureCancelled.current) {
                        statusRef.current = 'refreshing';
                        setStatus('refreshing');
                        pullDistanceRef.current = 100;
                        setPullDistance(100);
                        if (onRefresh) {
                            onRefresh().finally(() => {
                                setTimeout(() => {
                                    statusRef.current = 'idle';
                                    setStatus('idle');
                                    pullDistanceRef.current = 0;
                                    setPullDistance(0);
                                }, 500);
                            });
                        }
                    } else {
                        pullDistanceRef.current = 0;
                        setPullDistance(0);
                        statusRef.current = 'idle';
                        setStatus('idle');
                    }
                };

                el.addEventListener('touchstart', handleTouchStart, { passive: true });
                el.addEventListener('touchmove', handleTouchMove, { passive: false });
                el.addEventListener('touchend', handleTouchEnd, { passive: true });

                return () => {
                    el.removeEventListener('touchstart', handleTouchStart);
                    el.removeEventListener('touchmove', handleTouchMove);
                    el.removeEventListener('touchend', handleTouchEnd);
                };
            }, [disabled, onRefresh]);

            return (
                <div id="faiora_pull_to_refresh_wrapper" ref={contentRef} className="flex-1 h-full flex flex-col relative touch-pan-x touch-pan-y">
                    <div 
                        id="faiora_pull_to_refresh_indicator"
                        className="absolute left-0 w-full flex flex-col items-center justify-center pointer-events-none z-[150] transition-all duration-200"
                        style={{ 
                            height: `${pullDistance}px`,
                            top: '110px',
                            opacity: pullDistance > 30 ? 1 : 0
                        }}
                    >
                        <div className={`p-2.5 bg-slate-950 border border-white/10 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.6)] transition-transform ${status === 'refreshing' ? 'animate-spin' : ''}`}
                             style={{ transform: `rotate(${pullDistance * 2}deg) scale(${Math.min(1.1, pullDistance / 70)})` }}>
                            <span className="material-symbols-outlined text-primary text-3xl font-bold">
                                {status === 'ready' ? 'release_alert' : (status === 'refreshing' ? 'sync' : 'expand_circle_down')}
                            </span>
                        </div>
                        <p className="text-[10px] font-black text-primary tracking-[0.3em] mt-3 uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                            {status === 'pulling' ? 'Pull' : (status === 'ready' ? 'Release' : 'Syncing')}
                        </p>
                    </div>
                    {children}
                </div>
            );
        };

                    }
                }
                setHasChanges(true);
                hasChangesRef.current = true;
            };
            const handleEditorKeyDown = (e) => {
                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                const range = selection.getRangeAt(0);
                const startNode = range.startContainer;
                const startOffset = range.startOffset;

                // --- Space Key Logic (for list auto-formatting) ---
                if (e.key === ' ') {
                    const item = startNode.nodeType === 3 ? startNode.parentElement.closest('.checklist-item') : startNode.closest('.checklist-item');
                    if (!item) {
                        const currentBlock = startNode.nodeType === 3 ? startNode.parentElement.closest('div') : startNode.closest('div');
                        if (currentBlock && !currentBlock.classList.contains('note-editor-area')) {
                            const text = currentBlock.textContent;
                            if (startOffset === 1 && (text === '-' || text === '*')) {
                                e.preventDefault();
                                currentBlock.innerHTML = '-&nbsp;';
                                currentBlock.className = 'bullet-item';
                                const newRange = document.createRange();
                                newRange.setStart(currentBlock.childNodes[0], 2);
                                newRange.collapse(true);
                                selection.removeAllRanges();
                                selection.addRange(newRange);
                                setHasChanges(true);
                                hasChangesRef.current = true;
                                saveState();
                                return;
                            }
                        }
                    }
                }

                // --- Enter Key Logic ---
                if (e.key === 'Enter') {
                    const item = startNode.nodeType === 3 ? startNode.parentElement.closest('.checklist-item') : startNode.closest('.checklist-item');
                    
                    if (!item && startNode.nodeType === 3) {
                        const lineText = startNode.textContent;
                        
                         // Shortcut Detective: Divider
                         if (lineText.slice(0, startOffset).endsWith('---')) {
                             e.preventDefault();
                             startNode.textContent = lineText.slice(0, startOffset - 3) + lineText.slice(startOffset);
                             document.execCommand('insertHTML', false, '<hr style="border:none; border-top: 1px solid rgba(0,0,0,0.1); margin: 1.5rem 0; width: 100%;" />');
                             setHasChanges(true);
                             hasChangesRef.current = true;
                             saveState();
                             return;
                         }
                    }

                    if (item) {
                        e.preventDefault();
                        const text = item.textContent.trim();
                        
                        if (text === "") {
                            // Smart Exit: Convert to plain DIV
                            const div = document.createElement('div');
                            div.innerHTML = '&nbsp;';
                            item.parentNode.replaceChild(div, item);
                            
                            const newRange = document.createRange();
                            newRange.setStart(div, 0);
                            newRange.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(newRange);
                        } else {
                            // Smart Continuation: Insert new checklist item
                            const newItem = document.createElement('div');
                            newItem.className = 'checklist-item';
                            newItem.innerHTML = '<span class="checklist-checkbox" contenteditable="false"></span><span>&nbsp;</span>';
                            
                            item.insertAdjacentElement('afterend', newItem);
                            
                            const newRange = document.createRange();
                            const textSpan = newItem.querySelector('span:not(.checklist-checkbox)');
                            newRange.setStart(textSpan, 1);
                            newRange.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(newRange);
                        }
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                        return;
                    }

                    // --- Auto-Indentation & Custom Bullets ---
                    if (!item) {
                        const currentBlock = startNode.nodeType === 3 ? startNode.parentElement.closest('div') : startNode.closest('div');
                        if (currentBlock && !currentBlock.classList.contains('note-editor-area')) {
                            const text = currentBlock.textContent;
                            const hasIndentation = currentBlock.style.marginLeft && currentBlock.style.marginLeft !== '0px';
                            const isBulletItem = currentBlock.classList.contains('bullet-item');

                            // Smart Exit: If user presses Enter on an empty bullet line or an empty indented line
                            const isDashOnly = text.replace(/\s|\u00a0/g, '') === "-" || text.replace(/\s|\u00a0/g, '') === "";
                            if (isDashOnly && (isBulletItem || hasIndentation)) {
                                e.preventDefault();
                                currentBlock.style.marginLeft = '0px';
                                currentBlock.className = '';
                                currentBlock.innerHTML = '&nbsp;';
                                
                                const newRange = document.createRange();
                                newRange.setStart(currentBlock.childNodes[0] || currentBlock, 0);
                                newRange.collapse(true);
                                selection.removeAllRanges();
                                selection.addRange(newRange);
                                
                                setHasChanges(true);
                                hasChangesRef.current = true;
                                saveState();
                                return;
                            }

                            // Bullet Continuation: Only if we are at the end of the line
                            const isAtEnd = startNode.nodeType === 3 ? startOffset === startNode.length : startOffset === startNode.childNodes.length;
                            
                            if (isBulletItem && isAtEnd) {
                                e.preventDefault();
                                const nextDiv = document.createElement('div');
                                nextDiv.className = 'bullet-item';
                                nextDiv.innerHTML = '-&nbsp;';
                                currentBlock.insertAdjacentElement('afterend', nextDiv);
                                
                                const newRange = document.createRange();
                                newRange.setStart(nextDiv.childNodes[0], 2);
                                newRange.collapse(true);
                                selection.removeAllRanges();
                                selection.addRange(newRange);
                                setHasChanges(true);
                                hasChangesRef.current = true;
                                saveState();
                                return;
                            } else if (hasIndentation) {
                                e.preventDefault();
                                const nextDiv = document.createElement('div');
                                nextDiv.style.marginLeft = currentBlock.style.marginLeft;
                                nextDiv.innerHTML = '&nbsp;';
                                currentBlock.insertAdjacentElement('afterend', nextDiv);
                                
                                const newRange = document.createRange();
                                newRange.setStart(nextDiv, 0);
                                newRange.collapse(true);
                                selection.removeAllRanges();
                                selection.addRange(newRange);
                                setHasChanges(true);
                                hasChangesRef.current = true;
                                saveState();
                                return;
                            }
                        }
                    }
                }

                // --- Backspace Key Logic ---
                if (e.key === 'Backspace' && range.collapsed) {
                    const currentBlock = startNode.nodeType === 3 ? startNode.parentElement.closest('div, li, .checklist-item') : startNode.closest('div, li, .checklist-item');
                    
                    if (currentBlock && startOffset === 0) {
                        // Check for indentation or special class
                        const hasIndentation = currentBlock.style.marginLeft && currentBlock.style.marginLeft !== '0px';
                        const isBulletItem = currentBlock.classList.contains('bullet-item');
                        const isChecklistItem = currentBlock.classList.contains('checklist-item');

                        if (hasIndentation || isBulletItem || isChecklistItem) {
                            e.preventDefault();
                            if (isChecklistItem) {
                                // Convert checklist to plain text
                                const div = document.createElement('div');
                                const contentSpan = currentBlock.querySelector('span:not(.checklist-checkbox)');
                                div.innerHTML = contentSpan ? contentSpan.innerHTML : '&nbsp;';
                                currentBlock.parentNode.replaceChild(div, currentBlock);
                                const newRange = document.createRange();
                                newRange.setStart(div, 0);
                                newRange.collapse(true);
                                selection.removeAllRanges();
                                selection.addRange(newRange);
                            } else if (isBulletItem) {
                                // Remove bullet class but keep content
                                currentBlock.classList.remove('bullet-item');
                                currentBlock.innerHTML = currentBlock.innerHTML.replace(/^-\s*|^-&nbsp;/, '');
                                if (!currentBlock.innerHTML) currentBlock.innerHTML = '&nbsp;';
                                const newRange = document.createRange();
                                newRange.setStart(currentBlock, 0);
                                newRange.collapse(true);
                                selection.removeAllRanges();
                                selection.addRange(newRange);
                            } else if (hasIndentation) {
                                // Reduce indentation
                                const currentML = parseInt(currentBlock.style.marginLeft);
                                currentBlock.style.marginLeft = Math.max(0, currentML - 24) + 'px';
                            }
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                            return;
                        }
                    }
                }
            };

            const toggleFormat = (marker) => {
                if (marker === '**') document.execCommand('bold', false, null);
                if (marker === '*') document.execCommand('italic', false, null);
                if (marker === '__') document.execCommand('underline', false, null);
                if (marker === '~~') document.execCommand('strikeThrough', false, null);
                setHasChanges(true);
                hasChangesRef.current = true;
            };

            const toggleHighlight = (color) => {
                document.execCommand('hiliteColor', false, color);
                setHasChanges(true);
                hasChangesRef.current = true;
            };

            const applyCase = (caseType) => {
                const selection = window.getSelection();
                if (!selection.rangeCount || selection.isCollapsed) return;
                
                const range = selection.getRangeAt(0);
                const fragment = range.extractContents();
                
                const walker = document.createTreeWalker(fragment, NodeFilter.SHOW_TEXT);
                while (walker.nextNode()) {
                    const node = walker.currentNode;
                    const text = node.nodeValue;
                    if (caseType === 'upper') {
                        node.nodeValue = text.toUpperCase();
                    } else if (caseType === 'lower') {
                        node.nodeValue = text.toLowerCase();
                    } else if (caseType === 'cap') {
                        // Better capitalize: Force Title Case (every word starts with upper, rest lower)
                        node.nodeValue = text.toLowerCase().replace(/\b[a-z\u00c0-\u00ff]/g, (match) => match.toUpperCase());
                    }
                }
                
                const firstChild = fragment.firstChild;
                const lastChild = fragment.lastChild;
                range.insertNode(fragment);
                
                setHasChanges(true);
                hasChangesRef.current = true;
                saveState();
                
                // Restore selection across the modified content
                if (firstChild && lastChild) {
                    selection.removeAllRanges();
                    const newRange = document.createRange();
                    newRange.setStartBefore(firstChild);
                    newRange.setEndAfter(lastChild);
                    selection.addRange(newRange);
                }
            };
            const handleEditorClick = (e) => {
                
                const target = e.target;
                if (target.classList.contains('checklist-checkbox')) {
                    const li = target.closest('.checklist-item');
                    if (li) {
                        li.classList.toggle('checked');
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    }
                }
            };
            
            const handleImageResize = (e, targetImage, handleType) => {
                const isTouch = e.type.startsWith('touch');
                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                const startY = isTouch ? e.touches[0].clientY : e.clientY;
                const initialWidth = targetImage.offsetWidth;
                const initialHeight = targetImage.offsetHeight;
                const aR = initialWidth / initialHeight;
                const editorWidth = editorRef.current ? editorRef.current.offsetWidth : window.innerWidth;

                document.body.classList.add('resizing-active');
                if (handleType === 'br' || handleType === 'tl') {
                    document.body.style.cursor = 'nwse-resize';
                } else {
                    document.body.style.cursor = 'nesw-resize';
                }

                const onMove = (moveEvent) => {
                    const currentX = isTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
                    const currentY = isTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;
                    
                    // Resizing logic with aspect ratio preservation
                    let deltaX = 0;
                    let deltaY = 0;

                    if (handleType === 'br') {
                        deltaX = currentX - startX;
                        deltaY = currentY - startY;
                    } else if (handleType === 'tl') {
                        deltaX = startX - currentX;
                        deltaY = startY - currentY;
                    } else if (handleType === 'tr') {
                        deltaX = currentX - startX;
                        deltaY = startY - currentY;
                    } else if (handleType === 'bl') {
                        deltaX = startX - currentX;
                        deltaY = currentY - startY;
                    }

                    // Use the larger delta to drive resizing
                    const dominantDelta = Math.abs(deltaX) > Math.abs(deltaY) ? deltaX : (deltaY * aR);
                    const newWidth = Math.max(80, Math.min(editorWidth - 40, initialWidth + dominantDelta));
                    
                    targetImage.style.width = newWidth + 'px';
                    targetImage.style.height = 'auto'; // Keep aspect ratio
                    
                    if (isTouch) moveEvent.preventDefault(); // Prevent scroll
                };

                const onEnd = () => {
                    document.removeEventListener('mousemove', onMove, true);
                    document.removeEventListener('mouseup', onEnd, true);
                    document.removeEventListener('touchmove', onMove, { passive: false });
                    document.removeEventListener('touchend', onEnd, true);
                    document.body.classList.remove('resizing-active');
                    document.body.style.cursor = '';
                    setHasChanges(true);
                    hasChangesRef.current = true;
                    saveState();
                };

                document.addEventListener('mousemove', onMove, true);
                document.addEventListener('mouseup', onEnd, true);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd, true);
            };

            const handleImageMoveStart = (e, container) => {
                const isTouch = e.type.startsWith('touch');
                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                const startY = isTouch ? e.touches[0].clientY : e.clientY;
                const img = container.querySelector('img');
                if (!img) return;

                const rect = container.getBoundingClientRect();
                const offsetX = startX - rect.left;
                const offsetY = startY - rect.top;

                // Create ghost
                const ghost = container.cloneNode(true);
                ghost.className = 'image-drag-ghost';
                ghost.style.width = rect.width + 'px';
                ghost.style.height = rect.height + 'px';
                ghost.style.left = rect.left + 'px';
                ghost.style.top = rect.top + 'px';
                document.body.appendChild(ghost);

                container.classList.add('dragging-now');
                document.body.classList.add('dragging-image-active');

                // Marker
                const marker = document.createElement('div');
                marker.className = 'drop-insertion-marker';
                let currentDropTarget = null;

                const onMove = (moveEvent) => {
                    const curX = isTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
                    const curY = isTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;

                    // Update ghost position
                    ghost.style.left = (curX - offsetX) + 'px';
                    ghost.style.top = (curY - offsetY) + 'px';

                    // Find drop position using caret
                    let range;
                    if (document.caretRangeFromPoint) {
                        // Offset Y slightly to target the line center better
                        range = document.caretRangeFromPoint(curX, curY);
                    } else if (moveEvent.rangeParent) {
                        range = document.createRange();
                        range.setStart(moveEvent.rangeParent, moveEvent.rangeOffset);
                    }

                    if (range && editorRef.current.contains(range.startContainer)) {
                        // Ensure it's inside a block-level element if possible
                        let container = range.startContainer;
                        if (container.nodeType === 3) container = container.parentNode;
                        
                        // Avoid deep nesting inside complex spans if we can
                        const block = container.closest('div, p, li, h1, h2');
                        if (block && editorRef.current.contains(block)) {
                             // Correct range if we are at edge of text node
                             range.insertNode(marker);
                             currentDropTarget = range;
                        }
                    }

                    if (isTouch) moveEvent.preventDefault();
                };

                const onEnd = () => {
                    document.removeEventListener('mousemove', onMove, true);
                    document.removeEventListener('mouseup', onEnd, true);
                    document.removeEventListener('touchmove', onMove, { passive: false });
                    document.removeEventListener('touchend', onEnd, true);
                    
                    document.body.classList.remove('dragging-image-active');
                    container.classList.remove('dragging-now');
                ghost.remove();

                    if (currentDropTarget && editorRef.current.contains(marker)) {
                        marker.parentNode.insertBefore(container, marker);
                        marker.remove();
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    } else {
                        marker.remove();
                    }
                };

                document.addEventListener('mousemove', onMove, true);
                document.addEventListener('mouseup', onEnd, true);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd, true);
            };

            const handlePaste = (e) => {
                const clipboardData = e.clipboardData || window.clipboardData;
                if (!clipboardData) return;
                const items = clipboardData.items || [];
                const imageItem = Array.from(items).find(item => item.kind === 'file' && item.type.startsWith('image/'));
                if (imageItem) {
                    e.preventDefault();
                    const blob = imageItem.getAsFile();
                    if (blob) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const src = event.target && event.target.result ? event.target.result : '';
                            if (!src) return;
                            const imgHtml = `
                                <div class="resizable-image-container selected" contenteditable="false">
                                    <div class="image-toolbar">
                                        <button class="image-action-btn danger" data-action="image-delete">
                                            <span class="material-symbols-outlined text-[16px]">delete</span>
                                            Delete
                                        </button>
                                    </div>
                                    <img src="${src}" class="resizable-image selected" style="width: 250px" />
                                    <div class="resize-handle tl"></div>
                                    <div class="resize-handle tr"></div>
                                    <div class="resize-handle bl"></div>
                                    <div class="resize-handle br"></div>
                                </div>
                            `;
                            document.execCommand('insertHTML', false, imgHtml + '<div>&nbsp;</div>');
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        };
                        reader.readAsDataURL(blob);
                    }
                    return;
                }
                e.preventDefault();
                const text = clipboardData.getData('text');
                document.execCommand('insertText', false, text);
            };


            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imgHtml = `
                            <div class="resizable-image-container selected" contenteditable="false">
                                <div class="image-toolbar">
                                    <button class="image-action-btn danger" data-action="image-delete">
                                        <span class="material-symbols-outlined text-[16px]">delete</span>
                                        Delete
                                    </button>
                                </div>
                                <img src="${event.target.result}" class="resizable-image selected" style="width: 250px" />
                                <div class="resize-handle tl"></div>
                                <div class="resize-handle tr"></div>
                                <div class="resize-handle bl"></div>
                                <div class="resize-handle br"></div>
                            </div>
                        `;
                        document.execCommand('insertHTML', false, imgHtml + '<div>&nbsp;</div>');
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                const handleGlobalInteract = (e) => {
                    const target = e.target;
                    const isTouch = e.type.startsWith('touch');
                    const startX = isTouch ? e.touches[0].clientX : e.clientX;
                    const startY = isTouch ? e.touches[0].clientY : e.clientY;
                    
                    // Clear helper
                    const clearAll = () => {
                        document.querySelectorAll('.resizable-image.selected, .resizable-image-container.selected').forEach(el => el.classList.remove('selected'));
                        setSelectedImage(null);
                    };

                    // 1. Handle clicking on an image
                    if (target.classList.contains('resizable-image')) {
                        e.stopPropagation();
                        // On touch, we might not want to prevent default if we want focus, but for selection it's better to prevent.
                        if (!isTouch) e.preventDefault(); 
                        
                        clearAll();
                        const container = target.closest('.resizable-image-container');
                        if (container) container.classList.add('selected');
                        target.classList.add('selected');
                        setSelectedImage(target);

                        // Long Press to Move
                        const timer = setTimeout(() => {
                            if (container) handleImageMoveStart(e, container);
                        }, 500);
                        
                        const clearTimer = () => clearTimeout(timer);
                        document.addEventListener('mouseup', clearTimer, { once: true });
                        document.addEventListener('touchend', clearTimer, { once: true });
                        document.addEventListener('mousemove', (me) => {
                            if (Math.abs(me.clientX - startX) > 10 || Math.abs(me.clientY - startY) > 10) clearTimer();
                        }, { once: true });
                        
                        return;
                    }
                    
                    // 2. Handle clicking a resize handle (Remove crop handles)
                    if (target.classList.contains('resize-handle')) {
                        e.stopPropagation();
                        e.preventDefault();
                        const handleType = target.classList.contains('tl') ? 'tl' :
                                         target.classList.contains('tr') ? 'tr' :
                                         target.classList.contains('bl') ? 'bl' : 'br';
                        
                        const container = target.closest('.resizable-image-container');
                        const img = container ? container.querySelector('img') : null;
                        if (img) handleImageResize(e, img, handleType);
                        return;
                    }

                    // 4. Handle Action Buttons (Delete)
                    const action = target.closest('[data-action]') ? target.closest('[data-action]').dataset.action : null;
                    if (action) {
                        e.stopPropagation();
                        e.preventDefault();
                        const container = target.closest('.resizable-image-container');
                        
                        if (action === 'image-delete' && container) {
                            container.remove();
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        }
                        return;
                    }

                    // 3. Deselect when clicking outside
                    if (selectedImage && !target.closest('.resizable-image-container')) {
                        clearAll();
                    }
                };
                
                document.addEventListener('mousedown', handleGlobalInteract, true);
                document.addEventListener('touchstart', handleGlobalInteract, { capture: true, passive: false });
                
                return () => {
                    document.removeEventListener('mousedown', handleGlobalInteract, true);
                    document.removeEventListener('touchstart', handleGlobalInteract, true);
                };
            }, [selectedImage]);

            const ownerId = editingNote ? editingNote.ownerId : user?.uid;
            const canEdit = useMemo(() => {
                if (!user) return isPublic && allowPublicEdit;
                if (!ownerId || user.uid === ownerId) return true;
                if (user.email && sharedWith.includes(user.email.toLowerCase())) return true;
                if (isPublic && allowPublicEdit) return true;
                return false;
            }, [user, ownerId, sharedWith, isPublic, allowPublicEdit]);

            const theme = themes.find(t => t.id === noteTheme);
            const currentThemeClass = theme ? theme.themeClass : '';

            /* notepad-modal-overlay - fullscreen overlay container for the task creator/notepad */
            /* notepad-modal-overlay - raised z-index to 999 for extreme mobile priority */
            /* FIX 2026-04-15: Raised to z-[999] (was 500) */
            return (
                <div className={"fixed inset-0 z-[999] flex items-center justify-center transition-all duration-300 " + (isFullscreen ? "p-0" : "p-0 md:p-8") + " " + (isClosing ? 'opacity-0 scale-95 pointer-events-none' : 'animate-in fade-in duration-500')}>
                    <div className={"absolute inset-0 bg-black/70 backdrop-blur-2xl transition-opacity duration-300 " + (isClosing ? 'opacity-0' : '')} onClick={handleClose}></div>
                    
                    <div ref={modalRef} style={{ transform: 'translateY(calc(-1 * var(--faiora-keyboard-offset, 0px)))' }} className={"task-creator-modal w-full max-w-full h-full overflow-hidden flex flex-col relative z-10 shadow-2xl transition-all duration-250 " + (isFullscreen ? "md:max-w-full md:h-[100dvh] md:rounded-none !p-0 !m-0" : "md:max-w-4xl md:h-[85vh] md:rounded-[2rem]") + " " + (isClosing ? 'opacity-0 scale-95 translate-y-20 md:translate-y-0 ease-in' : 'animate-in zoom-in-95 duration-500 ease-out') + ' transition-colors duration-500 ' + currentThemeClass}>
                        
                        {/* Top Progress Bar Slider */}
                        <div 
                            className="modal-top-progress cursor-pointer group h-4 bg-black/5 hover:bg-black/10 transition-all relative overflow-hidden"
                            onClick={handleProgressClick}
                            onMouseMove={handleProgressDrag}
                            onTouchMove={handleProgressDrag}
                        >
                            <div 
                                className="modal-progress-fill h-full transition-all duration-300 relative flex items-center justify-end" 
                                style={{ width: progress + "%" }}
                            >
                                <span className={`text-[9px] font-bold text-slate-800 px-2 mb-0.5 select-none transition-opacity ${progress < 15 ? 'opacity-0' : 'opacity-100'}`}>
                                    {progress}%
                                </span>
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow-lg scale-0 group-hover:scale-100 transition-transform ring-4 ring-primary/20"></div>
                            </div>
                            {progress < 15 && (
                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-slate-800 opacity-60 select-none">
                                    {progress}%
                                </span>
                            )}
                        </div>

                        <div 
                            className="task-creator-scroll flex-1 overflow-y-auto p-4 md:p-10 no-scrollbar relative flex flex-col"
                            style={{ scrollPaddingBottom: `${keyboardSafeSpace}px` }}
                        >
                            {noteIcon && (
                                <div className="absolute top-24 right-10 pointer-events-none opacity-[0.07] select-none">
                                    <span className="material-symbols-outlined text-8xl text-primary animate-in zoom-in-50 duration-700">{noteIcon}</span>
                                </div>
                            )}
                            <div className="flex justify-between items-start mb-4 relative z-10">

        const formatReminderDate = (dateStr) => {
            try {
                const d = parseDateString(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                const month = d.toLocaleString('en-US', { month: 'short' });
                const day = d.getDate();
                const time = d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                return `${month} ${day} • ${time}`;
            } catch(e) { return dateStr; }
        };

        const formatDateMinimal = (dateStr) => {
            try {
                const d = parseDateString(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                const month = d.toLocaleString('en-US', { month: 'short' });
                const day = d.getDate();
                return `${month} ${day}`;
            } catch(e) { return dateStr; }
        };

        const stripHtml = (html) => {
            if (!html) return '';
            const tmp = document.createElement('div');
            // Remove <hr> tags specifically and other block-level separations
            const clean = html.replace(/<hr[^>]*>/gi, ' ');
            const formatted = clean.replace(/<\/div>| <\/p>|<\/h1>|<\/h2>|<\/h3>|<\/li>|<\/br>|<br\/?>/gi, ' ');
            tmp.innerHTML = formatted;
            return (tmp.textContent || tmp.innerText || '').trim().replace(/\s+/g, ' ');
        };

        const formatTitle = (text) => {
            if (!text) return '';
            const t = text.trim();
            if (t.length === 0) return '';
            const limited = t.slice(0, 24);
            // If already all caps (and contains at least one letter), keep it. 
            // Otherwise, apply Title Case to ensure it's never all lowercase.
            if (limited === limited.toUpperCase() && /[A-Z]/.test(limited)) {
                return limited;
            }
            return limited.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        };

        const formatTaskText = (text) => {
            if (!text) return '';
            const t = text.trim();
            if (t.length === 0) return '';
            return t.split(/\s+/).map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        };

            const utf8 = new TextEncoder().encode(pin);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);

            return hashArray.map((bytes) => bytes.toString(16).padStart(2, '0')).join('');

                        <div className="flex flex-wrap gap-1.5">
                        {(note.labels && note.labels.length > 0) ? (

                    )}
                </div>
            );
        });

        const QuickTaskItem = React.memo(({ task, onToggle, onDelete, onEdit }) => {

            return (

                    style={{ minHeight: window.innerWidth < 768 ? '64px' : 'auto', touchAction: 'pan-y' }}

                        </div>
                        <div className="flex flex-col gap-0.5">
                            <h4 className={`text-sm md:text-base text-cream-light font-montserrat font-bold tracking-wide transition-all duration-300 line-clamp-2 overflow-hidden ${task.completed ? 'line-through decoration-primary/50 opacity-60' : 'group-hover:text-primary'} ${isOverdue && !task.completed ? 'text-red-400' : ''}`}>

                            </h4>
                            {dueDateStr && (
                                <p className={`text-[9px] md:text-[10px] font-montserrat font-bold uppercase tracking-[0.15em] flex items-center gap-1.5 transition-opacity ${isOverdue && !task.completed ? 'text-red-500' : 'text-primary/80 opacity-60 group-hover:opacity-100'}`}>
