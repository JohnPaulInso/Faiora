<body class="dark overflow-x-hidden">
    <div id="root" class="w-full min-h-screen flex items-center justify-center p-4 relative z-10"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { createRoot } = ReactDOM;

        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyDktbyVgI7AAwaY2u-KsWBRwLZawy0949s",
            authDomain: "faiora-24f4a.firebaseapp.com",
            projectId: "faiora-24f4a",
            storageBucket: "faiora-24f4a.firebasestorage.app",
            messagingSenderId: "752265363994",
            appId: "1:752265363994:web:78795bfad67d2d541e07a3",
            measurementId: "G-B0DWSL1JMV"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const ShareApp = () => {
            const [user, setUser] = useState(null);
            const [note, setNote] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activePopup, setActivePopup] = useState(null);
            const [activeSubPopup, setActiveSubPopup] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);
            const [hasChanges, setHasChanges] = useState(false);
            const [hasSavedOnce, setHasSavedOnce] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const editorRef = useRef(null);
            const hasChangesRef = useRef(false);
            const saveTimeoutRef = useRef(null);
            const fileInputRef = useRef(null);
            const [showCustomReminder, setShowCustomReminder] = useState(false);
            const [selectedImage, setSelectedImage] = useState(null);
            const noteRef = useRef(note);
            useEffect(() => { noteRef.current = note; }, [note]);

            const themes = [
                { id: 'glass', color: 'rgba(0,0,0,0.05)', themeClass: '' },
                { id: 'peach', color: '#ffedd5', themeClass: 'theme-peach' },
                { id: 'amber', color: '#fef3c7', themeClass: 'theme-amber' },
                { id: 'orange', color: '#ffedd5', themeClass: 'theme-orange' },
                { id: 'yellow', color: '#fef9c3', themeClass: 'theme-yellow' },
                { id: 'warm1', color: '#e9d9c4', themeClass: 'theme-warm1' },
                { id: 'warm2', color: '#e9e5d8', themeClass: 'theme-warm2' },
                { id: 'warm3', color: '#e9e2da', themeClass: 'theme-warm3' },
                { id: 'warm4', color: '#e8c59d', themeClass: 'theme-warm4' },
                { id: 'warm5', color: '#e9e6d5', themeClass: 'theme-warm5' },
                { id: 'sage', color: '#ecfdf5', themeClass: 'theme-sage' },
                { id: 'sky', color: '#e0f2fe', themeClass: 'theme-sky' },
                { id: 'lavender', color: '#eef2ff', themeClass: 'theme-lavender' },
                { id: 'rose', color: '#fff1f2', themeClass: 'theme-rose' },
                { id: 'slate', color: '#f1f5f9', themeClass: 'theme-slate' },
                { id: 'teal', color: '#f0fdfa', themeClass: 'theme-teal' },
                { id: 'indigo', color: '#f5f3ff', themeClass: 'theme-indigo' }
            ];

            const icons = [
                'star', 'favorite', 'home', 'work', 'rocket', 'lightbulb', 'eco', 'auto_stories', 
                'fitness_center', 'restaurant', 'pets', 'explore', 'shopping_cart', 'celebration', 
                'terminal', 'brush', 'psychology', 'monitoring', 'diversity_3', 'sports_esports',
                'volunteer_activism', 'public', 'castle', 'luggage', 'shopping_bag', 'wallet',
                'medication', 'spa', 'comedy_mask', 'theater_comedy', 'music_note', 'piano',
                'palette', 'architecture', 'biotech', 'science', 'vape_free', 'podcasts',
                'school', 'book', 'menu_book', 'library_books', 'bookmark', 'grade',
                'attach_money', 'account_balance', 'savings', 'credit_card', 'receipt_long',
                'flight', 'train', 'directions_car', 'directions_bike', 'directions_walk',
                'camera', 'videocam', 'headphones', 'mic', 'movie', 'tv',
                'code', 'developer_mode', 'bug_report', 'build', 'extension', 'widgets',
                'local_cafe', 'local_bar', 'local_pizza', 'bakery_dining', 'lunch_dining', 'icecream',
                'sports_basketball', 'sports_soccer', 'sports_tennis', 'pool', 'surfing', 'hiking',
                'cloud', 'wb_sunny', 'nights_stay', 'ac_unit', 'park', 'forest',
                'child_care', 'family_restroom', 'elderly', 'groups', 'person', 'face',
                'lock', 'key', 'shield', 'security', 'verified', 'admin_panel_settings',
                'notifications_active', 'alarm', 'timer', 'event', 'today', 'calendar_month',
                'chat', 'forum', 'mail', 'call', 'sms', 'send',
                'flag', 'emoji_events', 'military_tech', 'workspace_premium', 'diamond', 'token',
                'handyman', 'plumbing', 'electrical_services', 'carpenter', 'cleaning_services',
                'language', 'translate', 'travel_explore', 'map', 'pin_drop', 'place',
                'local_hospital', 'health_and_safety', 'medical_services', 'emergency',
                'church', 'mosque', 'temple_buddhist', 'synagogue',
                'edit', 'draw', 'design_services', 'color_lens', 'auto_fix_high', 'photo_filter'
            ];

            const filteredIcons = useMemo(() => icons.filter(icon => icon.toLowerCase().includes(searchTerm.toLowerCase())), [searchTerm]);

            const stripHtml = (html) => {
                if (!html) return '';
                const tmp = document.createElement('div');
                const clean = html.replace(/<hr[^>]*>/gi, ' ');
                const formatted = clean.replace(/<\/div>| <\/p>|<\/h1>|<\/h2>|<\/h3>|<\/li>|<\/br>|<br\/?>/gi, ' ');
                tmp.innerHTML = formatted;
                return (tmp.textContent || tmp.innerText || '').trim().replace(/\s+/g, ' ');
            };

            const formatTitle = (text) => {
                if (!text) return '';
                const t = text.trim();
                const limited = t.slice(0, 24);
                if (limited === limited.toUpperCase() && /[A-Z]/.test(limited)) return limited;
                return limited.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
            };

            const formatReminderDate = (dateStr) => {
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }).replace(',', ' •');
                } catch(e) { return dateStr; }
            };

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    console.log("Auth state changed:", u ? `User: ${u.uid}` : "Guest");
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const hash = window.location.hash;
                const token = hash.replace(/^#\/?/, '').split('/').pop();
                if (!token) { setLoading(false); setError("invalid_token"); return; }

                setLoading(true);
                const unsubscribe = db.collection('public_shares').doc(token).onSnapshot(doc => {
                    setLoading(false);
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.isPublic) {
                            // Always process incoming remote changes for real-time sync
                            setNote(prev => {
                                // Real-time sync of content to editor
                                if (editorRef.current && data.content !== editorRef.current.innerHTML) {
                                    // Only update editor if not actively focused (prevent cursor jumps)
                                    if (document.activeElement !== editorRef.current) {
                                        editorRef.current.innerHTML = data.content || '';
                                    }
                                }
                                return { ...data, shareToken: token };
                            });

                            // Initial history setup if not already done
                            setHistory(prev => {
                                if (prev.length === 0) {
                                    const initialState = {
                                        title: data.title,
                                        content: data.content,
                                        progress: data.progress,
                                        noteTheme: data.noteTheme,
                                        noteIcon: data.noteIcon,
                                        labels: data.labels || []
                                    };
                                    setHistoryIndex(0);
                                    return [initialState];
                                }
                                return prev;
                            });
                        } else { setError("no_access"); }
                    } else { setError("not_found"); }
                }, err => {
                    console.error("Sync error:", err);
                    setError("error");
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            const saveToFirestore = useCallback(async (updates = {}, force = false) => {
                const token = window.location.hash.split('/').pop();
                if (!token || (!hasChanges && !force)) return;

                setIsSaving(true);
                try {
                    // Only send fields that actually exist in the share document or are being updated
                    const cleanUpdates = { ...updates };
                    cleanUpdates.updatedAt = firebase.firestore.FieldValue.serverTimestamp();

                    // Remove any undefined fields
                    Object.keys(cleanUpdates).forEach(key => cleanUpdates[key] === undefined && delete cleanUpdates[key]);

                    // Use update instead of set to avoid permission issues and preserve other fields
                    await db.collection('public_shares').doc(token).update(cleanUpdates);
                    
                    setHasChanges(false);
                    hasChangesRef.current = false;
                    setHasSavedOnce(true);
                    setLastSaved(new Date());
                } catch (err) {
                    console.error("Save failed for token:", token);
                    console.error("Updates attempted:", updates);
                    console.error("Error details:", err);
                } finally {
                    setIsSaving(false);
                }
            }, [hasChanges]);

            // Debounced Auto-Save
            const hasInitializedRef = useRef(false);

            useEffect(() => {
                if (loading || !note || !note.content || hasInitializedRef.current) return;
                if (editorRef.current) {
                    editorRef.current.innerHTML = note.content;
                    hasInitializedRef.current = true;
                }
            }, [loading, note]);

            useEffect(() => {
                const token = window.location.hash.split('/').pop();
                if (!token) return;
                if (!hasChanges) return;
                const timer = setTimeout(() => {
                    const html = editorRef.current ? editorRef.current.innerHTML : (note ? note.content : '');
                    saveToFirestore({ 
                        title: note ? note.title : '', 
                        content: html, 
                        progress: note ? note.progress : 0, 
                        noteTheme: note ? note.noteTheme : 'glass', 
                        noteIcon: note ? note.noteIcon : '', 
                        labels: note ? note.labels : []
                    }, true);
                }, 200); // .2 second delay as requested
                return () => clearTimeout(timer);
            }, [note, hasChanges, saveToFirestore]);

            const saveState = useCallback(() => {
                const html = editorRef.current ? editorRef.current.innerHTML : (note ? note.content : '');
                const currentState = { 
                    title: note ? note.title : '', 
                    content: html, 
                    progress: note ? note.progress : 0, 
                    noteTheme: note ? note.noteTheme : 'glass', 
                    noteIcon: note ? note.noteIcon : '', 
                    labels: note ? note.labels : []
                };
                const newHistory = history.slice(0, historyIndex + 1);
                newHistory.push(currentState);
                setHistory(newHistory.slice(-30));
                setHistoryIndex(Math.min(newHistory.length - 1, 29));
                setHasChanges(true);
                hasChangesRef.current = true;
            }, [note, history, historyIndex]);

            const undo = () => {
                if (historyIndex > 0) {
                    const prev = history[historyIndex - 1];
                    setNote(prev);
                    if (editorRef.current) editorRef.current.innerHTML = prev.content;
                    setHistoryIndex(historyIndex - 1);
                }
            };

            const redo = () => {
                if (historyIndex < history.length - 1) {
                    const next = history[historyIndex + 1];
                    setNote(next);
                    if (editorRef.current) editorRef.current.innerHTML = next.content;
                    setHistoryIndex(historyIndex + 1);
                }
            };

            const handlePaste = (e) => {
                if (!note.allowPublicEdit) return;
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const imgUrl = event.target.result;
                            const imgHtml = `<div class="resizable-image-container my-4 relative group" style="width: 100%; max-width: 400px;">
                                <img src="${imgUrl}" class="resizable-image rounded-2xl w-full h-auto cursor-pointer border-4 border-transparent hover:border-primary/20 transition-all" />
                                <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button data-action="image-delete" class="bg-black/50 hover:bg-rose-500 text-white p-2 rounded-xl backdrop-blur-md">
                                        <span class="material-symbols-outlined text-sm font-bold">delete</span>
                                    </button>
                                </div>
                            </div>`;
                            document.execCommand('insertHTML', false, imgHtml);
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            };

            const handleEditorKeyDown = (e) => {
                if (!note || !note.allowPublicEdit) return;
                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                const range = selection.getRangeAt(0);
                const startNode = range.startContainer;
                const startOffset = range.startOffset;

                if (e.key === 'Enter') {
                    const item = startNode.nodeType === 3 ? startNode.parentElement.closest('.checklist-item') : startNode.closest('.checklist-item');
                    
                    if (!item && startNode.nodeType === 3) {
                        const lineText = startNode.textContent;
                        if (lineText.slice(0, startOffset).endsWith('---')) {
                            e.preventDefault();
                            startNode.textContent = lineText.slice(0, startOffset - 3) + lineText.slice(startOffset);
                            document.execCommand('insertHTML', false, '<hr style="border:none; border-top: 1px solid rgba(0,0,0,0.1); margin: 1.5rem 0; width: 100%;" />');
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            return;
                        }
                    }

                    if (item) {
                        e.preventDefault();
                        const text = item.textContent.trim();
                        if (text === "") {
                            const div = document.createElement('div');
                            div.innerHTML = '&nbsp;';
                            item.parentNode.replaceChild(div, item);
                            const newRange = document.createRange();
                            newRange.setStart(div, 0);
                            newRange.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(newRange);
                        } else {
                            const newItem = document.createElement('div');
                            newItem.className = 'checklist-item';
                            newItem.innerHTML = '<span class="checklist-checkbox" contenteditable="false"></span><span>&nbsp;</span>';
                            item.insertAdjacentElement('afterend', newItem);
                            const newRange = document.createRange();
                            const textSpan = newItem.querySelector('span:not(.checklist-checkbox)');
                            newRange.setStart(textSpan, 1);
                            newRange.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(newRange);
                        }
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                        return;
                    }
                }

                if (e.key === 'Backspace' && range.collapsed) {
                    const item = startNode.nodeType === 3 ? startNode.parentElement.closest('.checklist-item') : startNode.closest('.checklist-item');
                    if (item && startOffset === 0) {
                        e.preventDefault();
                        const div = document.createElement('div');
                        const contentSpan = item.querySelector('span:not(.checklist-checkbox)');
                        div.innerHTML = contentSpan ? contentSpan.innerHTML : '&nbsp;';
                        item.parentNode.replaceChild(div, item);
                        const newRange = document.createRange();
                        newRange.setStart(div, 0);
                        newRange.collapse(true);
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                        return;
                    }
                }
            };

            const handleEditorClick = useCallback((e) => {
                const target = e.target;
                if (target.classList.contains('checklist-checkbox')) {
                    const item = target.closest('.checklist-item');
                    if (item) {
                        item.classList.toggle('checked');
                        saveState();
                    }
                    return;
                }
                
                const actionBtn = target.closest('[data-action="image-delete"]');
                if (actionBtn) {
                    const container = target.closest('.resizable-image-container');
                    if (container) {
                        container.remove();
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    }
                }
            }, [saveState]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imgHtml = `
                            <div class="resizable-image-container selected" contenteditable="false">
                                <div class="image-toolbar">
                                    <button class="image-action-btn danger" data-action="image-delete">
                                        <span class="material-symbols-outlined text-[16px]">delete</span>
                                        Delete
                                    </button>
                                </div>
                                <img src="${event.target.result}" class="resizable-image selected" style="width: 250px" />
                                <div class="resize-handle tl"></div>
                                <div class="resize-handle tr"></div>
                                <div class="resize-handle bl"></div>
                                <div class="resize-handle br"></div>
                            </div>
                        `;
                        document.execCommand('insertHTML', false, imgHtml + '<div>&nbsp;</div>');
                        setHasChanges(true);
                        hasChangesRef.current = true;
                        saveState();
                    };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                const handleGlobalInteract = (e) => {
                    if (!note || !canEdit) return;
                    const target = e.target;
                    
                    const clearAll = () => {
                        document.querySelectorAll('.resizable-image.selected, .resizable-image-container.selected').forEach(el => el.classList.remove('selected'));
                        setSelectedImage(null);
                    };

                    if (target.classList.contains('resizable-image')) {
                        e.stopPropagation();
                        clearAll();
                        const container = target.closest('.resizable-image-container');
                        if (container) container.classList.add('selected');
                        target.classList.add('selected');
                        setSelectedImage(target);
                        return;
                    }
                    
                    const action = target.closest('[data-action]') ? target.closest('[data-action]').dataset.action : null;
                    if (action === 'image-delete') {
                        e.stopPropagation();
                        const container = target.closest('.resizable-image-container');
                        if (container) {
                            container.remove();
                            setHasChanges(true);
                            hasChangesRef.current = true;
                            saveState();
                        }
                        return;
                    }

                    if (selectedImage && !target.closest('.resizable-image-container')) {
                        clearAll();
                    }
                };
                
                document.addEventListener('mousedown', handleGlobalInteract, true);
                return () => document.removeEventListener('mousedown', handleGlobalInteract, true);
            }, [note, selectedImage, canEdit]);

            const toggleFormat = (marker) => {
                if (!note || !canEdit) return;
                document.execCommand(marker, false, null);
                saveState();
            };

            const toggleHighlight = (color) => {
                if (!note || !canEdit) return;
                document.execCommand('hiliteColor', false, color);
                saveState();
            };

            const convertActiveBlock = (type) => {
                if (!note || !canEdit) return;
                if (type === 'todo') {
                    const selection = window.getSelection();
                    const text = selection.toString() || ' ';
                    const html = `<div class="checklist-item"><span class="checklist-checkbox" contenteditable="false"></span><span contenteditable="true">${text}</span></div>`;
                    document.execCommand('insertHTML', false, html);
                } else {
                    document.execCommand('formatBlock', false, type);
                }
                saveState();
            };

            const handleProgressClick = (e) => {
                if (!note || !canEdit) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const x = clientX - rect.left;
                const val = Math.round(Math.max(0, Math.min(100, (x / rect.width) * 100)) / 5) * 5;
                setNote(prev => ({ ...prev, progress: val }));
                setHasChanges(true);
                hasChangesRef.current = true;
            };

            const handleProgressDrag = (e) => {
                if (!canEdit) return;
                if (e.buttons !== 1 && !e.touches) return;
                handleProgressClick(e);
            };

            const applyCase = (type) => {
                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                const text = selection.toString();
                let transformed = text;
                if (type === 'upper') transformed = text.toUpperCase();
                else if (type === 'lower') transformed = text.toLowerCase();
                else if (type === 'cap') transformed = text.split(' ').map(s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase()).join(' ');
                document.execCommand('insertHTML', false, transformed);
                saveState();
            };

            if (loading) return (
                <div className="flex flex-col items-center gap-4">
                    <div className="w-10 h-10 border-4 border-white/20 border-t-primary rounded-full animate-spin"></div>
                    <p className="text-white/60 text-[10px] font-bold uppercase tracking-widest font-montserrat">Igniting Note...</p>
                </div>
            );

            if (error || !note) return (
                <div className="fixed inset-0 flex flex-col items-center justify-center p-6 z-[200]">
                    {/* Background gradient for error state */}
                    <div className="fixed inset-0 z-[-1]" style={{ background: 'linear-gradient(180deg, #7c2d12 0%, #111827 40%, #0a0a0a 100%)' }}></div>
                    
                    <div className="bg-black/40 backdrop-blur-2xl w-full max-w-lg rounded-[2.5rem] p-12 text-center border border-white/10 shadow-2xl animate-in zoom-in-95 duration-500">
                        <span className="material-symbols-outlined text-6xl text-primary mb-6">lock</span>
                        <h2 className="text-2xl font-display font-bold text-white italic mb-2">Note not found</h2>
                        <p className="text-white/40 text-sm mb-8 font-montserrat">It may have been made private or deleted by the owner.</p>
                        <a href="index.html" className="px-8 py-3 bg-primary hover:bg-primary-dark text-white rounded-full text-xs font-bold uppercase tracking-widest transition-all font-montserrat shadow-lg hover:shadow-primary/20">Dashboard</a>
                    </div>
                </div>
            );

            const activeTheme = themes.find(t => t.id === note.noteTheme) || themes[0];
            const canEdit = note.allowPublicEdit;
            const title = note.title || '';
            const labels = note.labels || [];
            const isPinned = note.isPinned || false;
            const progress = note.progress || 0;
            const noteIcon = note.noteIcon || '';
            const reminderDate = note.reminderDate || '';
            const currentThemeClass = activeTheme.themeClass;
            const initialContent = note.content || '';

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-0 md:p-8 transition-all duration-300 animate-in fade-in duration-500">
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-2xl transition-opacity duration-300 hidden md:block" onClick={() => window.location.href = 'index.html'}></div>
                    
                    <div className={"task-creator-modal w-full max-w-full md:max-w-4xl h-full md:h-[85vh] rounded-none md:rounded-[2rem] overflow-hidden flex flex-col relative z-10 shadow-2xl transition-all duration-250 animate-in zoom-in-95 duration-500 ease-out transition-colors duration-500 " + currentThemeClass}>
                        
                        <div 
                            className="modal-top-progress cursor-pointer group h-4 bg-black/5 hover:bg-black/10 transition-all relative overflow-hidden"
                            onClick={handleProgressClick}
                            onMouseMove={handleProgressDrag}
                            onTouchMove={handleProgressDrag}
                        >
                            <div 
                                className="modal-progress-fill h-full transition-all duration-300 relative flex items-center justify-end" 
                                style={{ width: progress + "%" }}
                            >
                                <span className={`text-[9px] font-bold text-slate-800 px-2 mb-0.5 select-none transition-opacity ${progress < 15 ? 'opacity-0' : 'opacity-100'}`}>
                                    {progress}%
                                </span>
                                <div className="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow-lg scale-0 group-hover:scale-100 transition-transform ring-4 ring-primary/20"></div>
                            </div>
                            {progress < 15 && (
                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-slate-800 opacity-60 select-none">
                                    {progress}%
                                </span>
                            )}
                        </div>

                        <div 
                            className="flex-1 overflow-y-auto p-4 md:p-10 no-scrollbar relative flex flex-col"
                        >
                            {noteIcon && (
                                <div className="absolute top-24 right-10 pointer-events-none opacity-[0.07] select-none">
                                    <span className="material-symbols-outlined text-8xl text-primary animate-in zoom-in-50 duration-700">{noteIcon}</span>
                                </div>
                            )}
                            <div className="flex justify-between items-start mb-4 relative z-10">
                                <div className="flex-1 flex flex-col gap-2">
                                    <div className="flex items-center gap-2">
                                        <button 
                                            onClick={() => window.location.href='index.html'}
                                            className="md:hidden flex items-center justify-center flex-shrink-0 text-slate-500 hover:text-slate-800 transition-colors p-1 -ml-1"
                                        >
                                            <span className="material-symbols-outlined text-[22px]">arrow_back</span>
                                        </button>
                                    <input 
                                        type="text" 
                                        placeholder="Main title" 
                                        maxLength={24}
                                        readOnly={!canEdit}
                                        className="bg-transparent border-none text-2xl md:text-4xl font-bold text-slate-800 placeholder:text-slate-600 focus:ring-0 w-full tracking-tight px-0 md:px-4 font-display"
                                        value={title}
                                        onChange={(e) => { 
                                            if(!canEdit) return;
                                            const val = e.target.value;
                                            setNote(prev => ({...prev, title: val}));
                                            setHasChanges(true); 
                                            hasChangesRef.current = true;
                                        }}
                                        onBlur={() => {
                                            if(!canEdit) return;
                                            saveState();
                                        }}
                                    />
                                    </div>
                                    <div className="flex flex-wrap items-center gap-2 px-0 md:px-4">
                                        {labels.map(label => (
                                            <span key={label} className="text-[10px] font-bold uppercase tracking-widest bg-primary/10 text-primary px-2 py-1 rounded-md flex items-center gap-1 font-montserrat">
                                                {label}
                                                {canEdit && (
                                                    <button onClick={() => { 
                                                        const newLabels = labels.filter(l => l !== label);
                                                        setNote(prev => ({...prev, labels: newLabels}));
                                                        setHasChanges(true); 
                                                        hasChangesRef.current = true;
                                                        saveState(); 
                                                    }} className="hover:text-primary-dark">
                                                        <span className="material-symbols-outlined text-xs">close</span>
                                                    </button>
                                                )}
                                            </span>
                                        ))}
                                        {reminderDate && (
                                            <span className="inline-flex items-center gap-1 text-[10px] font-bold font-montserrat text-primary bg-primary/10 px-2 py-1 rounded-md">
                                                <span className="material-symbols-outlined text-xs">notifications_active</span>
                                                {formatReminderDate(reminderDate)}
                                            </span>
                                        )}
                                    </div>
                                </div>
                               
                            </div>
                            <div className="flex-1">
                                <div 
                                    ref={editorRef}
                                    contentEditable={canEdit ? "true" : "false"}
                                    className="note-editor-area"
                                    data-placeholder="Start typing your notes..."
                                    onInput={(e) => { if(!canEdit) return; setHasChanges(true); hasChangesRef.current = true; }}
                                    onBlur={saveState}
                                    onClick={handleEditorClick}
                                    onPaste={handlePaste}
                                    onKeyDown={handleEditorKeyDown}
                                />
                            </div>
                        </div>
                        <div className="task-creator-footer mt-auto flex items-center justify-between p-1.5 md:p-3 bg-white/50 backdrop-blur-xl border-t border-black/5 relative z-[100] gap-1 md:gap-2 overflow-visible">
                            <div className="flex items-center gap-0 md:gap-1 flex-nowrap overflow-visible">
                                <div className="relative flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setActivePopup(activePopup === 'format' ? null : 'format'); }} 
                                        className={"footer-action-btn h-[32px] w-[32px] flex items-center justify-center transition-all rounded-xl " + (activePopup === 'format' ? "bg-black/5 text-secondary" : "text-secondary hover:bg-black/5") + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                        title="Formatting"
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[22px]">format_color_text</span>
                                    </button>
                                    
                                    {activePopup === 'format' && (
                                        <div className="format-popup-bar absolute bottom-[calc(100%+8px)] left-1 bg-white rounded-2xl pl-3 shadow-xl border border-black/5 flex flex-nowrap items-center p-2 z-[150] animate-in slide-in-from-bottom-2 duration-200">
                                                
                                                 <div className="relative px-2">
                                                    <button 
                                                        onClick={() => setActiveSubPopup(activeSubPopup === 'style' ? null : 'style')}
                                                        className={"h-10 pl-3 pr-3 flex items-center justify-center gap-1.5 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'style' ? "bg-black/5" : "hover:bg-black/5")}
                                                    >
                                                        <span className="text-[14px] font-bold tracking-tight uppercase font-montserrat">H1</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {activeSubPopup === 'style' && (
                                                        <div className="absolute bottom-full left-0 mb-2 bg-white rounded-xl shadow-2xl border border-black/10 flex items-center p-1.5 px-3 z-[160] animate-in slide-in-from-bottom-2 duration-200 gap-2 w-max whitespace-nowrap">
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('h1'); }} className="h-9 px-2 flex items-center hover:bg-black/5 rounded-md text-base font-bold text-slate-700 font-montserrat">H1</button>
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('h2'); }} className="h-9 px-2 flex items-center hover:bg-black/5 rounded-md text-sm font-bold text-slate-600 font-montserrat">H2</button>
                                                        <button onMouseDown={(e) => { e.preventDefault(); convertActiveBlock('normal'); }} className="centered h-9 px-6 flex items-center text-center justify-center hover:bg-black/5 rounded-md text-xs text-slate-500 font-montserrat">Normal</button>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/10 mx-1"></div>

                                                <div className="relative">
                                                    <button 
                                                        onClick={() => setActiveSubPopup(activeSubPopup === 'case' ? null : 'case')}
                                                        className={"w-10 h-10 flex items-center justify-center gap-1 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'case' ? "bg-black/5" : "hover:bg-black/5")}
                                                    >
                                                        <span className="text-[14px] font-bold tracking-tight font-montserrat">Aa</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {activeSubPopup === 'case' && (
                                                        <div className="absolute bottom-full left-0 mb-2 bg-white rounded-xl shadow-2xl border border-black/10 flex items-center p-1.5 px-2 z-[150] animate-in slide-in-from-bottom-2 duration-200 gap-1">
                                                            <button onMouseDown={(e) => { e.preventDefault(); applyCase('cap'); }} className="h-5 px-3 flex items-center hover:bg-black/5 rounded-lg text-xs capitalize font-bold text-slate-700 font-montserrat">Aa</button>
                                                            <button onMouseDown={(e) => { e.preventDefault(); applyCase('upper'); }} className="h-5 px-3 flex items-center hover:bg-black/5 rounded-lg text-xs uppercase font-bold text-slate-700 font-montserrat">AA</button>
                                                            <button onMouseDown={(e) => { e.preventDefault(); applyCase('lower'); }} className="h-5 px-3 flex items-center hover:bg-black/5 rounded-lg text-xs lowercase font-bold text-slate-700 font-montserrat">aa</button>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/10 mx-1"></div>

                                                <div className="flex items-center">
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('bold'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Bold">
                                                        <span className="material-symbols-outlined text-[20px]">format_bold</span>
                                                    </button>
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('italic'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Italic">
                                                        <span className="material-symbols-outlined text-[20px]">format_italic</span>
                                                    </button>
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('underline'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Underline">
                                                        <span className="material-symbols-outlined text-[20px]">format_underlined</span>
                                                    </button>
                                                    <button onMouseDown={(e) => { e.preventDefault(); toggleFormat('strikethrough'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Strikethrough">
                                                        <span className="material-symbols-outlined text-[20px]">strikethrough_s</span>
                                                    </button>
                                                </div>

                                                <div className="fmt-divider w-px h-6 bg-black/5 mx-1"></div>

                                                <div className="relative">
                                                    <button 
                                                        onClick={() => setActiveSubPopup(activeSubPopup === 'highlight' ? null : 'highlight')}
                                                        className={"w-10 h-10 flex items-center justify-center gap-1 rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'highlight' ? "bg-black/5" : "hover:bg-black/5")}
                                                    >
                                                        <span className="material-symbols-outlined text-[20px]">ink_highlighter</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {activeSubPopup === 'highlight' && (
                                                        <div className="absolute bottom-full right-0 mb-2 p-2 bg-white rounded-xl shadow-2xl border border-black/5 flex items-center z-[160] animate-in slide-in-from-bottom-1 duration-200" style={{ minWidth: '130px' }}>
                                                            <div className="grid grid-cols-4 gap-2">
                                                                <button 
                                                                    onMouseDown={(e) => { e.preventDefault(); toggleHighlight('transparent'); }}
                                                                    className="highlight-option flex items-center justify-center bg-white border-dashed"
                                                                    title="No Highlight"
                                                                >
                                                                    <span className="material-symbols-outlined text-xs text-slate-200">format_color_reset</span>
                                                                </button>
                                                                {['#fed7aa', '#fef08a', '#bbf7d0', '#bfdbfe', '#ddd6fe', '#fecaca', '#f5f5f5', '#ffedd5', '#fef9c3', '#dcfce7', '#dbeafe', '#f3e8ff', '#ffe4e6', '#ccfbf1', '#fef3c7'].map(c => (
                                                                    <button 
                                                                        key={c}
                                                                        onMouseDown={(e) => { e.preventDefault(); toggleHighlight(c); }}
                                                                        className="highlight-option" 
                                                                        style={{ backgroundColor: c }}
                                                                    />
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="relative">
                                                    <button 
                                                        onClick={() => setActiveSubPopup(activeSubPopup === 'divider' ? null : 'divider')}
                                                        className={"w-10 h-10 flex items-center justify-center rounded-lg text-slate-600 transition-colors " + (activeSubPopup === 'divider' ? "bg-black/5" : "hover:bg-black/5")}
                                                        title="Divider Colors"
                                                    >
                                                        <span className="material-symbols-outlined text-[20px]" style={{color: '#ea580c'}}>horizontal_rule</span>
                                                        <span className="material-symbols-outlined text-sm">arrow_drop_up</span>
                                                    </button>
                                                    {activeSubPopup === 'divider' && (
                                                        <div className="absolute bottom-full right-0 mb-2 p-2 bg-white rounded-xl shadow-2xl border border-black/5 flex items-center gap-2 z-[160] animate-in slide-in-from-bottom-1 duration-200">
                                                            {['#ea580c', '#334155', '#64748b', '#94a3b8', '#cbd5e1'].map(color => (
                                                                <button 
                                                                    key={color}
                                                                    onMouseDown={(e) => { 
                                                                        e.preventDefault(); 
                                                                        document.execCommand('insertHTML', false, `<hr style="border:none; border-top: 2px solid ${color}; margin: 1.5rem 0; width: 100%;" />`); 
                                                                        setHasChanges(true);
                                                                    }}
                                                                    className="divider-option w-6 h-6 rounded-full border border-black/5 hover:scale-110 transition-transform flex-shrink-0"
                                                                    style={{ backgroundColor: color }}
                                                                />
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                        </div>
                                    )}
                                </div>
                                <div className="relative flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setActivePopup(activePopup === 'tools' ? null : 'tools'); }} 
                                        className={"footer-action-btn flex items-center justify-center transition-all rounded-xl " + (activePopup === 'tools' ? "bg-black/5 text-secondary" : "text-secondary hover:bg-black/5") + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                        title="More Tools"
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[26px]">menu</span>
                                    </button>
                                    {activePopup === 'tools' && (
                                        <div className="absolute bottom-[calc(100%+8px)] left-0 md:left-0 md:translate-x-0 bg-white rounded-2xl shadow-xl border border-black/5 flex items-center p-1 z-[150] animate-in slide-in-from-bottom-2 duration-200">
                                                 <div className="flex items-center px-1">
                                                     <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('justifyLeft'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Align Left"><span className="material-symbols-outlined text-[20px]">format_align_left</span></button>
                                                     <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('justifyCenter'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Align Center"><span className="material-symbols-outlined text-[20px]">format_align_center</span></button>
                                                     <button onMouseDown={(e) => { e.preventDefault(); document.execCommand('justifyRight'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Align Right"><span className="material-symbols-outlined text-[20px]">format_align_right</span></button>
                                                 </div>
                                                 <div className="w-px h-6 bg-black/5 mx-1"></div>
                                                 <div className="flex items-center px-1">
                                                     <button onClick={() => { convertActiveBlock('checklist'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Checklist"><span className="material-symbols-outlined text-[20px]">checklist</span></button>
                                                     <button onClick={() => { document.execCommand('insertUnorderedList'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Bullets"><span className="material-symbols-outlined text-[20px]">format_list_bulleted</span></button>
                                                     <button onClick={() => { document.execCommand('insertOrderedList'); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Numbering"><span className="material-symbols-outlined text-[20px]">format_list_numbered</span></button>
                                                 </div>
                                                 <div className="w-px h-6 bg-black/5 mx-1"></div>
                                                 <div className="flex items-center px-1">
                                                     <button onClick={() => { fileInputRef.current.click(); }} className="w-10 h-10 flex items-center justify-center hover:bg-black/5 rounded-lg text-slate-600" title="Add Image"><span className="material-symbols-outlined text-[20px]">image</span></button>
                                                 </div>
                                             </div>
                                    )}
                                </div>
                                
                                <div className="footer-divider flex-shrink-0 hidden md:block"></div>

                                <div className="relative flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setActivePopup(activePopup === 'reminder' ? null : 'reminder'); }} 
                                        className={"footer-action-btn relative " + (activePopup === 'reminder' ? "bg-black/5 text-primary" : "") + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                        title="Reminders"
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[24px]">notifications</span>
                                        {reminderDate && <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-orange-500 rounded-full border-2 border-white"></span>}
                                    </button>
                                    {activePopup === 'reminder' && (
                                        <div className="absolute bottom-full mb-4 left-0 bg-white rounded-xl shadow-2xl border border-black/5 z-[150] w-72 animate-in slide-in-from-bottom-2 duration-300 py-2">
                                            {!showCustomReminder ? (
                                                <div className="flex flex-col">
                                                    <div className="px-5 py-3 border-b border-black/5 mb-1">
                                                        <p className="text-sm font-semibold text-slate-800 font-montserrat">Remind me later</p>
                                                    </div>
                                                    
                                                    <button onClick={() => { setNote(prev => ({...prev, reminderDate: new Date().toISOString().split('T')[0] + 'T18:00'})); setHasChanges(true); setActivePopup(null); }} className="px-5 py-3 hover:bg-black/5 flex items-center justify-between text-sm text-slate-600 transition-colors font-montserrat">
                                                        <span>Later today</span>
                                                        <span className="text-xs text-slate-400 font-montserrat">6:00 PM</span>
                                                    </button>
                                                    <button onClick={() => { 
                                                        const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
                                                        setNote(prev => ({...prev, reminderDate: tomorrow.toISOString().split('T')[0] + 'T08:00'})); setHasChanges(true); setActivePopup(null); 
                                                    }} className="px-5 py-3 hover:bg-black/5 flex items-center justify-between text-sm text-slate-600 transition-colors font-montserrat">
                                                        <span>Tomorrow</span>
                                                        <span className="text-xs text-slate-400 font-montserrat">8:00 AM</span>
                                                    </button>
                                                    
                                                    <div className="h-px bg-black/5 my-1"></div>
                                                    
                                                    <button onClick={() => { setShowCustomReminder(true); }} className="px-5 py-3 hover:bg-black/5 flex items-center gap-3 text-sm text-slate-700 font-semibold transition-colors font-montserrat justify-between">
                                                        <div className="flex items-center gap-3">
                                                            <span className="material-symbols-outlined text-lg">schedule</span>
                                                            <span className="font-montserrat">Custom</span>
                                                        </div>
                                                        {reminderDate && <span className="w-2.5 h-2.5 bg-orange-500 rounded-full flex-shrink-0"></span>}
                                                    </button>
                                                </div>
                                            ) : (
                                                <div className="p-4">
                                                    <div className="flex items-center gap-2 mb-4">
                                                        <button onClick={() => setShowCustomReminder(false)} className="p-1.5 hover:bg-black/5 rounded-full text-slate-500 transition-colors">
                                                            <span className="material-symbols-outlined text-lg">arrow_back</span>
                                                        </button>
                                                        <span className="text-sm font-bold text-slate-700 font-montserrat">Custom</span>
                                                    </div>
                                                    
                                                    <div className="space-y-4">
                                                        <div className="relative border-b border-black/10 focus-within:border-primary transition-colors">
                                                            <input 
                                                                type="date" 
                                                                className="w-full bg-transparent border-none p-2 text-sm focus:ring-0 text-slate-600 font-montserrat"
                                                                value={reminderDate.split('T')[0] || ""}
                                                                onChange={(e) => { 
                                                                    const newDate = e.target.value;
                                                                    const currentTime = reminderDate.split('T')[1] || "08:00";
                                                                    setNote(prev => ({...prev, reminderDate: `${newDate}T${currentTime}`})); 
                                                                    setHasChanges(true); 
                                                                }}
                                                            />
                                                        </div>
                                                        <div className="relative border-b border-black/10 focus-within:border-primary transition-colors">
                                                            <input 
                                                                type="time" 
                                                                className="w-full bg-transparent border-none p-2 text-sm focus:ring-0 text-slate-600 font-montserrat"
                                                                value={reminderDate.split('T')[1] || "08:00"}
                                                                onChange={(e) => { 
                                                                    const newTime = e.target.value;
                                                                    const currentDate = reminderDate.split('T')[0] || new Date().toISOString().split('T')[0];
                                                                    setNote(prev => ({...prev, reminderDate: `${currentDate}T${newTime}`})); 
                                                                    setHasChanges(true); 
                                                                }}
                                                            />
                                                        </div>
                                                    </div>

                                                    <div className="flex justify-end mt-6">
                                                        <button onClick={() => { setHasChanges(true); setActivePopup(null); }} className="px-6 py-2 text-sm font-bold text-slate-800 hover:bg-black/5 rounded-lg transition-all font-montserrat">
                                                            Save
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <div className="relative flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setActivePopup(activePopup === 'palette' ? null : 'palette'); }} 
                                        className={"footer-action-btn " + (activePopup === 'palette' ? "bg-black/5 text-black" : "") + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                        title="Theme"
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[24px]">palette</span>
                                    </button>
                                    {activePopup === 'palette' && (
                                        <div className="absolute bottom-full mb-4 left-0 md:left-0 md:translate-x-0 grid grid-cols-6 gap-2 p-3 w-max bg-white rounded-2xl shadow-2xl border border-black/5 z-[150] animate-in slide-in-from-bottom-2 duration-200">
                                            {themes.map(t => (
                                                <button 
                                                    key={t.id}
                                                    onClick={() => { setNote(prev => ({...prev, noteTheme: t.id})); setActivePopup(null); setHasChanges(true); saveState(); }}
                                                    className={"w-7 h-7 md:w-8 md:h-8 rounded-full border-2 transition-all hover:scale-110 flex-shrink-0 " + (note.noteTheme === t.id ? "border-primary" : "border-transparent")}
                                                    style={{ backgroundColor: t.id === 'glass' ? 'rgba(0,0,0,0.05)' : t.color }}
                                                />
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <input 
                                    type="file" 
                                    ref={fileInputRef} 
                                    className="hidden" 
                                    accept="image/*" 
                                    onChange={handleImageUpload}
                                />
                                <div className="relative flex-shrink-0">
                                    <button 
                                        onClick={() => { if(!canEdit) return; setActivePopup(activePopup === 'icon' ? null : 'icon'); }} 
                                        className={"footer-action-btn " + (activePopup === 'icon' ? "bg-black/5 text-primary" : "") + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                        title="Choose Icon"
                                        disabled={!canEdit}
                                    >
                                        <span className="material-symbols-outlined text-[24px]">add_reaction</span>
                                    </button>
                                    {activePopup === 'icon' && (
                                        <div className="absolute bottom-full mb-4 left-1/2 -translate-x-1/2 md:left-0 md:translate-x-0 flex flex-col p-3 bg-white rounded-2xl shadow-2xl border border-black/5 z-[120] w-72 md:w-80 animate-in slide-in-from-bottom-2 duration-200">
                                            <div className="search-bar-container">
                                                <span className="material-symbols-outlined text-slate-400 text-lg">search</span>
                                                <input 
                                                    type="text" 
                                                    placeholder="Search icons..." 
                                                    className="search-input bg-transparent focus:outline-none focus:ring-0"
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    autoFocus
                                                />
                                            </div>
                                            <div className="max-h-56 overflow-y-auto icon-picker-scroll grid grid-cols-4 gap-2 w-full pr-1 px-1">
                                                {filteredIcons.map(icon => (
                                                    <button 
                                                        key={icon}
                                                        onClick={() => { setNote(prev => ({...prev, noteIcon: icon})); setActivePopup(null); setHasChanges(true); saveState(); }}
                                                        className={"p-2 rounded-xl border border-transparent hover:border-primary/20 hover:bg-primary/5 transition-all flex items-center justify-center " + (note.noteIcon === icon ? "text-primary bg-primary/10" : "text-slate-400")}
                                                        title={icon}
                                                    >
                                                        <span className="material-symbols-outlined text-[20px]">{icon}</span>
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="h-px bg-slate-100 my-2 mx-1"></div>
                                            <button 
                                                onClick={() => { setNote(prev => ({...prev, noteIcon: ""})); setActivePopup(null); setHasChanges(true); saveState(); }}
                                                className="mx-1 p-2 rounded-xl border border-dashed border-slate-200 text-slate-400 hover:text-red-400 hover:bg-red-50 transition-all flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-wider font-montserrat"
                                            >
                                                <span className="material-symbols-outlined text-[18px]">block</span>
                                                Remove Icon
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                             
                             {/* Save Status Indicator */}
                             <div className="flex items-center gap-2 px-3">
                                 {isSaving ? (
                                     <div className="flex items-center gap-1.5 text-[10px] font-bold text-primary animate-saving uppercase tracking-widest font-montserrat">
                                         <span className="material-symbols-outlined text-sm">sync</span>
                                         <span>Saving...</span>
                                     </div>
                                 ) : lastSaved ? (
                                     <div className="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 uppercase tracking-widest font-montserrat opacity-60">
                                         <span className="material-symbols-outlined text-sm">cloud_done</span>
                                         <span>Saved</span>
                                     </div>
                                 ) : (
                                     <div className="flex items-center gap-1.5 text-[10px] font-bold text-slate-300 uppercase tracking-widest font-montserrat opacity-30">
                                         <span className="material-symbols-outlined text-sm">cloud</span>
                                         <span>Ready</span>
                                     </div>
                                 )}
                             </div>

                             <div className="flex items-center gap-1 md:gap-2">
                                 <button 
                                     onClick={undo} 
                                     disabled={historyIndex <= 0 || !canEdit} 
                                     className={"footer-action-btn flex-shrink-0 disabled:opacity-20" + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                     title="Undo"
                                 >
                                     <span className="material-symbols-outlined text-[24px]">undo</span>
                                 </button>
                                 <button 
                                     onClick={redo} 
                                     disabled={historyIndex >= history.length - 1 || !canEdit} 
                                     className={"footer-action-btn flex-shrink-0 disabled:opacity-20" + (!canEdit ? " opacity-30 grayscale pointer-events-none" : "")} 
                                     title="Redo"
                                 >
                                     <span className="material-symbols-outlined text-[24px]">redo</span>
                                 </button>
                                 <div className="relative flex-shrink-0">
                                     <button onClick={() => setActivePopup(activePopup === 'more' ? null : 'more')} className={"footer-action-btn " + (activePopup === 'more' ? "bg-black/5 text-primary" : "")} title="More Options">
                                         <span className="material-symbols-outlined text-[24px]">more_vert</span>
                                     </button>
                                     {activePopup === 'more' && (
                                         <div className="more-menu-dropdown z-[120] animate-in slide-in-from-bottom-2 duration-200">
                                             {canEdit && (
                                                 <button onClick={() => setActivePopup('labels')} className="menu-item font-montserrat">
                                                     <span className="material-symbols-outlined text-lg">label</span>
                                                     Add Label
                                                 </button>
                                             )}
                                             <button onClick={() => alert("Version History coming soon")} className="menu-item font-montserrat">
                                                 <span className="material-symbols-outlined text-lg">history</span>
                                                 Version History
                                             </button>
                                             <div className="h-px bg-slate-100 my-1"></div>
                                             <a href="index.html" className="menu-item font-montserrat">
                                                 <span className="material-symbols-outlined text-lg">dashboard</span>
                                Dashboard
                                             </a>
                                         </div>
                                     )}
                                     {activePopup === 'labels' && (
                                         <div className="more-menu-dropdown z-[120] w-56 animate-in scale-95 duration-200">
                                             <div className="flex items-center gap-2 mb-3 p-1">
                                                 <button onClick={() => setActivePopup('more')} className="p-1 hover:bg-slate-100 rounded-full">
                                                     <span className="material-symbols-outlined text-sm">arrow_back</span>
                                                 </button>
                                                 <span className="text-xs font-bold uppercase tracking-widest text-slate-400 font-montserrat">Add Label</span>
                                             </div>
                                             <div className="flex flex-col gap-1 mb-2 max-h-40 overflow-y-auto no-scrollbar">
                                                 {["PRIORITY", "PERSONAL", "WORK", "URGENT", "STRATEGY"].map(l => (
                                                     <button key={l} onClick={() => { 
                                                         const newLabels = labels.includes(l) ? labels.filter(x => x !== l) : [...labels, l];
                                                         setNote(prev => ({...prev, labels: newLabels})); 
                                                         setHasChanges(true); 
                                                     }} className="menu-item !py-2 justify-between font-montserrat">
                                                         <span>{l}</span>
                                                         {labels.includes(l) && <span className="material-symbols-outlined text-primary text-sm">check</span>}
                                                     </button>
                                                 ))}
                                             </div>
                                             <div className="h-px bg-slate-100 my-1"></div>
                                             <div className="flex gap-1 p-1">
                                                 <input 
                                                     type="text" 
                                                     placeholder="Custom label..." 
                                                     className="flex-1 bg-slate-50 border-none rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-primary/30 font-montserrat"
                                                     onKeyDown={e => {
                                                         if(e.key === 'Enter' && e.target.value.trim()) {
                                                             const cleanLabel = e.target.value.trim().toUpperCase();
                                                             const newLabels = labels.includes(cleanLabel) ? labels : [...labels, cleanLabel];
                                                             setNote(prev => ({...prev, labels: newLabels}));
                                                             e.target.value = "";
                                                             setHasChanges(true);
                                                         }
                                                     }}
                                                 />
                                             </div>
                                         </div>
                                     )}
                                 </div>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<ShareApp />);
    </script>
</body>
</html>
